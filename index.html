<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAÍZEN - GESTÃO V25.0</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --verde-raizen: #4d6d5d;
            --roxo-raizen: #84207d;
            --ouro-raizen: #ffc107;
            --fundo-base: #f1f5f9;
            --branco: #ffffff;
        }

        * { box-sizing: border-box; font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--fundo-base); padding-bottom: 50px; }

        /* HEADER ORIGINAL GIGANTE */
        header { 
            background: linear-gradient(135deg, var(--verde-raizen) 0%, #1a241f 100%); 
            padding: 90px 20px; text-align: center; border-bottom: 25px solid var(--roxo-raizen);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .logo-raizen-master { color: var(--branco); font-size: 85px; font-weight: 900; letter-spacing: 15px; text-transform: uppercase; }

        /* PAINEL MOTORISTA (O TELÃO) */
        .card-industrial { 
            width: 94%; max-width: 1100px; margin: 60px auto; background: var(--branco); 
            padding: 70px; border-radius: 60px; box-shadow: 0 40px 80px rgba(0,0,0,0.2); 
            border-left: 35px solid var(--roxo-raizen);
        }
        .card-industrial h2 { font-size: 38px; color: var(--roxo-raizen); font-weight: 900; margin-bottom: 40px; text-align: center; }
        
        input, select { 
            width: 100%; padding: 28px; border: 5px solid #e2e8f0; border-radius: 30px; 
            font-size: 24px; font-weight: 700; background: #f8fafc; margin-bottom: 30px;
        }

        .btn-principal { 
            width: 100%; padding: 40px; background: var(--roxo-raizen); color: white; border: none; 
            border-radius: 35px; font-size: 30px; font-weight: 900; cursor: pointer; text-transform: uppercase;
        }

        /* PAINEL ADM COMPLETO */
        #secao-operador { display: none; width: 98%; margin: 10px auto; background: var(--branco); padding: 20px; border-radius: 30px; }
        
        .area-filtros { display: flex; gap: 10px; margin-bottom: 15px; }
        .area-filtros input { padding: 15px; font-size: 16px; margin-bottom: 0; border: 3px solid var(--roxo-raizen); }

        /* TABELA SEM ROLAGEM LATERAL */
        .moldura-tabela { overflow-x: hidden; border: 2px solid #ddd; border-radius: 20px; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        
        th { background: #0f172a; color: white; padding: 10px 2px; font-size: 9px; text-transform: uppercase; }
        td { padding: 10px 2px; border-bottom: 1px solid #eee; text-align: center; font-weight: 800; font-size: 11px; word-wrap: break-word; }

        /* CAMPO DE EDIÇÃO DO COLETA NA TABELA */
        .input-coleta-edit { 
            width: 95%; padding: 5px; font-size: 11px; font-weight: 900; 
            border: 2px solid var(--ouro-raizen); border-radius: 5px; background: #fffde7; text-align: center;
        }

        .tag-prod { padding: 5px; border-radius: 6px; font-size: 9px; font-weight: 900; display: block; color: white; }
        .tag-gasolina { background: #ff8c00; }
        .tag-b100 { background: #5d4037; }
        .tag-anidro { background: #0056b3; }
        .tag-hidratado { background: #3b82f6; }

        .btn-acao { width: 100%; padding: 8px 0; border-radius: 6px; border: none; color: white; font-weight: 900; font-size: 9px; margin-bottom: 3px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="logo-raizen-master">RAÍZEN</div>
</header>

<div class="card-industrial" id="modulo-entrada">
    <h2>REGISTRO DE PÁTIO</h2>
    <form id="formDescarga">
        <input type="text" id="campo_placa" placeholder="PLACA" required>
        <select id="campo_produto" required>
            <option value="">PRODUTO...</option>
            <option value="GASOLINA">GASOLINA</option>
            <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
            <option value="ETANOL ANIDRO">ETANOL ANIDRO</option>
            <option value="ETANOL HIDRATADO">ETANOL HIDRATADO</option>
            <option value="DIESEL S10">DIESEL S10</option>
        </select>
        <input type="tel" id="campo_whatsapp" placeholder="WHATSAPP" required>
        <input type="time" id="campo_jornada">
        <button type="submit" class="btn-principal">REGISTRAR ENTRADA</button>
    </form>
    <button onclick="acessoOperador()" style="margin-top:30px; background:none; border:none; color:var(--roxo-raizen); text-decoration:underline; width:100%; font-weight:900; font-size:18px;">ADM - EDITAR FILA</button>
</div>

<div id="secao-operador">
    <div class="area-filtros">
        <input type="text" id="buscaPlaca" placeholder="Filtrar Placa..." onkeyup="filtrar()">
        <button onclick="sincronizarFila()" style="background:var(--verde-raizen); color:white; border:none; padding:10px; border-radius:10px; font-weight:900;">ATUALIZAR</button>
    </div>

    <div class="moldura-tabela">
        <table>
            <thead>
                <tr>
                    <th style="width: 18%;">PLACA</th>
                    <th style="width: 20%;">PRODUTO</th>
                    <th style="width: 22%;">AG. COLETA</th>
                    <th style="width: 18%;">JORNADA</th>
                    <th style="width: 22%;">AÇÕES</th>
                </tr>
            </thead>
            <tbody id="dadosFila"></tbody>
        </table>
    </div>
    <button class="btn-principal" style="background:#475569; margin-top:20px; font-size:20px;" onclick="location.reload()">SAIR</button>
</div>

<script>
    const API_URL = 'https://sheetdb.io/api/v1/p9z83v5m0dxq5';
    const SENHA_OP = 'raizen2026';

    function filtrar() {
        let p = document.getElementById("buscaPlaca").value.toUpperCase();
        let rows = document.getElementById("dadosFila").getElementsByTagName("tr");
        for (let r of rows) r.style.display = r.cells[0].innerText.toUpperCase().includes(p) ? "" : "none";
    }

    async function salvarColeta(placa, novoHorario) {
        await fetch(`${API_URL}/PLACA/${placa}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({"AGENDAMENTO NO COLETA": novoHorario})
        });
        console.log("Coleta atualizado para " + placa);
    }

    async function sincronizarFila() {
        const corpo = document.getElementById('dadosFila');
        corpo.innerHTML = "<tr><td colspan='5'>...</td></tr>";
        const res = await fetch(API_URL + "?t=" + Date.now());
        const json = await res.json();
        let ativos = json.filter(x => x.PLACA && !x.SAIDA);
        
        ativos.sort((a, b) => (a['AGENDAMENTO NO COLETA'] || '23:59').localeCompare(b['AGENDAMENTO NO COLETA'] || '23:59'));

        corpo.innerHTML = "";
        ativos.forEach(item => {
            const tr = document.createElement('tr');
            let p = item.PRODUTO.toUpperCase();
            let cor = p.includes("GASOLINA") ? "tag-gasolina" : p.includes("B100") ? "tag-b100" : p.includes("ANIDRO") ? "tag-anidro" : "tag-hidratado";

            tr.innerHTML = `
                <td style="color:var(--roxo-raizen);">${item.PLACA}</td>
                <td><span class="tag-prod ${cor}">${item.PRODUTO}</span></td>
                <td>
                    <input type="time" class="input-coleta-edit" value="${item['AGENDAMENTO NO COLETA'] || ''}" 
                    onchange="salvarColeta('${item.PLACA}', this.value)">
                </td>
                <td>${item.JORNADA || '24H'}</td>
                <td>
                    <button class="btn-acao" style="background:#22c55e;" onclick="window.open('https://api.whatsapp.com/send?phone=55${item.TELEFONE.replace(/\D/g,'')}&text=Placa ${item.PLACA}, favor encostar.')">ZAP</button>
                    <button class="btn-acao" style="background:#3b82f6;" onclick="finalizar('${item.PLACA}')">FIM</button>
                </td>
            `;
            corpo.appendChild(tr);
        });
    }

    async function finalizar(placa) {
        if(confirm(`Encerrar ${placa}?`)) {
            await fetch(`${API_URL}/PLACA/${placa}`, { method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({"SAIDA": new Date().toLocaleString()}) });
            sincronizarFila();
        }
    }

    document.getElementById('formDescarga').onsubmit = async e => {
        e.preventDefault();
        const dados = {
            "PLACA": document.getElementById('campo_placa').value.toUpperCase(),
            "PRODUTO": document.getElementById('campo_produto').value,
            "TELEFONE": document.getElementById('campo_whatsapp').value,
            "JORNADA": document.getElementById('campo_jornada').value || "24 HORAS",
            "ENTRADA": new Date().toLocaleString(),
            "SAIDA": ""
        };
        await fetch(API_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify([dados]) });
        alert("REGISTRADO!");
        location.reload();
    };

    function acessoOperador() {
        if(prompt("SENHA:") === SENHA_OP) {
            document.getElementById('modulo-entrada').style.display = 'none';
            document.getElementById('secao-operador').style.display = 'block';
            sincronizarFila();
        }
    }
</script>
</body>
</html>
