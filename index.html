<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200"> 
    <title>RAÍZEN - GESTÃO OPERACIONAL V29.0</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- DESIGN SYSTEM ORIGINAL RESTAURADO --- */
        :root {
            --verde-raizen: #4d6d5d;
            --roxo-raizen: #84207d;
            --ouro-raizen: #ffc107;
            --fundo-base: #f1f5f9;
            --branco: #ffffff;
            --cor-erro: #e11d48;
            --cor-sucesso: #10b981;
            --sombra-premium: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
        
        body { background-color: var(--fundo-base); color: #1e293b; min-height: 100vh; padding-bottom: 80px; overflow-x: auto; }

        header { 
            background: linear-gradient(135deg, var(--verde-raizen) 0%, #1a241f 100%); 
            padding: 100px 20px; text-align: center; border-bottom: 30px solid var(--roxo-raizen);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4); position: relative;
        }

        .logo-display {
            color: var(--branco); font-size: 110px; font-weight: 900;
            letter-spacing: 25px; text-transform: uppercase; text-shadow: 5px 5px 0px rgba(0,0,0,0.2);
        }

        .card-master { 
            width: 94%; max-width: 1150px; margin: -60px auto 60px; 
            background: var(--branco); padding: 70px; border-radius: 45px; 
            box-shadow: var(--sombra-premium); border-left: 35px solid var(--roxo-raizen);
            position: relative; z-index: 10;
        }

        /* Paineis Escondidos */
        #modulo-operador-full, #modulo-supervisao { 
            display: none; width: 98%; max-width: 1900px; margin: 40px auto;
            background: var(--branco); padding: 45px; border-radius: 35px;
            box-shadow: var(--sombra-premium); zoom: 0.75;
        }

        h2 { 
            color: var(--roxo-raizen); text-align: center; font-weight: 900; 
            text-transform: uppercase; margin-bottom: 50px; font-size: 38px; 
            border-bottom: 12px solid #f8fafc; padding-bottom: 25px;
        }

        .wrapper-input { margin-bottom: 40px; }
        label { display: flex; align-items: center; gap: 15px; margin-bottom: 18px; font-weight: 900; color: var(--verde-raizen); font-size: 16px; text-transform: uppercase; }

        input, select { 
            width: 100%; padding: 28px; border: 5px solid #f1f5f9; border-radius: 25px; 
            font-size: 24px; font-weight: 700; background: #f8fafc; transition: all 0.3s ease;
        }

        /* Painel Amarelo de Jornada - ORIGINAL */
        .painel-jornada { 
            background: #fffbeb; padding: 40px; border-radius: 40px; 
            border: 4px dashed var(--ouro-raizen); margin: 45px 0;
        }

        .btn-master { 
            width: 100%; padding: 35px; background: var(--roxo-raizen); 
            color: white; border: none; border-radius: 30px; 
            font-size: 26px; font-weight: 900; cursor: pointer; 
            text-transform: uppercase; box-shadow: 0 15px 0 #5e1659; 
            margin-bottom: 25px; display: flex; justify-content: center;
            align-items: center; gap: 20px;
        }
        .btn-master:active { transform: translateY(10px); box-shadow: 0 5px 0 #5e1659; }

        /* Estilos da Tabela Operacional */
        .moldura-tabela { overflow-x: auto; border-radius: 30px; border: 3px solid #f1f5f9; }
        table { width: 100%; border-collapse: collapse; min-width: 1750px; background: white; }
        th { background: #1e293b; color: white; padding: 25px; font-size: 13px; text-transform: uppercase; }
        td { padding: 20px; border-bottom: 3px solid #f8fafc; text-align: center; font-weight: 700; font-size: 17px; }

        .tag-p { padding: 12px 20px; border-radius: 15px; font-size: 13px; font-weight: 900; color: white; display: inline-block; min-width: 160px; }
        .bg-gas { background: #ff8c00; } 
        .bg-b100 { background: #5d4037; } 
        .bg-ani { background: #0056b3; } 
        .bg-hid { background: #00a8ff; border: 2px solid #0056b3; } 
        .bg-die { background: #334155; }

        /* Grid de Tanques */
        .grid-tanques { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card-tanque { padding: 30px; border-radius: 30px; background: #f8fafc; border: 5px solid #e2e8f0; text-align: center; }

        #loader-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95); z-index: 10000; flex-direction: column; align-items: center; justify-content: center;
        }
        .raizen-spinner { width: 90px; height: 90px; border: 12px solid #f3f3f3; border-top: 12px solid var(--roxo-raizen); border-radius: 50%; animation: girar 1s linear infinite; }
        @keyframes girar { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader-overlay"><div class="raizen-spinner"></div><h2 style="border:none; margin-top:25px;">SINCRONIZANDO...</h2></div>

<header><div class="logo-display">RAÍZEN</div></header>

<div class="card-master" id="secao-entrada">
    <div id="form-principal-wrapper">
        <h2><i class="fa-solid fa-truck-ramp-box"></i> REGISTRO DE ENTRADA</h2>
        <form id="formMaster">
            <div class="wrapper-input">
                <label><i class="fa-solid fa-barcode"></i> PLACA DO VEÍCULO</label>
                <input type="text" id="placa" placeholder="AAA-0000" maxlength="8" required>
            </div>
            <div class="wrapper-input">
                <label><i class="fa-solid fa-gas-pump"></i> PRODUTO</label>
                <select id="produto" required>
                    <option value="">-- SELECIONE --</option>
                    <option value="GASOLINA">GASOLINA</option>
                    <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
                    <option value="ETANOL ANIDRO">ETANOL ANIDRO</option>
                    <option value="ETANOL HIDRATADO">ETANOL HIDRATADO</option>
                    <option value="DIESEL S10">DIESEL S10</option>
                </select>
            </div>
            <div class="wrapper-input">
                <label><i class="fa-brands fa-whatsapp"></i> WHATSAPP MOTORISTA</label>
                <input type="tel" id="whatsapp" placeholder="(19) 99999-9999" required>
            </div>
            
            <div class="painel-jornada">
                <div id="area-tempo">
                    <label><i class="fa-solid fa-clock"></i> HORÁRIO LIMITE JORNADA</label>
                    <input type="time" id="limite" required> 
                </div>
                <label style="margin-top:25px; display:flex; align-items:center; gap:20px; cursor:pointer; font-size: 20px; font-weight: 900; color: var(--roxo-raizen);">
                    <input type="checkbox" id="jornada24" style="width:35px; height:35px;"> HABILITAR JORNADA 24 HORAS
                </label>
            </div>

            <button type="submit" class="btn-master">CONFIRMAR REGISTRO</button>
            <button type="button" onclick="abrirReabertura()" class="btn-master" style="background:#475569; box-shadow: 0 15px 0 #2d3748; font-size:18px;">
                <i class="fa-solid fa-clock-rotate-left"></i> REABRIR JORNADA EXISTENTE
            </button>
        </form>
    </div>

    <div id="form-reabertura-wrapper" style="display:none;">
        <h2 style="color:#475569">REABRIR REGISTRO</h2>
        <div class="wrapper-input">
            <label>PLACA</label>
            <input type="text" id="re_placa" placeholder="AAA-0000" maxlength="8">
        </div>
        <div class="wrapper-input">
            <label>NOVA HORA LIMITE</label>
            <input type="time" id="re_hora">
        </div>
        <button onclick="processarReabertura()" class="btn-master" style="background:#475569">ATUALIZAR JORNADA</button>
        <button onclick="fecharReabertura()" style="width:100%; background:none; border:none; color:var(--roxo-raizen); font-weight:900; cursor:pointer; padding:20px;">CANCELAR</button>
    </div>

    <div style="text-align:center; margin-top:50px; display:flex; justify-content:center; gap:30px;">
        <button onclick="acessoADM()" style="background:none; border:none; color:var(--roxo-raizen); font-weight:900; cursor:pointer; text-transform:uppercase;">
            <i class="fa-solid fa-lock"></i> ADM PÁTIO
        </button>
        <button onclick="acessoSupervisao()" style="background:none; border:none; color:var(--verde-raizen); font-weight:900; cursor:pointer; text-transform:uppercase;">
            <i class="fa-solid fa-user-shield"></i> SUPERVISÃO TANQUE
        </button>
    </div>
</div>

<div id="modulo-operador-full">
    <h2>PAINEL DE CONTROLE DE PÁTIO</h2>
    <div class="moldura-tabela">
        <table>
            <thead>
                <tr>
                    <th>VEÍCULO</th>
                    <th>PRODUTO</th>
                    <th style="background:#fefce8;">VOLUME (L)</th>
                    <th>STATUS JORNADA</th>
                    <th>CAPACIDADE TANQUE</th>
                    <th>AÇÕES WHATSAPP</th>
                    <th>FINALIZAR</th>
                </tr>
            </thead>
            <tbody id="listaFila"></tbody>
        </table>
    </div>
    <button class="btn-master" style="background:#1e293b; margin-top:40px;" onclick="location.reload()">SAIR</button>
</div>

<div id="modulo-supervisao">
    <h2><i class="fa-solid fa-user-shield"></i> SUPERVISÃO: AJUSTE DE TANQUES</h2>
    <div id="gridSupervisao" class="grid-tanques"></div>
    <button class="btn-master" style="background:#1e293b; margin-top:40px;" onclick="location.reload()">SAIR</button>
</div>

<script>
    const CONFIG = {
        URL: 'https://rbbkjuiizmvatiawfzuv.supabase.co/rest/v1',
        HEADERS: { 
            "apikey": 'sb_publishable_WkrHi6cWtZsnsDXl0nh1hA_kz1UT_1X', 
            "Authorization": `Bearer sb_publishable_WkrHi6cWtZsnsDXl0nh1hA_kz1UT_1X`, 
            "Content-Type": "application/json", "Prefer": "return=minimal"
        }
    };

    let memFila = [];
    let memTanques = [];

    /* --- MÁSCARAS ORIGINAIS --- */
    const maskP = el => el.oninput = function() {
        let v = this.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
        if (v.length > 3 && !isNaN(v[3])) v = v.substring(0,3) + "-" + v.substring(3,7);
        this.value = v.substring(0,8);
    };
    maskP(document.getElementById('placa'));
    maskP(document.getElementById('re_placa'));

    document.getElementById('whatsapp').oninput = e => {
        let v = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !v[2] ? v[1] : '(' + v[1] + ') ' + v[2] + (v[3] ? '-' + v[3] : '');
    };

    document.getElementById('jornada24').onchange = function() {
        document.getElementById('limite').disabled = this.checked;
        document.getElementById('area-tempo').style.opacity = this.checked ? "0.3" : "1";
    };

    /* --- LÓGICA DE DADOS --- */
    async function carregarTudo() {
        try {
            const [rF, rT] = await Promise.all([
                fetch(`${CONFIG.URL}/registros?SAIDA=is.null&select=*`, { headers: CONFIG.HEADERS }),
                fetch(`${CONFIG.URL}/ESTOQUE?select=*`, { headers: CONFIG.HEADERS })
            ]);
            memFila = await rF.json();
            memTanques = await rT.json();
            renderFila();
            renderSupervisao();
        } catch(e) { console.error(e); }
    }

    function renderFila() {
        const corpo = document.getElementById('listaFila');
        corpo.innerHTML = "";
        memFila.forEach(item => {
            const tq = memTanques.find(t => item.PRODUTO.includes(t.PRODUTO));
            const vol = Number(item.VOLUME) || 0;
            const espaco = tq ? Number(tq.ESPAÇO_DISPONIVEL) : 0;
            const podeChamar = vol > 0 && espaco >= vol;

            corpo.innerHTML += `
                <tr>
                    <td style="font-size:22px; color:var(--roxo-raizen);">${item.PLACA}</td>
                    <td><span class="tag-p bg-gas">${item.PRODUTO}</span></td>
                    <td>
                        <input type="number" id="v-${item.ID}" value="${item.VOLUME || ''}" style="width:100px; padding:10px; border-radius:10px;">
                        <button onclick="saveV(${item.ID})" style="background:var(--roxo-raizen); color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">OK</button>
                    </td>
                    <td>${item.JORNADA}</td>
                    <td>${podeChamar ? '<b style="color:green">LIBERADO</b>' : '<b style="color:red">TRAVADO (S/ ESPAÇO)</b>'}</td>
                    <td>
                        <button onclick="convocar('${item.TELEFONE}', '${item.PLACA}')" ${podeChamar ? '' : 'disabled'} 
                            style="background:${podeChamar ? '#25d366' : '#ccc'}; color:white; border:none; padding:15px; border-radius:15px; cursor:pointer; font-weight:900;">
                            WHATSAPP
                        </button>
                    </td>
                    <td><button onclick="saida(${item.ID}, ${vol}, ${tq?.id})" style="background:#3b82f6; color:white; border:none; padding:15px; border-radius:15px; cursor:pointer;">SAÍDA</button></td>
                </tr>`;
        });
    }

    async function saida(id, vol, tqId) {
        if(!confirm("FINALIZAR?")) return;
        setLoader(true);
        // Atualiza Saída
        await fetch(`${CONFIG.URL}/registros?ID=eq.${id}`, { method: 'PATCH', headers: CONFIG.HEADERS, body: JSON.stringify({ SAIDA: new Date().toLocaleString() }) });
        // Subtrai do Tanque
        if(tqId) {
            const t = memTanques.find(x => x.id === tqId);
            await fetch(`${CONFIG.URL}/ESTOQUE?id=eq.${tqId}`, { method: 'PATCH', headers: CONFIG.HEADERS, body: JSON.stringify({ ESPAÇO_DISPONIVEL: Number(t.ESPAÇO_DISPONIVEL) - vol }) });
        }
        carregarTudo();
        setLoader(false);
    }

    /* --- SUPERVISÃO --- */
    function renderSupervisao() {
        const grid = document.getElementById('gridSupervisao');
        grid.innerHTML = memTanques.map(t => `
            <div class="card-tanque">
                <h3>${t.TANQUE_NAME}</h3>
                <p>${t.PRODUTO}</p>
                <input type="number" id="sup-${t.id}" value="${t.ESPAÇO_DISPONIVEL}" style="margin:15px 0;">
                <button onclick="ajustarT(${t.id})" class="btn-master" style="font-size:16px; padding:20px;">ATUALIZAR ESPAÇO</button>
            </div>
        `).join('');
    }

    async function ajustarT(id) {
        const val = document.getElementById(`sup-${id}`).value;
        setLoader(true);
        await fetch(`${CONFIG.URL}/ESTOQUE?id=eq.${id}`, { method: 'PATCH', headers: CONFIG.HEADERS, body: JSON.stringify({ ESPAÇO_DISPONIVEL: val }) });
        carregarTudo();
        setLoader(false);
        alert("TANQUE ATUALIZADO!");
    }

    /* --- ACESSOS --- */
    function acessoADM() {
        if(prompt("SENHA ADM:") === "raizen2026") {
            document.getElementById('secao-entrada').style.display = 'none';
            document.getElementById('modulo-operador-full').style.display = 'block';
            carregarTudo();
        }
    }

    function acessoSupervisao() {
        if(prompt("SENHA SUPERVISÃO:") === "master2026") {
            document.getElementById('secao-entrada').style.display = 'none';
            document.getElementById('modulo-supervisao').style.display = 'block';
            carregarTudo();
        }
    }

    // Registro
    document.getElementById('formMaster').onsubmit = async e => {
        e.preventDefault();
        setLoader(true);
        const data = {
            PLACA: document.getElementById('placa').value.toUpperCase(),
            PRODUTO: document.getElementById('produto').value,
            TELEFONE: document.getElementById('whatsapp').value,
            JORNADA: document.getElementById('jornada24').checked ? "24 HORAS" : document.getElementById('limite').value,
            ENTRADA: new Date().toLocaleString()
        };
        await fetch(`${CONFIG.URL}/registros`, { method: 'POST', headers: CONFIG.HEADERS, body: JSON.stringify(data) });
        location.reload();
    };

    function setLoader(v) { document.getElementById('loader-overlay').style.display = v ? 'flex' : 'none'; }
    function abrirReabertura() { document.getElementById('form-principal-wrapper').style.display = 'none'; document.getElementById('form-reabertura-wrapper').style.display = 'block'; }
    function fecharReabertura() { document.getElementById('form-reabertura-wrapper').style.display = 'none'; document.getElementById('form-principal-wrapper').style.display = 'block'; }
    function convocar(t, p) { window.open(`https://wa.me/55${t.replace(/\D/g,"")}?text=Entrada autorizada para o veículo ${p}`); }
    async function saveV(id) {
        const v = document.getElementById(`v-${id}`).value;
        await fetch(`${CONFIG.URL}/registros?ID=eq.${id}`, { method: 'PATCH', headers: CONFIG.HEADERS, body: JSON.stringify({ VOLUME: v }) });
        carregarTudo();
    }
</script>
</body>
</html>
