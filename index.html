<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raízen - SISTEMA DE GESTÃO ÁREA 2 - TERMINAL PAULÍNIA</title>
    
    <style>
        :root {
            --verde-raizen: #4d6d5d; 
            --amarelo-raizen: #ffcd00;
            --fundo-cinza: #f8f9fa;
            --branco: #ffffff;
            --cor-perigo: #dc3545;
            --cor-sucesso: #28a745;
            --cor-info: #17a2b8;
            --sombra-viva: 0 15px 35px rgba(0,0,0,0.1);
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--fundo-cinza); 
            margin: 0; 
            padding: 0;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        /* HEADER IDENTIDADE RAÍZEN */
        header { 
            background-color: var(--verde-raizen); 
            width: 100%; 
            padding: 45px 0; 
            text-align: center; 
            border-bottom: 12px solid var(--amarelo-raizen); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            position: sticky;
            top: 0;
            z-index: 999;
        }
        
        header h1 { 
            color: var(--branco); 
            margin: 0; 
            font-size: 30px; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            font-weight: 900;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        /* CONTAINERS E BOXES */
        .container-principal { 
            width: 90%; 
            max-width: 800px; 
            margin: 50px auto; 
            background: var(--branco); 
            padding: 60px; 
            border-radius: 40px; 
            box-shadow: var(--sombra-viva); 
        }

        /* PAINEL ADMIN AMPLIADO */
        #painel-admin { 
            display: none; 
            max-width: 98%; 
            width: 1700px; 
        }

        h2 { 
            color: var(--verde-raizen); 
            text-align: center; 
            border-bottom: 5px solid var(--amarelo-raizen); 
            padding-bottom: 25px; 
            margin-bottom: 45px; 
            text-transform: uppercase;
            font-weight: 800;
        }
        
        /* ELEMENTOS DE FORMULÁRIO */
        .campo-grupo { margin-bottom: 30px; }

        label { 
            display: block; 
            margin-bottom: 12px; 
            font-weight: 800; 
            color: #333; 
            font-size: 18px; 
        }

        input, select { 
            width: 100%; 
            padding: 22px; 
            border: 2px solid #ddd; 
            border-radius: 18px; 
            box-sizing: border-box; 
            font-size: 19px; 
            color: #333;
            background-color: #fdfdfd;
            transition: all 0.4s ease;
        }
        
        input:focus { border-color: var(--verde-raizen); outline: none; box-shadow: 0 0 15px rgba(77,109,93,0.15); background: white; }

        /* DASHBOARD DE INDICADORES (ADMIN) */
        .indicadores {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-bottom: 50px;
        }
        
        .card-ind {
            background: #fff;
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            border-bottom: 8px solid var(--amarelo-raizen);
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
        }
        
        .card-ind h3 { margin: 0; font-size: 15px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .card-ind p { margin: 15px 0 0 0; font-size: 38px; font-weight: 950; color: var(--verde-raizen); }

        /* BUSCA DE PLACA (RESTAURADA E MELHORADA) */
        .wrapper-busca {
            background: #f1f3f5;
            padding: 35px;
            border-radius: 25px;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 30px;
            border: 2px solid #e9ecef;
        }
        .wrapper-busca label { margin-bottom: 0; min-width: 200px; color: var(--verde-raizen); font-size: 19px; }
        .wrapper-busca input { background: white; border: 2px solid var(--verde-raizen); font-weight: 800; }

        /* TABELA DE GESTÃO */
        .overflow-tabela { overflow-x: auto; background: white; border-radius: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.03); }
        
        table { width: 100%; border-collapse: collapse; min-width: 1300px; }
        
        th { 
            background: var(--verde-raizen); 
            color: white; 
            padding: 30px 20px; 
            text-align: center; 
            font-size: 14px; 
            text-transform: uppercase;
        }
        
        td { 
            padding: 25px 20px; 
            border-bottom: 1px solid #f2f2f2; 
            text-align: center; 
            font-size: 17px; 
            font-weight: 700; 
        }

        /* CORES POR PRODUTO */
        .tag-prod { padding: 10px 15px; border-radius: 10px; font-size: 13px; color: white; display: inline-block; min-width: 120px; text-transform: uppercase; }
        .tag-gasosa { background: #ffc107; color: #000; }
        .tag-b100 { background: #212529; }
        .tag-etanol { background: #28a745; }
        .tag-s10 { background: #6c757d; }

        /* STATUS AGENDADO VS PENDENTE */
        .blink-pendente { 
            color: white; 
            background: var(--cor-perigo); 
            padding: 15px 25px; 
            border-radius: 12px; 
            font-weight: 900; 
            animation: flash 1.5s infinite; 
        }
        
        .label-agendado { 
            color: #155724; 
            background: #d4edda; 
            padding: 18px; 
            border-radius: 15px; 
            border: 3px solid #c3e6cb; 
            display: block;
            font-weight: 900;
        }

        @keyframes flash { 50% { opacity: 0.4; } }

        /* BOTÕES */
        .btn-controle { 
            border: none; border-radius: 12px; padding: 16px; font-weight: bold; cursor: pointer; font-size: 12px; 
            width: 100%; margin-bottom: 10px; color: white; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-cor-agenda { background: white; color: var(--cor-info); border: 2.5px solid var(--cor-info); }
        .btn-cor-zap { background: #25D366; }
        .btn-cor-final { background: var(--cor-info); }

        .btn-enviar-master { 
            width: 100%; padding: 28px; background-color: var(--verde-raizen); color: white; border: none; border-radius: 20px; font-size: 26px; font-weight: 900; cursor: pointer; margin-top: 40px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); transition: 0.3s ease;
        }
        .btn-enviar-master:hover { background-color: #3d584a; transform: scale(1.02); }

        /* MODAL */
        #modalAgendamento { 
            display:none; position:fixed; z-index:9999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter: blur(12px); 
        }
        .modal-caixa { 
            background:white; margin:5% auto; padding:60px; border-radius:45px; width:500px; text-align: center; box-shadow: 0 60px 120px rgba(0,0,0,0.6); 
        }
    </style>
</head>
<body>

<header><h1>RAÍZEN - TERMINAL PAULÍNIA</h1></header>

<div class="container-principal" id="tela-motorista">
    <h2>REGISTRO DE DESCARGA</h2>
    <form id="formRegistroRaizen">
        <div class="campo-grupo">
            <label>Placa do Veículo</label>
            <input type="text" id="p_placa" placeholder="ABC-1234" maxlength="8" required>
        </div>
        
        <div class="campo-grupo">
            <label>Produto Carregado</label>
            <select id="p_produto" required>
                <option value="">Selecione o produto...</option>
                <option value="GASOLINA">GASOLINA</option>
                <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
                <option value="S10">S10</option>
                <option value="ANIDRO">ANIDRO</option>
                <option value="HIDRATADO">HIDRATADO</option>
            </select>
        </div>

        <div class="campo-grupo">
            <label>WhatsApp do Motorista</label>
            <input type="tel" id="p_zap" placeholder="(00) 00000-0000" maxlength="15" required>
        </div>

        <div style="background:#f1f8f4; padding:35px; border-radius:25px; border:2px dashed var(--verde-raizen); margin-top:35px;">
            <div id="secaoHora">
                <label style="margin-top: 0;">Fim da sua Jornada de Trabalho:</label>
                <input type="time" id="p_horaJornada" required>
            </div>
            <label style="display:flex; align-items:center; gap:18px; margin-top:25px; cursor:pointer; user-select:none;">
                <input type="checkbox" id="p_check24" style="width:30px; height:30px;" onchange="alternarHora()">
                <span style="font-weight:900; color:var(--verde-raizen); font-size:18px;">Minha jornada é de 24 Horas</span>
            </label>
        </div>

        <button type="submit" class="btn-enviar-master" id="btnSobeDados">REGISTRAR ENTRADA</button>
    </form>
    
    <div style="text-align:center; margin-top:40px;">
        <button onclick="logarAdmin()" style="background:none; border:none; color:#bbb; text-decoration:underline; cursor:pointer; font-size:16px;">Painel Administrativo (Uso Interno)</button>
    </div>
</div>

<div class="container-principal" id="painel-admin">
    <h2>GESTÃO DE PÁTIO ÁREA 2</h2>

    <div class="indicadores">
        <div class="card-ind"><h3>No Pátio</h3><p id="res_total">0</p></div>
        <div class="card-ind"><h3>Agendados</h3><p id="res_agendados" style="color:var(--cor-sucesso)">0</p></div>
        <div class="card-ind"><h3>Pendentes</h3><p id="res_pendentes" style="color:var(--cor-perigo)">0</p></div>
    </div>
    
    <div class="wrapper-busca">
        <label>🔎 <strong>FILTRAR POR PLACA:</strong></label>
        <input type="text" id="filtroPlaca" placeholder="Digite a placa para buscar na fila..." onkeyup="filtrarAgora()">
    </div>

    <div class="overflow-tabela">
        <table id="tabelaMaster">
            <thead>
                <tr>
                    <th>Placa</th>
                    <th>Produto</th>
                    <th>WhatsApp</th>
                    <th>Jornada</th>
                    <th style="background:#2d4a3e; color:white; width: 250px;">STATUS AGENDAMENTO</th>
                    <th>Tempo Pátio</th>
                    <th style="width: 200px;">Ações</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>

    <button class="btn-enviar-master" style="background:#444;" onclick="window.location.reload()">VOLTAR AO INÍCIO</button>
</div>

<div id="modalAgendamento">
    <div class="modal-caixa">
        <h3 style="font-size:26px;">Definir Agendamento</h3>
        <p id="placaAlvoTexto" style="font-weight:950; font-size:30px; color:var(--verde-raizen); margin-bottom:35px;"></p>
        <input type="hidden" id="hiddenPlaca">
        
        <label>Data Programada:</label>
        <input type="date" id="dataAgenda">
        
        <label>Hora Programada:</label>
        <input type="time" id="horaAgenda">
        
        <button class="btn-enviar-master" id="btnGravaAgenda" onclick="executarAgendamento()">CONFIRMAR NA PLANILHA</button>
        <button onclick="fecharModal()" style="margin-top:30px; border:none; background:none; color:red; font-weight:bold; cursor:pointer; font-size:18px;">CANCELAR</button>
    </div>
</div>

<script>
    const API_RAIZEN = 'https://sheetdb.io/api/v1/p9z83v5m0dxq5';

    // FUNÇÃO: ALTERNAR EXIBIÇÃO DA HORA
    function alternarHora() {
        const c = document.getElementById('p_check24').checked;
        document.getElementById('secaoHora').style.display = c ? 'none' : 'block';
        document.getElementById('p_horaJornada').required = !c;
    }

    // FUNÇÃO: MÁSCARAS
    document.getElementById('p_zap').addEventListener('input', (e) => {
        let v = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !v[2] ? v[1] : '(' + v[1] + ') ' + v[2] + (v[3] ? '-' + v[3] : '');
    });
    
    document.getElementById('p_placa').addEventListener('input', (e) => {
        let v = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
        if (v.length > 3 && !isNaN(v[3])) v = v.substring(0,3) + "-" + v.substring(3,7);
        e.target.value = v.substring(0,8);
    });

    // FUNÇÃO: FILTRO DE BUSCA (RESTAURADO)
    function filtrarAgora() {
        const t = document.getElementById("filtroPlaca").value.toUpperCase();
        const trs = document.querySelectorAll("#tabelaMaster tbody tr");
        trs.forEach(linha => {
            const p = linha.cells[0].textContent.toUpperCase();
            linha.style.display = p.includes(t) ? "" : "none";
        });
    }

    // FUNÇÃO: ATUALIZAR TABELA E LÓGICA DE AGENDAMENTO
    function carregarPlanilha() {
        const tb = document.querySelector('#tabelaMaster tbody');
        tb.innerHTML = "<tr><td colspan='7'>Consultando Planilha de Descarga...</td></tr>";

        fetch(API_RAIZEN + "?t=" + new Date().getTime())
        .then(res => res.json())
        .then(data => {
            const ativos = data.filter(i => i.PLACA && !i.SAIDA);
            
            // FILA: AGENDADOS NO TOPO
            ativos.sort((a, b) => {
                const aX = (a.COLETA && a.COLETA.trim() !== "" && a.COLETA !== "undefined") ? 0 : 1;
                const bX = (b.COLETA && b.COLETA.trim() !== "" && b.COLETA !== "undefined") ? 0 : 1;
                return aX - bX;
            });

            tb.innerHTML = "";
            let ag = 0; let pen = 0;

            ativos.forEach(i => {
                const temAgenda = i.COLETA && i.COLETA.trim() !== "" && i.COLETA !== "undefined";
                temAgenda ? ag++ : pen++;

                // COR DO PRODUTO
                let cor = "tag-s10";
                if(i.PRODUTO.includes("GASOLINA")) cor = "tag-gasosa";
                if(i.PRODUTO.includes("B100")) cor = "tag-b100";
                if(i.PRODUTO.includes("HIDRATADO") || i.PRODUTO.includes("ANIDRO")) cor = "tag-etanol";

                tb.innerHTML += `
                    <tr>
                        <td style="font-size:19px; color:var(--verde-raizen);">${i.PLACA}</td>
                        <td><span class="tag-prod ${cor}">${i.PRODUTO}</span></td>
                        <td>${i.TELEFONE}</td>
                        <td>${calcJornada(i.JORNADA)}</td>
                        <td style="background:#fcfcfc">
                            ${temAgenda 
                                ? `<span class="label-agendado">📅 ${i.COLETA}</span>` 
                                : `<span class="blink-pendente">⚠️ PENDENTE</span>`}
                        </td>
                        <td style="color:#777; font-size:13px;">${calcPatio(i.ENTRADA)}</td>
                        <td>
                            <button class="btn-controle btn-cor-agenda" onclick="abrirModal('${i.PLACA}')">📅 AGENDAR</button>
                            <button class="btn-controle btn-cor-zap" onclick="chamar('${i.TELEFONE}', '${i.PLACA}', '${i.COLETA}')">📱 CHAMAR</button>
                            <button class="btn-controle btn-cor-final" onclick="finalizar('${i.PLACA}')">✅ CONCLUIR</button>
                        </td>
                    </tr>`;
            });
            
            document.getElementById('res_total').innerText = ativos.length;
            document.getElementById('res_agendados').innerText = ag;
            document.getElementById('res_pendentes').innerText = pen;
        });
    }

    // AUXILIARES
    function calcJornada(h) {
        if (h === "24 Horas") return '<span style="color:green">LIVRE (24H)</span>';
        const ag = new Date(); const [hr, min] = h.split(':');
        const d = new Date(); d.setHours(hr, min, 0);
        return (d < ag) ? `<span style="color:red">VENCIDA</span>` : `<span style="color:green">EM DIA</span>`;
    }

    function calcPatio(ent) {
        if(!ent) return "-";
        const pt = ent.split(', '); const d = pt[0].split('/'); const h = pt[1].split(':');
        const dt = new Date(d[2], d[1]-1, d[0], h[0], h[1]);
        const df = Math.floor((new Date() - dt) / 60000);
        return df > 60 ? Math.floor(df/60) + "h " + (df%60) + "m" : df + " min";
    }

    // MODAL
    function abrirModal(p) {
        document.getElementById('hiddenPlaca').value = p;
        document.getElementById('placaAlvoTexto').innerText = "PLACA: " + p;
        document.getElementById('modalAgendamento').style.display = 'block';
    }
    function fecharModal() { document.getElementById('modalAgendamento').style.display = 'none'; }

    function executarAgendamento() {
        const p = document.getElementById('hiddenPlaca').value;
        const dt = document.getElementById('dataAgenda').value.split('-').reverse().join('/');
        const hr = document.getElementById('horaAgenda').value;
        if(!dt || !hr || dt === "") return alert("Preencha data e hora corretamente!");

        const btn = document.getElementById('btnGravaAgenda');
        btn.innerText = "GRAVANDO NA PLANILHA...";

        fetch(`${API_RAIZEN}/PLACA/${p}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ "COLETA": dt + " às " + hr })
        }).then(() => {
            fecharModal();
            carregarPlanilha();
            btn.innerText = "CONFIRMAR NA PLANILHA";
        });
    }

    // ENVIO DO MOTORISTA (CORREÇÃO CRÍTICA)
    document.getElementById('formRegistroRaizen').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSobeDados');
        btn.innerText = "SUBINDO REGISTRO...";

        // IMPORTANTE: Use exatamente os nomes das colunas da sua planilha (PLACA, PRODUTO, TELEFONE, etc)
        const payload = {
            "PLACA": document.getElementById('p_placa').value,
            "PRODUTO": document.getElementById('p_produto').value,
            "TELEFONE": document.getElementById('p_zap').value,
            "JORNADA": document.getElementById('p_check24').checked ? "24 Horas" : document.getElementById('p_horaJornada').value,
            "ENTRADA": new Date().toLocaleString('pt-BR'),
            "COLETA": "", 
            "SAIDA": ""
        };

        // Envia como ARRAY de objeto único (padrão SheetDB)
        fetch(API_RAIZEN, { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify([payload]) 
        })
        .then(response => {
            if (response.ok) {
                alert("REGISTRO SALVO COM SUCESSO!");
                location.reload();
            } else {
                alert("ERRO AO SALVAR: Verifique a conexão.");
                btn.innerText = "REGISTRAR ENTRADA";
            }
        })
        .catch(err => {
            console.error(err);
            alert("ERRO DE REDE: O servidor não respondeu.");
            btn.innerText = "REGISTRAR ENTRADA";
        });
    });

    function logarAdmin() { 
        if (prompt("SENHA DE ACESSO:") === "raizen2026") { 
            document.getElementById('tela-motorista').style.display='none'; 
            document.getElementById('painel-admin').style.display='block'; 
            carregarPlanilha(); 
        } 
    }
    
    function finalizar(p) { 
        if(confirm("Confirmar conclusão da descarga?")) {
            fetch(`${API_RAIZEN}/PLACA/${p}`, { 
                method: 'PATCH', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ "SAIDA": new Date().toLocaleString() }) 
            }).then(() => carregarPlanilha());
        }
    }

    function chamar(tel, p, c) {
        const b = prompt("QUAL A BAIA DE DESCARGA?");
        if(b) {
            const m = `*RAÍZEN - ÁREA 2*%0APLACA: *${p}*%0ACOLETA: *${c || 'Pendente'}*%0ABAIA: *${b}*%0A%0AFavor entrar para descarga imediatamente.`;
            window.open(`https://web.whatsapp.com/send?phone=55${tel.replace(/\D/g, "")}&text=${msg}`);
        }
    }
</script>
</body>
</html>
