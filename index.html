<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAÍZEN - SISTEMA DE GESTÃO DE PÁTIO V3.9</title>
    
    <style>
        :root {
            --verde-raizen: #4d6d5d; 
            --destaque-raizen: #84207d; /* Roxo Pantone 512 C */
            --fundo-cinza: #f4f7f6;
            --branco: #ffffff;
            --cor-pendente: #dc3545;
            --cor-sucesso: #28a745;
            --cor-info: #007bff;
            --sombra-premium: 0 15px 35px rgba(0,0,0,0.15);
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #f4f7f6 0%, #dce5e2 100%);
            background-attachment: fixed;
            margin: 0; 
            padding-bottom: 50px;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        /* HEADER ENCORPADO */
        header { 
            background: linear-gradient(to right, #4d6d5d, #3a5246);
            width: 100%; 
            padding: 40px 0; 
            text-align: center; 
            border-bottom: 12px solid var(--destaque-raizen); 
            box-shadow: 0 8px 25px rgba(0,0,0,0.3); 
            position: sticky;
            top: 0;
            z-index: 9999;
        }

        header img {
            height: 70px;
            margin-bottom: 15px;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.2));
        }
        
        header h1 { 
            color: var(--branco); 
            margin: 0; 
            font-size: 26px; 
            text-transform: uppercase; 
            letter-spacing: 5px; 
            font-weight: 900;
        }

        /* CAIXAS DE CONTEÚDO */
        .caixa-principal { 
            width: 95%; 
            max-width: 850px; 
            margin: 50px auto; 
            background: var(--branco); 
            padding: 45px; 
            border-radius: 45px; 
            box-shadow: var(--sombra-premium); 
            border-left: 15px solid var(--destaque-raizen);
            position: relative;
        }

        #painel-gestao-admin { 
            display: none; 
            max-width: 98%; 
            width: 1780px; 
        }

        h2 { 
            color: var(--verde-raizen); 
            text-align: center; 
            border-bottom: 5px solid #f0f0f0; 
            padding-bottom: 25px; 
            margin-bottom: 40px; 
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1px;
        }
        
        /* FORMULÁRIO */
        .grupo-campo { 
            margin-bottom: 30px; 
        }

        label { 
            display: block; 
            margin-bottom: 12px; 
            font-weight: 900; 
            color: #2c3e50; 
            font-size: 18px; 
        }

        input, select { 
            width: 100%; 
            padding: 22px; 
            border: 2px solid #ced4da; 
            border-radius: 20px; 
            box-sizing: border-box; 
            font-size: 20px; 
            background-color: #fafafa;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--destaque-raizen);
            outline: none;
            background-color: #fff;
        }

        /* TABELA E GESTÃO */
        .tabela-container { 
            overflow-x: auto; 
            background: white; 
            border-radius: 30px; 
            border: 1px solid #ddd; 
            margin-top: 20px;
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            min-width: 1500px; 
        }

        th { 
            background: var(--verde-raizen); 
            color: white; 
            padding: 25px 15px; 
            font-size: 14px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }

        td { 
            padding: 20px 15px; 
            border-bottom: 1px solid #f2f2f2; 
            text-align: center; 
            font-size: 17px; 
            font-weight: 700; 
            color: #333;
        }

        /* BOTÕES */
        .btn-geral { 
            border: none; 
            border-radius: 15px; 
            padding: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            width: 100%; 
            margin-bottom: 10px; 
            color: white; 
            text-transform: uppercase; 
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-whats { background: #25D366; box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3); }
        .btn-concluir { background: var(--cor-info); }
        .btn-principal-form { 
            width: 100%; 
            padding: 30px; 
            background-color: var(--destaque-raizen); 
            color: white; 
            border: none; 
            border-radius: 25px; 
            font-size: 26px; 
            font-weight: 900; 
            cursor: pointer; 
            margin-top: 40px;
            box-shadow: 0 10px 20px rgba(132, 32, 125, 0.3);
        }

        /* ETIQUETAS DE PRODUTO */
        .etiqueta-prod { 
            padding: 10px 20px; 
            border-radius: 12px; 
            font-size: 13px; 
            color: white; 
            display: inline-block; 
            min-width: 130px; 
            font-weight: 900; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        .cor-gasolina { background: #ffc107; color: #000; text-shadow: none; }
        .cor-biodiesel { background: #1a1a1a; }
        .cor-etanol { background: #28a745; }
        .cor-s10 { background: #6c757d; }

    </style>
</head>
<body>

<header>
    <img src="https://logodownload.org/wp-content/uploads/2019/08/raizen-logo.png" alt="Raízen Logística">
    <h1>TERMINAL PAULÍNIA - ÁREA 02</h1>
</header>

<div class="caixa-principal" id="container-motorista">
    <h2>REGISTRO DE DESCARGA</h2>
    <form id="formularioRaizen">
        <div class="grupo-campo">
            <label>Placa do Veículo (Caminhão/Bitrem)</label>
            <input type="text" id="inputPlaca" placeholder="ABC-1234" maxlength="8" required>
        </div>

        <div class="grupo-campo">
            <label>Produto para Descarga</label>
            <select id="inputProduto" required>
                <option value="">Selecione o produto no tanque...</option>
                <option value="GASOLINA">GASOLINA COMUM/ADITIVADA</option>
                <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
                <option value="S10">DIESEL S10</option>
                <option value="ANIDRO">ETANOL ANIDRO</option>
                <option value="HIDRATADO">ETANOL HIDRATADO</option>
            </select>
        </div>

        <div class="grupo-campo">
            <label>WhatsApp do Motorista</label>
            <input type="tel" id="inputZap" placeholder="(19) 99999-9999" maxlength="15" required>
        </div>
        
        <div style="background:#f8f9fa; padding:35px; border-radius:30px; border:3px dashed #cbd5e0; margin-top: 10px;">
            <div id="boxRelogio">
                <label>Horário Limite da Jornada:</label>
                <input type="time" id="inputHoraJornada" required>
            </div>
            
            <label style="display:flex; align-items:center; gap:20px; margin-top:25px; cursor:pointer;">
                <input type="checkbox" id="chk24" style="width:30px; height:30px; cursor:pointer;" onchange="alternarJornada(this)">
                <span style="font-weight:900; color:var(--destaque-raizen); font-size:18px;">Minha jornada é de 24 Horas</span>
            </label>
        </div>

        <button type="submit" class="btn-principal-form" id="btnEnviar">REGISTRAR ENTRADA NO PÁTIO</button>
    </form>
    
    <div style="text-align:center; margin-top:40px;">
        <button onclick="validaAcessoAdmin()" style="background:none; border:none; color:#adb5bd; text-decoration:underline; cursor:pointer; font-size:14px;">
            Acesso Restrito: Operador de Terminal
        </button>
    </div>
</div>

<div class="caixa-principal" id="painel-gestao-admin">
    <h2>PAINEL DE CONTROLE DE PÁTIO</h2>
    
    <div style="margin-bottom:30px; display: flex; gap: 20px; align-items: center; background: #eee; padding: 20px; border-radius: 20px;">
        <label style="margin:0; min-width: 100px;">🔍 FILTRAR:</label>
        <input type="text" id="buscaAdmin" placeholder="Busque por placa, produto ou telefone..." onkeyup="filtrarTabela()" style="padding:15px; margin:0;">
    </div>

    <div class="tabela-container">
        <table id="tabelaDados">
            <thead>
                <tr>
                    <th>Placa</th>
                    <th>Produto</th>
                    <th>WhatsApp</th>
                    <th>Status Jornada</th>
                    <th>Tempo Pátio</th>
                    <th style="background:#856404; color: #fff;">AGENDAMENTO COLETA</th>
                    <th style="width: 200px;">Ações Rápidas</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
    
    <button class="btn-principal-form" style="background:#495057; margin-top: 40px;" onclick="window.location.reload()">
        SAIR DO PAINEL / VOLTAR
    </button>
</div>

<script>
    const SHEET_API = 'https://sheetdb.io/api/v1/p9z83v5m0dxq5';
    const NOME_COLUNA_AGENDAMENTO = "AGENDAMENTO NO COLETA";

    // --- LÓGICA DE FORMATAÇÃO E MÁSCARAS ---
    
    function alternarJornada(checkbox) {
        const box = document.getElementById('boxRelogio');
        const input = document.getElementById('inputHoraJornada');
        if (checkbox.checked) {
            box.style.opacity = '0.3';
            input.required = false;
            input.disabled = true;
        } else {
            box.style.opacity = '1';
            input.required = true;
            input.disabled = false;
        }
    }

    document.getElementById('inputZap').addEventListener('input', function(e) {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
    });

    document.getElementById('inputPlaca').addEventListener('input', function(e) {
        let v = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
        if (v.length > 3 && !isNaN(v[3])) {
            v = v.substring(0,3) + "-" + v.substring(3,7);
        }
        e.target.value = v.substring(0,8);
    });

    // --- FUNÇÕES DE COMUNICAÇÃO E GESTÃO ---

    function chamarZapMotorista(tel) {
        const baia = prompt("MENSAGEM AO MOTORISTA:\nPara qual BAIA ele deve se dirigir agora?");
        if (!baia) return;

        const foneLimpo = tel.replace(/\D/g, "");
        // MENSAGEM ORIGINAL PRESERVADA
        const texto = `Olá%0AMotorista vamos descarregar?%0ABaia *${baia}* - Área 02%0AObrigado!%0A%0A_Obs: aguarde a instrução do operador para entrar na baia!_`;
        
        // LINK wa.me PARA FORÇAR ABERTURA DO APP NO CELULAR
        const urlZap = `https://wa.me/55${foneLimpo}?text=${texto}`;
        window.open(urlZap, '_blank');
    }

    function salvarAgendamentoFull(placa) {
        const dataInput = document.getElementById(`date-${placa}`).value;
        const horaInput = document.getElementById(`time-${placa}`).value;
        
        if (!dataInput || !horaInput) {
            alert("Erro: Defina Data e Hora do agendamento primeiro.");
            return;
        }

        let objUpdate = {};
        objUpdate[NOME_COLUNA_AGENDAMENTO] = `${dataInput} ${horaInput}`;

        fetch(`${SHEET_API}/PLACA/${placa}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(objUpdate)
        })
        .then(res => {
            if(res.ok) {
                alert("Sucesso: Sincronizado com o Portal Coleta!");
                atualizarPainel();
            }
        });
    }

    // --- LÓGICA DE PROCESSAMENTO DE DADOS ---

    function calcJornadaStatus(jornada) {
        if (jornada === "24 Horas") return '<span style="color:#28a745">LIVRE (24H)</span>';
        if (!jornada) return "---";

        const agora = new Date();
        const [horas, minutos] = jornada.split(':');
        const dataLimite = new Date();
        dataLimite.setHours(parseInt(horas), parseInt(minutos), 0);

        if (dataLimite < agora) {
            return `<span style="color:#dc3545; background:#fff5f5; padding:5px; border-radius:5px;">⚠️ VENCIDA (${jornada})</span>`;
        } else {
            return `<span style="color:#28a745">DENTRO DO PRAZO (${jornada})</span>`;
        }
    }

    function calcTempoPátio(entradaStr) {
        if (!entradaStr) return "---";
        try {
            const partes = entradaStr.split(', ');
            const dPartes = partes[0].split('/');
            const hPartes = partes[1].split(':');
            const dtEntrada = new Date(dPartes[2], dPartes[1]-1, dPartes[0], hPartes[0], hPartes[1]);
            const diffMs = new Date() - dtEntrada;
            const diffMin = Math.floor(diffMs / 60000);

            if (diffMin < 60) return diffMin + " min";
            const h = Math.floor(diffMin / 60);
            const m = diffMin % 60;
            return `${h}h ${m}m`;
        } catch (err) {
            return "Erro data";
        }
    }

    function filtrarTabela() {
        const termo = document.getElementById("buscaAdmin").value.toUpperCase();
        const linhas = document.querySelectorAll("#tabelaDados tbody tr");
        linhas.forEach(linha => {
            const texto = linha.innerText.toUpperCase();
            linha.style.display = texto.indexOf(termo) > -1 ? "" : "none";
        });
    }

    function atualizarPainel() {
        const tbody = document.querySelector('#tabelaDados tbody');
        tbody.innerHTML = "<tr><td colspan='7' style='padding:50px; color:#666;'>Sincronizando com a base de dados Raízen...</td></tr>";

        fetch(SHEET_API + "?t=" + new Date().getTime())
        .then(response => response.json())
        .then(dados => {
            tbody.innerHTML = "";
            const ativos = dados.filter(item => item.PLACA && !item.SAIDA);

            ativos.forEach(item => {
                let classeCor = "cor-s10";
                if (item.PRODUTO.includes("GASOLINA")) classeCor = "cor-gasolina";
                if (item.PRODUTO.includes("B100")) classeCor = "cor-biodiesel";
                if (item.PRODUTO.includes("HIDRATADO") || item.PRODUTO.includes("ANIDRO")) classeCor = "cor-etanol";

                const agendamento = item[NOME_COLUNA_AGENDAMENTO] || " ";
                const [dataS, horaS] = agendamento.split(" ");

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-size:20px; color:var(--verde-raizen);">${item.PLACA}</td>
                    <td><span class="etiqueta-prod ${classeCor}">${item.PRODUTO}</span></td>
                    <td style="color:#555;">${item.TELEFONE}</td>
                    <td>${calcJornadaStatus(item.JORNADA)}</td>
                    <td style="font-size:14px; font-weight:400;">${calcTempoPátio(item.ENTRADA)}</td>
                    <td style="background:#fdf2ff; border-left: 2px solid var(--destaque-raizen);">
                        <div style="display:flex; flex-direction:column; gap:5px; align-items:center;">
                            <input type="date" id="date-${item.PLACA}" value="${dataS || ''}" style="width:140px; padding:8px; font-size:12px; border:1px solid #ddd;">
                            <input type="time" id="time-${item.PLACA}" value="${horaS || ''}" style="width:140px; padding:8px; font-size:12px; border:1px solid #ddd;">
                            <button onclick="salvarAgendamentoFull('${item.PLACA}')" style="background:var(--destaque-raizen); color:white; border:none; padding:8px; border-radius:8px; cursor:pointer; width:100%; font-size:11px; font-weight:bold;">ATUALIZAR COLETA</button>
                        </div>
                    </td>
                    <td>
                        <button class="btn-geral btn-whats" onclick="chamarZapMotorista('${item.TELEFONE}')">📱 WHATSAPP</button>
                        <button class="btn-geral btn-concluir" onclick="finalizaDescarga('${item.PLACA}')">✅ CONCLUIR</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        });
    }

    // --- SUBMISSÃO E FINALIZAÇÃO ---

    document.getElementById('formularioRaizen').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnEnviar');
        btn.innerHTML = "PROCESSANDO REGISTRO...";
        btn.disabled = true;

        const registro = {
            "PLACA": document.getElementById('inputPlaca').value,
            "PRODUTO": document.getElementById('inputProduto').value,
            "TELEFONE": document.getElementById('inputZap').value,
            "JORNADA": document.getElementById('chk24').checked ? "24 Horas" : document.getElementById('inputHoraJornada').value,
            "ENTRADA": new Date().toLocaleString('pt-BR'),
            "SAIDA": ""
        };
        registro[NOME_COLUNA_AGENDAMENTO] = "";

        fetch(SHEET_API, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify([registro])
        })
        .then(() => {
            alert("ENTRADA REGISTRADA!\nO motorista foi adicionado à fila de descarga.");
            location.reload();
        });
    };

    function finalizaDescarga(placa) {
        if (confirm(`Deseja confirmar a SAÍDA definitiva do veículo ${placa}?`)) {
            fetch(`${SHEET_API}/PLACA/${placa}`, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ "SAIDA": new Date().toLocaleString('pt-BR') })
            })
            .then(() => {
                atualizarPainel();
            });
        }
    }

    function validaAcessoAdmin() {
        const pass = prompt("IDENTIFICAÇÃO REQUERIDA:\nDigite a senha de operador:");
        if (pass === "raizen2026") {
            document.getElementById('container-motorista').style.display = 'none';
            document.getElementById('painel-gestao-admin').style.display = 'block';
            atualizarPainel();
        } else if (pass !== null) {
            alert("Senha incorreta. Acesso registrado como tentativa inválida.");
        }
    }

    console.log("Sistema de Gestão Raízen V3.9 iniciado. Integrado com Coleta Portal.");
</script>
</body>
</html>
