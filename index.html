<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAÍZEN - GESTÃO OPERACIONAL DE TERMINAL V26.9</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- DESIGN SYSTEM INDUSTRIAL RAÍZEN --- */
        :root {
            --verde-raizen: #4d6d5d;
            --roxo-raizen: #84207d;
            --ouro-raizen: #ffc107;
            --fundo-base: #f1f5f9;
            --cor-borda: #cbd5e1;
            --branco: #ffffff;
            --cor-erro: #e11d48;
            --cor-sucesso: #10b981;
            --sombra-premium: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
        
        body { 
            background-color: var(--fundo-base); 
            color: #1e293b; 
            min-height: 100vh; 
            padding-bottom: 80px;
            overflow-x: hidden;
        }

        /* --- CABEÇALHO --- */
        header { 
            background: linear-gradient(135deg, var(--verde-raizen) 0%, #1a241f 100%); 
            padding: 100px 20px; 
            text-align: center; 
            border-bottom: 30px solid var(--roxo-raizen);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            position: relative;
        }

        .logo-display {
            color: var(--branco); 
            font-size: clamp(50px, 12vw, 110px); 
            font-weight: 900;
            letter-spacing: 25px; 
            text-transform: uppercase;
            text-shadow: 5px 5px 0px rgba(0,0,0,0.2);
        }

        .tagline {
            color: var(--ouro-raizen);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 8px;
            font-weight: 700;
            margin-top: 10px;
        }

        /* --- CONTAINERS --- */
        .card-master { 
            width: 94%; 
            max-width: 1150px; 
            margin: -60px auto 60px; 
            background: var(--branco); 
            padding: 70px; 
            border-radius: 45px; 
            box-shadow: var(--sombra-premium); 
            border-left: 35px solid var(--roxo-raizen);
            position: relative;
            z-index: 10;
        }

        #modulo-operador-full { 
            display: none; 
            width: 98%; 
            max-width: 1800px; 
            margin: 40px auto;
            background: var(--branco); 
            padding: 45px; 
            border-radius: 30px;
            box-shadow: var(--sombra-premium); 
            zoom: 0.8;
        }

        h2 { 
            color: var(--roxo-raizen); 
            text-align: center; 
            font-weight: 900; 
            text-transform: uppercase; 
            margin-bottom: 50px; 
            font-size: 38px; 
            letter-spacing: -1.5px;
            border-bottom: 12px solid #f8fafc;
            padding-bottom: 25px;
        }

        /* --- FORMULÁRIOS --- */
        .wrapper-input { margin-bottom: 40px; position: relative; }
        
        label { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            margin-bottom: 18px; 
            font-weight: 900; 
            color: var(--verde-raizen); 
            font-size: 16px; 
            text-transform: uppercase;
        }

        input, select { 
            width: 100%; 
            padding: 28px; 
            border: 5px solid #f1f5f9; 
            border-radius: 25px; 
            font-size: 24px; 
            font-weight: 700; 
            background: #f8fafc; 
            color: #334155;
            transition: all 0.3s ease;
        }

        input:focus { 
            border-color: var(--roxo-raizen); 
            background: var(--branco); 
            box-shadow: 0 0 0 15px rgba(132, 32, 125, 0.08);
        }

        .painel-jornada { 
            background: #fffbeb; 
            padding: 50px; 
            border-radius: 40px; 
            border: 4px dashed var(--ouro-raizen); 
            margin: 45px 0;
        }

        .check-container {
            display: flex;
            align-items: center;
            gap: 25px;
            background: white;
            padding: 25px;
            border-radius: 20px;
            cursor: pointer;
            border: 3px solid #fef3c7;
        }

        .check-container input { width: 40px; height: 40px; }
        .texto-alerta { font-weight: 900; color: var(--cor-erro); font-size: 22px; }

        /* --- BOTÕES --- */
        .btn-master { 
            width: 100%; 
            padding: 35px; 
            background: var(--roxo-raizen); 
            color: white; 
            border: none; 
            border-radius: 30px; 
            font-size: 26px; 
            font-weight: 900; 
            cursor: pointer; 
            text-transform: uppercase; 
            box-shadow: 0 15px 0 #5e1659; 
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            transition: 0.2s;
        }

        .btn-master:active { transform: translateY(10px); box-shadow: 0 5px 0 #5e1659; }
        .btn-master:hover { filter: contrast(1.2); }

        /* --- TABELA OPERACIONAL --- */
        .filtros-top { display: flex; gap: 20px; margin-bottom: 40px; justify-content: center; flex-wrap: wrap; }
        .chip-filtro { 
            padding: 18px 40px; border-radius: 20px; border: none; background: #e2e8f0;
            font-weight: 900; cursor: pointer; color: #64748b; font-size: 14px;
        }
        .chip-filtro.active { background: var(--roxo-raizen); color: white; transform: scale(1.1); }

        .moldura-tabela { 
            overflow-x: auto; 
            border-radius: 30px; 
            border: 3px solid #f1f5f9; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        table { width: 100%; border-collapse: collapse; min-width: 1500px; background: white; }
        th { background: #1e293b; color: #ffffff; padding: 25px; font-size: 14px; text-transform: uppercase; letter-spacing: 3px; }
        td { padding: 25px; border-bottom: 3px solid #f8fafc; text-align: center; font-weight: 700; font-size: 18px; }

        .linha-vip { background-color: #fff9c4 !important; }

        /* Etiquetas de Produto */
        .tag-p { padding: 12px 20px; border-radius: 15px; font-size: 13px; font-weight: 900; display: inline-block; min-width: 150px; color: white; }
        .bg-gas { background: #ff8c00; } 
        .bg-b100 { background: #5d4037; } 
        .bg-anidro { background: #0056b3; } 
        .bg-hidra { background: #00a8ff; border: 2px solid #0056b3; } 
        .bg-diesel { background: #334155; } 

        /* --- LOADER --- */
        #loader-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.98); z-index: 10000; 
            flex-direction: column; align-items: center; justify-content: center;
        }
        .raizen-spinner { 
            width: 100px; height: 100px; border: 12px solid #f3f3f3; 
            border-top: 12px solid var(--roxo-raizen); border-radius: 50%; 
            animation: girar 1s linear infinite; 
        }
        @keyframes girar { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #log-sync { text-align: center; font-size: 14px; color: #94a3b8; font-weight: 800; padding: 20px; }
    </style>
</head>
<body>

<div id="loader-overlay">
    <div class="raizen-spinner"></div>
    <h2 style="border:none; margin-top:30px;">SINCRONIZANDO SISTEMA...</h2>
</div>

<header>
    <div class="logo-display">RAÍZEN</div>
    <div class="tagline">Gestão de Pátio e Logística de Combustíveis</div>
</header>

<div class="card-master" id="secao-entrada">
    <div id="form-principal-wrapper">
        <h2><i class="fa-solid fa-truck-ramp-box"></i> REGISTRO DE CHEGADA</h2>
        <form id="formMaster">
            <div class="wrapper-input">
                <label><i class="fa-solid fa-barcode"></i> PLACA DO VEÍCULO</label>
                <input type="text" id="placa" placeholder="AAA-0000" maxlength="8" required>
            </div>

            <div class="wrapper-input">
                <label><i class="fa-solid fa-gas-pump"></i> TIPO DE PRODUTO</label>
                <select id="produto" required>
                    <option value="">-- SELECIONE --</option>
                    <option value="GASOLINA COMUM / ADITIVADA">GASOLINA COMUM / ADITIVADA</option>
                    <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
                    <option value="ETANOL ANIDRO">ETANOL ANIDRO</option>
                    <option value="ETANOL HIDRATADO">ETANOL HIDRATADO</option>
                    <option value="DIESEL S10">DIESEL S10</option>
                </select>
            </div>

            <div class="wrapper-input">
                <label><i class="fa-brands fa-whatsapp"></i> CELULAR DO MOTORISTA</label>
                <input type="tel" id="whatsapp" placeholder="(19) 99999-9999" required>
            </div>

            <div class="painel-jornada">
                <div id="box-time">
                    <label><i class="fa-solid fa-hourglass-half"></i> LIMITE DE JORNADA</label>
                    <input type="time" id="limite">
                </div>
                <label class="check-container" style="margin-top:30px;">
                    <input type="checkbox" id="jornada24">
                    <span class="texto-alerta">Habilitar Jornada 24 Horas</span>
                </label>
            </div>

            <button type="submit" class="btn-master"><i class="fa-solid fa-check-double"></i> CONFIRMAR REGISTRO</button>
            
            <button type="button" onclick="abrirReabertura()" class="btn-master" style="background:#475569; box-shadow: 0 15px 0 #2d3748; font-size:18px;">
                <i class="fa-solid fa-clock-rotate-left"></i> REABRIR JORNADA EXISTENTE
            </button>
        </form>
    </div>

    <div id="form-reabertura-wrapper" style="display:none;">
        <h2 style="color:#475569">REABRIR REGISTRO</h2>
        <div class="wrapper-input">
            <label>PLACA</label>
            <input type="text" id="re_placa" placeholder="AAA-0000" maxlength="8">
        </div>
        <div class="wrapper-input">
            <label>NOVO HORÁRIO LIMITE</label>
            <input type="time" id="re_hora">
        </div>
        <button onclick="processarReabertura()" class="btn-master" style="background:#475569">ATUALIZAR JORNADA</button>
        <button onclick="fecharReabertura()" style="width:100%; background:none; border:none; color:var(--roxo-raizen); font-weight:900; cursor:pointer; padding: 20px;">CANCELAR</button>
    </div>

    <div style="text-align:center; margin-top:50px;">
        <button onclick="ativarOperador()" style="background:none; border:none; color:var(--roxo-raizen); font-weight:900; cursor:pointer; text-transform:uppercase; letter-spacing:2px;">
            <i class="fa-solid fa-lock"></i> Acesso Operacional
        </button>
    </div>
</div>

<div id="modulo-operador-full">
    <h2>PAINEL DE CONTROLE DE PÁTIO</h2>
    
    <div class="filtros-top">
        <button class="chip-filtro active" onclick="filtrar('TODOS', this)">TODOS</button>
        <button class="chip-filtro" onclick="filtrar('GASOLINA', this)">GASOLINA</button>
        <button class="chip-filtro" onclick="filtrar('BIODIESEL', this)">BIODIESEL</button>
        <button class="chip-filtro" onclick="filtrar('ANIDRO', this)">ANIDRO</button>
        <button class="chip-filtro" onclick="filtrar('HIDRATADO', this)">HIDRATADO</button>
        <button class="chip-filtro" onclick="filtrar('DIESEL', this)">DIESEL S10</button>
    </div>

    <div id="log-sync">Aguardando atualização...</div>

    <div class="moldura-tabela">
        <table>
            <thead>
                <tr>
                    <th>VEÍCULO</th>
                    <th>PRODUTO</th>
                    <th>STATUS JORNADA</th>
                    <th>ENTRADA</th>
                    <th style="background:#fff7ed; color:#c2410c;">AGENDAMENTO</th>
                    <th>WHATSAPP</th>
                    <th>AÇÕES</th>
                </tr>
            </thead>
            <tbody id="listaFila"></tbody>
        </table>
    </div>

    <div style="margin-top:40px; display:flex; gap:30px;">
        <button class="btn-master" style="background:#1e293b; box-shadow: 0 15px 0 #0f172a;" onclick="location.reload()">
            <i class="fa-solid fa-door-open"></i> SAIR
        </button>
        <button class="btn-master" style="background:var(--verde-raizen); box-shadow: 0 15px 0 #2d3e35;" onclick="carregarDados()">
            <i class="fa-solid fa-sync"></i> ATUALIZAR AGORA
        </button>
    </div>
</div>

<script>
    /* --- CONFIGURAÇÃO SUPABASE --- */
    const RAÍZEN_DB = {
        URL: 'https://rbbkjuiizmvatiawfzuv.supabase.co',
        KEY: 'sb_publishable_WkrHi6cWtZsnsDXl0nh1hA_kz1UT_1X',
        ID_COL: 'ID',
        HEADERS: { 
            "apikey": 'sb_publishable_WkrHi6cWtZsnsDXl0nh1hA_kz1UT_1X', 
            "Authorization": `Bearer sb_publishable_WkrHi6cWtZsnsDXl0nh1hA_kz1UT_1X`, 
            "Content-Type": "application/json",
            "Prefer": "return=minimal"
        }
    };

    let memoriaFila = [];
    let filtroAtivo = 'TODOS';

    /* --- UTILITÁRIOS --- */
    function setLoader(v) { document.getElementById('loader-overlay').style.display = v ? 'flex' : 'none'; }
    function abrirReabertura() { document.getElementById('form-principal-wrapper').style.display = 'none'; document.getElementById('form-reabertura-wrapper').style.display = 'block'; }
    function fecharReabertura() { document.getElementById('form-reabertura-wrapper').style.display = 'none'; document.getElementById('form-principal-wrapper').style.display = 'block'; }

    // Máscara Placa
    const aplicarMascaraPlaca = (el) => {
        el.oninput = function() {
            let v = this.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
            if (v.length > 3 && !isNaN(v[3])) v = v.substring(0,3) + "-" + v.substring(3,7);
            this.value = v.substring(0,8);
        };
    };
    aplicarMascaraPlaca(document.getElementById('placa'));
    aplicarMascaraPlaca(document.getElementById('re_placa'));

    // Máscara WhatsApp
    document.getElementById('whatsapp').oninput = function(e) {
        let v = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !v[2] ? v[1] : '(' + v[1] + ') ' + v[2] + (v[3] ? '-' + v[3] : '');
    };

    document.getElementById('jornada24').onchange = function() {
        document.getElementById('box-time').style.opacity = this.checked ? "0.3" : "1";
        document.getElementById('limite').disabled = this.checked;
    };

    /* --- LÓGICA DE DADOS --- */
    async function carregarDados() {
        document.getElementById('log-sync').innerText = "CONECTANDO AO TERMINAL...";
        try {
            const res = await fetch(`${RAÍZEN_DB.URL}/rest/v1/registros?SAIDA=is.null&select=*`, { headers: RAÍZEN_DB.HEADERS });
            memoriaFila = await res.json();
            renderTabela();
            document.getElementById('log-sync').innerText = "ÚLTIMA SINCRONIZAÇÃO: " + new Date().toLocaleTimeString();
        } catch (e) { document.getElementById('log-sync').innerText = "ERRO DE CONEXÃO!"; }
    }

    function renderTabela() {
        const corpo = document.getElementById('listaFila');
        corpo.innerHTML = "";

        let lista = [...memoriaFila].sort((a,b) => {
            const tA = a.AGENDAMENTO ? new Date(a.AGENDAMENTO).getTime() : Infinity;
            const tB = b.AGENDAMENTO ? new Date(b.AGENDAMENTO).getTime() : Infinity;
            return tA - tB || new Date(a.created_at) - new Date(b.created_at);
        });

        if (filtroAtivo !== 'TODOS') {
            lista = lista.filter(i => i.PRODUTO.toUpperCase().includes(filtroAtivo));
        }

        lista.forEach(item => {
            const idDoc = item[RAÍZEN_DB.ID_COL];
            const zapLimpo = item.TELEFONE.replace(/\D/g, "");
            
            let cssTag = "bg-diesel";
            if(item.PRODUTO.includes("GASOLINA")) cssTag = "bg-gas";
            else if(item.PRODUTO.includes("BIODIESEL")) cssTag = "bg-b100";
            else if(item.PRODUTO.includes("ANIDRO")) cssTag = "bg-anidro";
            else if(item.PRODUTO.includes("HIDRATADO")) cssTag = "bg-hidra";

            const valAg = item.AGENDAMENTO ? new Date(item.AGENDAMENTO).toISOString().slice(0,16) : "";

            corpo.innerHTML += `
                <tr ${item.AGENDAMENTO ? 'class="linha-vip"' : ''}>
                    <td style="color:var(--roxo-raizen); font-weight:900; font-size:22px;">${item.PLACA}</td>
                    <td><span class="tag-p ${cssTag}">${item.PRODUTO}</span></td>
                    <td>${validarStatusJornada(item.JORNADA)}</td>
                    <td style="font-size:12px; color:#64748b;">${item.ENTRADA}</td>
                    <td style="background:#fffbeb; border:2px solid #fed7aa;">
                        <input type="datetime-local" id="ag-inp-${idDoc}" value="${valAg}" style="font-size:14px; padding:10px; width:220px;">
                        <button onclick="salvarAgendamento('${idDoc}')" style="background:var(--verde-raizen); color:white; border:none; padding:10px; border-radius:10px; cursor:pointer; width:100%; margin-top:8px; font-weight:900;">SALVAR</button>
                    </td>
                    <td>
                        <button onclick="chamarWhatsApp('${zapLimpo}')" style="background:#25d366; color:white; border:none; padding:15px; border-radius:15px; width:100%; cursor:pointer; font-weight:900; display:flex; align-items:center; justify-content:center; gap:10px;">
                            <i class="fa-brands fa-whatsapp"></i> CHAMAR
                        </button>
                    </td>
                    <td>
                        <button onclick="finalizarSaida('${idDoc}')" style="background:#3b82f6; color:white; border:none; padding:15px; border-radius:15px; width:100%; cursor:pointer; font-weight:900;">FINALIZAR</button>
                    </td>
                </tr>
            `;
        });
    }

    function validarStatusJornada(hora) {
        if(hora === "24 HORAS") return "<b style='color:green'>● 24H OK</b>";
        if(!hora) return "<span style='color:#cbd5e1'>N/D</span>";
        
        const [h, m] = hora.split(':');
        const limite = new Date();
        limite.setHours(parseInt(h), parseInt(m), 0);
        
        const agora = new Date();
        if (agora > limite) {
            return `<b style="color:var(--cor-erro)">● EXPIRADA (${hora})</b>`;
        } else {
            return `<b style="color:var(--cor-sucesso)">● EM DIA (${hora})</b>`;
        }
    }

    /* --- AÇÕES --- */
    function chamarWhatsApp(tel) {
        const baia = prompt("Motorista vamos descarregar?\nInforme a BAIA / ÁREA:");
        if(!baia) return;
        
        const mensagem = `Olá\nMotorista vamos descarregar?\nBaia ${baia}\nObrigado!\n\nObs: aguarde a instrução do operador para entrar na baia!`;
        const link = `https://wa.me/55${tel}?text=${encodeURIComponent(mensagem)}`;
        window.open(link, '_blank');
    }

    async function salvarAgendamento(id) {
        const val = document.getElementById(`ag-inp-${id}`).value;
        setLoader(true);
        try {
            const dataISO = val ? new Date(val).toISOString() : null;
            await fetch(`${RAÍZEN_DB.URL}/rest/v1/registros?${RAÍZEN_DB.ID_COL}=eq.${id}`, {
                method: 'PATCH',
                headers: RAÍZEN_DB.HEADERS,
                body: JSON.stringify({ "AGENDAMENTO": dataISO })
            });
            await carregarDados();
            alert("AGENDAMENTO ATUALIZADO!");
        } catch (e) { alert("ERRO AO SALVAR."); }
        finally { setLoader(false); }
    }

    async function finalizarSaida(id) {
        if(!confirm("CONFIRMAR SAÍDA DO VEÍCULO?")) return;
        setLoader(true);
        try {
            await fetch(`${RAÍZEN_DB.URL}/rest/v1/registros?${RAÍZEN_DB.ID_COL}=eq.${id}`, {
                method: 'PATCH',
                headers: RAÍZEN_DB.HEADERS,
                body: JSON.stringify({ "SAIDA": new Date().toLocaleString('pt-BR') })
            });
            await carregarDados();
        } catch (e) { alert("ERRO AO FINALIZAR."); }
        finally { setLoader(false); }
    }

    function filtrar(tipo, btn) {
        filtroAtivo = tipo;
        document.querySelectorAll('.chip-filtro').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderTabela();
    }

    function ativarOperador() {
        const s = prompt("SENHA DE OPERAÇÃO:");
        if(s === "raizen2026") {
            document.getElementById('secao-entrada').style.display = 'none';
            document.getElementById('modulo-operador-full').style.display = 'block';
            carregarDados();
            setInterval(carregarDados, 30000); // Auto-refresh 30s
        } else {
            alert("SENHA INCORRETA!");
        }
    }

    /* --- SUBMIT FORMULÁRIOS --- */
    document.getElementById('formMaster').onsubmit = async e => {
        e.preventDefault();
        setLoader(true);
        const info = {
            "PLACA": document.getElementById('placa').value.toUpperCase(),
            "PRODUTO": document.getElementById('produto').value,
            "TELEFONE": document.getElementById('whatsapp').value,
            "JORNADA": document.getElementById('jornada24').checked ? "24 HORAS" : document.getElementById('limite').value,
            "ENTRADA": new Date().toLocaleString('pt-BR')
        };
        try {
            const res = await fetch(`${RAÍZEN_DB.URL}/rest/v1/registros`, {
                method: 'POST',
                headers: RAÍZEN_DB.HEADERS,
                body: JSON.stringify(info)
            });
            if(res.ok) {
                alert("VEÍCULO REGISTRADO COM SUCESSO!");
                location.reload();
            } else throw new Error();
        } catch (e) { alert("ERRO AO REGISTRAR NO BANCO."); }
        finally { setLoader(false); }
    };

    async function processarReabertura() {
        const p = document.getElementById('re_placa').value.toUpperCase();
        const h = document.getElementById('re_hora').value;
        if(!p || !h) return alert("PREENCHA PLACA E HORÁRIO!");
        
        setLoader(true);
        try {
            const res = await fetch(`${RAÍZEN_DB.URL}/rest/v1/registros?PLACA=eq.${p}&SAIDA=is.null`, { headers: RAÍZEN_DB.HEADERS });
            const data = await res.json();
            
            if(data.length > 0) {
                const updateRes = await fetch(`${RAÍZEN_DB.URL}/rest/v1/registros?${RAÍZEN_DB.ID_COL}=eq.${data[0][RAÍZEN_DB.ID_COL]}`, {
                    method: 'PATCH',
                    headers: RAÍZEN_DB.HEADERS,
                    body: JSON.stringify({"JORNADA": h})
                });
                if(updateRes.ok) {
                    alert("JORNADA REABERTA COM SUCESSO!");
                    location.reload();
                }
            } else {
                alert("VEÍCULO NÃO LOCALIZADO NO PÁTIO!");
            }
        } catch (e) { alert("ERRO NO PROCESSO."); }
        finally { setLoader(false); }
    }
</script>
</body>
