<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAÍZEN - SISTEMA DE GESTÃO DE PÁTIO V20.2</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --verde-raizen: #4d6d5d;
            --roxo-raizen: #84207d;
            --ouro-raizen: #ffc107;
            --fundo: #f8fafc;
            --branco: #ffffff;
            --preto-industrial: #1e293b;
            --cor-erro: #be123c;
            --cor-sucesso: #15803d;
        }

        /* RESET E CONFIGURAÇÃO BASE */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
        body { background-color: var(--fundo); color: var(--preto-industrial); line-height: 1.6; }

        /* CABEÇALHO INDUSTRIAL */
        header { 
            background: linear-gradient(135deg, #1a241f 0%, var(--verde-raizen) 100%); 
            padding: 60px 20px; text-align: center; border-bottom: 20px solid var(--roxo-raizen);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .logo-raizen { color: var(--branco); font-size: 70px; font-weight: 900; letter-spacing: 15px; text-shadow: 3px 3px 0px var(--roxo-raizen); }
        header p { color: var(--ouro-raizen); font-weight: 700; letter-spacing: 3px; margin-top: 10px; text-transform: uppercase; }

        /* CONTAINER PRINCIPAL */
        .container { width: 95%; max-width: 1100px; margin: -40px auto 40px; }

        /* CARD DE ENTRADA DO MOTORISTA */
        .card-entrada {
            background: var(--branco); border-radius: 40px; padding: 50px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.15); border-top: 15px solid var(--roxo-raizen);
        }

        .titulo-sessao { text-align: center; color: var(--roxo-raizen); font-weight: 900; font-size: 28px; margin-bottom: 40px; text-transform: uppercase; }

        /* BOTÕES DE ATALHO (PRODUTOS) */
        .grid-atalhos { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 30px; }
        .btn-atalho { 
            background: #f1f5f9; border: 2px solid #e2e8f0; padding: 15px; border-radius: 15px;
            font-weight: 900; font-size: 11px; cursor: pointer; transition: all 0.3s; color: var(--verde-raizen);
        }
        .btn-atalho:hover { background: var(--verde-raizen); color: white; border-color: var(--verde-raizen); }

        /* FORMULÁRIO */
        .grupo-input { margin-bottom: 25px; }
        .grupo-input label { display: block; font-weight: 900; font-size: 14px; margin-bottom: 8px; color: var(--verde-raizen); }
        .input-industrial {
            width: 100%; padding: 22px; border-radius: 18px; border: 4px solid #f1f5f9;
            font-size: 20px; font-weight: 700; transition: 0.3s; background: #fafafa;
        }
        .input-industrial:focus { border-color: var(--roxo-raizen); outline: none; background: #fff; }

        /* BOX DE JORNADA */
        .caixa-jornada {
            background: #fffbeb; border: 3px solid var(--ouro-raizen); padding: 25px; border-radius: 25px; margin-bottom: 30px;
        }
        .check-container { display: flex; align-items: center; gap: 15px; cursor: pointer; margin-top: 15px; }
        .check-container input { width: 30px; height: 30px; cursor: pointer; }

        .btn-enviar {
            width: 100%; padding: 28px; background: var(--roxo-raizen); color: white; border: none;
            border-radius: 22px; font-size: 24px; font-weight: 900; cursor: pointer; box-shadow: 0 10px 20px rgba(132, 32, 125, 0.3);
        }
        .btn-enviar:active { transform: scale(0.98); }

        /* PAINEL DO OPERADOR - ESTILO AMPLIADO */
        #painel-operador { display: none; zoom: 0.85; padding: 20px; background: #fff; border-radius: 30px; margin-top: 20px; }
        
        .filtros-painel {
            display: flex; gap: 20px; background: #e2e8f0; padding: 25px; border-radius: 20px; margin-bottom: 30px;
        }
        .filtro-item { flex: 1; padding: 15px; border-radius: 10px; border: none; font-weight: 700; }

        /* TABELA TÉCNICA */
        .area-tabela { overflow-x: auto; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; background: white; }
        th { background: #0f172a; color: white; padding: 20px; text-transform: uppercase; font-size: 13px; letter-spacing: 1px; }
        td { padding: 18px; border-bottom: 2px solid #f1f5f9; text-align: center; font-weight: 700; font-size: 15px; }

        .tag-produto { 
            padding: 10px 15px; border-radius: 12px; font-size: 11px; font-weight: 900; 
            text-transform: uppercase; display: inline-block; width: 100%; max-width: 200px;
        }
        .gasolina { background: #ff8c00; color: #fff; }
        .diesel { background: #5d4037; color: #fff; }
        .etanol { background: #0056b3; color: #fff; }
        .hidratado { border: 2px solid #0056b3; color: #0056b3; }

        .btn-convocar { background: #22c55e; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 900; cursor: pointer; width: 100%; margin-bottom: 5px; }
        .btn-fechar { background: #e11d48; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 900; cursor: pointer; width: 100%; }

        /* UTILITÁRIOS */
        .oculto { display: none !important; }
    </style>
</head>
<body>

<header>
    <div class="logo-raizen">RAÍZEN</div>
    <p>Logística de Combustíveis | Terminal Paulínia</p>
</header>

<div class="container">
    <div id="modulo-motorista" class="card-entrada">
        <h2 class="titulo-sessao">Check-in de Descarregamento</h2>
        
        <p style="font-weight: 900; font-size: 12px; color: #64748b; margin-bottom: 10px;">SELECIONE O PRODUTO PARA PREENCHIMENTO RÁPIDO:</p>
        <div class="grid-atalhos">
            <button class="btn-atalho" onclick="setProduto('GASOLINA COMUM / ADITIVADA')"><i class="fa-solid fa-gas-pump"></i> GASOLINA</button>
            <button class="btn-atalho" onclick="setProduto('DIESEL S10')"><i class="fa-solid fa-truck-moving"></i> DIESEL S10</button>
            <button class="btn-atalho" onclick="setProduto('ETANOL HIDRATADO')"><i class="fa-solid fa-droplet"></i> HIDRATADO</button>
            <button class="btn-atalho" onclick="setProduto('BIODIESEL (B100)')"><i class="fa-solid fa-leaf"></i> B100</button>
        </div>

        <form id="formRegistro">
            <div class="grupo-input">
                <label>PLACA DO VEÍCULO:</label>
                <input type="text" id="placa" class="input-industrial" placeholder="AAA-0000" maxlength="8" required>
            </div>

            <div class="grupo-input">
                <label>PRODUTO PARA DESCARGA:</label>
                <select id="produto" class="input-industrial" required>
                    <option value="">-- SELECIONE NA LISTA --</option>
                    <option value="GASOLINA COMUM / ADITIVADA">GASOLINA COMUM / ADITIVADA</option>
                    <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
                    <option value="ETANOL ANIDRO">ETANOL ANIDRO</option>
                    <option value="ETANOL HIDRATADO">ETANOL HIDRATADO</option>
                    <option value="DIESEL S10">DIESEL S10</option>
                </select>
            </div>

            <div class="grupo-input">
                <label>WHATSAPP PARA CONVOCAÇÃO:</label>
                <input type="tel" id="whatsapp" class="input-industrial" placeholder="(00) 00000-0000" required>
            </div>

            <div class="caixa-jornada">
                <div id="wrapper-hora">
                    <label style="font-weight: 900; color: var(--verde-raizen);">HORÁRIO LIMITE DA JORNADA:</label>
                    <input type="time" id="hora_limite" class="input-industrial" style="padding: 15px; margin-top: 10px;">
                </div>
                
                <label class="check-container">
                    <input type="checkbox" id="jornada_24h">
                    <span style="font-weight: 900; color: var(--cor-erro); font-size: 16px;">ESTOU EM JORNADA 24 HORAS</span>
                </label>
            </div>

            <button type="submit" class="btn-enviar">REGISTRAR ENTRADA</button>
        </form>
        
        <div style="text-align: center; margin-top: 30px;">
            <button onclick="abrirGestao()" style="background: none; border: none; color: #94a3b8; font-weight: 700; cursor: pointer; text-decoration: underline;">Acesso Administrativo</button>
        </div>
    </div>

    <div id="painel-operador">
        <h2 class="titulo-sessao" style="text-align: left;"><i class="fa-solid fa-tower-observation"></i> Painel de Controle de Fila</h2>
        
        <div class="filtros-painel">
            <input type="text" id="buscaPlaca" class="filtro-item" placeholder="🔍 Buscar por Placa..." onkeyup="aplicarFiltros()">
            <select id="buscaProduto" class="filtro-item" onchange="aplicarFiltros()">
                <option value="">Filtrar Produto</option>
                <option value="GASOLINA">GASOLINA</option>
                <option value="DIESEL">DIESEL</option>
                <option value="ETANOL">ETANOL</option>
            </select>
            <button onclick="location.reload()" style="padding: 10px; border-radius: 10px; cursor: pointer; font-weight: 900;">ATUALIZAR TELA</button>
        </div>

        <div class="area-tabela">
            <table>
                <thead>
                    <tr>
                        <th>VEÍCULO</th>
                        <th>PRODUTO</th>
                        <th>STATUS JORNADA</th>
                        <th>ENTRADA PÁTIO</th>
                        <th style="background: #fef08a; color: #854d0e;">AGENDAMENTO (DATA/HORA)</th>
                        <th>AÇÕES OPERACIONAIS</th>
                    </tr>
                </thead>
                <tbody id="tabelaCorpo"></tbody>
            </table>
        </div>
        <button class="btn-enviar" style="background: #475569; margin-top: 30px;" onclick="location.reload()">SAIR DO MÓDULO GESTÃO</button>
    </div>
</div>

<script>
    const S_URL = 'https://rbbkjuiizmvatiawfzuv.supabase.co';
    const S_KEY = 'sb_publishable_WkrHi6cWtZsnsDXl0nh1hA_kz1UT_1X';
    const S_HEADERS = { "apikey": S_KEY, "Authorization": `Bearer ${S_KEY}`, "Content-Type": "application/json" };

    // --- LÓGICA DE INTERFACE RESTAURADA ---
    const check24 = document.getElementById('jornada_24h');
    const wrapHora = document.getElementById('wrapper-hora');

    // Quando clica em 24h, a jornada SOME (Conquistado!)
    check24.addEventListener('change', function() {
        if(this.checked) {
            wrapHora.classList.add('oculto');
            document.getElementById('hora_limite').value = "";
        } else {
            wrapHora.classList.remove('oculto');
        }
    });

    function setProduto(val) {
        document.getElementById('produto').value = val;
    }

    // WHATSAPP COM TEXTO COMPLETO RESTAURADO
    function convocarMotorista(tel, placa) {
        const baia = prompt("PARA QUAL BAIA O VEÍCULO " + placa + " DEVE IR?");
        if (baia) {
            const msg = `Olá! Motorista da placa *${placa}*, favor comparecer à *BAIA ${baia}* e aguardar orientações para início da operação de descarga.`;
            const link = `https://api.whatsapp.com/send?phone=55${tel.replace(/\D/g, "")}&text=${encodeURIComponent(msg)}`;
            window.open(link, '_blank');
        }
    }

    // FILTROS TÉCNICOS
    function aplicarFiltros() {
        const p = document.getElementById('buscaPlaca').value.toUpperCase();
        const pr = document.getElementById('buscaProduto').value.toUpperCase();
        const linhas = document.querySelectorAll("#tabelaCorpo tr");

        linhas.forEach(l => {
            const textoPlaca = l.cells[0].innerText.toUpperCase();
            const textoProd = l.cells[1].innerText.toUpperCase();
            l.style.display = (textoPlaca.includes(p) && textoProd.includes(pr)) ? "" : "none";
        });
    }

    // COMUNICAÇÃO SUPABASE
    async function carregarDados() {
        const r = await fetch(`${S_URL}/rest/v1/registros?SAIDA=is.null&select=*&order=id.asc`, { headers: S_HEADERS });
        const dados = await r.json();
        const corpo = document.getElementById('tabelaCorpo');
        corpo.innerHTML = "";

        dados.forEach(i => {
            let css = i.PRODUTO.includes("GASOLINA") ? "gasolina" : i.PRODUTO.includes("DIESEL") ? "diesel" : "etanol";
            if(i.PRODUTO.includes("HIDRATADO")) css += " hidratado";

            corpo.innerHTML += `
                <tr>
                    <td style="font-size: 20px; color: var(--roxo-raizen);">${i.PLACA}</td>
                    <td><span class="tag-produto ${css}">${i.PRODUTO}</span></td>
                    <td style="color: ${i.JORNADA === '24 HORAS' ? 'green' : 'red'}">${i.JORNADA === '24 HORAS' ? '🟢 24 HORAS' : '⏰ ' + i.JORNADA}</td>
                    <td style="font-size: 12px; color: #64748b;">${i.ENTRADA}</td>
                    <td style="background: #fffbeb;">
                        <input type="datetime-local" id="agenda-${i.id}" value="${i.AGENDAMENTO || ''}" style="padding: 10px; border-radius: 8px; border: 2px solid #fbbf24; font-weight: 700;">
                        <button onclick="salvarAgenda('${i.id}')" style="background: var(--verde-raizen); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer;"><i class="fa-solid fa-floppy-disk"></i></button>
                    </td>
                    <td>
                        <button class="btn-convocar" onclick="convocarMotorista('${i.TELEFONE}','${i.PLACA}')"><i class="fa-brands fa-whatsapp"></i> CONVOCAR</button>
                        <button class="btn-fechar" onclick="finalizarAtendimento('${i.id}')">FINALIZAR</button>
                    </td>
                </tr>`;
        });
        aplicarFiltros();
    }

    async function salvarAgenda(id) {
        const val = document.getElementById(`agenda-${id}`).value;
        const res = await fetch(`${S_URL}/rest/v1/registros?id=eq.${id}`, { 
            method: 'PATCH', headers: S_HEADERS, body: JSON.stringify({ AGENDAMENTO: val }) 
        });
        if(res.ok) alert("✅ AGENDAMENTO ATUALIZADO NO SISTEMA!");
    }

    document.getElementById('formRegistro').onsubmit = async e => {
        e.preventDefault();
        const payload = {
            PLACA: document.getElementById('placa').value.toUpperCase(),
            PRODUTO: document.getElementById('produto').value,
            TELEFONE: document.getElementById('whatsapp').value,
            JORNADA: check24.checked ? "24 HORAS" : document.getElementById('hora_limite').value,
            ENTRADA: new Date().toLocaleString('pt-BR')
        };
        const res = await fetch(`${S_URL}/rest/v1/registros`, { method: 'POST', headers: S_HEADERS, body: JSON.stringify(payload) });
        if(res.ok) { alert("🚀 REGISTRO REALIZADO COM SUCESSO!"); location.reload(); }
    };

    async function finalizarAtendimento(id) {
        if(confirm("DESEJA FINALIZAR E REMOVER ESTE VEÍCULO DA FILA ATIVA?")) {
            await fetch(`${S_URL}/rest/v1/registros?id=eq.${id}`, { 
                method: 'PATCH', headers: S_HEADERS, body: JSON.stringify({ SAIDA: new Date().toLocaleString('pt-BR') }) 
            });
            carregarDados();
        }
    }

    function abrirGestao() {
        if(prompt("DIGITE A SENHA DE OPERADOR:") === "raizen2026") {
            document.getElementById('modulo-motorista').style.display = 'none';
            document.getElementById('painel-operador').style.display = 'block';
            carregarDados();
        }
    }

    // MÁSCARA AUTOMÁTICA DE PLACA
    document.getElementById('placa').oninput = function() {
        let v = this.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
        if (v.length > 3 && !isNaN(v[3])) v = v.substring(0,3) + "-" + v.substring(3,7);
        this.value = v;
    };
</script>
</body>
</html>
