<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAÍZEN - SISTEMA DE GESTÃO DE PÁTIO V19.0</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* CSS EXPANDIDO PARA MAXIMIZAR A ROBUSTEZ VISUAL 
        */
        :root {
            --verde-raizen: #4d6d5d;
            --roxo-raizen: #84207d;
            --ouro-raizen: #ffc107;
            --fundo-cinza: #f8fafc;
            --branco-puro: #ffffff;
            --alerta-vermelho: #e11d48;
            --sucesso-verde: #10b981;
            --texto-base: #1e293b;
            --sombra-industrial: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        * { 
            box-sizing: border-box; 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; 
            padding: 0; 
            outline: none;
        }

        body { 
            background-color: var(--fundo-cinza); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            padding-bottom: 150px;
            color: var(--texto-base);
        }

        /* CABEÇALHO CORPORATIVO */
        header { 
            background: linear-gradient(135deg, var(--verde-raizen) 0%, #1c2621 100%); 
            width: 100%; 
            padding: 90px 0; 
            text-align: center; 
            border-bottom: 25px solid var(--roxo-raizen);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .marca-topo {
            color: var(--branco-puro);
            font-size: 85px;
            font-weight: 900;
            letter-spacing: 18px;
            text-transform: uppercase;
            margin-bottom: 15px;
            text-shadow: 3px 3px 0px rgba(0,0,0,0.2);
        }

        header h1 { 
            color: var(--branco-puro); 
            font-size: 22px; 
            text-transform: uppercase; 
            letter-spacing: 8px; 
            font-weight: 300;
        }

        /* CARD DE ENTRADA DO MOTORISTA */
        .painel-central { 
            width: 95%; 
            max-width: 1150px; 
            margin: 60px auto; 
            background: var(--branco-puro); 
            padding: 85px; 
            border-radius: 75px; 
            box-shadow: var(--sombra-industrial); 
            border-left: 35px solid var(--roxo-raizen);
            position: relative;
        }

        /* PAINEL DO OPERADOR - FORMATO ULTRA-WIDE */
        #secao-gestao-operador { 
            display: none; 
            width: 99%; 
            max-width: 2400px; 
            background: var(--branco-puro);
            margin: 40px auto;
            border-radius: 50px;
            padding: 65px;
            box-shadow: var(--sombra-industrial);
        }

        h2 { 
            color: var(--roxo-raizen); 
            text-align: center; 
            font-weight: 900; 
            text-transform: uppercase; 
            margin-bottom: 55px; 
            font-size: 36px;
            letter-spacing: 2px;
            border-bottom: 12px solid #f1f5f9;
            padding-bottom: 35px;
        }

        /* CAMPOS DE FORMULÁRIO */
        .bloco-input { margin-bottom: 45px; }
        
        label { 
            display: block; 
            margin-bottom: 18px; 
            font-weight: 900; 
            color: var(--verde-raizen); 
            font-size: 16px; 
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        input[type="text"], 
        input[type="tel"], 
        input[type="time"], 
        select { 
            width: 100%; 
            padding: 30px; 
            border: 5px solid #f1f5f9; 
            border-radius: 30px; 
            font-size: 24px; 
            font-weight: 700;
            background: #f8fafc;
            color: #334155;
            transition: all 0.3s ease;
        }

        input:focus { 
            border-color: var(--roxo-raizen); 
            background: #ffffff;
            box-shadow: 0 0 0 8px rgba(132, 32, 125, 0.1);
        }

        /* MÓDULO DE JORNADA DINÂMICO */
        .container-jornada-critica {
            background: #fffbeb;
            padding: 55px;
            border-radius: 50px;
            border: 6px solid var(--ouro-raizen);
            margin: 45px 0;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #caixa-entrada-hora {
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .wrapper-checkbox-industrial {
            display: flex;
            align-items: center;
            gap: 30px;
            cursor: pointer;
            background: #ffffff;
            padding: 30px;
            border-radius: 35px;
            margin-top: 40px;
            border: 3px solid #fde68a;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .wrapper-checkbox-industrial input { 
            width: 50px; 
            height: 50px; 
            accent-color: var(--alerta-vermelho); 
            cursor: pointer;
        }

        .texto-alerta-24h {
            font-weight: 900; 
            color: var(--alerta-vermelho); 
            font-size: 24px;
            text-transform: uppercase;
        }

        /* BOTÕES DE AÇÃO */
        .btn-principal-raizen { 
            width: 100%; 
            padding: 45px; 
            background: var(--roxo-raizen); 
            color: white; 
            border: none; 
            border-radius: 40px; 
            font-size: 32px; 
            font-weight: 900; 
            cursor: pointer; 
            text-transform: uppercase;
            box-shadow: 0 25px 50px rgba(132, 32, 125, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-principal-raizen:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(132, 32, 125, 0.5);
        }

        /* BUSCA AVANÇADA NO PAINEL */
        .caixa-busca-operador {
            margin-bottom: 60px;
            position: relative;
        }

        .caixa-busca-operador input {
            width: 100%;
            padding: 35px 35px 35px 110px;
            border: 8px solid var(--roxo-raizen);
            border-radius: 45px;
            font-size: 28px;
            font-weight: 900;
        }

        .caixa-busca-operador i {
            position: absolute;
            left: 45px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--roxo-raizen);
            font-size: 45px;
        }

        /* TABELA DE GESTÃO DE FILA */
        .moldura-tabela-industrial { 
            overflow-x: auto; 
            border-radius: 55px; 
            border: 4px solid #e2e8f0; 
            background: #ffffff;
        }

        table { width: 100%; border-collapse: collapse; min-width: 2200px; }
        
        th { 
            background: #0f172a; 
            color: #ffffff; 
            padding: 40px; 
            font-size: 16px; 
            text-transform: uppercase; 
            letter-spacing: 5px;
            text-align: center;
        }

        td { 
            padding: 35px; 
            border-bottom: 4px solid #f1f5f9; 
            text-align: center; 
            font-weight: 800; 
            font-size: 24px;
            color: #1e293b;
        }

        /* ESTILOS DO SEMÁFORO (DENTRO/FORA JORNADA) */
        .status-semaforo-v2 {
            padding: 20px 30px;
            border-radius: 65px;
            font-size: 15px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            text-transform: uppercase;
            min-width: 280px;
        }

        .status-verde-ativo { 
            background: #dcfce7; 
            color: #166534; 
            border: 4px solid var(--sucesso-verde); 
        }

        .status-vermelho-critico { 
            background: #fee2e2; 
            color: #991b1b; 
            border: 4px solid var(--alerta-vermelho); 
        }

        .lampada-status { 
            width: 18px; 
            height: 18px; 
            border-radius: 50%; 
            display: inline-block; 
        }

        .lampada-verde { background: #10b981; box-shadow: 0 0 15px #10b981; }
        .lampada-vermelha { background: #ef4444; box-shadow: 0 0 15px #ef4444; }

        /* BADGES DE COMBUSTÍVEL */
        .tag-combustivel {
            padding: 20px 40px;
            border-radius: 30px;
            color: white;
            font-size: 15px;
            font-weight: 900;
            display: inline-block;
            min-width: 220px;
            text-transform: uppercase;
        }
        .bg-gasolina { background: #f59e0b; color: #000; }
        .bg-biodiesel { background: #000000; }
        .bg-anidro { background: #059669; }
        .bg-hidratado { background: #10b981; }
        .bg-diesel { background: #475569; }

        /* BOTÕES DE COMANDO (WHATSAPP / FINALIZAR) */
        .btn-operacional-comando {
            border: none;
            border-radius: 30px;
            padding: 25px;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            color: white;
            text-transform: uppercase;
            font-size: 15px;
            margin-bottom: 18px;
            transition: all 0.2s;
        }
        .btn-w-convocar { background: #22c55e; }
        .btn-f-concluir { background: #3b82f6; }
        .btn-operacional-comando:hover { opacity: 0.9; transform: scale(1.02); }

        /* ACESSO AO PAINEL */
        .rodape-login {
            margin-top: 90px;
            text-align: center;
            border-top: 6px dashed #cbd5e1;
            padding-top: 70px;
        }

        .rodape-login button {
            background: #ffffff;
            border: 8px solid var(--roxo-raizen);
            color: var(--roxo-raizen);
            padding: 35px 120px;
            border-radius: 120px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 22px;
            transition: all 0.4s;
        }

        .rodape-login button:hover { 
            background: var(--roxo-raizen); 
            color: #ffffff; 
        }

        /* ANIMAÇÃO DE CARREGAMENTO */
        .spinner-raizen {
            border: 12px solid rgba(255,255,255,0.2);
            border-top: 12px solid #ffffff;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: girar 1.2s linear infinite;
            display: inline-block;
        }
        @keyframes girar { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

<header>
    <div class="marca-topo">RAÍZEN</div>
    <h1>TERMINAL PAULÍNIA | LOGÍSTICA DE DESCARGAS</h1>
</header>

<div class="painel-central" id="painel-entrada-motorista">
    <h2>REGISTRO DE CHEGADA</h2>
    <form id="formPrincipalDescarga">
        
        <div class="bloco-input">
            <label><i class="fa-solid fa-truck-moving"></i> PLACA DO VEÍCULO (CAMINHÃO / BITREM)</label>
            <input type="text" id="inp_placa" placeholder="ABC-1234" maxlength="8" required>
        </div>

        <div class="bloco-input">
            <label><i class="fa-solid fa-gas-pump"></i> PRODUTO PARA DESCARGA</label>
            <select id="inp_produto" required>
                <option value="">-- SELECIONE O PRODUTO --</option>
                <option value="GASOLINA">GASOLINA COMUM / ADITIVADA</option>
                <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
                <option value="ETANOL ANIDRO">ETANOL ANIDRO</option>
                <option value="ETANOL HIDRATADO">ETANOL HIDRATADO</option>
                <option value="DIESEL S10">DIESEL S10 (EURO 5)</option>
            </select>
        </div>

        <div class="bloco-input">
            <label><i class="fa-brands fa-whatsapp"></i> WHATSAPP (DDD + NÚMERO)</label>
            <input type="tel" id="inp_whatsapp" placeholder="(19) 99999-9999" maxlength="15" required>
        </div>

        <div class="container-jornada-critica">
            <div id="caixa-entrada-hora">
                <label><i class="fa-solid fa-clock"></i> HORÁRIO DE TÉRMINO DA JORNADA</label>
                <input type="time" id="inp_horario_fim">
            </div>
            
            <label class="wrapper-checkbox-industrial">
                <input type="checkbox" id="check_24h">
                <span class="texto-alerta-24h">DECLARO JORNADA 24 HORAS</span>
            </label>
        </div>

        <div style="margin-top:80px;">
            <button type="submit" class="btn-principal-raizen" id="btn_enviar_dados">EFETUAR REGISTRO NO PÁTIO</button>
        </div>

    </form>
    
    <div class="rodape-login">
        <button onclick="validaAcessoGestao()">MÓDULO DO OPERADOR</button>
    </div>
</div>

<div id="secao-gestao-operador">
    <h2>CONTROLE DE FILA ÁREA 02 - PAULÍNIA</h2>
    
    <div class="caixa-busca-operador">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="filtroTexto" placeholder="BUSCAR POR PLACA, PRODUTO OU STATUS DE JORNADA..." onkeyup="aplicarFiltroTabela()">
    </div>

    <div class="moldura-tabela-industrial">
        <table id="tabelaDados">
            <thead>
                <tr>
                    <th>PLACA VEÍCULO</th>
                    <th>PRODUTO</th>
                    <th>CONTATO WHATSAPP</th>
                    <th>STATUS SEMÁFORO</th>
                    <th>HORA ENTRADA</th>
                    <th style="background:#fff9c4; color:#000; border:5px solid var(--ouro-raizen);">AGENDAMENTO COLETA</th>
                    <th>COMANDOS OPERACIONAIS</th>
                </tr>
            </thead>
            <tbody id="listaFila">
                </tbody>
        </table>
    </div>

    <div style="margin-top:100px; display:flex; gap:60px;">
        <button class="btn-principal-raizen" style="background:#334155;" onclick="location.reload()">SAIR DO MÓDULO</button>
        <button class="btn-principal-raizen" style="background:var(--verde-raizen);" onclick="sincronizarFilaPaulinia()">ATUALIZAR FILA AGORA</button>
    </div>
</div>

<script>
    /* JAVASCRIPT ROBUSTO - VERSÃO EXPANDIDA (NÃO COMPACTADA)
    */
    const ENDPOINT_API = 'https://sheetdb.io/api/v1/p9z83v5m0dxq5';
    const CHAVE_SISTEMA = 'raizen2026';

    /* LÓGICA DE JORNADA INTELIGENTE:
       ESCONDE O CAMPO DE HORA SE "24 HORAS" ESTIVER MARCADO
    */
    document.getElementById('check_24h').addEventListener('change', function() {
        const divHora = document.getElementById('caixa-entrada-hora');
        const inputHora = document.getElementById('inp_horario_fim');
        
        if (this.checked) {
            // Se marcou 24h, esconde a caixa de hora e limpa o valor
            divHora.style.opacity = '0';
            divHora.style.transform = 'translateY(-20px)';
            setTimeout(() => {
                divHora.style.display = 'none';
                inputHora.value = '';
            }, 400);
        } else {
            // Se desmarcou, volta a exibir
            divHora.style.display = 'block';
            setTimeout(() => {
                divHora.style.opacity = '1';
                divHora.style.transform = 'translateY(0)';
            }, 10);
        }
    });

    /* MÁSCARA DE PLACA (PADRÃO MERCOSUL / ANTIGO) */
    document.getElementById('inp_placa').oninput = function(e) {
        let p = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
        if (p.length > 3 && !isNaN(p[3])) {
            p = p.substring(0,3) + "-" + p.substring(3,7);
        }
        e.target.value = p.substring(0,8);
    };

    /* MÁSCARA DE TELEFONE (DDD + 9 DÍGITOS) */
    document.getElementById('inp_whatsapp').oninput = function(e) {
        let t = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !t[2] ? t[1] : '(' + t[1] + ') ' + t[2] + (t[3] ? '-' + t[3] : '');
    };

    /* FUNÇÃO DE FILTRO GLOBAL DO PAINEL */
    function aplicarFiltroTabela() {
        const texto = document.getElementById("filtroTexto").value.toUpperCase();
        const tb = document.getElementById("tabelaDados");
        const tr = tb.getElementsByTagName("tr");

        for (let i = 1; i < tr.length; i++) {
            const linhaTexto = tr[i].innerText.toUpperCase();
            tr[i].style.display = (linhaTexto.indexOf(texto) > -1) ? "" : "none";
        }
    }

    /* ENVIO DE WHATSAPP PADRÃO RAÍZEN ÁREA 02 */
    function enviarConvocacao(tel, placa) {
        const cel = tel.replace(/\D/g, "");
        
        // Verificação de Segurança de 11 dígitos
        if (cel.length < 11) {
            alert("ERRO: O telefone cadastrado para o veículo " + placa + " está incompleto.");
            return;
        }

        const baia = prompt("INFORME A BAIA PARA DESCARGA DO VEÍCULO " + placa + ":");
        if (!baia) return;

        const msg = `Olá%0AMotorista vamos descarregar?%0ABaia *${baia}* - Área 02%0AObrigado!%0A%0A_Favor aguardar autorização do pátio para manobra._`;
        
        const urlFinal = `https://api.whatsapp.com/send?phone=55${cel}&text=${msg}`;
        window.open(urlFinal, '_blank');
    }

    /* CÁLCULO DINÂMICO DO SEMÁFORO DE STATUS */
    function renderizarSemaforo(valorJornada) {
        // Se for 24 horas, já acende o alerta de prioridade
        if (valorJornada === "24 HORAS") {
            return `
                <div class="status-semaforo-v2 status-vermelho-critico">
                    <span class="lampada-status lampada-vermelha"></span> 
                    CRÍTICO (24H)
                </div>
            `;
        }
        
        const tempoAtual = new Date();
        const splitHora = valorJornada.split(':');
        
        if (splitHora.length < 2) return valorJornada;

        const dataLimite = new Date();
        dataLimite.setHours(parseInt(splitHora[0]), parseInt(splitHora[1]), 0);

        // Se o horário atual for maior que o fim da jornada, sinal vermelho
        if (tempoAtual > dataLimite) {
            return `
                <div class="status-semaforo-v2 status-vermelho-critico">
                    <span class="lampada-status lampada-vermelha"></span> 
                    FORA DE JORNADA
                </div>
            `;
        } else {
            return `
                <div class="status-semaforo-v2 status-verde-ativo">
                    <span class="lampada-status lampada-verde"></span> 
                    DENTRO DA JORNADA
                </div>
            `;
        }
    }

    /* REGISTRO DE DADOS NA PLANILHA (POST) */
    document.getElementById('formPrincipalDescarga').onsubmit = async function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('btn_enviar_dados');
        const checkZap = document.getElementById('inp_whatsapp').value.replace(/\D/g, "");

        if (checkZap.length < 11) {
            alert("ALERTA: O WhatsApp precisa ter o DDD e o 9 inicial.");
            return;
        }

        btn.innerHTML = '<span class="spinner-raizen"></span> PROCESSANDO...';
        btn.disabled = true;

        const registroObjeto = {
            "PLACA": document.getElementById('inp_placa').value,
            "PRODUTO": document.getElementById('inp_produto').value,
            "TELEFONE": document.getElementById('inp_whatsapp').value,
            "JORNADA": document.getElementById('check_24h').checked ? "24 HORAS" : document.getElementById('inp_horario_fim').value,
            "ENTRADA": new Date().toLocaleString('pt-BR'),
            "SAIDA": "",
            "AGENDAMENTO NO COLETA": ""
        };

        try {
            const res = await fetch(ENDPOINT_API, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify([registroObjeto])
            });
            
            if (res.ok) {
                alert("REGISTRO DE ENTRADA CONCLUÍDO COM SUCESSO!");
                location.reload();
            }
        } catch (err) {
            alert("ERRO DE REDE: NÃO FOI POSSÍVEL SALVAR OS DADOS.");
            btn.disabled = false;
            btn.innerText = "EFETUAR REGISTRO NO PÁTIO";
        }
    };

    /* SINCRONIZAÇÃO E ORDENAÇÃO DE FILA (GET) */
    async function sincronizarFilaPaulinia() {
        const corpoTabela = document.getElementById('listaFila');
        corpoTabela.innerHTML = "<tr><td colspan='7'><span class='spinner-raizen' style='width:30px; height:30px; border-top-color:var(--roxo-raizen);'></span> SINCRONIZANDO FILA E AGENDAMENTOS...</td></tr>";

        try {
            const busca = await fetch(ENDPOINT_API + "?t=" + Date.now());
            const listaOriginal = await busca.json();
            
            // Filtra quem ainda não saiu do terminal
            let motoristasAtivos = listaOriginal.filter(x => x.PLACA && !x.SAIDA);

            // LÓGICA DE ORDENAÇÃO: AGENDAMENTO COLETA NO TOPO
            motoristasAtivos.sort((a, b) => {
                const dataA = a['AGENDAMENTO NO COLETA'] ? new Date(a['AGENDAMENTO NO COLETA']) : new Date(8640000000000000);
                const dataB = b['AGENDAMENTO NO COLETA'] ? new Date(b['AGENDAMENTO NO COLETA']) : new Date(8640000000000000);
                
                if (a['AGENDAMENTO NO COLETA'] && b['AGENDAMENTO NO COLETA']) return dataA - dataB;
                if (a['AGENDAMENTO NO COLETA']) return -1;
                if (b['AGENDAMENTO NO COLETA']) return 1;
                return 0;
            });

            corpoTabela.innerHTML = "";
            motoristasAtivos.forEach(item => {
                let badgeClass = "bg-diesel";
                if (item.PRODUTO === "GASOLINA") badgeClass = "bg-gasolina";
                if (item.PRODUTO === "BIODIESEL (B100)") badgeClass = "bg-biodiesel";
                if (item.PRODUTO === "ETANOL ANIDRO") badgeClass = "bg-anidro";
                if (item.PRODUTO === "ETANOL HIDRATADO") badgeClass = "bg-hidratado";

                const htmlSemaforo = renderizarSemaforo(item.JORNADA);

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="color:var(--roxo-raizen); font-size:32px; font-weight:900;">${item.PLACA}</td>
                    <td><span class="tag-combustivel ${badgeClass}">${item.PRODUTO}</span></td>
                    <td style="font-size:18px;">${item.TELEFONE}</td>
                    <td>${htmlSemaforo}<br><small style="font-size:12px;">Ref: ${item.JORNADA}</small></td>
                    <td style="font-size:16px;">${item.ENTRADA.split(',')[1] || item.ENTRADA}</td>
                    <td style="background:#fffde7; border:4px solid var(--ouro-raizen);">
                        <input type="datetime-local" id="agenda-${item.PLACA}" value="${item['AGENDAMENTO NO COLETA'] || ''}" style="font-size:16px; padding:15px; border-radius:15px;">
                        <button onclick="salvarAgendaColeta('${item.PLACA}')" style="width:100%; margin-top:15px; background:var(--verde-raizen); color:white; border:none; padding:18px; border-radius:20px; cursor:pointer;">DEFINIR PRIORIDADE</button>
                    </td>
                    <td>
                        <button class="btn-operacional-comando btn-w-convocar" onclick="enviarConvocacao('${item.TELEFONE}', '${item.PLACA}')"><i class="fa-brands fa-whatsapp"></i> CONVOCAR</button>
                        <button class="btn-operacional-comando btn-f-concluir" onclick="finalizarDescarga('${item.PLACA}')"><i class="fa-solid fa-check-double"></i> FINALIZAR</button>
                    </td>
                `;
                corpoTabela.appendChild(tr);
            });
        } catch (erro) {
            corpoTabela.innerHTML = "<tr><td colspan='7'>ERRO AO CONECTAR COM A BASE DE DADOS.</td></tr>";
        }
    }

    /* ATUALIZAR AGENDAMENTO (PATCH) */
    async function salvarAgendaColeta(placa) {
        const novaData = document.getElementById(`agenda-${placa}`).value;
        try {
            await fetch(`${ENDPOINT_API}/PLACA/${placa}`, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({"AGENDAMENTO NO COLETA": novaData})
            });
            alert("PRIORIDADE ATUALIZADA NO COLETA PARA O VEÍCULO " + placa);
            sincronizarFilaPaulinia();
        } catch (e) {
            alert("ERRO AO SALVAR PRIORIDADE.");
        }
    }

    /* FINALIZAR DESCARGA (PATCH) */
    async function finalizarDescarga(placa) {
        if (confirm("CONFIRMAR SAÍDA DO VEÍCULO " + placa + " DO TERMINAL?")) {
            try {
                await fetch(`${ENDPOINT_API}/PLACA/${placa}`, {
                    method: 'PATCH',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({"SAIDA": new Date().toLocaleString('pt-BR')})
                });
                sincronizarFilaPaulinia();
            } catch (e) {
                alert("ERRO AO FINALIZAR OPERAÇÃO.");
            }
        }
    }

    /* LOGIN NO SISTEMA */
    function validaAcessoGestao() {
        const pass = prompt("SENHA DE OPERAÇÃO PAULÍNIA:");
        if (pass === CHAVE_SISTEMA) {
            document.getElementById('painel-entrada-motorista').style.display = 'none';
            document.getElementById('secao-gestao-operador').style.display = 'block';
            sincronizarFilaPaulinia();
        } else {
            alert("SENHA INCORRETA.");
        }
    }

    console.log("RAÍZEN LOGÍSTICA V19.0 - SISTEMA INICIALIZADO.");
</script>
</body>
</html>
