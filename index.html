<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raízen - DESCARGA ÁREA 2</title>
    <style>
        :root {
            --cor-principal: #4d6d5d; 
            --amarelo-raizen: #ffcd00;
            --fundo: #f0f2f5;
            --branco: #ffffff;
            --danger: #dc3545;
            --warning: #ffc107;
            --success: #28a745;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--fundo); margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { background-color: var(--cor-principal); width: 100%; padding: 20px 0; text-align: center; border-bottom: 6px solid var(--amarelo-raizen); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        header h1 { color: var(--branco); margin: 0; font-size: 22px; text-transform: uppercase; }
        
        .container { width: 92%; max-width: 550px; margin: 20px auto; background: var(--branco); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        #admin-panel { display: none; max-width: 98%; width: 1350px; }

        h2 { color: var(--cor-principal); text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; font-size: 13px; }
        th { background: var(--cor-principal); color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        .status-badge { padding: 6px 10px; border-radius: 4px; font-weight: bold; font-size: 11px; color: white; display: inline-block; }
        .bg-ok { background: var(--success); }
        .bg-alerta { background: var(--warning); color: #333; }
        .bg-vencido { background: var(--danger); animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .btn-zap { background:#25D366; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer; font-weight:bold; width: 100%; margin-bottom: 4px; display: block; text-align: center; text-decoration: none; font-size: 11px; }
        .btn-concluir { background:#007bff; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer; font-weight:bold; width: 100%; font-size: 11px; }
        
        #modalColeta { display:none; position:fixed; z-index:999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5); }
        .modal-content { background:white; margin:15% auto; padding:25px; border-radius:15px; width:300px; text-align: center; }

        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #e1e1e1; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn-enviar { width: 100%; padding: 16px; background-color: var(--cor-principal); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        
        /* Estilo para o seletor de jornada simplificado */
        .jornada-group { display: flex; gap: 10px; margin-top: 5px; }
        .jornada-btn { flex: 1; padding: 10px; border: 2px solid #e1e1e1; border-radius: 8px; background: #f8f9fa; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .jornada-btn.active { border-color: var(--cor-principal); background: var(--cor-principal); color: white; }
    </style>
</head>
<body>

<header><h1>RAÍZEN - TERMINAL PAULÍNIA</h1></header>

<div class="container" id="tela-motorista">
    <h2>DESCARGA ÁREA 2</h2>
    <form id="formAgendamento">
        <label style="font-weight:bold;">Placa do Veículo</label>
        <input type="text" id="placa" placeholder="ABC-1234 ou ABC1D23" maxlength="8" required>
        
        <label style="display:block; margin-top:15px; font-weight:bold;">Produto</label>
        <select id="produto" required>
            <option value="">Selecione o produto...</option>
            <option value="GASOLINA">GASOLINA</option>
            <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
            <option value="S10">S10</option>
            <option value="ANIDRO">ANIDRO</option>
            <option value="HIDRATADO">HIDRATADO</option>
        </select>

        <label style="display:block; margin-top:15px; font-weight:bold;">WhatsApp</label>
        <input type="tel" id="telefone" placeholder="(19) 99999-9999" maxlength="15" required>

        <label style="display:block; margin-top:15px; font-weight:bold;">Fim da Jornada</label>
        <div class="jornada-group">
            <button type="button" class="jornada-btn active" id="btn24h" onclick="setJornada('24 Horas')">24 Horas</button>
            <button type="button" class="jornada-btn" id="btnHorario" onclick="ativarHorario()">Definir Horário</button>
        </div>
        <input type="time" id="jornadaTime" style="display:none; margin-top:10px;">
        <input type="hidden" id="jornadaFinal" value="24 Horas">

        <button type="submit" class="btn-enviar" id="btnEnviar">REGISTRAR ENTRADA</button>
    </form>
    <div style="text-align: center; margin-top: 20px;">
        <button onclick="abrirAdmin()" style="background:none; border:none; color:#999; text-decoration:underline; cursor:pointer;">Acesso Administrativo</button>
    </div>
</div>

<div class="container" id="admin-panel">
    <h2>PAINEL DESCARGA ÁREA 2</h2>
    <div style="overflow-x: auto;">
        <table id="tabelaDados">
            <thead>
                <tr>
                    <th>Placa</th>
                    <th>WhatsApp</th>
                    <th>Produto</th>
                    <th>Status Jornada</th>
                    <th>Agendado para</th>
                    <th>Pátio</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <button class="btn-enviar" style="background:#666; margin-top:20px;" onclick="window.location.reload()">SAIR DO PAINEL</button>
</div>

<div id="modalColeta">
    <div class="modal-content">
        <h3>Definir Agendamento</h3>
        <input type="hidden" id="placaAlvo">
        <label>Data:</label><input type="date" id="inputData">
        <label>Hora:</label><input type="time" id="inputHora">
        <button class="btn-enviar" id="btnSalvarAgenda" onclick="salvarColeta()">SALVAR NA TABELA</button>
        <button onclick="fecharModal()" style="margin-top:10px; background:none; border:none; color:red; cursor:pointer;">Cancelar</button>
    </div>
</div>

<script>
    const API_URL = 'https://sheetdb.io/api/v1/p9z83v5m0dxq5';

    // FUNÇÕES DA JORNADA SIMPLIFICADA
    function setJornada(valor) {
        document.getElementById('jornadaFinal').value = valor;
        document.getElementById('jornadaTime').style.display = 'none';
        document.getElementById('btn24h').classList.add('active');
        document.getElementById('btnHorario').classList.remove('active');
    }

    function ativarHorario() {
        document.getElementById('jornadaTime').style.display = 'block';
        document.getElementById('btn24h').classList.remove('active');
        document.getElementById('btnHorario').classList.add('active');
        document.getElementById('jornadaFinal').value = "";
    }

    // MÁSCARA TELEFONE
    document.getElementById('telefone').addEventListener('input', function(e) {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
    });

    // VALIDAÇÃO DE PLACA
    document.getElementById('placa').addEventListener('input', function(e) {
        let v = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
        if (v.length <= 3) e.target.value = v.replace(/[0-9]/g, "");
        else {
            if (!isNaN(v[3])) { if (v.length > 3) v = v.substring(0,3) + "-" + v.substring(3,7); }
            e.target.value = v.substring(0,8);
        }
    });

    function calcularPatio(entrada) {
        if (!entrada) return "0 min";
        const agora = new Date();
        const partes = entrada.split(', ');
        const dataPartes = partes[0].split('/');
        const horaPartes = partes[1].split(':');
        const dataEntrada = new Date(dataPartes[2], dataPartes[1]-1, dataPartes[0], horaPartes[0], horaPartes[1]);
        const diff = Math.floor((agora - dataEntrada) / 60000);
        return diff > 0 ? diff + " min" : "0 min";
    }

    function carregarAtivos() {
        fetch(API_URL + "?t=" + new Date().getTime())
        .then(res => res.json())
        .then(data => {
            const tbody = document.querySelector('#tabelaDados tbody');
            tbody.innerHTML = "";
            data.filter(i => i.PLACA && !i.SAIDA).forEach(i => {
                const prod = (i.PRODUTO && i.PRODUTO !== "undefined" && i.PRODUTO !== "") ? i.PRODUTO : "—";
                const agendado = (i.COLETA && i.COLETA !== "undefined" && i.COLETA !== "") ? i.COLETA : "Pendente";
                
                tbody.innerHTML += `
                    <tr>
                        <td style="font-weight:bold">${i.PLACA}</td>
                        <td>${i.TELEFONE}</td>
                        <td>${prod}</td>
                        <td>${getStatusJornada(i.JORNADA)}</td>
                        <td><span style="font-weight:bold; color:${agendado === 'Pendente' ? '#999' : '#155724'}">${agendado}</span></td>
                        <td>${calcularPatio(i.ENTRADA)}</td>
                        <td>
                            <button class="btn-zap" onclick="enviarZap('${i.TELEFONE}', '${i.PLACA}', '${agendado}')">📱 CHAMAR</button>
                            <button class="btn-concluir" onclick="concluir('${i.PLACA}')">OK</button>
                            <button onclick="abrirModalColeta('${i.PLACA}')" style="font-size:10px; border:none; background:none; color:blue; cursor:pointer;">[Agendar]</button>
                        </td>
                    </tr>`;
            });
        });
    }

    function getStatusJornada(horaFim) {
        if (!horaFim || horaFim === "24 Horas") return '<span class="status-badge bg-ok">EM DIA</span>';
        const agora = new Date();
        const [h, m] = horaFim.split(':');
        const dF = new Date(); dF.setHours(h, m, 0);
        const diff = (dF - agora) / 60000;
        if (diff < 0) return `<span class="status-badge bg-vencido">VENCIDA (${horaFim})</span>`;
        if (diff <= 60) return `<span class="status-badge bg-alerta">ALERTA (${horaFim})</span>`;
        return `<span class="status-badge bg-ok">EM DIA (${horaFim})</span>`;
    }

    document.getElementById('formAgendamento').addEventListener('submit', function(e) {
        e.preventDefault();
        const jornada = document.getElementById('jornadaFinal').value || document.getElementById('jornadaTime').value;
        if(!jornada) return alert("Defina o horário da jornada!");

        const btn = document.getElementById('btnEnviar');
        btn.innerText = "GRAVANDO...";
        const dados = {
            "PLACA": document.getElementById('placa').value,
            "PRODUTO": document.getElementById('produto').value,
            "TELEFONE": document.getElementById('telefone').value,
            "JORNADA": jornada,
            "ENTRADA": new Date().toLocaleString('pt-BR'),
            "COLETA": "", "SAIDA": ""
        };
        fetch(API_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify([dados]) })
        .then(() => { alert("Registrado!"); location.reload(); });
    });

    // Funções de Modal e Admin permanecem iguais...
    function abrirAdmin() { if (prompt("Senha:") === "raizen2026") { document.getElementById('tela-motorista').style.display = 'none'; document.getElementById('admin-panel').style.display = 'block'; carregarAtivos(); } }
    function abrirModalColeta(placa) { document.getElementById('placaAlvo').value = placa; document.getElementById('modalColeta').style.display = 'block'; }
    function fecharModal() { document.getElementById('modalColeta').style.display = 'none'; }
    function salvarColeta() {
        const placa = document.getElementById('placaAlvo').value;
        const d = document.getElementById('inputData').value;
        const h = document.getElementById('inputHora').value;
        const info = d.split('-')[2] + "/" + d.split('-')[1] + " " + h;
        fetch(`${API_URL}/PLACA/${placa}`, { method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ "COLETA": info }) })
        .then(() => { fecharModal(); carregarAtivos(); });
    }
    function concluir(placa) { if(confirm("Concluir?")) fetch(`${API_URL}/PLACA/${placa}`, { method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ "SAIDA": new Date().toLocaleString() }) }).then(() => carregarAtivos()); }
    function enviarZap(tel, placa, agenda) { const baia = prompt("Qual a BAIA?"); if(baia) window.open(`https://web.whatsapp.com/send?phone=55${tel.replace(/\D/g, "")}&text=${encodeURIComponent(`*RAÍZEN*\nPlaca: ${placa}\nAgendado: ${agenda}\nBaia: ${baia}`)}`); }
</script>
</body>
</html>
