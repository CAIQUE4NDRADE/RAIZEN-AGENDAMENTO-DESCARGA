<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAÍZEN | GESTÃO TÉCNICA DE PÁTIO</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --raizen-purple: #84207d;
            --raizen-green: #4d6d5d;
            --raizen-gold: #ffc107;
            --dark-bg: #1a202c;
            --glass-white: rgba(255, 255, 255, 0.95);
            --shadow-ux: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            background: radial-gradient(circle at top right, #e2e8f0, #cbd5e1);
            background-attachment: fixed;
            margin: 0; 
            min-height: 100vh;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        /* HEADER PREMIUM */
        header { 
            background: var(--raizen-green);
            width: 100%; 
            padding: 25px 0; 
            text-align: center; 
            border-bottom: 8px solid var(--raizen-purple); 
            box-shadow: var(--shadow-ux);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header img {
            height: 55px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
            transition: transform 0.3s ease;
        }

        header h1 { 
            color: white; 
            margin: 10px 0 0; 
            font-size: 20px; 
            letter-spacing: 6px; 
            font-weight: 200;
            text-transform: uppercase;
        }

        /* CONTAINER COM EFEITO GLASSMORPHISM */
        .caixa-principal { 
            width: 90%; 
            max-width: 850px; 
            margin: 40px auto; 
            background: var(--glass-white); 
            padding: 50px; 
            border-radius: 40px; 
            box-shadow: var(--shadow-ux);
            border: 1px solid rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #painel-gestao-admin { 
            display: none; 
            max-width: 96%; 
            width: 1800px; 
        }

        h2 { 
            color: var(--raizen-purple); 
            text-align: left; 
            font-size: 28px;
            margin-bottom: 35px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        h2::after {
            content: "";
            flex: 1;
            height: 2px;
            background: linear-gradient(to right, #84207d, transparent);
        }

        /* INPUTS E FORMULÁRIO ESTILIZADOS */
        .field-box { margin-bottom: 25px; position: relative; }
        
        label { 
            font-weight: 700; 
            color: #4a5568; 
            font-size: 14px; 
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
            padding-left: 5px;
        }

        input, select { 
            width: 100%; 
            padding: 18px 20px; 
            border: 2px solid #edf2f7; 
            border-radius: 16px; 
            font-size: 18px; 
            background: #f7fafc;
            color: #2d3748;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--raizen-purple);
            background: white;
            box-shadow: 0 0 0 4px rgba(132, 32, 125, 0.1);
            outline: none;
        }

        /* BOTÃO DE AÇÃO PRINCIPAL */
        .btn-main { 
            width: 100%; 
            padding: 22px; 
            background: linear-gradient(135deg, #84207d 0%, #63175e 100%);
            color: white; 
            border: none; 
            border-radius: 18px; 
            font-size: 22px; 
            font-weight: 800; 
            cursor: pointer; 
            margin-top: 20px;
            box-shadow: 0 10px 15px -3px rgba(132, 32, 125, 0.4);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-main:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 25px -5px rgba(132, 32, 125, 0.5);
        }

        /* TABELA DE ALTO DESEMPENHO */
        .table-wrapper { 
            overflow-x: auto; 
            border-radius: 25px; 
            background: white;
            border: 1px solid #e2e8f0;
        }

        table { width: 100%; border-collapse: collapse; min-width: 1400px; }
        
        th { 
            background: #f8fafc; 
            color: #64748b; 
            padding: 20px; 
            font-size: 12px; 
            text-transform: uppercase; 
            text-align: center;
            border-bottom: 2px solid #edf2f7;
        }

        td { 
            padding: 20px; 
            border-bottom: 1px solid #f1f5f9; 
            font-weight: 600;
            color: #1e293b;
        }

        /* BADGES DE STATUS */
        .badge {
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 800;
            color: white;
            text-transform: uppercase;
        }

        .bg-gasoline { background: #f59e0b; color: #000; }
        .bg-biodiesel { background: #000; }
        .bg-etanol { background: #10b981; }
        .bg-diesel { background: #64748b; }

        .btn-table {
            border: none;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 11px;
            width: 100%;
            margin-bottom: 5px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-w { background: #22c55e; color: white; }
        .btn-c { background: #3b82f6; color: white; }

        /* RODAPÉ DO FORMULÁRIO */
        .admin-link {
            display: inline-block;
            margin-top: 30px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 13px;
            transition: color 0.3s;
        }
        .admin-link:hover { color: var(--raizen-purple); }

    </style>
</head>
<body>

<header>
    <img src="https://logodownload.org/wp-content/uploads/2019/08/raizen-logo.png" alt="Raízen">
    <h1>LOGÍSTICA & TERMINAIS</h1>
</header>

<div class="caixa-principal" id="container-motorista">
    <h2><i class="fa-solid fa-truck-moving"></i> REGISTRO DE ENTRADA</h2>
    
    <form id="formRaizen">
        <div class="field-box">
            <label>Placa do Veículo</label>
            <input type="text" id="p_placa" placeholder="EX: BRA-2E19" maxlength="8" required>
        </div>

        <div class="field-box">
            <label>Produto Carregado</label>
            <select id="p_produto" required>
                <option value="">Selecione o combustível...</option>
                <option value="GASOLINA">GASOLINA COMUM</option>
                <option value="BIODIESEL (B100)">BIODIESEL B100</option>
                <option value="S10">DIESEL S10</option>
                <option value="ANIDRO">ETANOL ANIDRO</option>
                <option value="HIDRATADO">ETANOL HIDRATADO</option>
            </select>
        </div>

        <div class="field-box">
            <label>WhatsApp do Condutor</label>
            <input type="tel" id="p_zap" placeholder="(00) 00000-0000" maxlength="15" required>
        </div>
        
        <div style="background: #ffffff; border: 2px solid #edf2f7; padding: 30px; border-radius: 25px; margin-top: 10px;">
            <div id="jornada_box">
                <label><i class="fa-regular fa-clock"></i> Horário de Término da Jornada</label>
                <input type="time" id="p_jornada" required>
            </div>
            
            <label style="display:flex; align-items:center; gap:15px; margin-top:20px; cursor:pointer;">
                <input type="checkbox" id="p_24h" style="width:22px; height:22px;" onchange="toggleJornada(this)">
                <span style="font-weight:700; color: #4a5568;">Motorista em regime de 24 horas</span>
            </label>
        </div>

        <button type="submit" class="btn-main" id="btn_sub">FINALIZAR CHECK-IN</button>
    </form>
    
    <div style="text-align:center;">
        <a href="#" class="admin-link" onclick="validaAdmin()">Acesso Administrativo / Operador</a>
    </div>
</div>

<div class="caixa-principal" id="painel-gestao-admin">
    <h2><i class="fa-solid fa-microchip"></i> CONTROLE DE PÁTIO - ÁREA 2</h2>
    
    <div style="margin-bottom:25px; display: flex; background: #fff; padding: 15px; border-radius: 20px; border: 1px solid #e2e8f0; align-items: center; gap: 15px;">
        <i class="fa-solid fa-magnifying-glass" style="color: #cbd5e1; padding-left: 10px;"></i>
        <input type="text" id="filtro" placeholder="Pesquisar por Placa, Produto ou Telefone..." onkeyup="f_tabela()" style="border:none; background:transparent; padding: 10px; margin:0;">
    </div>

    <div class="table-wrapper">
        <table id="mainTable">
            <thead>
                <tr>
                    <th>Placa</th>
                    <th>Produto</th>
                    <th>WhatsApp</th>
                    <th>Status Jornada</th>
                    <th>Tempo em Pátio</th>
                    <th style="background: #fff8e6; color: #92400e;">COLETA (AGENDAMENTO)</th>
                    <th style="width: 220px;">Operações</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    
    <button class="btn-main" style="background:#1e293b; margin-top:30px; font-size: 16px;" onclick="window.location.reload()">Sair do Sistema</button>
</div>

<script>
    const API = 'https://sheetdb.io/api/v1/p9z83v5m0dxq5';
    const COL_COLETA = "AGENDAMENTO NO COLETA";

    // --- INTERFACE E UX ---

    function toggleJornada(el) {
        const j = document.getElementById('p_jornada');
        j.disabled = el.checked;
        j.style.opacity = el.checked ? '0.3' : '1';
        j.required = !el.checked;
    }

    // Máscaras de Input (UX)
    document.getElementById('p_zap').addEventListener('input', (e) => {
        let r = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !r[2] ? r[1] : '(' + r[1] + ') ' + r[2] + (r[3] ? '-' + r[3] : '');
    });

    document.getElementById('p_placa').addEventListener('input', (e) => {
        let v = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
        if (v.length > 3 && !isNaN(v[3])) v = v.substring(0,3) + "-" + v.substring(3,7);
        e.target.value = v.substring(0,8);
    });

    // --- LÓGICA DE DADOS ---

    function f_tabela() {
        const query = document.getElementById("filtro").value.toUpperCase();
        document.querySelectorAll("#mainTable tbody tr").forEach(tr => {
            tr.style.display = tr.textContent.toUpperCase().includes(query) ? "" : "none";
        });
    }

    async function atualizar() {
        const tbody = document.querySelector('#mainTable tbody');
        tbody.innerHTML = "<tr><td colspan='7' style='padding:60px; text-align:center;'><i class='fa-solid fa-spinner fa-spin'></i> Carregando dados operacionais...</td></tr>";

        try {
            const r = await fetch(API + "?t=" + new Date().getTime());
            const data = await r.json();
            tbody.innerHTML = "";
            
            data.filter(i => i.PLACA && !i.SAIDA).forEach(i => {
                let badgeClass = "bg-diesel";
                if(i.PRODUTO.includes("GASOLINA")) badgeClass = "bg-gasoline";
                if(i.PRODUTO.includes("B100")) badgeClass = "bg-biodiesel";
                if(i.PRODUTO.includes("ANIDRO") || i.PRODUTO.includes("HIDRATADO")) badgeClass = "bg-etanol";

                const [dS, hS] = (i[COL_COLETA] || " ").split(" ");

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-size:18px; color:var(--raizen-purple); font-weight:800;">${i.PLACA}</td>
                    <td><span class="badge ${badgeClass}">${i.PRODUTO}</span></td>
                    <td style="color:#64748b; font-size:14px;">${i.TELEFONE}</td>
                    <td>${statusJornada(i.JORNADA)}</td>
                    <td style="color:#94a3b8; font-size:13px;">${tempoPatio(i.ENTRADA)}</td>
                    <td style="background:#fffcf5;">
                        <div style="display:flex; flex-direction:column; gap:6px;">
                            <input type="date" id="d-${i.PLACA}" value="${dS||''}" style="padding:6px; font-size:11px; border-radius:8px;">
                            <input type="time" id="h-${i.PLACA}" value="${hS||''}" style="padding:6px; font-size:11px; border-radius:8px;">
                            <button onclick="saveColeta('${i.PLACA}')" style="background:var(--raizen-purple); color:white; border:none; padding:6px; border-radius:8px; font-size:10px; cursor:pointer;">ATUALIZAR</button>
                        </div>
                    </td>
                    <td>
                        <button class="btn-table btn-w" onclick="callZap('${i.TELEFONE}')"><i class="fa-brands fa-whatsapp"></i> CHAMAR</button>
                        <button class="btn-table btn-c" onclick="finish('${i.PLACA}')"><i class="fa-solid fa-check"></i> CONCLUIR</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        } catch(e) { tbody.innerHTML = "Erro de conexão."; }
    }

    function statusJornada(j) {
        if(j === "24 Horas") return '<span style="color:#10b981"><i class="fa-solid fa-infinity"></i> LIVRE</span>';
        const [h, m] = j.split(':');
        const lim = new Date(); lim.setHours(h, m, 0);
        return (lim < new Date()) ? '<span style="color:#ef4444; font-weight:900;">⚠️ VENCIDA</span>' : `<span style="color:#10b981">OK (${j})</span>`;
    }

    function tempoPatio(ent) {
        if(!ent) return "-";
        const p = ent.split(', '); const d = p[0].split('/'); const h = p[1].split(':');
        const diff = Math.floor((new Date() - new Date(d[2], d[1]-1, d[0], h[0], h[1])) / 60000);
        return diff < 60 ? diff + "m" : Math.floor(diff/60) + "h " + (diff%60) + "m";
    }

    function callZap(tel) {
        const baia = prompt("Informe a BAIA de destino:");
        if(!baia) return;
        const msg = `Olá%0AMotorista vamos descarregar?%0ABaia *${baia}* - Área 02%0AObrigado!%0A%0A_Obs: aguarde a instrução do operador para entrar na baia!_`;
        window.open(`https://wa.me/55${tel.replace(/\D/g, "")}?text=${msg}`, '_blank');
    }

    async function saveColeta(placa) {
        const d = document.getElementById(`d-${placa}`).value;
        const h = document.getElementById(`h-${placa}`).value;
        let up = {}; up[COL_COLETA] = `${d} ${h}`;
        await fetch(`${API}/PLACA/${placa}`, { method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(up) });
        atualizar();
    }

    document.getElementById('formRaizen').onsubmit = async (e) => {
        e.preventDefault();
        const b = document.getElementById('btn_sub');
        b.innerHTML = "<i class='fa-solid fa-sync fa-spin'></i> PROCESSANDO...";
        b.disabled = true;

        const payload = {
            "PLACA": document.getElementById('p_placa').value,
            "PRODUTO": document.getElementById('p_produto').value,
            "TELEFONE": document.getElementById('p_zap').value,
            "JORNADA": document.getElementById('p_24h').checked ? "24 Horas" : document.getElementById('p_jornada').value,
            "ENTRADA": new Date().toLocaleString('pt-BR'),
            "SAIDA": ""
        };
        payload[COL_COLETA] = "";

        await fetch(API, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify([payload]) });
        alert("Check-in realizado com sucesso!");
        location.reload();
    };

    async function finish(placa) {
        if(confirm("Confirmar liberação do veículo?")) {
            await fetch(`${API}/PLACA/${placa}`, { method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ "SAIDA": new Date().toLocaleString('pt-BR') }) });
            atualizar();
        }
    }

    function validaAdmin() {
        if(prompt("Chave de Acesso:") === "raizen2026") {
            document.getElementById('container-motorista').style.display = 'none';
            document.getElementById('painel-gestao-admin').style.display = 'block';
            atualizar();
        }
    }
</script>
</body>
</html>
