<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200"> 
    <title>RAÍZEN - MONITORAMENTO OPERACIONAL V31.0 - FULL SYSTEM</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* ============================================================
           ESTILO VISUAL RAÍZEN - NÃO APAGAR NADA ABAIXO
           ============================================================ 
        */
        :root {
            --verde-raizen: #4d6d5d;
            --roxo-raizen: #84207d;
            --ouro-raizen: #ffc107;
            --fundo-base: #f1f5f9;
            --branco: #ffffff;
            --preto-painel: #1e293b;
            --cor-erro: #e11d48;
            --cor-alerta: #f59e0b;
            --cor-sucesso: #10b981;
            --sombra-premium: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
        
        body { 
            background-color: var(--fundo-base); 
            color: #1e293b; 
            min-height: 100vh; 
            padding-bottom: 200px;
        }

        header { 
            background: linear-gradient(135deg, var(--verde-raizen) 0%, #1a241f 100%); 
            padding: 130px 20px; 
            text-align: center; 
            border-bottom: 40px solid var(--roxo-raizen);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .logo-display {
            color: var(--branco); 
            font-size: 130px; 
            font-weight: 900;
            letter-spacing: 35px; 
            text-transform: uppercase;
            text-shadow: 10px 10px 0px rgba(0,0,0,0.2);
        }

        /* CONTAINER PRINCIPAL */
        .card-master { 
            width: 95%; 
            max-width: 1250px; 
            margin: -90px auto 100px; 
            background: var(--branco); 
            padding: 90px; 
            border-radius: 70px; 
            box-shadow: var(--sombra-premium); 
            border-left: 50px solid var(--roxo-raizen);
            position: relative;
            z-index: 10;
        }

        /* MÓDULOS OCULTOS */
        #modulo-operador-full, #modulo-supervisao { 
            display: none; 
            width: 98%; 
            max-width: 2200px; 
            margin: 60px auto;
            background: var(--branco); 
            padding: 70px; 
            border-radius: 60px;
            box-shadow: var(--sombra-premium); 
            zoom: 0.8; 
        }

        h2 { 
            color: var(--roxo-raizen); 
            text-align: center; 
            font-weight: 900; 
            text-transform: uppercase; 
            margin-bottom: 70px; 
            font-size: 52px; 
            border-bottom: 25px solid #f1f5f9;
            padding-bottom: 40px;
        }

        /* INPUTS E FORMULÁRIO */
        .wrapper-input { margin-bottom: 55px; }
        label { display: flex; align-items: center; gap: 25px; margin-bottom: 30px; font-weight: 900; color: var(--verde-raizen); font-size: 22px; text-transform: uppercase; }
        input, select { width: 100%; padding: 40px; border: 8px solid #f1f5f9; border-radius: 40px; font-size: 30px; font-weight: 700; background: #f8fafc; }

        .painel-jornada { background: #fffbeb; padding: 60px; border-radius: 65px; border: 8px dashed var(--ouro-raizen); margin: 80px 0; }

        /* BOTÕES */
        .btn-master { 
            width: 100%; padding: 50px; background: var(--roxo-raizen); color: white; border: none; 
            border-radius: 45px; font-size: 34px; font-weight: 900; cursor: pointer; 
            text-transform: uppercase; box-shadow: 0 20px 0 #5e1659; margin-bottom: 40px; 
            display: flex; justify-content: center; align-items: center; gap: 35px;
        }
        .btn-master:active { transform: translateY(18px); box-shadow: 0 2px 0 #5e1659; }

        /* TABELA E STATUS */
        .moldura-tabela { overflow-x: auto; border-radius: 60px; border: 10px solid #f1f5f9; }
        table { width: 100%; border-collapse: collapse; min-width: 2000px; }
        th { background: var(--preto-painel); color: white; padding: 45px 30px; font-size: 18px; text-transform: uppercase; }
        td { padding: 35px 30px; border-bottom: 6px solid #f8fafc; text-align: center; font-weight: 700; font-size: 24px; }

        /* SEMÁFORO DE JORNADA */
        .jor-24h { color: #3b82f6; font-weight: 900; }
        .jor-ok { color: var(--cor-sucesso); }
        .jor-alerta { color: var(--cor-alerta); background: #fffbeb; animation: pisca 1s infinite; }
        .jor-vencida { color: var(--cor-erro); background: #fee2e2; font-weight: 900; }
        @keyframes pisca { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .status-ok { color: var(--cor-sucesso); font-weight: 900; background: #ecfdf5; padding: 15px 30px; border-radius: 25px; border: 4px solid var(--cor-sucesso); }
        .status-erro { color: var(--cor-erro); font-weight: 900; background: #fff1f2; padding: 15px 30px; border-radius: 25px; border: 4px solid var(--cor-erro); font-size: 16px; }

        /* LOADER */
        #loader-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; }
        .raizen-spinner { width: 150px; height: 150px; border: 20px solid #f3f3f3; border-top: 20px solid var(--roxo-raizen); border-radius: 50%; animation: girar 1s linear infinite; }
        @keyframes girar { 100% { transform: rotate(360deg); } }

        .grid-tanques { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 60px; margin-top: 60px; }
        .card-tanque { background: #ffffff; padding: 70px; border-radius: 60px; border: 10px solid #e2e8f0; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div id="loader-overlay"><div class="raizen-spinner"></div><h2 style="border:none; margin-top:45px;">SINCRONIZANDO DADOS...</h2></div>

<header><div class="logo-display">RAÍZEN</div></header>

<div class="card-master" id="secao-entrada">
    <div id="form-principal-wrapper">
        <h2>REGISTRO DE MOTORISTA</h2>
        <form id="formMaster">
            <div class="wrapper-input"><label>PLACA</label><input type="text" id="placa" placeholder="AAA-0000" maxlength="8" required></div>
            <div class="wrapper-input">
                <label>PRODUTO</label>
                <select id="produto" required>
                    <option value="">-- SELECIONE --</option>
                    <option value="GASOLINA">GASOLINA</option>
                    <option value="BIODIESEL">BIODIESEL (B100)</option>
                    <option value="ANIDRO">ETANOL ANIDRO</option>
                    <option value="HIDRATADO">ETANOL HIDRATADO</option>
                    <option value="DIESEL">DIESEL S10</option>
                </select>
            </div>
            <div class="wrapper-input"><label>WHATSAPP</label><input type="tel" id="whatsapp" placeholder="(19) 99999-9999" required></div>
            <div class="painel-jornada">
                <div id="area-tempo"><label>HORA LIMITE</label><input type="time" id="limite" required></div>
                <label style="margin-top:40px; display:flex; align-items:center; gap:30px; cursor:pointer; font-size: 26px; font-weight: 900; color: var(--roxo-raizen);">
                    <input type="checkbox" id="jornada24" style="width:50px; height:50px;"> JORNADA 24 HORAS
                </label>
            </div>
            <button type="submit" class="btn-master">CONFIRMAR CHEGADA</button>
            <button type="button" onclick="abrirReabertura()" class="btn-master" style="background:#475569; font-size:24px;">REABRIR JORNADA</button>
        </form>
    </div>

    <div id="form-reabertura-wrapper" style="display:none;">
        <h2>REABRIR REGISTRO</h2>
        <div class="wrapper-input"><label>PLACA</label><input type="text" id="re_placa" placeholder="AAA-0000"></div>
        <div class="wrapper-input"><label>NOVA HORA</label><input type="time" id="re_hora"></div>
        <button onclick="processarReabertura()" class="btn-master" style="background:#475569">ATUALIZAR HORA</button>
        <button onclick="fecharReabertura()" style="width:100%; background:none; border:none; color:var(--roxo-raizen); font-weight:900; cursor:pointer; padding:40px; font-size:22px;">VOLTAR</button>
    </div>

    <div style="text-align:center; margin-top:80px; display:flex; justify-content:center; gap:60px;">
        <button onclick="acessoADM()" style="color:var(--roxo-raizen); font-weight:900; border:none; background:none; cursor:pointer; font-size:20px;">ADM PÁTIO</button>
        <button onclick="acessoSuper()" style="color:var(--verde-raizen); font-weight:900; border:none; background:none; cursor:pointer; font-size:20px;">SUPERVISÃO</button>
    </div>
</div>

<div id="modulo-operador-full">
    <h2>CONTROLE DE FILA OPERACIONAL</h2>
    <div class="moldura-tabela">
        <table>
            <thead>
                <tr>
                    <th>VEÍCULO</th>
                    <th>PRODUTO</th>
                    <th style="background:#fefce8;">VOLUME (L)</th>
                    <th>JORNADA</th>
                    <th>ESTOQUE</th>
                    <th>CHAMAR</th>
                    <th>AÇÃO</th>
                </tr>
            </thead>
            <tbody id="listaFila"></tbody>
        </table>
    </div>
    <button class="btn-master" style="background:var(--preto-painel); margin-top:70px;" onclick="location.reload()">SAIR</button>
</div>

<div id="modulo-supervisao">
    <h2>CONTROLE DE TANQUES</h2>
    <div id="gridSupervisao" class="grid-tanques"></div>
    <button class="btn-master" style="background:var(--preto-painel); margin-top:70px;" onclick="location.reload()">SAIR</button>
</div>

<script>
    /* ============================================================
       LÓGICA DO SISTEMA - FOCO NA TRAVA DO BIODIESEL
       ============================================================ 
    */
    const CONFIG = {
        URL: 'https://rbbkjuiizmvatiawfzuv.supabase.co/rest/v1',
        HEADERS: { "apikey": 'sb_publishable_WkrHi6cWtZsnsDXl0nh1hA_kz1UT_1X', "Authorization": `Bearer sb_publishable_WkrHi6cWtZsnsDXl0nh1hA_kz1UT_1X`, "Content-Type": "application/json", "Prefer": "return=minimal" }
    };

    let filaGlobal = [], tanquesGlobal = [];

    // MÁSCARAS
    const mkP = el => { el.oninput = function() { let v = this.value.toUpperCase().replace(/[^A-Z0-9]/g, ""); if (v.length > 3 && !isNaN(v[3])) v = v.substring(0,3) + "-" + v.substring(3,7); this.value = v.substring(0,8); }; };
    mkP(document.getElementById('placa')); mkP(document.getElementById('re_placa'));
    document.getElementById('whatsapp').oninput = function(e) { let v = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/); e.target.value = !v[2] ? v[1] : '(' + v[1] + ') ' + v[2] + (v[3] ? '-' + v[3] : ''); };
    document.getElementById('jornada24').onchange = function() { document.getElementById('limite').disabled = this.checked; document.getElementById('area-tempo').style.opacity = this.checked ? "0.3" : "1"; };

    function setLoader(v) { document.getElementById('loader-overlay').style.display = v ? 'flex' : 'none'; }
    
    // LIMPEZA TOTAL DE TEXTO PARA COMPARAÇÃO
    function limpar(t) { 
        if(!t) return "";
        return t.toString().toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^A-Z0-9]/g, ""); 
    }

    // SEMAFORO CORES
    function calcularSemaforo(h) {
        if(h === "24 HORAS") return { c: 'jor-24h', i: 'fa-infinity' };
        const agora = new Date(); const [hr, mn] = h.split(':'); const lim = new Date(); lim.setHours(hr, mn, 0);
        const df = (lim - agora) / 60000;
        if(df <= 0) return { c: 'jor-vencida', i: 'fa-triangle-exclamation' };
        if(df <= 30) return { c: 'jor-alerta', i: 'fa-clock' };
        return { c: 'jor-ok', i: 'fa-circle-check' };
    }

    async function carregarDados() {
        const [resF, resT] = await Promise.all([
            fetch(`${CONFIG.URL}/registros?SAIDA=is.null&select=*&order=ENTRADA.asc`, { headers: CONFIG.HEADERS }),
            fetch(`${CONFIG.URL}/ESTOQUE?select=*&order=TANQUE_NAME.asc`, { headers: CONFIG.HEADERS })
        ]);
        filaGlobal = await resF.json(); tanquesGlobal = await resT.json();
        renderFila(); renderSuper();
    }

    function renderFila() {
        const corpo = document.getElementById('listaFila'); corpo.innerHTML = "";
        
        filaGlobal.forEach(item => {
            const prodCaminhao = limpar(item.PRODUTO);
            
            // BUSCA DO TANQUE - LÓGICA DE EQUIVALÊNCIA "CHAVE MESTRA"
            const tanque = tanquesGlobal.find(t => {
                const prodTanque = limpar(t.PRODUTO);
                // Se o caminhão é BIODIESEL e no tanque tem B100 ou BIO, ele libera
                if (prodCaminhao.includes("BIODIESEL") && (prodTanque.includes("B100") || prodTanque.includes("BIO"))) return true;
                // Se o caminhão é DIESEL e no tanque tem S10, ele libera
                if (prodCaminhao.includes("DIESEL") && prodTanque.includes("S10")) return true;
                // Comparação padrão
                return prodTanque.includes(prodCaminhao) || prodCaminhao.includes(prodTanque);
            });
            
            const sem = calcularSemaforo(item.JORNADA);
            const volC = Number(item.VOLUME) || 0;
            const espL = tanque ? Number(tanque.ESPAÇO_DISPONIVEL) : 0;
            
            let txtStatus = "OK";
            let pode = true;

            if (!tanque) { txtStatus = "ERRO: PRODUTO"; pode = false; }
            else if (volC <= 0) { txtStatus = "INSERIR VOLUME"; pode = false; }
            else if (espL < volC) { txtStatus = `SEM ESPAÇO (${espL}L)`; pode = false; }

            corpo.innerHTML += `
                <tr>
                    <td style="color:var(--roxo-raizen); font-weight:900;">${item.PLACA}</td>
                    <td><span style="background:#f1f5f9; padding:10px 20px; border-radius:15px;">${item.PRODUTO}</span></td>
                    <td>
                        <div style="display:flex; gap:12px; justify-content:center;">
                            <input type="number" id="vol-${item.ID}" value="${item.VOLUME || ''}" style="width:170px; padding:15px; border-radius:20px; font-size:22px;">
                            <button onclick="salvarVol(${item.ID})" style="background:var(--roxo-raizen); color:white; border:none; padding:15px 25px; border-radius:15px; cursor:pointer;">OK</button>
                        </div>
                    </td>
                    <td class="${sem.c}"><i class="fa-solid ${sem.i}"></i> ${item.JORNADA}</td>
                    <td><span class="${pode ? 'status-ok' : 'status-erro'}">${txtStatus}</span></td>
                    <td>
                        <button onclick="enviarW('${item.TELEFONE}', '${item.PLACA}')" 
                            ${pode ? '' : 'disabled'} 
                            style="background:${pode ? '#25d366' : '#cbd5e1'}; color:white; border:none; padding:25px; border-radius:25px; cursor:pointer; font-weight:900; width:100%;">
                            WHATSAPP
                        </button>
                    </td>
                    <td>
                        <button onclick="finalizar(${item.ID}, ${volC}, ${tanque?.id})" style="background:#3b82f6; color:white; border:none; padding:25px; border-radius:25px; cursor:pointer; font-weight:900;">SAÍDA</button>
                    </td>
                </tr>`;
        });
    }

    async function salvarVol(id) {
        const v = document.getElementById(`vol-${id}`).value;
        setLoader(true);
        await fetch(`${CONFIG.URL}/registros?ID=eq.${id}`, { method: 'PATCH', headers: CONFIG.HEADERS, body: JSON.stringify({ VOLUME: v }) });
        await carregarDados(); setLoader(false);
    }

    async function finalizar(id, vol, tId) {
        if(!confirm("CONFIRMAR FINALIZAÇÃO?")) return;
        setLoader(true);
        await fetch(`${CONFIG.URL}/registros?ID=eq.${id}`, { method: 'PATCH', headers: CONFIG.HEADERS, body: JSON.stringify({ SAIDA: new Date().toLocaleString() }) });
        if(tId && vol > 0) {
            const t = tanquesGlobal.find(x => x.id === tId);
            await fetch(`${CONFIG.URL}/ESTOQUE?id=eq.${tId}`, { method: 'PATCH', headers: CONFIG.HEADERS, body: JSON.stringify({ ESPAÇO_DISPONIVEL: Number(t.ESPAÇO_DISPONIVEL) - vol }) });
        }
        await carregarDados(); setLoader(false);
    }

    function renderSuper() {
        const grid = document.getElementById('gridSupervisao');
        grid.innerHTML = tanquesGlobal.map(t => `
            <div class="card-tanque">
                <i class="fa-solid fa-database" style="font-size:55px; color:var(--roxo-raizen); margin-bottom:30px;"></i>
                <h3 style="color:var(--roxo-raizen); font-size:30px;">${t.TANQUE_NAME}</h3>
                <p style="font-weight:900; font-size:24px; color:var(--verde-raizen);">${t.PRODUTO}</p>
                <div style="text-align:left; margin-top:30px;">
                    <label style="font-size:14px;">ESPAÇO LIVRE (L)</label>
                    <input type="number" id="stq-${t.id}" value="${t.ESPAÇO_DISPONIVEL}" style="padding:30px; font-size:28px;">
                </div>
                <button onclick="salvarEstoque(${t.id})" class="btn-master" style="font-size:20px; padding:35px; margin-top:30px;">SALVAR</button>
            </div>`).join('');
    }

    async function salvarEstoque(id) {
        const v = document.getElementById(`stq-${id}`).value;
        setLoader(true);
        await fetch(`${CONFIG.URL}/ESTOQUE?id=eq.${id}`, { method: 'PATCH', headers: CONFIG.HEADERS, body: JSON.stringify({ ESPAÇO_DISPONIVEL: v }) });
        await carregarDados(); setLoader(false); alert("ESTOQUE SALVO!");
    }

    document.getElementById('formMaster').onsubmit = async e => {
        e.preventDefault(); setLoader(true);
        const d = { PLACA: document.getElementById('placa').value.toUpperCase(), PRODUTO: document.getElementById('produto').value, TELEFONE: document.getElementById('whatsapp').value, JORNADA: document.getElementById('jornada24').checked ? "24 HORAS" : document.getElementById('limite').value, ENTRADA: new Date().toLocaleString() };
        await fetch(`${CONFIG.URL}/registros`, { method: 'POST', headers: CONFIG.HEADERS, body: JSON.stringify(d) });
        setLoader(false); alert("REGISTRADO!"); location.reload();
    };

    function acessoADM() { if(prompt("SENHA ADM:") === "raizen2026") { document.getElementById('secao-entrada').style.display='none'; document.getElementById('modulo-operador-full').style.display='block'; carregarDados(); } }
    function acessoSuper() { if(prompt("SENHA SUPERVISÃO:") === "master2026") { document.getElementById('secao-entrada').style.display='none'; document.getElementById('modulo-supervisao').style.display='block'; carregarDados(); } }
    function abrirReabertura() { document.getElementById('form-principal-wrapper').style.display = 'none'; document.getElementById('form-reabertura-wrapper').style.display = 'block'; }
    function fecharReabertura() { document.getElementById('form-reabertura-wrapper').style.display = 'none'; document.getElementById('form-principal-wrapper').style.display = 'block'; }
    
    async function processarReabertura() {
        const p = document.getElementById('re_placa').value.toUpperCase(); const h = document.getElementById('re_hora').value; setLoader(true);
        const res = await fetch(`${CONFIG.URL}/registros?PLACA=eq.${p}&SAIDA=is.null`, { headers: CONFIG.HEADERS });
        const d = await res.json();
        if(d.length > 0) { await fetch(`${CONFIG.URL}/registros?ID=eq.${d[0].ID}`, { method: 'PATCH', headers: CONFIG.HEADERS, body: JSON.stringify({ JORNADA: h }) }); location.reload(); }
        else { setLoader(false); alert("PLACA NÃO ACHADA!"); }
    }

    function enviarW(t, p) { window.open(`https://wa.me/55${t.replace(/\D/g, "")}?text=Veículo ${p} autorizado.`); }
    
    // ATUALIZAÇÃO AUTOMÁTICA DO SEMÁFORO
    setInterval(() => { if(filaGlobal.length > 0) renderFila(); }, 60000);
</script>
</body>
</html>
