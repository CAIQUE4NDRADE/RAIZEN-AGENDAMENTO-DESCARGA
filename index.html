<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raízen - SISTEMA DE GESTÃO DE PÁTIO ÁREA 2 - TERMINAL PAULÍNIA</title>
    
    <style>
        :root {
            --verde-raizen: #4d6d5d; 
            --amarelo-raizen: #ffcd00;
            --fundo-cinza: #f4f7f6;
            --branco-puro: #ffffff;
            --vermelho-alerta: #dc3545;
            --verde-sucesso: #28a745;
            --azul-info: #007bff;
            --sombra-card: 0 10px 30px rgba(0,0,0,0.15);
            --borda-radius: 20px;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--fundo-cinza); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        /* CABEÇALHO PADRÃO RAÍZEN */
        header { 
            background-color: var(--verde-raizen); 
            width: 100%; 
            padding: 40px 0; 
            text-align: center; 
            border-bottom: 10px solid var(--amarelo-raizen); 
            box-shadow: 0 5px 20px rgba(0,0,0,0.3); 
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        header h1 { 
            color: var(--branco-puro); 
            margin: 0; 
            font-size: 28px; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            font-weight: 900;
        }
        
        /* CONTAINERS PRINCIPAIS */
        .main-container { 
            width: 92%; 
            max-width: 750px; 
            margin: 40px auto; 
            background: var(--branco-puro); 
            padding: 50px; 
            border-radius: 35px; 
            box-shadow: var(--sombra-card); 
        }

        /* PAINEL ADMIN COM LARGURA ESTENDIDA */
        #admin-panel { 
            display: none; 
            max-width: 98%; 
            width: 1650px; 
        }

        h2 { 
            color: var(--verde-raizen); 
            text-align: center; 
            border-bottom: 4px solid var(--amarelo-raizen); 
            padding-bottom: 20px; 
            margin-bottom: 35px; 
            text-transform: uppercase;
            font-size: 24px;
        }
        
        /* FORMULÁRIOS E INPUTS */
        .form-group { margin-bottom: 25px; }

        label { 
            display: block; 
            margin-bottom: 10px; 
            font-weight: 800; 
            color: #222; 
            font-size: 17px; 
        }

        input, select { 
            width: 100%; 
            padding: 20px; 
            border: 2px solid #ddd; 
            border-radius: 15px; 
            box-sizing: border-box; 
            font-size: 18px; 
            color: #333;
            transition: all 0.3s ease;
        }
        
        input:focus { border-color: var(--verde-raizen); outline: none; box-shadow: 0 0 10px rgba(77,109,93,0.2); }

        /* DASHBOARD DE RESUMO (GIGANTE NO ADMIN) */
        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: var(--branco-puro);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            border-bottom: 6px solid var(--amarelo-raizen);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        
        .stat-card h3 { margin: 0; font-size: 14px; color: #777; text-transform: uppercase; }
        .stat-card p { margin: 10px 0 0 0; font-size: 32px; font-weight: 900; color: var(--verde-raizen); }

        /* BARRA DE BUSCA DE PLACA */
        .search-area {
            background: #eef2f3;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 35px;
            display: flex;
            align-items: center;
            gap: 25px;
            border: 2px solid #dee2e6;
        }
        .search-area label { margin-bottom: 0; min-width: 180px; color: var(--verde-raizen); font-size: 18px; }
        .search-area input { background: white; border: 2px solid var(--verde-raizen); font-weight: bold; }

        /* TABELA DE DADOS - GESTÃO À VISTA */
        .table-wrapper { overflow-x: auto; background: white; border-radius: 20px; }
        
        table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        
        th { 
            background: var(--verde-raizen); 
            color: white; 
            padding: 25px 15px; 
            text-align: center; 
            font-size: 13px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        td { 
            padding: 20px 15px; 
            border-bottom: 1px solid #f0f0f0; 
            text-align: center; 
            font-size: 16px; 
            font-weight: 700; 
        }

        /* ETIQUETAS DE PRODUTO COLORIDAS */
        .badge-produto { padding: 8px 12px; border-radius: 8px; font-size: 12px; color: white; display: inline-block; width: 110px; }
        .bg-gasolina { background: #ffc107; color: #000; }
        .bg-b100 { background: #343a40; }
        .bg-alcool { background: #28a745; }
        .bg-s10 { background: #6c757d; }

        /* LÓGICA DO PENDENTE VS AGENDADO */
        .status-pendente-animado { 
            color: white; 
            background: var(--vermelho-alerta); 
            padding: 12px 20px; 
            border-radius: 10px; 
            font-weight: 900; 
            animation: blinker 1.5s linear infinite; 
        }
        
        .status-confirmado-verde { 
            color: #155724; 
            background: #d4edda; 
            padding: 15px; 
            border-radius: 12px; 
            border: 2px solid #c3e6cb; 
            display: block;
            font-weight: 900;
        }

        @keyframes blinker { 50% { opacity: 0.3; } }

        /* BOTÕES DE CONTROLE */
        .btn-action { 
            border: none; border-radius: 10px; padding: 14px; font-weight: bold; cursor: pointer; font-size: 11px; 
            width: 100%; margin-bottom: 8px; color: white; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-agendar-cor { background: white; color: var(--azul-info); border: 2px solid var(--azul-info); }
        .btn-whats-cor { background: #25D366; }
        .btn-finalizar-cor { background: var(--azul-info); }

        /* BOTÃO SALVAR MOTORISTA */
        .btn-submit-large { 
            width: 100%; padding: 25px; background-color: var(--verde-raizen); color: white; border: none; border-radius: 18px; font-size: 24px; font-weight: 900; cursor: pointer; margin-top: 35px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); transition: 0.3s;
        }
        .btn-submit-large:hover { background-color: #3d584a; transform: translateY(-2px); }

        /* MODAL DE AGENDAMENTO */
        #modalAgendamento { 
            display:none; 
            position:fixed; 
            z-index:9999; 
            left:0; top:0; 
            width:100%; height:100%; 
            background:rgba(0,0,0,0.85); 
            backdrop-filter: blur(8px); 
        }
        .modal-body { 
            background:white; 
            margin:6% auto; 
            padding:50px; 
            border-radius:40px; 
            width:480px; 
            text-align: center; 
            box-shadow: 0 50px 100px rgba(0,0,0,0.5); 
        }
    </style>
</head>
<body>

<header><h1>RAÍZEN - TERMINAL PAULÍNIA</h1></header>

<div class="main-container" id="tela-registro">
    <h2>DESCARGA ÁREA 2</h2>
    <form id="formMotorista">
        <div class="form-group">
            <label>Placa do Caminhão</label>
            <input type="text" id="inputPlaca" placeholder="ABC-1234" maxlength="8" required>
        </div>
        
        <div class="form-group">
            <label>Produto para Descarga</label>
            <select id="inputProduto" required>
                <option value="">Clique para selecionar o produto...</option>
                <option value="GASOLINA">GASOLINA</option>
                <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
                <option value="S10">S10</option>
                <option value="ANIDRO">ANIDRO</option>
                <option value="HIDRATADO">HIDRATADO</option>
            </select>
        </div>

        <div class="form-group">
            <label>WhatsApp (com DDD)</label>
            <input type="tel" id="inputZap" placeholder="(19) 99999-9999" maxlength="15" required>
        </div>

        <div style="background:#f1f5f2; padding:30px; border-radius:20px; border:2px dashed #999; margin-top:30px;">
            <div id="boxRelogio">
                <label style="margin-top: 0;">Horário de Término da Jornada:</label>
                <input type="time" id="inputHoraJornada" required>
            </div>
            <label style="display:flex; align-items:center; gap:15px; margin-top:20px; cursor:pointer; user-select:none;">
                <input type="checkbox" id="check24h" style="width:25px; height:25px;" onchange="document.getElementById('boxRelogio').style.display = this.checked ? 'none' : 'block'; document.getElementById('inputHoraJornada').required = !this.checked;">
                <span style="font-weight:bold; color:var(--verde-raizen);">Minha jornada é de 24 Horas</span>
            </label>
        </div>

        <button type="submit" class="btn-submit-large" id="btnRegistrar">CONCLUIR REGISTRO</button>
    </form>
    
    <div style="text-align:center; margin-top:35px;">
        <button onclick="fazerLoginAdmin()" style="background:none; border:none; color:#bbb; text-decoration:underline; cursor:pointer; font-size:15px;">Acesso Administrativo</button>
    </div>
</div>

<div class="main-container" id="admin-panel">
    <h2>GESTÃO DE PÁTIO EM TEMPO REAL</h2>

    <div class="dashboard-stats">
        <div class="stat-card"><h3>Total no Pátio</h3><p id="totalPatio">0</p></div>
        <div class="stat-card"><h3>Já Agendados</h3><p id="totalAgendados" style="color:var(--verde-sucesso)">0</p></div>
        <div class="stat-card"><h3>Aguardando Agenda</h3><p id="totalPendentes" style="color:var(--vermelho-alerta)">0</p></div>
    </div>
    
    <div class="search-area">
        <label>🔎 <strong>FILTRAR PLACA:</strong></label>
        <input type="text" id="campoBuscaAdmin" placeholder="Digite a placa para localizar..." onkeyup="filtrarListaAdmin()">
    </div>

    <div class="table-wrapper">
        <table id="tabelaDadosGerais">
            <thead>
                <tr>
                    <th>Placa</th>
                    <th>Produto</th>
                    <th>WhatsApp</th>
                    <th>Jornada</th>
                    <th style="background:#2d4a3e; color:white; width: 230px;">AGENDAMENTO COLETAS</th>
                    <th>Tempo Pátio</th>
                    <th style="width: 180px;">Ações</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>

    <button class="btn-submit-large" style="background:#555;" onclick="window.location.reload()">SAIR DO SISTEMA</button>
</div>

<div id="modalAgendamento">
    <div class="modal-body">
        <h3 style="margin-top:0; font-size:24px;">Definir Horário de Coleta</h3>
        <p id="placaTextoModal" style="font-weight:900; font-size:28px; color:var(--verde-raizen); margin-bottom:30px;"></p>
        <input type="hidden" id="placaReferencia">
        
        <label>Escolha a Data:</label>
        <input type="date" id="dataAgendaModal">
        
        <label>Escolha o Horário:</label>
        <input type="time" id="horaAgendaModal">
        
        <button class="btn-submit-large" id="btnSalvarNaPlanilha" onclick="gravarAgendamentoFinal()">GRAVAR NA PLANILHA</button>
        <button onclick="document.getElementById('modalAgendamento').style.display='none'" style="margin-top:25px; border:none; background:none; color:red; font-weight:bold; cursor:pointer; font-size:16px;">CANCELAR OPERAÇÃO</button>
    </div>
</div>

<script>
    const SHEET_API_LINK = 'https://sheetdb.io/api/v1/p9z83v5m0dxq5';

    // FUNÇÃO: MÁSCARAS DE TECLADO
    document.getElementById('inputZap').addEventListener('input', (e) => {
        let v = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !v[2] ? v[1] : '(' + v[1] + ') ' + v[2] + (v[3] ? '-' + v[3] : '');
    });
    
    document.getElementById('inputPlaca').addEventListener('input', (e) => {
        let v = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
        if (v.length > 3 && !isNaN(v[3])) v = v.substring(0,3) + "-" + v.substring(3,7);
        e.target.value = v.substring(0,8);
    });

    // FUNÇÃO: FILTRO DE BUSCA (A QUE VOCÊ PRECISA)
    function filtrarListaAdmin() {
        const termo = document.getElementById("campoBuscaAdmin").value.toUpperCase();
        const linhas = document.querySelectorAll("#tabelaDadosGerais tbody tr");
        linhas.forEach(linha => {
            const placaNaCelula = linha.cells[0].textContent.toUpperCase();
            linha.style.display = placaNaCelula.includes(termo) ? "" : "none";
        });
    }

    // FUNÇÃO: CARREGAR TABELA E LÓGICA DE SUMIR PENDENTE
    function carregarDadosAtualizados() {
        const tbody = document.querySelector('#tabelaDadosGerais tbody');
        tbody.innerHTML = "<tr><td colspan='7'>Carregando informações da Raízen...</td></tr>";

        fetch(SHEET_API_LINK + "?t=" + new Date().getTime())
        .then(res => res.json())
        .then(data => {
            const listaAtivos = data.filter(item => item.PLACA && !item.SAIDA);
            
            // ORDENAÇÃO: QUEM JÁ TEM AGENDAMENTO FICA NO TOPO
            listaAtivos.sort((a, b) => {
                const aOk = (a.COLETA && a.COLETA !== "" && a.COLETA !== "undefined") ? 0 : 1;
                const bOk = (b.COLETA && b.COLETA !== "" && b.COLETA !== "undefined") ? 0 : 1;
                return aOk - bOk;
            });

            tbody.innerHTML = "";
            let agendados = 0; let pendentes = 0;

            listaAtivos.forEach(item => {
                const temAgendamento = item.COLETA && item.COLETA !== "" && item.COLETA !== "undefined";
                temAgendamento ? agendados++ : pendentes++;

                // DEFINIR COR DO PRODUTO
                let classeCor = "bg-s10";
                if(item.PRODUTO.includes("GASOLINA")) classeCor = "bg-gasolina";
                if(item.PRODUTO.includes("B100")) classeCor = "bg-b100";
                if(item.PRODUTO.includes("HIDRATADO") || item.PRODUTO.includes("ANIDRO")) classeCor = "bg-alcool";

                tbody.innerHTML += `
                    <tr>
                        <td style="font-size:18px;">${item.PLACA}</td>
                        <td><span class="badge-produto ${classeCor}">${item.PRODUTO}</span></td>
                        <td>${item.TELEFONE}</td>
                        <td>${verificarJornada(item.JORNADA)}</td>
                        <td style="background:#fcfcfc">
                            ${temAgendamento 
                                ? `<span class="status-confirmado-verde">${item.COLETA}</span>` 
                                : `<span class="status-pendente-animado">⚠️ PENDENTE</span>`}
                        </td>
                        <td style="font-size:12px; color:#888;">${calcularTempoNoPatio(item.ENTRADA)}</td>
                        <td>
                            <button class="btn-action btn-agendar-cor" onclick="abrirModalAgendamento('${item.PLACA}')">📅 AGENDAR</button>
                            <button class="btn-action btn-whats-cor" onclick="enviarMensagemWhatsApp('${item.TELEFONE}', '${item.PLACA}', '${item.COLETA}')">📱 CHAMAR</button>
                            <button class="btn-action btn-finalizar-cor" onclick="finalizarDescarga('${item.PLACA}')">✅ CONCLUIR</button>
                        </td>
                    </tr>`;
            });
            
            document.getElementById('totalPatio').innerText = listaAtivos.length;
            document.getElementById('totalAgendados').innerText = agendados;
            document.getElementById('totalPendentes').innerText = pendentes;
        });
    }

    // FUNÇÕES DE CÁLCULO
    function verificarJornada(horaFim) {
        if (horaFim === "24 Horas") return '<span style="color:green">● LIVRE</span>';
        const agora = new Date();
        const [h, m] = horaFim.split(':');
        const dFim = new Date(); dFim.setHours(h, m, 0);
        return (dFim < agora) ? `<span style="color:red">● VENCIDA</span>` : `<span style="color:green">● OK</span>`;
    }

    function calcularTempoNoPatio(entradaStr) {
        if(!entradaStr) return "-";
        const partes = entradaStr.split(', ');
        const dataP = partes[0].split('/'); const horaP = partes[1].split(':');
        const dtEntrada = new Date(dataP[2], dataP[1]-1, dataP[0], horaP[0], horaP[1]);
        const diff = Math.floor((new Date() - dtEntrada) / 60000);
        return diff > 60 ? Math.floor(diff/60) + "h " + (diff%60) + "m" : diff + " min";
    }

    // FUNÇÕES DE MODAL E AGENDAMENTO
    function abrirModalAgendamento(placa) {
        document.getElementById('placaReferencia').value = placa;
        document.getElementById('placaTextoModal').innerText = "VEÍCULO: " + placa;
        document.getElementById('modalAgendamento').style.display = 'block';
    }

    function gravarAgendamentoFinal() {
        const placa = document.getElementById('placaReferencia').value;
        const dataInput = document.getElementById('dataAgendaModal').value.split('-').reverse().join('/');
        const horaInput = document.getElementById('horaAgendaModal').value;
        
        if(!dataInput || !horaInput || dataInput === "") return alert("Preencha Data e Hora!");

        const btn = document.getElementById('btnSalvarNaPlanilha');
        btn.innerText = "GRAVANDO...";

        fetch(`${SHEET_API_LINK}/PLACA/${placa}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ "COLETA": dataInput + " às " + horaInput })
        }).then(() => {
            document.getElementById('modalAgendamento').style.display='none';
            carregarDadosAtualizados();
            btn.innerText = "GRAVAR NA PLANILHA";
        });
    }

    // FUNÇÕES DE REGISTRO E ADMIN
    document.getElementById('formMotorista').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnRegistrar');
        btn.innerText = "ENVIANDO DADOS...";

        const payload = {
            "PLACA": document.getElementById('inputPlaca').value,
            "PRODUTO": document.getElementById('inputProduto').value,
            "TELEFONE": document.getElementById('inputZap').value,
            "JORNADA": document.getElementById('check24h').checked ? "24 Horas" : document.getElementById('inputHoraJornada').value,
            "ENTRADA": new Date().toLocaleString('pt-BR'),
            "COLETA": "", "SAIDA": ""
        };

        fetch(SHEET_API_LINK, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify([payload]) })
        .then(() => { alert("Registro Concluído!"); location.reload(); });
    });

    function fazerLoginAdmin() { 
        if (prompt("Digite a Senha Raízen:") === "raizen2026") { 
            document.getElementById('tela-registro').style.display='none'; 
            document.getElementById('admin-panel').style.display='block'; 
            carregarDadosAtualizados(); 
        } 
    }
    
    function finalizarDescarga(placa) { 
        if(confirm("Deseja confirmar a saída deste veículo?")) {
            fetch(`${SHEET_API_LINK}/PLACA/${placa}`, { 
                method: 'PATCH', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ "SAIDA": new Date().toLocaleString() }) 
            }).then(() => carregarDadosAtualizados());
        }
    }

    function enviarMensagemWhatsApp(tel, placa, coleta) {
        const baia = prompt("Informe a BAIA de descarga:");
        if(baia) {
            const msg = `*RAÍZEN - ÁREA 2*%0APLACA: *${placa}*%0ACOLETA: *${coleta || 'Pendente'}*%0ABAIA: *${baia}*%0A%0AFavor dirigir-se à descarga imediatamente.`;
            window.open(`https://web.whatsapp.com/send?phone=55${tel.replace(/\D/g, "")}&text=${msg}`);
        }
    }
</script>
</body>
</html>
