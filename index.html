<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAÍZEN - CONTROLE DE DESCARGAS V14.0</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --verde-raizen: #4d6d5d;
            --roxo-raizen: #84207d;
            --ouro-raizen: #ffc107;
            --fundo: #f4f7f6;
            --branco: #ffffff;
            --danger: #d32f2f;
            --info: #3498db;
            --sucesso: #2ecc71;
            --shadow-operacional: 0 20px 40px rgba(0,0,0,0.15);
        }

        * { box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--fundo); 
            margin: 0; 
            padding-bottom: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* CABEÇALHO TÉCNICO */
        header { 
            background: linear-gradient(135deg, var(--verde-raizen) 0%, #2d3e35 100%); 
            width: 100%; 
            padding: 60px 0; 
            text-align: center; 
            border-bottom: 15px solid var(--roxo-raizen); 
        }

        .texto-raizen {
            color: var(--branco);
            font-size: 65px;
            font-weight: 900;
            letter-spacing: 10px;
            margin: 0;
            text-transform: uppercase;
        }

        header h1 { 
            color: var(--branco); 
            margin: 15px 0 0 0; 
            font-size: 18px; 
            text-transform: uppercase; 
            letter-spacing: 5px; 
            font-weight: 300; 
        }

        /* CONTAINER PRINCIPAL */
        .card-sistema { 
            width: 95%; 
            max-width: 950px; 
            margin: 45px auto; 
            background: var(--branco); 
            padding: 55px; 
            border-radius: 50px; 
            box-shadow: var(--shadow-operacional); 
            border-left: 20px solid var(--roxo-raizen);
            position: relative;
        }

        #modulo-operador { 
            display: none; 
            width: 99%; 
            max-width: 1900px; 
            background: var(--branco);
            margin: 30px auto;
            border-radius: 40px;
            padding: 40px;
        }

        h2 { 
            color: var(--roxo-raizen); 
            text-align: center; 
            font-weight: 900; 
            text-transform: uppercase; 
            margin-bottom: 45px; 
            font-size: 30px;
            border-bottom: 6px solid #f1f1f1;
            padding-bottom: 25px;
        }

        /* FILTROS E BUSCA */
        .busca-container {
            margin-bottom: 40px;
            position: relative;
        }

        .busca-container input {
            width: 100%;
            padding: 28px 28px 28px 80px;
            border: 4px solid var(--roxo-raizen);
            border-radius: 25px;
            font-size: 22px;
            font-weight: 700;
            background: #fff;
        }

        .busca-container i {
            position: absolute;
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--roxo-raizen);
            font-size: 30px;
        }

        /* FORMULÁRIO MOTORISTA */
        .campo-unidade { margin-bottom: 35px; }
        
        label { 
            display: block; 
            margin-bottom: 12px; 
            font-weight: 800; 
            color: var(--verde-raizen); 
            font-size: 14px; 
            text-transform: uppercase;
        }

        input, select { 
            width: 100%; 
            padding: 22px; 
            border: 3px solid #e2e8f0; 
            border-radius: 20px; 
            font-size: 20px; 
            font-weight: 700;
            background: #fdfdfd;
        }

        input:focus { border-color: var(--roxo-raizen); outline: none; }

        /* BOX PRIORIDADE */
        .box-prioridade {
            background: #fffde7;
            padding: 35px;
            border-radius: 30px;
            border: 4px solid var(--ouro-raizen);
            margin: 20px 0;
        }

        .check-jornada {
            display: flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            margin-top: 25px;
            padding: 10px;
        }

        .check-jornada input { width: 35px; height: 35px; }

        .btn-master { 
            width: 100%; 
            padding: 32px; 
            background: var(--roxo-raizen); 
            color: white; 
            border: none; 
            border-radius: 25px; 
            font-size: 26px; 
            font-weight: 900; 
            cursor: pointer; 
            text-transform: uppercase;
            box-shadow: 0 15px 35px rgba(132, 32, 125, 0.4);
        }

        /* TABELA DE OPERAÇÃO PAULÍNIA */
        .scroll-tabela { 
            overflow-x: auto; 
            border-radius: 35px; 
            border: 1px solid #ddd; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        table { width: 100%; border-collapse: collapse; min-width: 1700px; }
        
        th { 
            background: #0f172a; 
            color: white; 
            padding: 28px; 
            font-size: 13px; 
            text-transform: uppercase; 
            letter-spacing: 3px;
        }

        td { 
            padding: 22px; 
            border-bottom: 2px solid #f8f9fa; 
            text-align: center; 
            font-weight: 700; 
            font-size: 18px;
        }

        /* ETIQUETAS DE PRODUTO */
        .tag-combustivel {
            padding: 12px 25px;
            border-radius: 15px;
            color: white;
            font-size: 12px;
            font-weight: 900;
            display: inline-block;
            min-width: 160px;
        }
        .tag-gas { background: #f39c12; color: #000; }
        .tag-bio { background: #000; }
        .tag-ani { background: #27ae60; }
        .tag-hid { background: #2ecc71; }
        .tag-s10 { background: #64748b; }

        /* AÇÕES */
        .btn-painel {
            border: none;
            border-radius: 18px;
            padding: 18px;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            color: white;
            text-transform: uppercase;
            font-size: 12px;
            margin-bottom: 10px;
        }
        .btn-zap-correto { background: #25D366; }
        .btn-finalizar { background: var(--info); }

        .acesso-operador-footer {
            margin-top: 60px;
            text-align: center;
            border-top: 3px dashed #eee;
            padding-top: 40px;
        }

        .acesso-operador-footer button {
            background: transparent;
            border: 4px solid var(--roxo-raizen);
            color: var(--roxo-raizen);
            padding: 22px 60px;
            border-radius: 70px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 16px;
        }

        .loader-roda {
            border: 6px solid rgba(255,255,255,0.2);
            border-top: 6px solid #fff;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            animation: girar 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes girar { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

<header>
    <p class="texto-raizen">RAÍZEN</p>
    <h1>TERMINAL PAULÍNIA | CONTROLE DE DESCARGAS</h1>
</header>

<div class="card-sistema" id="tela-entrada">
    <h2>REGISTRO DE DESCARGA</h2>
    <form id="formPaulinia">
        <div class="campo-unidade">
            <label><i class="fa-solid fa-truck"></i> PLACA DO VEÍCULO</label>
            <input type="text" id="v_placa" placeholder="ABC-1234" maxlength="8" required>
        </div>

        <div class="campo-unidade">
            <label><i class="fa-solid fa-gas-pump"></i> PRODUTO</label>
            <select id="v_produto" required>
                <option value="">-- SELECIONE --</option>
                <option value="GASOLINA">GASOLINA</option>
                <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
                <option value="ETANOL ANIDRO">ETANOL ANIDRO</option>
                <option value="ETANOL HIDRATADO">ETANOL HIDRATADO</option>
                <option value="DIESEL S10">DIESEL S10</option>
            </select>
        </div>

        <div class="campo-unidade">
            <label><i class="fa-brands fa-whatsapp"></i> WHATSAPP DO CONDUTOR</label>
            <input type="tel" id="v_zap" placeholder="(19) 99999-9999" maxlength="15" required>
        </div>

        <div class="box-prioridade">
            <label><i class="fa-solid fa-clock"></i> FIM DA JORNADA DO MOTORISTA</label>
            <input type="time" id="v_hora">
            
            <label class="check-jornada">
                <input type="checkbox" id="v_24h">
                <span style="font-weight:900; color:var(--danger); font-size:18px;">DECLARO JORNADA 24 HORAS</span>
            </label>
        </div>

        <div style="margin-top:50px;">
            <button type="submit" class="btn-master" id="btn_enviar_dados">REGISTRAR ENTRADA</button>
        </div>
    </form>
    
    <div class="acesso-operador-footer">
        <button onclick="acessarPainelOperador()">Painel de Gestão Operacional / Operador</button>
    </div>
</div>

<div id="modulo-operador">
    <h2>CONTROLE DE FILA - ÁREA 02</h2>
    
    <div class="busca-container">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="filtroTexto" placeholder="BUSCAR PLACA, PRODUTO OU JORNADA (24H)..." onkeyup="filtrarTabelaPaulinia()">
    </div>

    <div class="scroll-tabela">
        <table id="tabelaMestra">
            <thead>
                <tr>
                    <th>PLACA</th>
                    <th>PRODUTO</th>
                    <th>WHATSAPP</th>
                    <th>JORNADA</th>
                    <th>ENTRADA</th>
                    <th style="background:#fff9c4; color:black; border:2px solid #ffc107;">AGENDAMENTO NO COLETA</th>
                    <th>AÇÕES</th>
                </tr>
            </thead>
            <tbody id="corpoFilaOperacional">
                </tbody>
        </table>
    </div>

    <div style="margin-top:60px; display:flex; gap:30px;">
        <button class="btn-master" style="background:#444;" onclick="location.reload()">SAIR DO PAINEL</button>
        <button class="btn-master" style="background:var(--verde-raizen);" onclick="atualizarFilaCompleta()">ATUALIZAR LISTA</button>
    </div>
</div>

<script>
    const ENDPOINT = 'https://sheetdb.io/api/v1/p9z83v5m0dxq5';
    const SENHA_MESTRA = 'raizen2026';

    /* MÁSCARAS OPERACIONAIS */
    document.getElementById('v_placa').oninput = e => {
        let v = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
        if (v.length > 3 && !isNaN(v[3])) v = v.substring(0,3) + "-" + v.substring(3,7);
        e.target.value = v.substring(0,8);
    };

    document.getElementById('v_zap').oninput = e => {
        let r = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !r[2] ? r[1] : '(' + r[1] + ') ' + r[2] + (r[3] ? '-' + r[3] : '');
    };

    /* FILTRO DE BUSCA (RESTABELECIDO) */
    function filtrarTabelaPaulinia() {
        const busca = document.getElementById("filtroTexto").value.toUpperCase();
        const linhas = document.getElementById("tabelaMestra").getElementsByTagName("tr");

        for (let i = 1; i < linhas.length; i++) {
            const placa = linhas[i].getElementsByTagName("td")[0].innerText.toUpperCase();
            const prod = linhas[i].getElementsByTagName("td")[1].innerText.toUpperCase();
            const jorn = linhas[i].getElementsByTagName("td")[3].innerText.toUpperCase();
            
            linhas[i].style.display = (placa.includes(busca) || prod.includes(busca) || jorn.includes(busca)) ? "" : "none";
        }
    }

    /* WHATSAPP COM TEXTO PADRÃO E TRAVA */
    function chamarMotorista(tel, placa) {
        const zapLimpo = tel.replace(/\D/g, "");
        if(zapLimpo.length < 11) return alert("ERRO: O WhatsApp do veículo " + placa + " está incompleto.");

        const baia = prompt("QUAL A BAIA DE DESCARGA?");
        if(!baia) return;

        const msg = `Olá%0AMotorista vamos descarregar?%0ABaia *${baia}* - Área 02%0AObrigado!%0A%0A_Aguarde autorização para entrar._`;
        window.open(`https://api.whatsapp.com/send?phone=55${zapLimpo}&text=${msg}`, '_blank');
    }

    /* REGISTRO DE ENTRADA */
    document.getElementById('formPaulinia').onsubmit = async e => {
        e.preventDefault();
        const btn = document.getElementById('btn_enviar_dados');
        const zap = document.getElementById('v_zap').value.replace(/\D/g, "");

        if(zap.length < 11) return alert("ERRO: Informe o WhatsApp completo com DDD.");

        btn.innerHTML = '<span class="loader-roda"></span> SALVANDO REGISTRO...';
        btn.disabled = true;

        const dado = {
            "PLACA": document.getElementById('v_placa').value,
            "PRODUTO": document.getElementById('v_produto').value,
            "TELEFONE": document.getElementById('v_zap').value,
            "JORNADA": document.getElementById('v_24h').checked ? "24 HORAS" : document.getElementById('v_hora').value,
            "ENTRADA": new Date().toLocaleString('pt-BR'),
            "SAIDA": "",
            "AGENDAMENTO NO COLETA": ""
        };

        try {
            await fetch(ENDPOINT, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify([dado])
            });
            alert("REGISTRADO COM SUCESSO!");
            location.reload();
        } catch (f) {
            alert("ERRO DE REDE.");
            btn.disabled = false;
            btn.innerText = "REGISTRAR ENTRADA";
        }
    };

    /* LÓGICA DE ATUALIZAÇÃO E ORDENAÇÃO POR AGENDAMENTO */
    async function atualizarFilaCompleta() {
        const corpo = document.getElementById('corpoFilaOperacional');
        corpo.innerHTML = "<tr><td colspan='7'>Sincronizando agendamentos...</td></tr>";

        try {
            const resp = await fetch(ENDPOINT + "?t=" + Date.now());
            const lista = await resp.json();
            
            // FILTRAR APENAS QUEM NÃO SAIU
            let ativos = lista.filter(x => x.PLACA && !x.SAIDA);

            // ORDENAÇÃO PRIORITÁRIA POR AGENDAMENTO
            ativos.sort((a, b) => {
                const dataA = a['AGENDAMENTO NO COLETA'] ? new Date(a['AGENDAMENTO NO COLETA']) : new Date(8640000000000000);
                const dataB = b['AGENDAMENTO NO COLETA'] ? new Date(b['AGENDAMENTO NO COLETA']) : new Date(8640000000000000);
                
                // Se ambos têm agendamento, ordena pelo mais antigo (quem deve entrar primeiro)
                if (a['AGENDAMENTO NO COLETA'] && b['AGENDAMENTO NO COLETA']) return dataA - dataB;
                
                // Se apenas um tem, ele vai para o topo
                if (a['AGENDAMENTO NO COLETA']) return -1;
                if (b['AGENDAMENTO NO COLETA']) return 1;

                // Se nenhum tem, ordena por ordem de entrada no pátio
                return 0;
            });

            corpo.innerHTML = "";
            ativos.forEach(item => {
                let cssProd = "tag-s10";
                if(item.PRODUTO === "GASOLINA") cssProd = "tag-gas";
                if(item.PRODUTO === "BIODIESEL (B100)") cssProd = "tag-bio";
                if(item.PRODUTO === "ETANOL ANIDRO") cssProd = "tag-ani";
                if(item.PRODUTO === "ETANOL HIDRATADO") cssProd = "tag-hid";

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="color:var(--roxo-raizen); font-size:24px;">${item.PLACA}</td>
                    <td><span class="tag-combustivel ${cssProd}">${item.PRODUTO}</span></td>
                    <td>${item.TELEFONE}</td>
                    <td style="color:${item.JORNADA === '24 HORAS' ? 'red' : 'black'}; font-weight:900;">${item.JORNADA}</td>
                    <td style="font-size:12px;">${item.ENTRADA.split(',')[1] || item.ENTRADA}</td>
                    <td style="background:#fffde7; border:3px solid #fbc02d;">
                        <input type="datetime-local" id="agenda-${item.PLACA}" value="${item['AGENDAMENTO NO COLETA'] || ''}" style="font-size:12px; padding:10px; border-radius:12px;">
                        <button onclick="salvarAgendamento('${item.PLACA}')" style="width:100%; margin-top:10px; background:var(--verde-raizen); color:white; border:none; padding:12px; border-radius:15px; cursor:pointer; font-weight:bold;">DEFINIR PRIORIDADE</button>
                    </td>
                    <td>
                        <button class="btn-painel btn-zap-correto" onclick="chamarMotorista('${item.TELEFONE}', '${item.PLACA}')"><i class="fa-brands fa-whatsapp"></i> CONVOCAR</button>
                        <button class="btn-painel btn-finalizar" onclick="registrarSaida('${item.PLACA}')"><i class="fa-solid fa-check-double"></i> CONCLUIR</button>
                    </td>
                `;
                corpo.appendChild(tr);
            });
        } catch (e) {
            corpo.innerHTML = "<tr><td colspan='7'>ERRO AO CONECTAR COM A PLANILHA.</td></tr>";
        }
    }

    async function salvarAgendamento(placa) {
        const valor = document.getElementById(`agenda-${placa}`).value;
        await fetch(`${ENDPOINT}/PLACA/${placa}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({"AGENDAMENTO NO COLETA": valor})
        });
        alert("PRIORIDADE ATUALIZADA NA FILA.");
        atualizarFilaCompleta();
    }

    async function registrarSaida(placa) {
        if(confirm("CONFIRMAR SAÍDA DEFINITIVA DE " + placa + "?")) {
            await fetch(`${ENDPOINT}/PLACA/${placa}`, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({"SAIDA": new Date().toLocaleString('pt-BR')})
            });
            atualizarFilaCompleta();
        }
    }

    function acessarPainelOperador() {
        if(prompt("SENHA OPERACIONAL:") === SENHA_MESTRA) {
            document.getElementById('tela-entrada').style.display = 'none';
            document.getElementById('modulo-operador').style.display = 'block';
            atualizarFilaCompleta();
        } else {
            alert("SENHA INCORRETA.");
        }
    }
</script>
</body>
</html>
