<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raízen - DESCARGA ÁREA 2 - TERMINAL PAULÍNIA</title>
    <style>
        /* CONFIGURAÇÕES GERAIS DE CORES - IDENTIDADE RAÍZEN */
        :root {
            --cor-principal: #4d6d5d; 
            --amarelo-raizen: #ffcd00;
            --fundo: #f0f2f5;
            --branco: #ffffff;
            --danger: #dc3545;
            --warning: #ffc107;
            --success: #28a745;
            --azul-raizen: #007bff;
            --cinza-claro: #f8f9fa;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--fundo); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        /* CABEÇALHO PADRÃO */
        header { 
            background-color: var(--cor-principal); 
            width: 100%; 
            padding: 30px 0; 
            text-align: center; 
            border-bottom: 8px solid var(--amarelo-raizen); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
        }
        header h1 { 
            color: var(--branco); 
            margin: 0; 
            font-size: 26px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-weight: 800;
        }
        
        /* CONTAINERS DAS TELAS */
        .container { 
            width: 92%; 
            max-width: 650px; 
            margin: 40px auto; 
            background: var(--branco); 
            padding: 35px; 
            border-radius: 25px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.15); 
        }

        /* PAINEL ADMINISTRATIVO (MAIS LARGO PARA CABER TUDO) */
        #admin-panel { 
            display: none; 
            max-width: 98%; 
            width: 1450px; 
        }

        h2 { 
            color: var(--cor-principal); 
            text-align: center; 
            border-bottom: 3px solid var(--amarelo-raizen); 
            padding-bottom: 15px; 
            margin-bottom: 30px; 
            text-transform: uppercase;
            font-size: 20px;
        }
        
        label { 
            display: block; 
            margin-top: 20px; 
            font-weight: bold; 
            color: #333; 
            font-size: 16px;
        }

        input, select { 
            width: 100%; 
            padding: 18px; 
            margin-top: 8px; 
            border: 2px solid #ddd; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 18px; 
            color: #333;
            transition: all 0.3s ease;
        }
        input:focus { border-color: var(--cor-principal); box-shadow: 0 0 10px rgba(77, 109, 93, 0.2); outline: none; }

        /* BOX DE JORNADA INVERTIDA */
        .jornada-container {
            background: #f1f4f2;
            padding: 25px;
            border-radius: 15px;
            border: 2px dashed #ccc;
            margin-top: 25px;
        }

        .checkbox-estilizado {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            padding: 15px;
            background: white;
            border-radius: 12px;
            border: 1px solid #ddd;
            margin-top: 15px;
            user-select: none;
        }
        .checkbox-estilizado input { 
            width: 30px; 
            height: 30px; 
            margin: 0; 
            cursor: pointer;
        }
        .checkbox-estilizado span { 
            font-size: 18px; 
            font-weight: bold; 
            color: var(--cor-principal); 
        }

        /* BOTÕES PRINCIPAIS */
        .btn-enviar { 
            width: 100%; 
            padding: 22px; 
            background-color: var(--cor-principal); 
            color: white; 
            border: none; 
            border-radius: 15px; 
            font-size: 22px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 30px; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s, background 0.3s;
        }
        .btn-enviar:active { transform: scale(0.98); }

        /* TABELA ADMIN */
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 15px; overflow: hidden; }
        th { background: var(--cor-principal); color: white; padding: 20px; text-align: center; font-size: 13px; text-transform: uppercase; }
        td { padding: 18px; border-bottom: 1px solid #eee; text-align: center; font-size: 14px; font-weight: 600; }
        
        /* STATUS DE AGENDAMENTO (O QUE VOCÊ PEDIU) */
        .status-pendente { 
            color: var(--danger); 
            font-weight: 800; 
            background: #fff0f0; 
            padding: 8px; 
            border-radius: 8px; 
            border: 1px solid #ffcccc;
        }
        .status-agendado { 
            color: #1b5e20; 
            font-weight: 800; 
            background: #e8f5e9; 
            padding: 10px; 
            border-radius: 8px; 
            border: 2px solid #c8e6c9;
            display: block;
        }

        /* BADGES DE JORNADA */
        .badge { padding: 8px 12px; border-radius: 8px; font-weight: bold; font-size: 12px; color: white; }
        .bg-ok { background: var(--success); }
        .bg-vencido { background: var(--danger); animation: piscar 1.2s infinite; }
        
        @keyframes piscar { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* BOTÕES DE AÇÃO */
        .btn-acao { 
            border: none; border-radius: 8px; padding: 12px; font-weight: bold; cursor: pointer; font-size: 11px; 
            width: 100%; margin-bottom: 8px; color: white; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .btn-calendario { background: white; color: var(--azul-raizen); border: 2px solid var(--azul-raizen); }
        .btn-zap { background: #25D366; }
        .btn-ok { background: var(--azul-raizen); }

        /* MODAL */
        #modalColeta { display:none; position:fixed; z-index:9999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.8); backdrop-filter: blur(8px); }
        .modal-content { background:white; margin:10% auto; padding:40px; border-radius:30px; width:400px; text-align: center; box-shadow: 0 30px 70px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<header><h1>RAÍZEN - TERMINAL PAULÍNIA</h1></header>

<div class="container" id="tela-motorista">
    <h2>DESCARGA ÁREA 2</h2>
    <form id="formAgendamento">
        <label>Placa do Veículo</label>
        <input type="text" id="placa" placeholder="AAA-0000" maxlength="8" required>
        
        <label>Produto Carregado</label>
        <select id="produto" required>
            <option value="">Selecione...</option>
            <option value="GASOLINA">GASOLINA</option>
            <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
            <option value="S10">S10</option>
            <option value="ANIDRO">ANIDRO</option>
            <option value="HIDRATADO">HIDRATADO</option>
        </select>

        <label>WhatsApp do Motorista</label>
        <input type="tel" id="telefone" placeholder="(19) 99999-9999" maxlength="15" required>

        <div class="jornada-container">
            <div id="campoHora">
                <label style="margin-top: 0;">Fim da sua Jornada (Horário):</label>
                <input type="time" id="horaJornada" required>
            </div>
            <label class="checkbox-estilizado">
                <input type="checkbox" id="check24h" onchange="alternarJornada()">
                <span>Minha jornada é 24 Horas</span>
            </label>
        </div>

        <button type="submit" class="btn-enviar" id="btnEnviar">ENVIAR DADOS</button>
    </form>
    <div style="text-align:center; margin-top:25px;"><button onclick="entrarAdmin()" style="background:none; border:none; color:#ccc; text-decoration:underline; cursor:pointer;">Administrativo</button></div>
</div>

<div class="container" id="admin-panel">
    <h2>CONTROLE DE ENTRADA - ÁREA 2</h2>
    <div style="overflow-x: auto;">
        <table id="tabelaDados">
            <thead>
                <tr>
                    <th>Placa</th>
                    <th>WhatsApp</th>
                    <th>Jornada</th>
                    <th style="background:#2d4a3e; color:white; width: 180px;">AGENDAMENTO COLETA</th>
                    <th>Tempo de Espera</th>
                    <th style="width: 200px;">Ações Administrativas</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <button class="btn-enviar" style="background:#444;" onclick="window.location.reload()">VOLTAR PARA INÍCIO</button>
</div>

<div id="modalColeta">
    <div class="modal-content">
        <h3 style="margin-top:0; color:var(--cor-principal);">Definir Horário de Coleta</h3>
        <p id="mostraPlaca" style="font-weight:bold; font-size:22px; color:#333; margin-bottom:20px;"></p>
        <input type="hidden" id="placaAlvo">
        
        <label>Data Programada:</label>
        <input type="date" id="dataColeta">
        
        <label>Hora Programada:</label>
        <input type="time" id="horaColeta">
        
        <button class="btn-enviar" id="btnSalvarModal" onclick="salvarAgendaPlanilha()">CONFIRMAR AGENDAMENTO</button>
        <button onclick="fecharModal()" style="margin-top:20px; border:none; background:none; color:red; font-weight:bold; cursor:pointer;">DESISTIR</button>
    </div>
</div>

<script>
    const API_URL = 'https://sheetdb.io/api/v1/p9z83v5m0dxq5';

    // FUNÇÕES DE INTERFACE MOTORISTA
    function alternarJornada() {
        const checked = document.getElementById('check24h').checked;
        document.getElementById('campoHora').style.display = checked ? 'none' : 'block';
        document.getElementById('horaJornada').required = !checked;
    }

    // MÁSCARAS COMPLETAS
    document.getElementById('telefone').addEventListener('input', (e) => {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
    });

    document.getElementById('placa').addEventListener('input', (e) => {
        let v = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
        if (v.length > 3 && !isNaN(v[3])) v = v.substring(0,3) + "-" + v.substring(3,7);
        e.target.value = v.substring(0,8);
    });

    // LÓGICA DO PAINEL ADMIN
    function atualizarTabela() {
        const tbody = document.querySelector('#tabelaDados tbody');
        tbody.innerHTML = "<tr><td colspan='6'>Carregando dados...</td></tr>";

        fetch(API_URL + "?t=" + new Date().getTime())
        .then(res => res.json())
        .then(data => {
            tbody.innerHTML = "";
            data.filter(i => i.PLACA && !i.SAIDA).forEach(i => {
                // LÓGICA DA SETA VERMELHA: MUDAR PENDENTE PARA AGENDADO
                let agendamentoHTML = "";
                if (i.COLETA && i.COLETA.trim() !== "" && i.COLETA !== "undefined") {
                    agendamentoHTML = `<span class="status-agendado">${i.COLETA}</span>`;
                } else {
                    agendamentoHTML = `<span class="status-pendente">PENDENTE</span>`;
                }

                tbody.innerHTML += `
                    <tr>
                        <td style="font-size:16px;">${i.PLACA}</td>
                        <td>${i.TELEFONE}</td>
                        <td>${verificarJornada(i.JORNADA)}</td>
                        <td style="background:#fcfcfc">${agendamentoHTML}</td>
                        <td style="color:#666;">${calcularEspera(i.ENTRADA)}</td>
                        <td>
                            <button class="btn-acao btn-calendario" onclick="abrirModalAgenda('${i.PLACA}')">📅 AGENDAR COLETA</button>
                            <button class="btn-acao btn-zap" onclick="chamarZap('${i.TELEFONE}', '${i.PLACA}', '${i.COLETA}')">📱 CHAMAR</button>
                            <button class="btn-acao btn-ok" onclick="finalizar('${i.PLACA}')">✅ CONCLUIR</button>
                        </td>
                    </tr>`;
            });
        });
    }

    function verificarJornada(horaFim) {
        if (!horaFim || horaFim === "24 Horas") return '<span class="badge bg-ok">LIVRE (24h)</span>';
        const agora = new Date();
        const [h, m] = horaFim.split(':');
        const limite = new Date(); limite.setHours(h, m, 0);
        return (limite < agora) ? `<span class="badge bg-vencido">VENCIDA (${horaFim})</span>` : `<span class="badge bg-ok">EM DIA (${horaFim})</span>`;
    }

    function calcularEspera(entrada) {
        if(!entrada) return "0 min";
        const p = entrada.split(', ');
        const d = p[0].split('/'); const h = p[1].split(':');
        const inicio = new Date(d[2], d[1]-1, d[0], h[0], h[1]);
        const diff = Math.floor((new Date() - inicio) / 60000);
        return diff > 60 ? Math.floor(diff/60) + "h " + (diff%60) + "m" : diff + " min";
    }

    // MODAL E PERSISTÊNCIA
    function abrirModalAgenda(placa) {
        document.getElementById('placaAlvo').value = placa;
        document.getElementById('mostraPlaca').innerText = "VEÍCULO: " + placa;
        document.getElementById('modalColeta').style.display = 'block';
    }
    function fecharModal() { document.getElementById('modalColeta').style.display = 'none'; }

    function salvarAgendaPlanilha() {
        const placa = document.getElementById('placaAlvo').value;
        const dataStr = document.getElementById('dataColeta').value.split('-').reverse().join('/');
        const horaStr = document.getElementById('horaColeta').value;
        
        if(!dataStr || !horaStr || dataStr === "") return alert("Preencha Data e Hora corretamente!");

        const btn = document.getElementById('btnSalvarModal');
        btn.innerText = "GRAVANDO NA PLANILHA...";

        fetch(`${API_URL}/PLACA/${placa}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ "COLETA": dataStr + " às " + horaStr })
        }).then(() => {
            fecharModal();
            atualizarTabela();
            btn.innerText = "CONFIRMAR AGENDAMENTO";
        });
    }

    // REGISTRO DE MOTORISTA
    document.getElementById('formAgendamento').addEventListener('submit', function(e) {
        e.preventDefault();
        const placa = document.getElementById('placa').value;
        if(/(.)\1{6,}/.test(placa.replace("-",""))) return alert("Placa Inválida!");

        const btn = document.getElementById('btnEnviar');
        btn.innerText = "REGISTRANDO...";

        const dados = {
            "PLACA": placa,
            "PRODUTO": document.getElementById('produto').value,
            "TELEFONE": document.getElementById('telefone').value,
            "JORNADA": document.getElementById('check24h').checked ? "24 Horas" : document.getElementById('horaJornada').value,
            "ENTRADA": new Date().toLocaleString('pt-BR'),
            "COLETA": "", "SAIDA": ""
        };

        fetch(API_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify([dados]) })
        .then(() => location.reload());
    });

    function entrarAdmin() { if (prompt("Senha:") === "raizen2026") { document.getElementById('tela-motorista').style.display='none'; document.getElementById('admin-panel').style.display='block'; atualizarTabela(); } }
    function finalizar(placa) { if(confirm("Confirmar saída do veículo?")) fetch(`${API_URL}/PLACA/${placa}`, { method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ "SAIDA": new Date().toLocaleString() }) }).then(() => atualizarTabela()); }
    function chamarZap(tel, placa, coleta) {
        const baia = prompt("Informe a BAIA:");
        if(baia) {
            const msg = `*RAÍZEN - ÁREA 2*%0A%0A*PLACA:* ${placa}%0A*COLETA:* ${coleta || 'A definir'}%0A*BAIA:* ${baia}%0A%0AFavor entrar para descarga.`;
            window.open(`https://web.whatsapp.com/send?phone=55${tel.replace(/\D/g, "")}&text=${msg}`);
        }
    }
</script>
</body>
</html>
