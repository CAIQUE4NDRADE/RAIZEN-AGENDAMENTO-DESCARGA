<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAÍZEN - GESTÃO OPERACIONAL V20.0</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --verde-raizen: #4d6d5d; --roxo-raizen: #84207d; --ouro-raizen: #ffc107;
            --fundo-base: #f1f5f9; --branco: #ffffff; --cor-alerta: #e11d48;
            --cor-sucesso: #10b981; --cor-texto: #1e293b; --verde-botao-reabrir: #3d5446; 
        }

        * { box-sizing: border-box; font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--fundo-base); color: var(--cor-texto); padding-bottom: 50px; }

        header { 
            background: linear-gradient(135deg, var(--verde-raizen) 0%, #1a241f 100%); 
            padding: 50px 20px; text-align: center; border-bottom: 20px solid var(--roxo-raizen);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .logo-raizen-master { color: var(--branco); font-size: 60px; font-weight: 900; letter-spacing: 12px; text-transform: uppercase; }
        header h1 { color: white; font-size: 20px; letter-spacing: 4px; font-weight: 300; margin-top: 10px; }

        .card-industrial { 
            width: 94%; max-width: 900px; margin: 40px auto; background: var(--branco); 
            padding: 40px; border-radius: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.1); 
            border-left: 25px solid var(--roxo-raizen);
        }

        /* PAINEL DO OPERADOR COM ZOOM RESTAURADO */
        #secao-operador { 
            display: none; width: 98%; margin: 20px auto; background: var(--branco);
            padding: 20px; border-radius: 20px; zoom: 0.85; 
        }

        /* FILTROS DE BUSCA */
        .container-filtros {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px; background: #e2e8f0; padding: 20px; border-radius: 20px; margin-bottom: 20px;
        }
        .input-busca { padding: 15px; border-radius: 12px; border: 3px solid #cbd5e1; font-weight: 700; font-size: 14px; }

        table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        th { background: #0f172a; color: #ffffff; padding: 15px; font-size: 13px; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 3px solid #f1f5f9; text-align: center; font-weight: 700; }

        /* TAGS DE PRODUTO */
        .tag-prod { padding: 8px 12px; border-radius: 10px; font-size: 11px; font-weight: 900; text-transform: uppercase; display: inline-block; min-width: 150px; }
        .tag-gasosa { background: #ff8c00; color: #fff; } 
        .tag-b100 { background: #5d4037; color: #fff; } 
        .tag-anidro { background: #0056b3; color: #fff; } 
        .tag-hidratado { background: #fff; color: #0056b3; border: 2px solid #0056b3; } 
        .tag-s10 { background: #fff; color: #5d4037; border: 2px solid #5d4037; }

        .btn-principal { width: 100%; padding: 25px; background: var(--roxo-raizen); color: white; border: none; border-radius: 20px; font-size: 20px; font-weight: 900; cursor: pointer; margin-bottom: 15px; }
        .btn-w-whatsapp { background: #22c55e; color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; cursor: pointer; margin-bottom: 5px; font-weight: 800; font-size: 12px; }
        .btn-f-finalizar { background: #ef4444; color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: 800; font-size: 12px; }
        
        #status-atualizacao { text-align: center; font-size: 13px; color: #64748b; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <div class="logo-raizen-master">RAÍZEN</div>
    <h1>CONTROLE DE DESCARGAS | TERMINAL PAULÍNIA</h1>
</header>

<div class="card-industrial" id="modulo-entrada">
    <h2 style="text-align:center; margin-bottom:30px; color:var(--roxo-raizen);">REGISTRO DE ENTRADA</h2>
    <form id="formDescarga">
        <input type="text" id="campo_placa" placeholder="PLACA (ABC-1234)" maxlength="8" style="margin-bottom:20px; padding:20px; width:100%; border-radius:15px; border:4px solid #eee; font-size:20px; font-weight:900;" required>
        
        <select id="campo_produto" style="margin-bottom:20px; padding:20px; width:100%; border-radius:15px; border:4px solid #eee; font-size:18px; font-weight:700;" required>
            <option value="">-- SELECIONE O PRODUTO --</option>
            <option value="GASOLINA COMUM / ADITIVADA">GASOLINA COMUM / ADITIVADA</option>
            <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
            <option value="ETANOL ANIDRO">ETANOL ANIDRO</option>
            <option value="ETANOL HIDRATADO">ETANOL HIDRATADO</option>
            <option value="DIESEL S10">DIESEL S10</option>
        </select>

        <input type="tel" id="campo_whatsapp" placeholder="WHATSAPP (19) 99999-9999" style="margin-bottom:20px; padding:20px; width:100%; border-radius:15px; border:4px solid #eee; font-size:18px;" required>

        <div style="background:#fffbeb; padding:20px; border-radius:20px; border:3px solid var(--ouro-raizen); margin-bottom:20px;">
            <label style="font-weight:900; color:var(--verde-raizen);">TÉRMINO DA JORNADA:</label>
            <input type="time" id="campo_hora_limite" style="padding:10px; margin-top:10px; width:100%; border-radius:10px; border:2px solid #ccc;">
            <label style="display:flex; align-items:center; gap:10px; margin-top:15px; color:var(--cor-alerta); font-weight:900; cursor:pointer;">
                <input type="checkbox" id="check_jornada_24h" style="width:25px; height:25px;"> ESTOU EM JORNADA 24 HORAS
            </label>
        </div>

        <button type="submit" class="btn-principal">EFETUAR REGISTRO</button>
        <button type="button" onclick="acessoOperador()" style="width:100%; background:none; border:none; color:var(--roxo-raizen); font-weight:900; cursor:pointer; text-decoration:underline;">MÓDULO DE GESTÃO DO OPERADOR</button>
    </form>
</div>

<div id="secao-operador">
    <h2 style="text-align:center; margin-bottom:20px;"><i class="fa-solid fa-list-check"></i> FILA DE DESCARGA - ÁREA 02</h2>
    
    <div class="container-filtros">
        <input type="text" id="filtroPlaca" class="input-busca" placeholder="🔍 Buscar Placa..." onkeyup="filtrarTabela()">
        <select id="filtroProduto" class="input-busca" onchange="filtrarTabela()">
            <option value="">Todos os Produtos</option>
            <option value="GASOLINA">GASOLINA</option>
            <option value="BIODIESEL">BIODIESEL</option>
            <option value="ANIDRO">ANIDRO</option>
            <option value="HIDRATADO">HIDRATADO</option>
            <option value="DIESEL">DIESEL</option>
        </select>
        <select id="filtroJornada" class="input-busca" onchange="filtrarTabela()">
            <option value="">Todas as Jornadas</option>
            <option value="24 HORAS">Somente 24h</option>
            <option value="HORA">Com Horário Limite</option>
        </select>
    </div>

    <div style="overflow-x:auto; border-radius:15px; border:2px solid #e2e8f0;">
        <table>
            <thead>
                <tr>
                    <th>PLACA</th>
                    <th>PRODUTO</th>
                    <th>JORNADA</th>
                    <th>ENTRADA</th>
                    <th style="background:#fff9c4; color:#000;">AGENDAMENTO (DATA/HORA)</th>
                    <th>AÇÕES</th>
                </tr>
            </thead>
            <tbody id="dadosFila"></tbody>
        </table>
    </div>
    <div id="status-atualizacao">Sincronizando...</div>
    <button class="btn-principal" style="background:#475569; margin-top:20px;" onclick="location.reload()">VOLTAR AO INÍCIO</button>
</div>

<script>
    const SUPABASE_URL = 'https://rbbkjuiizmvatiawfzuv.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_WkrHi6cWtZsnsDXl0nh1hA_kz1UT_1X';
    const HEADERS = { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json" };

    // FILTRO DINÂMICO RESTAURADO
    function filtrarTabela() {
        const placa = document.getElementById('filtroPlaca').value.toUpperCase();
        const prod = document.getElementById('filtroProduto').value.toUpperCase();
        const jorn = document.getElementById('filtroJornada').value;
        const linhas = document.querySelectorAll("#dadosFila tr");

        linhas.forEach(linha => {
            const txtPlaca = linha.cells[0].textContent.toUpperCase();
            const txtProd = linha.cells[1].textContent.toUpperCase();
            const txtJorn = linha.cells[2].textContent.toUpperCase();

            const batePlaca = txtPlaca.includes(placa);
            const bateProd = txtProd.includes(prod);
            let bateJorn = true;
            if(jorn === "24 HORAS") bateJorn = txtJorn.includes("24H");
            if(jorn === "HORA") bateJorn = !txtJorn.includes("24H");

            linha.style.display = (batePlaca && bateProd && bateJorn) ? "" : "none";
        });
    }

    // WHATSAPP COM TEXTO PADRÃO RESTAURADO
    function chamar(tel, placa) {
        const baia = prompt("PARA QUAL BAIA O VEÍCULO " + placa + " DEVE IR?");
        if (baia) {
            const mensagem = `Olá! Motorista da placa *${placa}*, favor comparecer à *BAIA ${baia}* e aguardar orientações para início da operação de descarga.`;
            const numeroLimpo = tel.replace(/\D/g, "");
            window.open(`https://api.whatsapp.com/send?phone=55${numeroLimpo}&text=${encodeURIComponent(mensagem)}`, '_blank');
        }
    }

    // SINCRONIZAÇÃO SUPABASE
    async function sincronizarFila() {
        try {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/registros?SAIDA=is.null&select=*&order=id.asc`, { headers: HEADERS });
            const ativos = await res.json();
            const corpo = document.getElementById('dadosFila');
            corpo.innerHTML = "";

            ativos.forEach(item => {
                let cl = "";
                if(item.PRODUTO.includes("GASOLINA")) cl = "tag-gasosa";
                else if(item.PRODUTO.includes("BIODIESEL")) cl = "tag-b100";
                else if(item.PRODUTO.includes("ANIDRO")) cl = "tag-anidro";
                else if(item.PRODUTO.includes("HIDRATADO")) cl = "tag-hidratado";
                else if(item.PRODUTO.includes("DIESEL")) cl = "tag-s10";

                corpo.innerHTML += `
                    <tr>
                        <td style="font-size:18px; color:var(--roxo-raizen);">${item.PLACA}</td>
                        <td><span class="tag-prod ${cl}">${item.PRODUTO}</span></td>
                        <td>${item.JORNADA === "24 HORAS" ? "🟢 24H" : "⏰ " + item.JORNADA}</td>
                        <td style="font-size:12px;">${item.ENTRADA}</td>
                        <td style="background:#fffde7;">
                            <input type="datetime-local" id="ag-${item.id}" value="${item.AGENDAMENTO || ''}" style="padding:8px; border-radius:8px; border:1px solid #ccc; font-weight:700;">
                            <button onclick="salvarAgenda('${item.id}')" style="background:var(--verde-raizen); color:white; border:none; padding:8px 12px; cursor:pointer; border-radius:8px; font-weight:900;">OK</button>
                        </td>
                        <td>
                            <button class="btn-w-whatsapp" onclick="chamar('${item.TELEFONE}','${item.PLACA}')">CONVOCAR</button>
                            <button class="btn-f-finalizar" onclick="finalizar('${item.id}')">FINALIZAR</button>
                        </td>
                    </tr>`;
            });
            document.getElementById('status-atualizacao').innerText = "Última atualização: " + new Date().toLocaleTimeString();
            filtrarTabela(); 
        } catch (e) { console.error("Erro ao sincronizar dados."); }
    }

    // SALVAR AGENDAMENTO (DATA + HORA)
    async function salvarAgenda(id) {
        const val = document.getElementById(`ag-${id}`).value;
        const res = await fetch(`${SUPABASE_URL}/rest/v1/registros?id=eq.${id}`, { 
            method: 'PATCH', headers: HEADERS, body: JSON.stringify({ AGENDAMENTO: val }) 
        });
        if(res.ok) alert("AGENDAMENTO ATUALIZADO!");
    }

    // REGISTRO DE ENTRADA
    document.getElementById('formDescarga').onsubmit = async e => {
        e.preventDefault();
        const dados = {
            PLACA: document.getElementById('campo_placa').value.toUpperCase(),
            PRODUTO: document.getElementById('campo_produto').value,
            TELEFONE: document.getElementById('campo_whatsapp').value,
            JORNADA: document.getElementById('check_jornada_24h').checked ? "24 HORAS" : document.getElementById('campo_hora_limite').value,
            ENTRADA: new Date().toLocaleString('pt-BR')
        };
        const res = await fetch(`${SUPABASE_URL}/rest/v1/registros`, { method: 'POST', headers: HEADERS, body: JSON.stringify(dados) });
        if(res.ok) { alert("VEÍCULO REGISTRADO COM SUCESSO!"); location.reload(); }
    };

    async function finalizar(id) {
        if(confirm("Confirmar a saída do veículo e encerrar atendimento?")) {
            await fetch(`${SUPABASE_URL}/rest/v1/registros?id=eq.${id}`, { 
                method: 'PATCH', headers: HEADERS, body: JSON.stringify({ SAIDA: new Date().toLocaleString('pt-BR') }) 
            });
            sincronizarFila();
        }
    }

    function acessoOperador() {
        if(prompt("SENHA DE ACESSO:") === "raizen2026") {
            document.getElementById('modulo-entrada').style.display = 'none';
            document.getElementById('secao-operador').style.display = 'block';
            sincronizarFila();
            setInterval(sincronizarFila, 20000); // Auto-refresh a cada 20s
        } else { alert("Senha incorreta."); }
    }

    // Máscara básica para Placa
    document.getElementById('campo_placa').oninput = function() {
        let v = this.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
        if (v.length > 3 && !isNaN(v[3])) v = v.substring(0,3) + "-" + v.substring(3,7);
        this.value = v;
    };
</script>
</body>
</html>
