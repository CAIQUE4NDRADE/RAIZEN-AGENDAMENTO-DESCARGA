<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAÍZEN - GESTÃO V23.0</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --verde-raizen: #4d6d5d;
            --roxo-raizen: #84207d;
            --ouro-raizen: #ffc107;
            --fundo-base: #f1f5f9;
            --branco: #ffffff;
            --cor-alerta: #e11d48;
            --cor-sucesso: #10b981;
        }

        * { box-sizing: border-box; font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--fundo-base); color: #1e293b; padding-bottom: 50px; }

        /* --- HEADER ROBUSTO --- */
        header { 
            background: linear-gradient(135deg, var(--verde-raizen) 0%, #1a241f 100%); 
            padding: 90px 20px; text-align: center; border-bottom: 25px solid var(--roxo-raizen);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .logo-raizen-master { color: var(--branco); font-size: 85px; font-weight: 900; letter-spacing: 15px; text-transform: uppercase; }

        /* --- PAINEL MOTORISTA (VISUAL ORIGINAL REESTABELECIDO) --- */
        .card-industrial { 
            width: 94%; max-width: 1100px; margin: 60px auto; background: var(--branco); 
            padding: 70px; border-radius: 60px; box-shadow: 0 40px 80px rgba(0,0,0,0.2); 
            border-left: 35px solid var(--roxo-raizen);
        }
        .card-industrial h2 { font-size: 38px; color: var(--roxo-raizen); font-weight: 900; margin-bottom: 40px; text-align: center; }
        
        .wrapper-campo { margin-bottom: 40px; }
        .wrapper-campo label { display: block; margin-bottom: 15px; font-weight: 900; color: var(--verde-raizen); font-size: 16px; text-transform: uppercase; }
        
        input, select { 
            width: 100%; padding: 28px; border: 5px solid #e2e8f0; border-radius: 30px; 
            font-size: 24px; font-weight: 700; background: #f8fafc; margin-bottom: 10px;
        }

        .btn-principal-motorista { 
            width: 100%; padding: 40px; background: var(--roxo-raizen); color: white; border: none; 
            border-radius: 35px; font-size: 30px; font-weight: 900; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 20px 40px rgba(132, 32, 125, 0.3);
        }

        /* --- PAINEL ADM (COMPLETO COM FILTROS) --- */
        #secao-operador { display: none; width: 98%; margin: 20px auto; background: var(--branco); padding: 30px; border-radius: 40px; }
        
        .area-filtros { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px;
            background: #f8fafc; padding: 20px; border-radius: 20px; border: 2px solid #e2e8f0;
        }
        .area-filtros input, .area-filtros select { padding: 15px; font-size: 14px; margin-bottom: 0; border: 2px solid #cbd5e1; }

        /* TABELA SEM ROLAGEM MAS COM TODOS OS CAMPOS */
        .moldura-tabela { overflow-x: hidden; border: 3px solid #e2e8f0; border-radius: 25px; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        
        th { background: #0f172a; color: white; padding: 12px 2px; font-size: 9px; text-transform: uppercase; }
        td { padding: 12px 2px; border-bottom: 2px solid #f1f5f9; text-align: center; font-weight: 800; font-size: 11px; word-wrap: break-word; }

        /* CORES DOS PRODUTOS */
        .tag-prod { padding: 6px; border-radius: 8px; font-size: 9px; font-weight: 900; display: block; color: white; text-transform: uppercase; }
        .tag-gasolina { background: #ff8c00; }
        .tag-b100 { background: #5d4037; }
        .tag-anidro { background: #0056b3; }
        .tag-hidratado { background: #3b82f6; }
        .tag-diesel { background: #334155; }

        /* AGENDAMENTO COLETA (Destaque para Edição/Visualização) */
        .col-coleta { background: #fffde7; border: 1px solid #fde68a; color: #92400e; padding: 4px; border-radius: 6px; }

        .btn-acao { width: 100%; padding: 10px 2px; border-radius: 8px; border: none; color: white; font-weight: 900; font-size: 10px; margin-bottom: 4px; cursor: pointer; }

    </style>
</head>
<body>

<header>
    <div class="logo-raizen-master">RAÍZEN</div>
</header>

<div class="card-industrial" id="modulo-entrada">
    <h2><i class="fa-solid fa-truck-ramp-box"></i> REGISTRO</h2>
    <form id="formDescarga">
        <div class="wrapper-campo">
            <label>PLACA DO VEÍCULO</label>
            <input type="text" id="campo_placa" placeholder="ABC-1234" maxlength="8" required>
        </div>
        <div class="wrapper-campo">
            <label>PRODUTO</label>
            <select id="campo_produto" required>
                <option value="">SELECIONE...</option>
                <option value="GASOLINA">GASOLINA</option>
                <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
                <option value="ETANOL ANIDRO">ETANOL ANIDRO</option>
                <option value="ETANOL HIDRATADO">ETANOL HIDRATADO</option>
                <option value="DIESEL S10">DIESEL S10</option>
            </select>
        </div>
        <div class="wrapper-campo">
            <label>AGENDAMENTO (COLETA)</label>
            <input type="time" id="campo_ag_coleta">
        </div>
        <div class="wrapper-campo">
            <label>WHATSAPP</label>
            <input type="tel" id="campo_whatsapp" placeholder="(19) 99999-9999" required>
        </div>
        <div class="wrapper-campo">
            <label>FIM JORNADA</label>
            <input type="time" id="campo_hora_limite">
        </div>
        <button type="submit" class="btn-principal-motorista">REGISTRAR</button>
    </form>
    <button onclick="acessoOperador()" style="margin-top:40px; background:none; border:none; color:var(--roxo-raizen); text-decoration:underline; width:100%; font-weight:900; font-size:20px;">ACESSAR GESTÃO ADM</button>
</div>

<div id="secao-operador">
    <h2>GESTÃO DE PÁTIO</h2>
    
    <div class="area-filtros">
        <input type="text" id="buscaPlaca" placeholder="🔍 Filtrar Placa..." onkeyup="filtrar()">
        <select id="filtroProduto" onchange="filtrar()">
            <option value="">Todos Produtos</option>
            <option value="GASOLINA">GASOLINA</option>
            <option value="BIODIESEL">BIODIESEL</option>
            <option value="ETANOL">ETANOL</option>
            <option value="DIESEL">DIESEL</option>
        </select>
    </div>

    <div class="moldura-tabela">
        <table id="minhaTabela">
            <thead>
                <tr>
                    <th style="width: 17%;">PLACA</th>
                    <th style="width: 20%;">PRODUTO</th>
                    <th style="width: 18%;">AG. COLETA</th>
                    <th style="width: 20%;">JORNADA</th>
                    <th style="width: 25%;">AÇÕES</th>
                </tr>
            </thead>
            <tbody id="dadosFila"></tbody>
        </table>
    </div>
    
    <div style="margin-top:30px; display:flex; gap:15px;">
        <button class="btn-principal-motorista" style="background:#475569; font-size:20px; padding:20px;" onclick="location.reload()">SAIR</button>
        <button class="btn-principal-motorista" style="background:var(--verde-raizen); font-size:20px; padding:20px;" onclick="sincronizarFila()">SINCRONIZAR</button>
    </div>
</div>

<script>
    const API_URL = 'https://sheetdb.io/api/v1/p9z83v5m0dxq5';
    const SENHA_OP = 'raizen2026';

    function filtrar() {
        let p = document.getElementById("buscaPlaca").value.toUpperCase();
        let prod = document.getElementById("filtroProduto").value.toUpperCase();
        let rows = document.getElementById("dadosFila").getElementsByTagName("tr");
        for (let r of rows) {
            let txtP = r.cells[0].innerText.toUpperCase();
            let txtProd = r.cells[1].innerText.toUpperCase();
            r.style.display = (txtP.includes(p) && txtProd.includes(prod)) ? "" : "none";
        }
    }

    async function sincronizarFila() {
        const corpo = document.getElementById('dadosFila');
        corpo.innerHTML = "<tr><td colspan='5'>Atualizando...</td></tr>";
        const res = await fetch(API_URL + "?t=" + Date.now());
        const json = await res.json();
        let ativos = json.filter(x => x.PLACA && !x.SAIDA);
        
        // Ordenação por Agendamento
        ativos.sort((a, b) => (a['AGENDAMENTO NO COLETA'] || '23:59').localeCompare(b['AGENDAMENTO NO COLETA'] || '23:59'));

        corpo.innerHTML = "";
        ativos.forEach(item => {
            const tr = document.createElement('tr');
            const p = item.PRODUTO.toUpperCase();
            let cor = "tag-diesel";
            if(p.includes("GASOLINA")) cor = "tag-gasolina";
            else if(p.includes("B100")) cor = "tag-b100";
            else if(p.includes("ANIDRO")) cor = "tag-anidro";
            else if(p.includes("HIDRATADO")) cor = "tag-hidratado";

            tr.innerHTML = `
                <td style="color:var(--roxo-raizen);">${item.PLACA}</td>
                <td><span class="tag-prod ${cor}">${item.PRODUTO}</span></td>
                <td><div class="col-coleta">${item['AGENDAMENTO NO COLETA'] || '--:--'}</div></td>
                <td>${item.JORNADA || '24H'}</td>
                <td>
                    <button class="btn-acao" style="background:#22c55e;" onclick="window.open('https://api.whatsapp.com/send?phone=55${item.TELEFONE.replace(/\D/g,'')}&text=Motorista ${item.PLACA}, favor encostar.')">ZAP</button>
                    <button class="btn-acao" style="background:#3b82f6;" onclick="finalizar('${item.PLACA}')">FIM</button>
                </td>
            `;
            corpo.appendChild(tr);
        });
    }

    async function finalizar(placa) {
        if(confirm(`Encerrar placa ${placa}?`)) {
            await fetch(`${API_URL}/PLACA/${placa}`, { method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({"SAIDA": new Date().toLocaleString()}) });
            sincronizarFila();
        }
    }

    document.getElementById('formDescarga').onsubmit = async e => {
        e.preventDefault();
        const dados = {
            "PLACA": document.getElementById('campo_placa').value.toUpperCase(),
            "PRODUTO": document.getElementById('campo_produto').value,
            "TELEFONE": document.getElementById('campo_whatsapp').value,
            "AGENDAMENTO NO COLETA": document.getElementById('campo_ag_coleta').value,
            "JORNADA": document.getElementById('campo_hora_limite').value || "24 HORAS",
            "ENTRADA": new Date().toLocaleString(),
            "SAIDA": ""
        };
        await fetch(API_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify([dados]) });
        alert("REGISTRADO!");
        location.reload();
    };

    function acessoOperador() {
        if(prompt("SENHA:") === SENHA_OP) {
            document.getElementById('modulo-entrada').style.display = 'none';
            document.getElementById('secao-operador').style.display = 'block';
            sincronizarFila();
        }
    }
    
    // Auto-update a cada 40s
    setInterval(() => { if(document.getElementById('secao-operador').style.display==='block') sincronizarFila(); }, 40000);
</script>
</body>
</html>
