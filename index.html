<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200"> 
    <title>RAÍZEN - GESTÃO OPERACIONAL V27.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* Manutenção do Design System Anterior */
        :root {
            --verde-raizen: #4d6d5d; --roxo-raizen: #84207d; --ouro-raizen: #ffc107;
            --fundo-base: #f1f5f9; --branco: #ffffff; --cor-erro: #e11d48;
            --cor-sucesso: #10b981; --sombra-premium: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
        body { background-color: var(--fundo-base); color: #1e293b; min-height: 100vh; padding-bottom: 80px; overflow-x: auto; }
        header { background: linear-gradient(135deg, var(--verde-raizen) 0%, #1a241f 100%); padding: 80px 20px; text-align: center; border-bottom: 25px solid var(--roxo-raizen); box-shadow: 0 15px 40px rgba(0,0,0,0.4); }
        .logo-display { color: var(--branco); font-size: 90px; font-weight: 900; letter-spacing: 20px; text-transform: uppercase; }

        .card-master { width: 94%; max-width: 1150px; margin: -50px auto 60px; background: var(--branco); padding: 60px; border-radius: 40px; box-shadow: var(--sombra-premium); border-left: 30px solid var(--roxo-raizen); position: relative; z-index: 10; }
        
        #modulo-operador-full, #modulo-supervisao { display: none; width: 98%; max-width: 1900px; margin: 40px auto; background: var(--branco); padding: 40px; border-radius: 35px; box-shadow: var(--sombra-premium); zoom: 0.75; }

        h2 { color: var(--roxo-raizen); text-align: center; font-weight: 900; text-transform: uppercase; margin-bottom: 40px; font-size: 34px; border-bottom: 10px solid #f8fafc; padding-bottom: 20px; }

        /* Estilos da Tabela e Botões */
        .wrapper-input { margin-bottom: 30px; }
        label { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; font-weight: 900; color: var(--verde-raizen); font-size: 15px; text-transform: uppercase; }
        input, select { width: 100%; padding: 25px; border: 5px solid #f1f5f9; border-radius: 20px; font-size: 22px; font-weight: 700; background: #f8fafc; transition: 0.3s; }
        
        .btn-master { width: 100%; padding: 30px; background: var(--roxo-raizen); color: white; border: none; border-radius: 25px; font-size: 24px; font-weight: 900; cursor: pointer; text-transform: uppercase; box-shadow: 0 12px 0 #5e1659; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; gap: 15px; }
        .btn-master:active { transform: translateY(8px); box-shadow: 0 4px 0 #5e1659; }

        /* Painel de Tanques */
        .grid-tanques { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; margin-top: 30px; }
        .card-tanque { border: 6px solid #f1f5f9; padding: 30px; border-radius: 35px; text-align: center; background: #f8fafc; }
        .estoque-numero { font-size: 28px; font-weight: 900; color: #1e293b; display: block; margin: 10px 0; }
        
        /* Travas Visuais */
        .btn-bloqueado { background: #cbd5e1 !important; cursor: not-allowed !important; box-shadow: none !important; color: #64748b !important; }
        .aviso-capacidade { font-size: 10px; color: var(--cor-erro); font-weight: 900; display: block; margin-top: 5px; }

        #loader-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; }
        .raizen-spinner { width: 80px; height: 80px; border: 10px solid #f3f3f3; border-top: 10px solid var(--roxo-raizen); border-radius: 50%; animation: girar 1s linear infinite; }
        @keyframes girar { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader-overlay"><div class="raizen-spinner"></div><h2 style="border:none; margin-top:20px;">PROCESSANDO...</h2></div>

<header><div class="logo-display">RAÍZEN</div></header>

<div class="card-master" id="secao-entrada">
    <div id="form-principal-wrapper">
        <h2><i class="fa-solid fa-truck-ramp-box"></i> REGISTRO DE ENTRADA</h2>
        <form id="formMaster">
            <div class="wrapper-input">
                <label><i class="fa-solid fa-barcode"></i> PLACA DO VEÍCULO</label>
                <input type="text" id="placa" placeholder="AAA-0000" maxlength="8" required>
            </div>
            <div class="wrapper-input">
                <label><i class="fa-solid fa-gas-pump"></i> PRODUTO</label>
                <select id="produto" required>
                    <option value="">-- SELECIONE --</option>
                    <option value="GASOLINA">GASOLINA</option>
                    <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
                    <option value="ETANOL ANIDRO">ETANOL ANIDRO</option>
                    <option value="ETANOL HIDRATADO">ETANOL HIDRATADO</option>
                    <option value="DIESEL S10">DIESEL S10</option>
                </select>
            </div>
            <div class="wrapper-input">
                <label><i class="fa-brands fa-whatsapp"></i> WHATSAPP MOTORISTA</label>
                <input type="tel" id="whatsapp" placeholder="(19) 99999-9999" required>
            </div>
            <button type="submit" class="btn-master">CONFIRMAR REGISTRO</button>
            <button type="button" onclick="abrirReabertura()" class="btn-master" style="background:#475569; box-shadow: 0 12px 0 #2d3748; font-size:16px;">REABRIR JORNADA</button>
        </form>
    </div>

    <div style="text-align:center; margin-top:40px; display:flex; flex-direction:column; gap:15px;">
        <button onclick="ativarOperador()" style="background:none; border:none; color:var(--roxo-raizen); font-weight:900; cursor:pointer; text-transform:uppercase;">
            <i class="fa-solid fa-lock"></i> ACESSO OPERACIONAL
        </button>
        <button onclick="ativarSupervisao()" style="background:none; border:none; color:var(--verde-raizen); font-weight:900; cursor:pointer; text-transform:uppercase;">
            <i class="fa-solid fa-user-shield"></i> PAINEL SUPERVISÃO
        </button>
    </div>
</div>

<div id="modulo-operador-full">
    <h2>PAINEL DE CONTROLE DE PÁTIO</h2>
    <div id="status-tanques-resumo" class="grid-tanques" style="margin-bottom:40px;"></div>
    
    <div class="moldura-tabela">
        <table>
            <thead>
                <tr>
                    <th>VEÍCULO</th>
                    <th>PRODUTO</th>
                    <th style="background:#fefce8;">VOLUME CARGA</th>
                    <th>STATUS JORNADA</th>
                    <th>AGENDAMENTO</th>
                    <th>VALIDAÇÃO TANQUE</th>
                    <th>CONVOCAR</th>
                    <th>FINALIZAR</th>
                </tr>
            </thead>
            <tbody id="listaFila"></tbody>
        </table>
    </div>
    <button class="btn-master" style="background:#1e293b; margin-top:30px;" onclick="location.reload()">VOLTAR</button>
</div>

<div id="modulo-supervisao">
    <h2><i class="fa-solid fa-user-shield"></i> GESTÃO DE ATIVOS (SUPERVISÃO)</h2>
    <div id="gridTanquesSupervisao" class="grid-tanques"></div>
    <button class="btn-master" style="background:#1e293b; margin-top:30px;" onclick="location.reload()">SAIR DA SUPERVISÃO</button>
</div>

<script>
    const RAÍZEN_DB = {
        URL: 'https://rbbkjuiizmvatiawfzuv.supabase.co',
        HEADERS: { 
            "apikey": 'sb_publishable_WkrHi6cWtZsnsDXl0nh1hA_kz1UT_1X', 
            "Authorization": `Bearer sb_publishable_WkrHi6cWtZsnsDXl0nh1hA_kz1UT_1X`, 
            "Content-Type": "application/json",
            "Prefer": "return=minimal"
        }
    };

    let memoriaFila = [];
    let memoriaTanques = [];

    async function carregarDados() {
        try {
            const [respFila, respTanques] = await Promise.all([
                fetch(`${RAÍZEN_DB.URL}/rest/v1/registros?SAIDA=is.null&select=*`, { headers: RAÍZEN_DB.HEADERS }),
                fetch(`${RAÍZEN_DB.URL}/rest/v1/ESTOQUE?select=*`, { headers: RAÍZEN_DB.HEADERS })
            ]);
            memoriaFila = await respFila.json();
            memoriaTanques = await respTanques.json();
            renderTabelaOperador();
            renderTanquesSupervisao();
            renderResumoTanquesOperador();
        } catch(e) { console.error(e); }
    }

    function renderResumoTanquesOperador() {
        const div = document.getElementById('status-tanques-resumo');
        div.innerHTML = "";
        memoriaTanques.forEach(t => {
            div.innerHTML += `
                <div class="card-tanque" style="padding:15px; border-width:3px;">
                    <span style="font-size:10px; font-weight:900;">${t.TANQUE_NAME}</span>
                    <b style="display:block; font-size:18px;">${Number(t.ESPAÇO_DISPONIVEL).toLocaleString()} L</b>
                    <small>${t.PRODUTO}</small>
                </div>`;
        });
    }

    function renderTabelaOperador() {
        const corpo = document.getElementById('listaFila');
        corpo.innerHTML = "";
        memoriaFila.forEach(item => {
            // Encontra o tanque compatível com o produto do caminhão
            const tanqueRef = memoriaTanques.find(t => item.PRODUTO.includes(t.PRODUTO) && t.ATIVO);
            const volumeCaminhao = Number(item.VOLUME) || 0;
            const espacoDisponivel = tanqueRef ? Number(tanqueRef.ESPAÇO_DISPONIVEL) : 0;
            
            // TRAVA LÓGICA
            const temEspaco = volumeCaminhao > 0 && espacoDisponivel >= volumeCaminhao;
            const btnClass = temEspaco ? "" : "btn-bloqueado";
            const btnStatus = temEspaco ? "" : "disabled";

            corpo.innerHTML += `
                <tr>
                    <td style="font-weight:900; font-size:20px;">${item.PLACA}</td>
                    <td>${item.PRODUTO}</td>
                    <td>
                        <input type="number" id="vol-${item.ID}" value="${item.VOLUME || ''}" class="input-edit-table" style="font-size:14px; padding:10px;">
                        <button onclick="salvarVolume(${item.ID})" class="btn-acao-tabela" style="background:var(--roxo-raizen); color:white;">OK</button>
                    </td>
                    <td>${item.JORNADA}</td>
                    <td>${item.AGENDAMENTO ? item.AGENDAMENTO.slice(0,16) : '---'}</td>
                    <td>
                        ${temEspaco 
                            ? '<b style="color:green">LIBERADO</b>' 
                            : `<b style="color:red">BLOQUEADO</b><br><small>Faltam: ${Math.abs(espacoDisponivel - volumeCaminhao).toLocaleString()} L</small>`
                        }
                    </td>
                    <td>
                        <button onclick="chamarWhatsApp('${item.TELEFONE}', '${item.PLACA}')" ${btnStatus} class="btn-acao-tabela ${btnClass}" style="background:#25d366; color:white; padding:12px;">
                            <i class="fa-brands fa-whatsapp"></i> CONVOCAR
                        </button>
                    </td>
                    <td><button onclick="finalizarSaida(${item.ID}, ${volumeCaminhao}, ${tanqueRef?.id})" class="btn-acao-tabela" style="background:#3b82f6; color:white; padding:12px;">SAÍDA</button></td>
                </tr>`;
        });
    }

    async function finalizarSaida(registroId, volume, tanqueId) {
        if(!confirm("CONFIRMAR SAÍDA? O volume será subtraído do estoque.")) return;
        setLoader(true);
        try {
            // 1. Dá saída no caminhão
            await fetch(`${RAÍZEN_DB.URL}/rest/v1/registros?ID=eq.${registroId}`, {
                method: 'PATCH', headers: RAÍZEN_DB.HEADERS, body: JSON.stringify({ SAIDA: new Date().toLocaleString() })
            });

            // 2. Subtrai o espaço do tanque
            if(tanqueId) {
                const tanqueAtual = memoriaTanques.find(t => t.id === tanqueId);
                const novoEspaco = Number(tanqueAtual.ESPAÇO_DISPONIVEL) - volume;
                await fetch(`${RAÍZEN_DB.URL}/rest/v1/ESTOQUE?id=eq.${tanqueId}`, {
                    method: 'PATCH', headers: RAÍZEN_DB.HEADERS, body: JSON.stringify({ ESPAÇO_DISPONIVEL: novoEspaco })
                });
            }
            carregarDados();
        } finally { setLoader(false); }
    }

    // --- FUNÇÕES DE SUPERVISÃO ---
    function renderTanquesSupervisao() {
        const grid = document.getElementById('gridTanquesSupervisao');
        grid.innerHTML = "";
        memoriaTanques.forEach(t => {
            grid.innerHTML += `
                <div class="card-tanque" style="border-color:${t.ATIVO ? 'var(--cor-sucesso)' : 'var(--cor-erro)'}">
                    <h3>${t.TANQUE_NAME}</h3>
                    <p>${t.PRODUTO}</p>
                    <div style="margin:15px 0;">
                        <input type="number" id="sup-vol-${t.id}" value="${t.ESPAÇO_DISPONIVEL}" class="input-edit-table">
                        <button onclick="ajustarEstoqueSupervisao(${t.id})" class="btn-acao-tabela" style="background:var(--verde-raizen); color:white; margin-top:5px;">DEFINIR ESPAÇO</button>
                    </div>
                    <button onclick="alternarTanque(${t.id}, ${t.ATIVO})" style="width:100%; padding:10px; background:#1e293b; color:white; border-radius:10px; border:none; cursor:pointer;">
                        ${t.ATIVO ? 'DESATIVAR TANQUE' : 'ATIVAR TANQUE'}
                    </button>
                </div>`;
        });
    }

    async function ajustarEstoqueSupervisao(id) {
        const novo = document.getElementById(`sup-vol-${id}`).value;
        setLoader(true);
        await fetch(`${RAÍZEN_DB.URL}/rest/v1/ESTOQUE?id=eq.${id}`, {
            method:'PATCH', headers:RAÍZEN_DB.HEADERS, body:JSON.stringify({ESPAÇO_DISPONIVEL: novo})
        });
        carregarDados();
        setLoader(false);
        alert("CAPACIDADE AJUSTADA PELA SUPERVISÃO!");
    }

    // --- ACESSOS ---
    function ativarOperador() {
        if(prompt("SENHA OPERACIONAL:") === "raizen2026") {
            document.getElementById('secao-entrada').style.display = 'none';
            document.getElementById('modulo-operador-full').style.display = 'block';
            carregarDados();
        }
    }

    function ativarSupervisao() {
        if(prompt("SENHA DA SUPERVISÃO:") === "master2026") {
            document.getElementById('secao-entrada').style.display = 'none';
            document.getElementById('modulo-supervisao').style.display = 'block';
            carregarDados();
        }
    }

    async function salvarVolume(id) {
        const vol = document.getElementById(`vol-${id}`).value;
        setLoader(true);
        await fetch(`${RAÍZEN_DB.URL}/rest/v1/registros?ID=eq.${id}`, {
            method: 'PATCH', headers: RAÍZEN_DB.HEADERS, body: JSON.stringify({ VOLUME: vol })
        });
        carregarDados();
        setLoader(false);
    }

    function setLoader(v) { document.getElementById('loader-overlay').style.display = v ? 'flex' : 'none'; }

    function chamarWhatsApp(tel, placa) {
        const baia = prompt(`CONVOCANDO VEÍCULO ${placa}\nInforme a BAIA:`);
        if(!baia) return;
        const msg = encodeURIComponent(`Olá!\nVeículo ${placa}, sua entrada para descarregamento na BAIA ${baia} foi autorizada.`);
        window.open(`https://wa.me/55${tel.replace(/\D/g, "")}?text=${msg}`, '_blank');
    }

    // Mantendo a função de registro de entrada original
    document.getElementById('formMaster').onsubmit = async e => {
        e.preventDefault();
        setLoader(true);
        const data = {
            "PLACA": document.getElementById('placa').value.toUpperCase(),
            "PRODUTO": document.getElementById('produto').value,
            "TELEFONE": document.getElementById('whatsapp').value,
            "ENTRADA": new Date().toLocaleString('pt-BR'),
            "JORNADA": "LIBERADO"
        };
        const res = await fetch(`${RAÍZEN_DB.URL}/rest/v1/registros`, { method: 'POST', headers: RAÍZEN_DB.HEADERS, body: JSON.stringify(data) });
        if(res.ok) { alert("REGISTRADO!"); location.reload(); }
        setLoader(false);
    };
</script>
</body>
</html>
