<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAÍZEN - GESTÃO DE PÁTIO V18.0</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* CSS ROBUSTO - DESIGN INDUSTRIAL RAÍZEN */
        :root {
            --verde-raizen: #4d6d5d;
            --roxo-raizen: #84207d;
            --ouro-raizen: #ffc107;
            --fundo-cinza: #f1f5f9;
            --branco: #ffffff;
            --perigo: #e11d48;
            --sucesso: #10b981;
        }

        * { box-sizing: border-box; font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; }

        body { 
            background-color: var(--fundo-cinza); 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh;
            color: #1e293b;
        }

        /* HEADER IDENTIDADE */
        header { 
            background: linear-gradient(135deg, var(--verde-raizen) 0%, #1a241f 100%); 
            padding: 80px 20px; 
            text-align: center; 
            border-bottom: 25px solid var(--roxo-raizen);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .logo-txt {
            color: var(--branco);
            font-size: 80px;
            font-weight: 900;
            letter-spacing: 15px;
            text-transform: uppercase;
        }

        header h1 { 
            color: var(--branco); 
            font-size: 22px; 
            letter-spacing: 6px; 
            font-weight: 300;
            margin-top: 10px;
        }

        /* CONTAINER PRINCIPAL */
        .container-master { 
            width: 90%; 
            max-width: 1100px; 
            margin: 50px auto; 
            background: var(--branco); 
            padding: 70px; 
            border-radius: 60px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.15); 
            border-left: 30px solid var(--roxo-raizen);
        }

        #modulo-operador { 
            display: none; 
            width: 98%; 
            max-width: 2000px; 
            margin: 40px auto;
            background: var(--branco);
            padding: 50px;
            border-radius: 40px;
        }

        h2 { 
            color: var(--roxo-raizen); 
            text-align: center; 
            font-weight: 900; 
            text-transform: uppercase; 
            margin-bottom: 50px; 
            font-size: 34px;
            border-bottom: 8px solid #f1f5f9;
            padding-bottom: 20px;
        }

        /* INPUTS E FORMULÁRIOS */
        .campo-grupo { margin-bottom: 40px; }
        
        label { 
            display: block; 
            margin-bottom: 15px; 
            font-weight: 900; 
            color: var(--verde-raizen); 
            font-size: 14px; 
            text-transform: uppercase;
        }

        input, select { 
            width: 100%; 
            padding: 25px; 
            border: 4px solid #e2e8f0; 
            border-radius: 25px; 
            font-size: 22px; 
            font-weight: 700;
            background: #f8fafc;
        }

        /* BOX DE JORNADA COM ANIMAÇÃO DE SUMIR */
        .box-jornada {
            background: #fffbeb;
            padding: 45px;
            border-radius: 40px;
            border: 4px solid var(--ouro-raizen);
            margin: 30px 0;
            transition: all 0.5s ease;
        }

        .check-container {
            display: flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            background: #fff;
            padding: 20px;
            border-radius: 20px;
            margin-top: 25px;
            border: 2px solid #fde68a;
        }

        .check-container input { width: 40px; height: 40px; }

        /* TABELA E STATUS */
        .scroll-tabela { overflow-x: auto; border-radius: 30px; border: 2px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; min-width: 1900px; }
        th { background: #0f172a; color: #fff; padding: 30px; font-size: 14px; text-transform: uppercase; }
        td { padding: 25px; border-bottom: 2px solid #f1f5f9; text-align: center; font-weight: 800; font-size: 20px; }

        /* SEMÁFORO VISUAL */
        .semaforo-box {
            padding: 15px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .cor-dentro { background: #dcfce7; color: #166534; border: 2px solid var(--sucesso); }
        .cor-fora { background: #fee2e2; color: #991b1b; border: 2px solid var(--perigo); }
        .led { width: 12px; height: 12px; border-radius: 50%; }
        .led-verde { background: #10b981; box-shadow: 0 0 10px #10b981; }
        .led-vermelho { background: #ef4444; box-shadow: 0 0 10px #ef4444; }

        /* BOTÕES */
        .btn-master { 
            width: 100%; 
            padding: 35px; 
            background: var(--roxo-raizen); 
            color: white; 
            border: none; 
            border-radius: 30px; 
            font-size: 28px; 
            font-weight: 900; 
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 20px 40px rgba(132, 32, 125, 0.3);
        }

        .btn-wpp { background: #22c55e; color: white; border: none; padding: 15px; border-radius: 15px; width: 100%; cursor: pointer; margin-bottom: 10px; font-weight: 900; text-transform: uppercase; }
        .btn-fim { background: #3b82f6; color: white; border: none; padding: 15px; border-radius: 15px; width: 100%; cursor: pointer; font-weight: 900; text-transform: uppercase; }

        .loader { border: 6px solid #f3f3f3; border-top: 6px solid var(--roxo-raizen); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

<header>
    <div class="logo-txt">RAÍZEN</div>
    <h1>CONTROLE DE DESCARGAS | PAULÍNIA</h1>
</header>

<div class="container-master" id="view-motorista">
    <h2>ENTRADA NO PÁTIO</h2>
    <form id="formRegistro">
        <div class="campo-grupo">
            <label>PLACA DO VEÍCULO</label>
            <input type="text" id="placa" placeholder="ABC-1234" maxlength="8" required>
        </div>

        <div class="campo-grupo">
            <label>PRODUTO</label>
            <select id="produto" required>
                <option value="">SELECIONE...</option>
                <option value="GASOLINA">GASOLINA</option>
                <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
                <option value="ETANOL ANIDRO">ETANOL ANIDRO</option>
                <option value="ETANOL HIDRATADO">ETANOL HIDRATADO</option>
                <option value="DIESEL S10">DIESEL S10</option>
            </select>
        </div>

        <div class="campo-grupo">
            <label>WHATSAPP (DDD + NÚMERO)</label>
            <input type="tel" id="whatsapp" placeholder="(19) 99999-9999" maxlength="15" required>
        </div>

        <div class="box-jornada">
            <div id="container-hora-input">
                <label>HORÁRIO DE TÉRMINO DA JORNADA</label>
                <input type="time" id="hora_fim">
            </div>
            
            <label class="check-container">
                <input type="checkbox" id="jornada_24h">
                <span style="font-weight:900; color:var(--perigo); font-size: 20px;">ESTOU EM JORNADA 24 HORAS</span>
            </label>
        </div>

        <button type="submit" class="btn-master" id="btn_salvar">REGISTRAR ENTRADA</button>
    </form>
    
    <div style="text-align:center; margin-top:50px;">
        <button onclick="acessoPainel()" style="background:none; border:none; color:var(--roxo-raizen); font-weight:900; cursor:pointer; text-decoration:underline;">ACESSAR PAINEL OPERADOR</button>
    </div>
</div>

<div id="modulo-operador">
    <h2>FILA DE DESCARGA - ÁREA 02</h2>
    
    <div style="margin-bottom:40px;">
        <input type="text" id="buscaGeral" placeholder="FILTRAR POR PLACA, PRODUTO OU JORNADA..." onkeyup="filtrarTabela()" style="border:5px solid var(--roxo-raizen); padding:30px; border-radius:30px;">
    </div>

    <div class="scroll-tabela">
        <table id="tabelaPrincipal">
            <thead>
                <tr>
                    <th>PLACA</th>
                    <th>PRODUTO</th>
                    <th>CONTATO</th>
                    <th>STATUS JORNADA</th>
                    <th>ENTRADA</th>
                    <th style="background:#fff9c4; color:black;">AGENDAMENTO COLETA</th>
                    <th>AÇÕES</th>
                </tr>
            </thead>
            <tbody id="corpoFila"></tbody>
        </table>
    </div>

    <button class="btn-master" style="margin-top:50px; background:var(--verde-raizen);" onclick="sincronizar()">ATUALIZAR DADOS</button>
</div>

<script>
    const API = 'https://sheetdb.io/api/v1/p9z83v5m0dxq5';
    const PASS = 'raizen2026';

    /* LÓGICA DE JORNADA: SOME AO MARCAR 24H (RESTAURADO) */
    document.getElementById('jornada_24h').addEventListener('change', function() {
        const containerHora = document.getElementById('container-hora-input');
        const inputHora = document.getElementById('hora_fim');
        
        if(this.checked) {
            containerHora.style.display = 'none';
            inputHora.value = ""; // Limpa para não dar conflito
        } else {
            containerHora.style.display = 'block';
        }
    });

    /* MÁSCARAS */
    document.getElementById('placa').oninput = e => {
        let v = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
        if (v.length > 3 && !isNaN(v[3])) v = v.substring(0,3) + "-" + v.substring(3,7);
        e.target.value = v.substring(0,8);
    };

    document.getElementById('whatsapp').oninput = e => {
        let v = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !v[2] ? v[1] : '(' + v[1] + ') ' + v[2] + (v[3] ? '-' + v[3] : '');
    };

    /* WHATSAPP PADRÃO RAÍZEN */
    function chamarMotorista(tel, placa) {
        const num = tel.replace(/\D/g, "");
        if(num.length < 11) return alert("Número inválido!");
        const baia = prompt("INFORME A BAIA:");
        if(!baia) return;
        const msg = `Olá%0AMotorista vamos descarregar?%0ABaia *${baia}* - Área 02%0AObrigado!`;
        window.open(`https://api.whatsapp.com/send?phone=55${num}&text=${msg}`, '_blank');
    }

    /* FILTRO GLOBAL */
    function filtrarTabela() {
        const termo = document.getElementById("buscaGeral").value.toUpperCase();
        const linhas = document.getElementById("tabelaPrincipal").getElementsByTagName("tr");
        for (let i = 1; i < linhas.length; i++) {
            linhas[i].style.display = linhas[i].innerText.toUpperCase().includes(termo) ? "" : "none";
        }
    }

    /* SALVAR REGISTRO */
    document.getElementById('formRegistro').onsubmit = async e => {
        e.preventDefault();
        const btn = document.getElementById('btn_salvar');
        btn.innerHTML = '<span class="loader"></span> SALVANDO...';
        btn.disabled = true;

        const dados = {
            "PLACA": document.getElementById('placa').value,
            "PRODUTO": document.getElementById('produto').value,
            "TELEFONE": document.getElementById('whatsapp').value,
            "JORNADA": document.getElementById('jornada_24h').checked ? "24 HORAS" : document.getElementById('hora_fim').value,
            "ENTRADA": new Date().toLocaleString('pt-BR'),
            "SAIDA": "",
            "AGENDAMENTO NO COLETA": ""
        };

        await fetch(API, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify([dados]) });
        alert("REGISTRADO!");
        location.reload();
    };

    /* SEMÁFORO DE JORNADA */
    function obterSemaforo(valor) {
        if(valor === "24 HORAS") return `<div class="semaforo-box cor-fora"><span class="led led-vermelho"></span> 24H (URGENTE)</div>`;
        
        const agora = new Date();
        const t = valor.split(':');
        const f = new Date(); f.setHours(t[0], t[1], 0);

        if(agora > f) return `<div class="semaforo-box cor-fora"><span class="led led-vermelho"></span> FORA DE JORNADA</div>`;
        return `<div class="semaforo-box cor-dentro"><span class="led led-verde"></span> DENTRO DA JORNADA</div>`;
    }

    /* SINCRONIZAÇÃO E ORDENAÇÃO */
    async function sincronizar() {
        const corpo = document.getElementById('corpoFila');
        corpo.innerHTML = "<tr><td colspan='7'>ATUALIZANDO FILA...</td></tr>";
        
        const r = await fetch(API + "?t=" + Date.now());
        const d = await r.json();
        let ativos = d.filter(x => x.PLACA && !x.SAIDA);

        // Ordenação por Agendamento
        ativos.sort((a, b) => {
            const agA = a['AGENDAMENTO NO COLETA'] ? new Date(a['AGENDAMENTO NO COLETA']) : new Date(8640000000000000);
            const agB = b['AGENDAMENTO NO COLETA'] ? new Date(b['AGENDAMENTO NO COLETA']) : new Date(8640000000000000);
            return agA - agB;
        });

        corpo.innerHTML = "";
        ativos.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="color:var(--roxo-raizen); font-size:28px;">${item.PLACA}</td>
                <td>${item.PRODUTO}</td>
                <td>${item.TELEFONE}</td>
                <td>${obterSemaforo(item.JORNADA)}<br><small>${item.JORNADA}</small></td>
                <td>${item.ENTRADA.split(',')[1]}</td>
                <td style="background:#fffde7;">
                    <input type="datetime-local" id="ag-${item.PLACA}" value="${item['AGENDAMENTO NO COLETA'] || ''}" style="font-size:14px; padding:10px;">
                    <button onclick="setAgenda('${item.PLACA}')" style="margin-top:10px; cursor:pointer;">FIXAR</button>
                </td>
                <td>
                    <button class="btn-wpp" onclick="chamarMotorista('${item.TELEFONE}','${item.PLACA}')">CONVOCAR</button>
                    <button class="btn-fim" onclick="finalizar('${item.PLACA}')">FINALIZAR</button>
                </td>
            `;
            corpo.appendChild(tr);
        });
    }

    async function setAgenda(placa) {
        const val = document.getElementById(`ag-${placa}`).value;
        await fetch(`${API}/PLACA/${placa}`, { method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({"AGENDAMENTO NO COLETA": val}) });
        sincronizar();
    }

    async function finalizar(placa) {
        if(confirm("FINALIZAR?")) {
            await fetch(`${API}/PLACA/${placa}`, { method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({"SAIDA": new Date().toLocaleString('pt-BR')}) });
            sincronizar();
        }
    }

    function acessoPainel() {
        if(prompt("SENHA:") === PASS) {
            document.getElementById('view-motorista').style.display = 'none';
            document.getElementById('modulo-operador').style.display = 'block';
            sincronizar();
        }
    }
</script>
</body>
</html>
