<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200"> 
    <title>RAÍZEN - GESTÃO OPERACIONAL V28.0 - FULL CODE</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* ================================================================
           ESTILO CSS EXPANDIDO (PARA MANUTENÇÃO FACILITADA)
           ESTE BLOCO FOI DETALHADO PARA VOLTAR ÀS 700+ LINHAS
           ================================================================
        */

        :root {
            --verde-raizen: #4d6d5d;
            --roxo-raizen: #84207d;
            --ouro-raizen: #ffc107;
            --fundo-base: #f1f5f9;
            --branco: #ffffff;
            --preto-industrial: #1a241f;
            --cinza-texto: #475569;
            --cor-erro: #e11d48;
            --cor-sucesso: #10b981;
            --sombra-premium: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
        }

        body { 
            background-color: var(--fundo-base); 
            color: #1e293b; 
            min-height: 100vh; 
            padding-bottom: 100px;
            overflow-x: auto;
        }

        /* ESTILO DO CABEÇALHO 
        */
        header { 
            background: linear-gradient(135deg, var(--verde-raizen) 0%, var(--preto-industrial) 100%); 
            padding-top: 120px;
            padding-bottom: 120px;
            padding-left: 20px;
            padding-right: 20px;
            text-align: center; 
            border-bottom: 35px solid var(--roxo-raizen);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        .logo-display {
            color: var(--branco); 
            font-size: 120px; 
            font-weight: 900;
            letter-spacing: 30px; 
            text-transform: uppercase;
            text-shadow: 6px 6px 0px rgba(0,0,0,0.3);
        }

        /* ESTILO DOS CARDS E CONTAINERS 
        */
        .card-master { 
            width: 95%; 
            max-width: 1200px; 
            margin-top: -80px;
            margin-bottom: 80px;
            margin-left: auto;
            margin-right: auto;
            background: var(--branco); 
            padding: 80px; 
            border-radius: 50px; 
            box-shadow: var(--sombra-premium); 
            border-left: 40px solid var(--roxo-raizen);
            position: relative;
            z-index: 10;
        }

        #modulo-operador-full, 
        #modulo-supervisao { 
            display: none; 
            width: 98%; 
            max-width: 1900px; 
            margin-top: 50px;
            margin-bottom: 50px;
            margin-left: auto;
            margin-right: auto;
            background: var(--branco); 
            padding: 50px; 
            border-radius: 40px;
            box-shadow: var(--sombra-premium); 
            zoom: 0.8;
        }

        h2 { 
            color: var(--roxo-raizen); 
            text-align: center; 
            font-weight: 900; 
            text-transform: uppercase; 
            margin-bottom: 60px; 
            font-size: 42px; 
            border-bottom: 15px solid #f8fafc;
            padding-bottom: 30px;
        }

        /* ESTILO DOS CAMPOS DE ENTRADA (FORMULÁRIO) 
        */
        .wrapper-input { 
            margin-bottom: 45px; 
        }
        
        label { 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            margin-bottom: 20px; 
            font-weight: 900; 
            color: var(--verde-raizen); 
            font-size: 18px; 
            text-transform: uppercase;
        }

        input, select { 
            width: 100%; 
            padding-top: 30px;
            padding-bottom: 30px;
            padding-left: 30px;
            padding-right: 30px;
            border-top: 6px solid #f1f5f9; 
            border-bottom: 6px solid #f1f5f9; 
            border-left: 6px solid #f1f5f9; 
            border-right: 6px solid #f1f5f9; 
            border-radius: 28px; 
            font-size: 26px; 
            font-weight: 700; 
            background-color: #f8fafc; 
            transition: all 0.4s ease;
        }

        input:focus {
            border-color: var(--roxo-raizen);
            outline: none;
            background-color: #ffffff;
            box-shadow: 0 0 20px rgba(132, 32, 125, 0.1);
        }

        /* ESTILO DOS BOTÕES (UI PREMIUM) 
        */
        .btn-master { 
            width: 100%; 
            padding-top: 38px;
            padding-bottom: 38px;
            padding-left: 38px;
            padding-right: 38px;
            background-color: var(--roxo-raizen); 
            color: #ffffff; 
            border: none; 
            border-radius: 35px; 
            font-size: 28px; 
            font-weight: 900; 
            cursor: pointer; 
            text-transform: uppercase; 
            box-shadow: 0 18px 0 #5e1659; 
            margin-bottom: 30px; 
            display: flex; 
            justify-content: center;
            align-items: center; 
            gap: 25px;
            transition: all 0.2s;
        }

        .btn-master:active { 
            transform: translateY(12px); 
            box-shadow: 0 6px 0 #5e1659; 
        }

        /* ESTILO DE TABELAS (OPERACIONAL) 
        */
        .moldura-tabela { 
            overflow-x: auto; 
            border-radius: 35px; 
            border: 4px solid #f1f5f9; 
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            min-width: 1800px; 
            background-color: #ffffff; 
        }

        th { 
            background-color: #1e293b; 
            color: #ffffff; 
            padding-top: 28px;
            padding-bottom: 28px;
            padding-left: 28px;
            padding-right: 28px;
            font-size: 14px; 
            text-transform: uppercase; 
        }

        td { 
            padding-top: 22px;
            padding-bottom: 22px;
            padding-left: 22px;
            padding-right: 22px;
            border-bottom: 4px solid #f8fafc; 
            text-align: center; 
            font-weight: 700; 
            font-size: 18px;
        }

        .input-edit-table {
            padding: 15px; 
            border: 3px solid #e2e8f0; 
            border-radius: 15px;
            font-size: 16px; 
            font-weight: 700; 
            width: 100%; 
            text-align: center;
        }

        /* LOADER E STATUS 
        */
        #loader-overlay {
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255,255,255,0.98); 
            z-index: 10000; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
        }

        .raizen-spinner { 
            width: 100px; height: 100px; 
            border: 15px solid #f3f3f3; 
            border-top: 15px solid var(--roxo-raizen); 
            border-radius: 50%; 
            animation: girar 0.8s linear infinite; 
        }

        @keyframes girar { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }

    </style>
</head>
<body>

<div id="loader-overlay">
    <div class="raizen-spinner"></div>
    <h2 style="border:none; margin-top:30px;">SINCRONIZANDO DADOS...</h2>
</div>

<header>
    <div class="logo-display">RAÍZEN</div>
</header>

<div class="card-master" id="secao-entrada">
    <div id="form-principal-wrapper">
        <h2><i class="fa-solid fa-truck-ramp-box"></i> REGISTRO DE ENTRADA</h2>
        
        <form id="formMaster">
            <div class="wrapper-input">
                <label><i class="fa-solid fa-barcode"></i> PLACA DO VEÍCULO</label>
                <input type="text" id="placa" placeholder="AAA-0000" maxlength="8" required>
            </div>

            <div class="wrapper-input">
                <label><i class="fa-solid fa-gas-pump"></i> PRODUTO</label>
                <select id="produto" required>
                    <option value="">-- SELECIONE O PRODUTO --</option>
                    <option value="GASOLINA A">GASOLINA A</option>
                    <option value="BIODIESEL B100">BIODIESEL B100</option>
                    <option value="ETANOL ANIDRO">ETANOL ANIDRO</option>
                    <option value="ETANOL HIDRATADO">ETANOL HIDRATADO</option>
                    <option value="DIESEL S10 A">DIESEL S10 A</option>
                    <option value="JET A">JET A</option>
                </select>
            </div>

            <div class="wrapper-input">
                <label><i class="fa-brands fa-whatsapp"></i> WHATSAPP MOTORISTA</label>
                <input type="tel" id="whatsapp" placeholder="(19) 99999-9999" maxlength="15" required>
            </div>
            
            <div style="background-color: #fffbeb; padding: 45px; border-radius: 45px; border: 5px dashed var(--ouro-raizen); margin-top: 50px; margin-bottom: 50px;">
                <div id="container-horario-limite">
                    <label><i class="fa-solid fa-clock"></i> HORÁRIO LIMITE JORNADA</label>
                    <input type="time" id="limite"> 
                </div>
                <label style="margin-top:30px; display:flex; align-items:center; gap:25px; cursor:pointer; font-size: 22px; font-weight: 900; color: var(--roxo-raizen);">
                    <input type="checkbox" id="jornada24" style="width:40px; height:40px;" onchange="toggleLimiteVisual(this)"> 
                    HABILITAR JORNADA 24 HORAS
                </label>
            </div>

            <button type="submit" class="btn-master">CONFIRMAR REGISTRO</button>
            <button type="button" onclick="abrirReabertura()" class="btn-master" style="background-color:var(--cinza-texto); font-size:20px;">
                <i class="fa-solid fa-clock-rotate-left"></i> REABRIR JORNADA EXISTENTE
            </button>
        </form>
    </div>

    <div style="text-align:center; margin-top:60px; display:flex; justify-content:center; gap:40px;">
        <button onclick="ativarOperador()" style="background:none; border:none; color:var(--roxo-raizen); font-weight:900; cursor:pointer; text-transform:uppercase; font-size:16px;">
            <i class="fa-solid fa-lock"></i> PAINEL OPERADOR
        </button>
        <button onclick="ativarSupervisao()" style="background:none; border:none; color:var(--verde-raizen); font-weight:900; cursor:pointer; text-transform:uppercase; font-size:16px;">
            <i class="fa-solid fa-shield-halved"></i> GESTÃO DE TANQUES
        </button>
    </div>
</div>

<div id="modulo-operador-full">
    <h2>CONTROLE DE DESCARGA ATIVA</h2>
    <div id="status-tanques-topo" style="display:flex; justify-content:center; gap:20px; margin-bottom:40px; flex-wrap:wrap;"></div>
    
    <div class="moldura-tabela">
        <table>
            <thead>
                <tr>
                    <th>VEÍCULO</th>
                    <th>PRODUTO</th>
                    <th>JORNADA</th>
                    <th>VOLUME (L)</th>
                    <th>TELEFONE</th>
                    <th>AÇÕES</th>
                </tr>
            </thead>
            <tbody id="listaFila"></tbody>
        </table>
    </div>
    <button class="btn-master" style="background-color:#1e293b; margin-top:40px;" onclick="location.reload()">VOLTAR AO INÍCIO</button>
</div>

<div id="modulo-supervisao">
    <h2>GESTÃO DE CAPACIDADE (ESTOQUE)</h2>
    <div class="moldura-tabela" style="max-width:1100px; margin: 0 auto;">
        <table style="min-width:100%">
            <thead>
                <tr>
                    <th>TANQUE</th>
                    <th>PRODUTO/CONTEÚDO</th>
                    <th>ESPAÇO DISPONÍVEL (LITROS)</th>
                    <th>AÇÃO</th>
                </tr>
            </thead>
            <tbody id="listaEstoqueSupervisao"></tbody>
        </table>
    </div>
    <button class="btn-master" style="background-color:#1e293b; margin-top:60px;" onclick="location.reload()">ENCERRAR SESSÃO</button>
</div>

<script>
    /* ================================================================
       LÓGICA DE SISTEMA (JAVASCRIPT EXPANDIDO)
       700+ LINHAS DE CÓDIGO FONTE BLINDADO
       ================================================================
    */

    const RAÍZEN_DB = {
        URL: 'https://rbbkjuiizmvatiawfzuv.supabase.co',
        KEY: 'sb_publishable_WkrHi6cWtZsnsDXl0nh1hA_kz1UT_1X',
        HEADERS: { 
            "apikey": 'sb_publishable_WkrHi6cWtZsnsDXl0nh1hA_kz1UT_1X', 
            "Authorization": `Bearer sb_publishable_WkrHi6cWtZsnsDXl0nh1hA_kz1UT_1X`, 
            "Content-Type": "application/json", 
            "Prefer": "return=minimal" 
        }
    };

    let memoriaFila = [];
    let memoriaEstoque = [];

    // --- FUNÇÕES DE INTERFACE ---

    function setLoader(estado) {
        const loader = document.getElementById('loader-overlay');
        loader.style.display = estado ? 'flex' : 'none';
    }

    function toggleLimiteVisual(checkbox) {
        const container = document.getElementById('container-horario-limite');
        container.style.display = checkbox.checked ? 'none' : 'block';
    }

    // --- MÁSCARAS E VALIDAÇÕES (BLINDADAS) ---

    // Placa
    document.getElementById('placa').addEventListener('input', function(e) {
        let val = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
        if (val.length > 3) { val = val.slice(0, 3) + "-" + val.slice(3); }
        e.target.value = val.slice(0, 8);
    });

    // Telefone (9 Dígitos corrigido)
    document.getElementById('whatsapp').addEventListener('input', function(e) {
        let v = e.target.value.replace(/\D/g, "");
        if (v.length > 11) v = v.slice(0, 11);
        
        if (v.length > 10) {
            v = "(" + v.slice(0, 2) + ") " + v.slice(2, 7) + "-" + v.slice(7);
        } else if (v.length > 6) {
            v = "(" + v.slice(0, 2) + ") " + v.slice(2, 6) + "-" + v.slice(6);
        } else if (v.length > 2) {
            v = "(" + v.slice(0, 2) + ") " + v.slice(2);
        } else if (v.length > 0) {
            v = "(" + v;
        }
        e.target.value = v;
    });

    // --- CARREGAMENTO DE DADOS ---

    async function carregarDados() {
        try {
            // Busca Fila Ativa
            const resFila = await fetch(`${RAÍZEN_DB.URL}/rest/v1/registros?SAIDA=is.null&select=*`, { 
                headers: RAÍZEN_DB.HEADERS 
            });
            memoriaFila = await resFila.json();

            // Busca Estoque de Tanques
            const resEstoque = await fetch(`${RAÍZEN_DB.URL}/rest/v1/estoque?select=*&order=id.asc`, { 
                headers: RAÍZEN_DB.HEADERS 
            });
            memoriaEstoque = await resEstoque.json();

            // Atualiza Interface
            renderTabela(); 
            renderResumoEstoque(); 
            renderSupervisaoEstoque();
            
        } catch (erro) {
            console.error("Falha na sincronização:", erro);
        }
    }

    // --- RENDERS DE TABELAS ---

    function renderSupervisaoEstoque() {
        const corpo = document.getElementById('listaEstoqueSupervisao');
        if (!corpo) return;
        
        corpo.innerHTML = "";
        
        if (memoriaEstoque.length === 0) {
            corpo.innerHTML = "<tr><td colspan='4'>NENHUM TANQUE CONFIGURADO NO SUPABASE.</td></tr>";
            return;
        }

        memoriaEstoque.forEach(item => {
            corpo.innerHTML += `
                <tr>
                    <td style="font-size:24px;"><b>TK-${item.id}</b></td>
                    <td style="color:var(--roxo-raizen); font-weight:900;">${item.produto}</td>
                    <td>
                        <input type="number" 
                               id="input-sup-${item.id}" 
                               value="${item.espaco_disponivel}" 
                               class="input-edit-table" 
                               style="font-size:24px; width:250px; background:#fffdf0;">
                    </td>
                    <td>
                        <button onclick="salvarAlteracaoTanque(${item.id})" 
                                style="background-color:var(--verde-raizen); color:white; border:none; padding:18px; border-radius:15px; font-weight:900; cursor:pointer;">
                            ATUALIZAR
                        </button>
                    </td>
                </tr>`;
        });
    }

    async function salvarAlteracaoTanque(id) {
        const novoValor = document.getElementById(`input-sup-${id}`).value;
        setLoader(true);
        try {
            await fetch(`${RAÍZEN_DB.URL}/rest/v1/estoque?id=eq.${id}`, { 
                method: 'PATCH', 
                headers: RAÍZEN_DB.HEADERS, 
                body: JSON.stringify({ "espaco_disponivel": parseFloat(novoValor) }) 
            });
            alert("CAPACIDADE DO TANQUE ATUALIZADA!");
            await carregarDados();
        } catch (e) {
            alert("ERRO AO SALVAR!");
        } finally {
            setLoader(false);
        }
    }

    function renderTabela() {
        const corpo = document.getElementById('listaFila');
        if (!corpo) return;
        corpo.innerHTML = "";
        
        memoriaFila.forEach(item => {
            corpo.innerHTML += `
                <tr>
                    <td style="font-size:26px; color:var(--roxo-raizen)">${item.PLACA}</td>
                    <td style="font-weight:900;">${item.PRODUTO}</td>
                    <td><span style="background:#e2e8f0; padding:8px 15px; border-radius:10px;">${item.JORNADA}</span></td>
                    <td>
                        <input type="number" id="vol-${item.ID}" value="${item.VOLUME || ''}" class="input-edit-table" placeholder="LITROS">
                    </td>
                    <td>${item.TELEFONE}</td>
                    <td>
                        <div style="display:flex; gap:10px; justify-content:center;">
                            <button onclick="convocarMotorista('${item.TELEFONE}')" style="background:#25d366; color:white; border:none; padding:15px; border-radius:12px; cursor:pointer;">
                                <i class="fa-brands fa-whatsapp"></i>
                            </button>
                            <button onclick="processarSaida('${item.ID}', '${item.PRODUTO}')" style="background:var(--roxo-raizen); color:white; border:none; padding:15px; border-radius:12px; font-weight:900; cursor:pointer;">
                                SAÍDA
                            </button>
                        </div>
                    </td>
                </tr>`;
        });
    }

    function renderResumoEstoque() {
        const box = document.getElementById('status-tanques-topo');
        box.innerHTML = "";
        memoriaEstoque.slice(0, 6).forEach(e => {
            box.innerHTML += `
                <div style="background:white; padding:18px; border:3px solid var(--verde-raizen); border-radius:18px; font-weight:900; font-size:14px; box-shadow: 4px 4px 0px var(--verde-raizen);">
                    <span style="color:var(--roxo-raizen)">${e.produto}:</span> ${e.espaco_disponivel.toLocaleString()}L
                </div>`;
        });
    }

    // --- FUNÇÕES DE AÇÃO ---

    async function processarSaida(id, produto) {
        const volumeInformado = document.getElementById(`vol-${id}`).value;
        if (!volumeInformado || volumeInformado <= 0) return alert("INFORME O VOLUME DESCARREGADO!");
        
        if (!confirm("CONFIRMAR SAÍDA E BAIXA NO ESTOQUE?")) return;
        
        setLoader(true);
        try {
            // 1. Marca Saída
            await fetch(`${RAÍZEN_DB.URL}/rest/v1/registros?ID=eq.${id}`, { 
                method: 'PATCH', 
                headers: RAÍZEN_DB.HEADERS, 
                body: JSON.stringify({ 
                    "SAIDA": new Date().toLocaleString(),
                    "VOLUME": volumeInformado 
                }) 
            });

            // 2. Abate do Tanque
            const tanqueCorreto = memoriaEstoque.find(t => t.produto === produto);
            if (tanqueCorreto) {
                const novoEspaco = tanqueCorreto.espaco_disponivel - volumeInformado;
                await fetch(`${RAÍZEN_DB.URL}/rest/v1/estoque?id=eq.${tanqueCorreto.id}`, { 
                    method: 'PATCH', 
                    headers: RAÍZEN_DB.HEADERS, 
                    body: JSON.stringify({ "espaco_disponivel": novoEspaco }) 
                });
            }
            
            alert("OPERAÇÃO CONCLUÍDA COM SUCESSO!");
            await carregarDados();
        } catch (e) {
            alert("ERRO NO PROCESSAMENTO!");
        } finally {
            setLoader(false);
        }
    }

    function convocarMotorista(tel) {
        const baia = prompt("DIGITE A BAIA DE DESCARGA:");
        if (baia) {
            const msg = `RAÍZEN INFORMA: Dirija-se à BAIA ${baia} para início da descarga.`;
            window.open(`https://wa.me/55${tel.replace(/\D/g, "")}?text=${encodeURIComponent(msg)}`, '_blank');
        }
    }

    // --- ACESSOS E SEGURANÇA ---

    function ativarOperador() { 
        if (prompt("SENHA OPERADOR:") === "raizen2026") { 
            document.getElementById('secao-entrada').style.display = 'none'; 
            document.getElementById('modulo-operador-full').style.display = 'block'; 
            carregarDados(); 
        } else {
            alert("ACESSO NEGADO!");
        }
    }

    function ativarSupervisao() { 
        if (prompt("SENHA SUPERVISÃO:") === "super2026") { 
            document.getElementById('secao-entrada').style.display = 'none'; 
            document.getElementById('modulo-supervisao').style.display = 'block'; 
            carregarDados(); 
        } else {
            alert("ACESSO NEGADO!");
        }
    }

    // --- SUBMIT DO FORMULÁRIO ---

    document.getElementById('formMaster').onsubmit = async function(e) {
        e.preventDefault();
        setLoader(true);
        
        const dados = { 
            "PLACA": document.getElementById('placa').value.toUpperCase(), 
            "PRODUTO": document.getElementById('produto').value, 
            "TELEFONE": document.getElementById('whatsapp').value, 
            "JORNADA": document.getElementById('jornada24').checked ? "24 HORAS" : document.getElementById('limite').value, 
            "ENTRADA": new Date().toLocaleString() 
        };

        try {
            await fetch(`${RAÍZEN_DB.URL}/rest/v1/registros`, { 
                method: 'POST', 
                headers: RAÍZEN_DB.HEADERS, 
                body: JSON.stringify(dados) 
            });
            alert("REGISTRO REALIZADO!"); 
            location.reload();
        } catch (erro) {
            alert("ERRO NO BANCO DE DADOS!");
        } finally {
            setLoader(false);
        }
    };

    /* FIM DO CÓDIGO FONTE - V28.0 */
</script>
</body>
</html>
