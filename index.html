<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raízen - CONTROLE DE DESCARGA ÁREA 2</title>
    <style>
        /* ==========================================================================
           IDENTIDADE VISUAL E CORES OFICIAIS
           ========================================================================== */
        :root {
            --cor-principal: #4d6d5d; /* Verde Raízen */
            --amarelo-raizen: #ffcd00; /* Amarelo Raízen */
            --fundo: #f0f2f5;
            --branco: #ffffff;
            --danger: #dc3545;
            --warning: #ffc107;
            --success: #28a745;
            --azul-raizen: #007bff;
            --sombra: 0 15px 35px rgba(0,0,0,0.15);
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--fundo); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        /* CABEÇALHO ROBUSTO */
        header { 
            background-color: var(--cor-principal); 
            width: 100%; 
            padding: 30px 0; 
            text-align: center; 
            border-bottom: 8px solid var(--amarelo-raizen); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            position: sticky;
            top: 0;
            z-index: 100;
        }
        header h1 { 
            color: var(--branco); 
            margin: 0; 
            font-size: 26px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-weight: 800;
        }
        
        /* CONTAINERS PRINCIPAIS */
        .container { 
            width: 92%; 
            max-width: 650px; 
            margin: 40px auto; 
            background: var(--branco); 
            padding: 40px; 
            border-radius: 25px; 
            box-shadow: var(--sombra); 
            transition: all 0.3s ease;
        }

        /* PAINEL ADMINISTRATIVO EXPANDIDO */
        #admin-panel { 
            display: none; 
            max-width: 98%; 
            width: 1500px; 
        }

        h2 { 
            color: var(--cor-principal); 
            text-align: center; 
            border-bottom: 3px solid var(--amarelo-raizen); 
            padding-bottom: 15px; 
            margin-bottom: 30px; 
            text-transform: uppercase;
            font-size: 20px;
        }
        
        /* FORMULÁRIO MOTORISTA */
        label { 
            display: block; 
            margin-top: 20px; 
            font-weight: bold; 
            color: #333; 
            font-size: 16px;
        }

        input, select { 
            width: 100%; 
            padding: 18px; 
            margin-top: 8px; 
            border: 2px solid #ddd; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 18px; 
            color: #333;
            transition: border-color 0.3s ease;
        }
        input:focus { border-color: var(--cor-principal); outline: none; }

        /* LÓGICA DA JORNADA (BOX) */
        .jornada-container {
            background: #f8fbf9;
            padding: 25px;
            border-radius: 15px;
            border: 2px dashed #cbd5e0;
            margin-top: 25px;
        }

        .checkbox-estilizado {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            padding: 15px;
            background: white;
            border-radius: 12px;
            border: 1px solid #ddd;
            margin-top: 15px;
            user-select: none;
        }
        .checkbox-estilizado input { 
            width: 30px; 
            height: 30px; 
            cursor: pointer;
        }
        .checkbox-estilizado span { 
            font-size: 18px; 
            font-weight: bold; 
            color: var(--cor-principal); 
        }

        /* BOTÕES */
        .btn-enviar { 
            width: 100%; 
            padding: 22px; 
            background-color: var(--cor-principal); 
            color: white; 
            border: none; 
            border-radius: 15px; 
            font-size: 22px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 30px; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }
        .btn-enviar:hover { background-color: #3d5a4d; }

        /* TABELA ADMINISTRATIVA */
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 15px; overflow: hidden; }
        th { background: var(--cor-principal); color: white; padding: 22px; text-align: center; font-size: 13px; text-transform: uppercase; }
        td { padding: 20px; border-bottom: 1px solid #eee; text-align: center; font-size: 14px; font-weight: 600; }
        
        /* STATUS DE AGENDAMENTO (LÓGICA DA SETA VERMELHA) */
        .status-pendente { 
            color: var(--danger); 
            font-weight: 800; 
            background: #fff0f0; 
            padding: 10px; 
            border-radius: 8px; 
            border: 1px solid #ffcccc;
            display: inline-block;
            animation: pulse 2s infinite;
        }
        .status-agendado { 
            color: #1b5e20; 
            font-weight: 800; 
            background: #e8f5e9; 
            padding: 10px; 
            border-radius: 8px; 
            border: 2px solid #c8e6c9;
            display: block;
        }

        /* BADGES DE JORNADA */
        .badge { padding: 8px 12px; border-radius: 8px; font-weight: bold; font-size: 12px; color: white; }
        .bg-ok { background: var(--success); }
        .bg-vencido { background: var(--danger); animation: piscar 1.2s infinite; }
        
        @keyframes piscar { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }

        /* AÇÕES DO ADMIN */
        .btn-acao { 
            border: none; border-radius: 8px; padding: 12px; font-weight: bold; cursor: pointer; font-size: 11px; 
            width: 100%; margin-bottom: 8px; color: white; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-calendario { background: white; color: var(--azul-raizen); border: 2px solid var(--azul-raizen); }
        .btn-zap { background: #25D366; }
        .btn-ok { background: var(--azul-raizen); }

        /* MODAL DE AGENDAMENTO */
        #modalColeta { display:none; position:fixed; z-index:9999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.8); backdrop-filter: blur(8px); }
        .modal-content { background:white; margin:8% auto; padding:40px; border-radius:30px; width:420px; text-align: center; box-shadow: 0 30px 70px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<header><h1>RAÍZEN - TERMINAL PAULÍNIA</h1></header>

<div class="container" id="tela-motorista">
    <h2>DESCARGA ÁREA 2</h2>
    <form id="formAgendamento">
        <label>Placa do Veículo</label>
        <input type="text" id="placa" placeholder="ABC-1234" maxlength="8" required>
        
        <label>Produto</label>
        <select id="produto" required>
            <option value="">Selecione o produto...</option>
            <option value="GASOLINA">GASOLINA</option>
            <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
            <option value="S10">S10</option>
            <option value="ANIDRO">ANIDRO</option>
            <option value="HIDRATADO">HIDRATADO</option>
        </select>

        <label>WhatsApp (DDD + Número)</label>
        <input type="tel" id="telefone" placeholder="(19) 99999-9999" maxlength="15" required>

        <div class="jornada-container">
            <div id="campoHora">
                <label style="margin-top: 0;">Fim da Jornada (Horário):</label>
                <input type="time" id="horaJornada" required>
            </div>
            <label class="checkbox-estilizado">
                <input type="checkbox" id="check24h" onchange="alternarJornada()">
                <span>Minha jornada é 24 Horas (Livre)</span>
            </label>
        </div>

        <button type="submit" class="btn-enviar" id="btnEnviar">REGISTRAR ENTRADA</button>
    </form>
    <div style="text-align:center; margin-top:25px;">
        <button onclick="entrarAdmin()" style="background:none; border:none; color:#bbb; text-decoration:underline; cursor:pointer; font-size:14px;">Acesso Administrativo</button>
    </div>
</div>

<div class="container" id="admin-panel">
    <h2>CONTROLE DE PÁTIO - ÁREA 2</h2>
    <div style="overflow-x: auto;">
        <table id="tabelaDados">
            <thead>
                <tr>
                    <th>Placa</th>
                    <th>WhatsApp</th>
                    <th>Jornada</th>
                    <th style="background:#2d4a3e; color:white; width: 220px;">AGENDAMENTO COLETA</th>
                    <th>Tempo Pátio</th>
                    <th style="width: 200px;">Ações</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
    <button class="btn-enviar" style="background:#666;" onclick="window.location.reload()">SAIR DO PAINEL</button>
</div>

<div id="modalColeta">
    <div class="modal-content">
        <h3 style="margin-top:0; color:var(--cor-principal);">Definir Coleta</h3>
        <p id="mostraPlaca" style="font-weight:bold; font-size:22px; color:#333; margin-bottom:25px;"></p>
        <input type="hidden" id="placaAlvo">
        
        <label>Data Programada:</label>
        <input type="date" id="dataColeta">
        
        <label>Hora Programada:</label>
        <input type="time" id="horaColeta">
        
        <button class="btn-enviar" id="btnSalvarModal" onclick="salvarAgendaNaPlanilha()">GRAVAR AGENDAMENTO</button>
        <button onclick="fecharModal()" style="margin-top:20px; border:none; background:none; color:red; font-weight:bold; cursor:pointer;">CANCELAR</button>
    </div>
</div>

<script>
    const API_URL = 'https://sheetdb.io/api/v1/p9z83v5m0dxq5';

    // 1. GESTÃO DA JORNADA DO MOTORISTA
    function alternarJornada() {
        const checked = document.getElementById('check24h').checked;
        document.getElementById('campoHora').style.display = checked ? 'none' : 'block';
        document.getElementById('horaJornada').required = !checked;
    }

    // 2. MÁSCARAS DE INPUT
    document.getElementById('telefone').addEventListener('input', (e) => {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
    });

    document.getElementById('placa').addEventListener('input', (e) => {
        let v = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
        if (v.length > 3 && !isNaN(v[3])) v = v.substring(0,3) + "-" + v.substring(3,7);
        e.target.value = v.substring(0,8);
    });

    // 3. ATUALIZAÇÃO DO PAINEL ADMIN (LOGICA ROBUSTA)
    function atualizarTabelaAdmin() {
        const tbody = document.querySelector('#tabelaDados tbody');
        tbody.innerHTML = "<tr><td colspan='6'>Consultando Planilha...</td></tr>";

        fetch(API_URL + "?t=" + new Date().getTime())
        .then(res => res.json())
        .then(data => {
            tbody.innerHTML = "";
            data.filter(i => i.PLACA && !i.SAIDA).forEach(i => {
                
                // --- AQUI ESTÁ A LÓGICA DA SETA VERMELHA ---
                // Se COLETA existir e não for vazio, o Pendente SOME.
                let agendamentoVisual = "";
                if (i.COLETA && i.COLETA.trim() !== "" && i.COLETA !== "undefined" && i.COLETA !== "null") {
                    agendamentoVisual = `<span class="status-agendado">${i.COLETA}</span>`;
                } else {
                    agendamentoVisual = `<span class="status-pendente">PENDENTE</span>`;
                }

                tbody.innerHTML += `
                    <tr>
                        <td style="font-size:16px; font-weight:800;">${i.PLACA}</td>
                        <td>${i.TELEFONE}</td>
                        <td>${statusJornada(i.JORNADA)}</td>
                        <td style="background:#fcfcfc">${agendamentoVisual}</td>
                        <td style="color:#666;">${calcularTempo(i.ENTRADA)}</td>
                        <td>
                            <button class="btn-acao btn-calendario" onclick="abrirModal('${i.PLACA}')">📅 AGENDAR COLETA</button>
                            <button class="btn-acao btn-zap" onclick="chamarNoZap('${i.TELEFONE}', '${i.PLACA}', '${i.COLETA}')">📱 CHAMAR</button>
                            <button class="btn-acao btn-ok" onclick="finalizarDescarga('${i.PLACA}')">✅ CONCLUIR</button>
                        </td>
                    </tr>`;
            });
        });
    }

    // 4. CÁLCULOS DE STATUS E TEMPO
    function statusJornada(horaFim) {
        if (!horaFim || horaFim === "24 Horas") return '<span class="badge bg-ok">LIVRE (24h)</span>';
        const agora = new Date();
        const [h, m] = horaFim.split(':');
        const limite = new Date(); limite.setHours(h, m, 0);
        return (limite < agora) ? `<span class="badge bg-vencido">VENCIDA</span>` : `<span class="badge bg-ok">EM DIA</span>`;
    }

    function calcularTempo(entrada) {
        if(!entrada) return "0 min";
        const p = entrada.split(', ');
        const d = p[0].split('/'); const h = p[1].split(':');
        const inicio = new Date(d[2], d[1]-1, d[0], h[0], h[1]);
        const diff = Math.floor((new Date() - inicio) / 60000);
        return diff > 60 ? Math.floor(diff/60) + "h " + (diff%60) + "m" : diff + " min";
    }

    // 5. FUNÇÕES DO MODAL
    function abrirModal(placa) {
        document.getElementById('placaAlvo').value = placa;
        document.getElementById('mostraPlaca').innerText = "VEÍCULO: " + placa;
        document.getElementById('modalColeta').style.display = 'block';
    }
    function fecharModal() { document.getElementById('modalColeta').style.display = 'none'; }

    function salvarAgendaNaPlanilha() {
        const placa = document.getElementById('placaAlvo').value;
        const d = document.getElementById('dataColeta').value.split('-').reverse().join('/');
        const h = document.getElementById('horaColeta').value;
        if(!d || !h || d === "") return alert("Erro: Preencha data e hora corretamente!");

        const textoFinal = d + " às " + h;
        const btn = document.getElementById('btnSalvarModal');
        btn.innerText = "GRAVANDO...";

        fetch(`${API_URL}/PLACA/${placa}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ "COLETA": textoFinal })
        }).then(() => {
            fecharModal();
            atualizarTabelaAdmin();
            btn.innerText = "GRAVAR AGENDAMENTO";
        });
    }

    // 6. SUBMISSÃO DO MOTORISTA
    document.getElementById('formAgendamento').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnEnviar');
        btn.innerText = "REGISTRANDO...";

        const dados = {
            "PLACA": document.getElementById('placa').value,
            "PRODUTO": document.getElementById('produto').value,
            "TELEFONE": document.getElementById('telefone').value,
            "JORNADA": document.getElementById('check24h').checked ? "24 Horas" : document.getElementById('horaJornada').value,
            "ENTRADA": new Date().toLocaleString('pt-BR'),
            "COLETA": "", "SAIDA": ""
        };

        fetch(API_URL, { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify([dados]) 
        }).then(() => {
            alert("Entrada registrada com sucesso!");
            location.reload();
        });
    });

    // 7. AÇÕES FINAIS
    function entrarAdmin() {
        if (prompt("Senha de Acesso:") === "raizen2026") {
            document.getElementById('tela-motorista').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            atualizarTabelaAdmin();
        }
    }

    function finalizarDescarga(placa) {
        if(confirm("Deseja finalizar a descarga do veículo " + placa + "?")) {
            fetch(`${API_URL}/PLACA/${placa}`, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ "SAIDA": new Date().toLocaleString() })
            }).then(() => atualizarTabelaAdmin());
        }
    }

    function chamarNoZap(tel, placa, coleta) {
        const baia = prompt("Para qual BAIA o motorista deve se dirigir?");
        if(baia) {
            const msg = `*RAÍZEN - TERMINAL PAULÍNIA*%0A%0A*PLACA:* ${placa}%0A*AGENDAMENTO:* ${coleta || 'Pendente'}%0A*BAIA:* ${baia}%0A%0AFavor entrar para descarga imediatamente.`;
            window.open(`https://web.whatsapp.com/send?phone=55${tel.replace(/\D/g, "")}&text=${msg}`);
        }
    }
</script>
</body>
</html>
