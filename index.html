<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAÍZEN - GESTÃO OPERACIONAL V26.9</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- DESIGN SYSTEM INDUSTRIAL RAÍZEN --- */
        :root {
            --verde-raizen: #4d6d5d;
            --roxo-raizen: #84207d;
            --ouro-raizen: #ffc107;
            --fundo-base: #f1f5f9;
            --branco: #ffffff;
            --cor-erro: #e11d48;
            --cor-sucesso: #10b981;
            --sombra-premium: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
        body { background-color: var(--fundo-base); color: #1e293b; min-height: 100vh; padding-bottom: 80px; overflow-x: hidden; }

        /* --- CABEÇALHO --- */
        header { 
            background: linear-gradient(135deg, var(--verde-raizen) 0%, #1a241f 100%); 
            padding: 100px 20px; text-align: center; border-bottom: 30px solid var(--roxo-raizen);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }
        .logo-display { color: var(--branco); font-size: clamp(50px, 12vw, 110px); font-weight: 900; letter-spacing: 25px; text-transform: uppercase; text-shadow: 5px 5px 0px rgba(0,0,0,0.2); }

        /* --- CONTAINERS --- */
        .card-master { 
            width: 94%; max-width: 1150px; margin: -60px auto 60px; background: var(--branco); 
            padding: 70px; border-radius: 45px; box-shadow: var(--sombra-premium); 
            border-left: 35px solid var(--roxo-raizen);
        }

        #modulo-operador-full { 
            display: none; width: 98%; max-width: 1900px; margin: 40px auto;
            background: var(--branco); padding: 45px; border-radius: 35px;
            box-shadow: var(--sombra-premium); zoom: 0.75;
        }

        h2 { color: var(--roxo-raizen); text-align: center; font-weight: 900; text-transform: uppercase; margin-bottom: 50px; font-size: 38px; border-bottom: 12px solid #f8fafc; padding-bottom: 25px; }

        /* --- ENTRADA DE DADOS --- */
        .wrapper-input { margin-bottom: 40px; }
        label { display: flex; align-items: center; gap: 15px; margin-bottom: 18px; font-weight: 900; color: var(--verde-raizen); font-size: 16px; text-transform: uppercase; }
        input, select { width: 100%; padding: 28px; border: 5px solid #f1f5f9; border-radius: 25px; font-size: 24px; font-weight: 700; background: #f8fafc; transition: 0.3s; }
        input:focus { border-color: var(--roxo-raizen); background: white; outline: none; box-shadow: 0 0 0 15px rgba(132, 32, 125, 0.08); }

        .painel-jornada { background: #fffbeb; padding: 40px; border-radius: 40px; border: 4px dashed var(--ouro-raizen); margin: 45px 0; }

        /* --- FILTROS --- */
        .filtros-top { display: flex; gap: 20px; margin-bottom: 40px; justify-content: center; flex-wrap: wrap; }
        .chip-filtro { padding: 18px 40px; border-radius: 20px; border: none; background: #e2e8f0; font-weight: 900; cursor: pointer; color: #64748b; font-size: 14px; }
        .chip-filtro.active { background: var(--roxo-raizen); color: white; transform: scale(1.1); }

        /* --- TABELA E RESPONSIVIDADE --- */
        .moldura-tabela { overflow-x: auto; border-radius: 30px; border: 3px solid #f1f5f9; }
        table { width: 100%; border-collapse: collapse; min-width: 1750px; background: white; }
        th { background: #1e293b; color: white; padding: 25px; font-size: 13px; text-transform: uppercase; letter-spacing: 2px; }
        td { padding: 20px; border-bottom: 3px solid #f8fafc; text-align: center; font-weight: 700; font-size: 17px; }

        /* AJUSTE MOBILE: TRANSFORMA LINHAS EM CARTÕES */
        @media (max-width: 768px) {
            #modulo-operador-full { zoom: 1; padding: 15px; width: 95%; }
            table, thead, tbody, th, td, tr { display: block; width: 100% !important; min-width: 100% !important; }
            thead { display: none; }
            tr { margin-bottom: 30px; border: 4px solid var(--roxo-raizen); border-radius: 30px; padding: 15px; background: white; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
            td { text-align: left !important; padding: 12px 10px !important; border-bottom: 2px solid #f1f5f9; display: flex; flex-direction: column; gap: 5px; }
            td::before { content: attr(data-label); font-size: 11px; color: var(--roxo-raizen); font-weight: 900; text-transform: uppercase; opacity: 0.7; }
            .tag-p { width: 100%; text-align: center; }
            .btn-master { padding: 25px; font-size: 20px; border-radius: 20px; }
        }

        .tag-p { padding: 12px 20px; border-radius: 15px; font-size: 13px; font-weight: 900; color: white; display: inline-block; min-width: 160px; }
        .bg-gas { background: #ff8c00; } .bg-b100 { background: #5d4037; } .bg-ani { background: #0056b3; } .bg-hid { background: #00a8ff; } .bg-die { background: #334155; }

        .input-edit-table { padding: 12px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 14px; font-weight: 700; width: 100%; text-align: center; background: #f8fafc; }
        .btn-acao-tabela { padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: 900; font-size: 12px; text-transform: uppercase; width: 100%; margin-top: 5px; }

        .btn-master { width: 100%; padding: 35px; background: var(--roxo-raizen); color: white; border: none; border-radius: 30px; font-size: 26px; font-weight: 900; cursor: pointer; text-transform: uppercase; box-shadow: 0 15px 0 #5e1659; margin-bottom: 25px; display: flex; justify-content: center; align-items: center; gap: 20px; transition: 0.2s; }
        .btn-master:active { transform: translateY(10px); box-shadow: 0 5px 0 #5e1659; }

        #loader-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; }
        .raizen-spinner { width: 90px; height: 90px; border: 12px solid #f3f3f3; border-top: 12px solid var(--roxo-raizen); border-radius: 50%; animation: girar 1s linear infinite; }
        @keyframes girar { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader-overlay"><div class="raizen-spinner"></div><h2 style="border:none; margin-top:25px;">SINCRONIZANDO...</h2></div>

<header><div class="logo-display">RAÍZEN</div></header>

<div class="card-master" id="secao-entrada">
    <div id="form-principal-wrapper">
        <h2><i class="fa-solid fa-truck-ramp-box"></i> REGISTRO DE ENTRADA</h2>
        <form id="formMaster">
            <div class="wrapper-input">
                <label><i class="fa-solid fa-barcode"></i> PLACA DO VEÍCULO</label>
                <input type="text" id="placa" placeholder="AAA-0000" maxlength="8" required>
            </div>
            <div class="wrapper-input">
                <label><i class="fa-solid fa-gas-pump"></i> PRODUTO</label>
                <select id="produto" required>
                    <option value="">-- SELECIONE --</option>
                    <option value="GASOLINA COMUM / ADITIVADA">GASOLINA COMUM / ADITIVADA</option>
                    <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
                    <option value="ETANOL ANIDRO">ETANOL ANIDRO</option>
                    <option value="ETANOL HIDRATADO">ETANOL HIDRATADO</option>
                    <option value="DIESEL S10">DIESEL S10</option>
                </select>
            </div>
            <div class="wrapper-input">
                <label><i class="fa-brands fa-whatsapp"></i> WHATSAPP MOTORISTA</label>
                <input type="tel" id="whatsapp" placeholder="(19) 99999-9999" required>
            </div>
            <div class="painel-jornada">
                <div id="area-tempo">
                    <label><i class="fa-solid fa-clock"></i> LIMITE JORNADA</label>
                    <input type="time" id="limite">
                </div>
                <label style="margin-top:20px; display:flex; align-items:center; gap:20px; cursor:pointer; font-size: 20px; font-weight:900; color:var(--roxo-raizen);">
                    <input type="checkbox" id="jornada24" style="width:35px; height:35px;"> JORNADA 24 HORAS
                </label>
            </div>
            <button type="submit" class="btn-master">CONFIRMAR REGISTRO</button>
            <button type="button" onclick="abrirReabertura()" class="btn-master" style="background:#475569; box-shadow: 0 15px 0 #2d3748; font-size:18px;"><i class="fa-solid fa-clock-rotate-left"></i> REABRIR JORNADA EXISTENTE</button>
        </form>
    </div>

    <div id="form-reabertura-wrapper" style="display:none;">
        <h2 style="color:#475569">REABRIR JORNADA</h2>
        <div class="wrapper-input"><label>PLACA</label><input type="text" id="re_placa" placeholder="AAA-0000" maxlength="8"></div>
        <div class="wrapper-input"><label>NOVA HORA LIMITE</label><input type="time" id="re_hora"></div>
        <button onclick="processarReabertura()" class="btn-master" style="background:#475569">ATUALIZAR JORNADA</button>
        <button onclick="fecharReabertura()" style="width:100%; background:none; border:none; color:var(--roxo-raizen); font-weight:900; cursor:pointer; padding:20px;">CANCELAR</button>
    </div>

    <div style="text-align:center; margin-top:50px;">
        <button onclick="ativarOperador()" style="background:none; border:none; color:var(--roxo-raizen); font-weight:900; cursor:pointer; text-transform:uppercase; letter-spacing:2px;"><i class="fa-solid fa-lock"></i> ACESSO OPERACIONAL</button>
    </div>
</div>

<div id="modulo-operador-full">
    <h2>PAINEL DE CONTROLE DE PÁTIO</h2>
    <div class="filtros-top">
        <button class="chip-filtro active" onclick="filtrar('TODOS', this)">TODOS</button>
        <button class="chip-filtro" onclick="filtrar('GASOLINA', this)">GASOLINA</button>
        <button class="chip-filtro" onclick="filtrar('BIODIESEL', this)">BIODIESEL</button>
        <button class="chip-filtro" onclick="filtrar('ANIDRO', this)">ANIDRO</button>
        <button class="chip-filtro" onclick="filtrar('HIDRATADO', this)">HIDRATADO</button>
        <button class="chip-filtro" onclick="filtrar('DIESEL', this)">DIESEL S10</button>
    </div>

    <div class="moldura-tabela">
        <table>
            <thead>
                <tr>
                    <th>VEÍCULO</th>
                    <th>PRODUTO</th>
                    <th>STATUS JORNADA</th>
                    <th>HORA ENTRADA</th>
                    <th>AGENDAMENTO</th>
                    <th>TELEFONE (AJUSTAR)</th>
                    <th>WHATSAPP</th>
                    <th>AÇÕES</th>
                </tr>
            </thead>
            <tbody id="listaFila"></tbody>
        </table>
    </div>
    <div style="margin-top:40px; display:flex; gap:25px;">
        <button class="btn-master" style="background:#1e293b; box-shadow: 0 15px 0 #0f172a;" onclick="location.reload()">VOLTAR</button>
        <button class="btn-master" style="background:var(--verde-raizen); box-shadow: 0 15px 0 #2d3e35;" onclick="carregarDados()">ATUALIZAR DADOS</button>
    </div>
</div>

<script>
    const RAÍZEN_DB = {
        URL: 'https://rbbkjuiizmvatiawfzuv.supabase.co',
        HEADERS: { 
            "apikey": 'sb_publishable_WkrHi6cWtZsnsDXl0nh1hA_kz1UT_1X', 
            "Authorization": `Bearer sb_publishable_WkrHi6cWtZsnsDXl0nh1hA_kz1UT_1X`, 
            "Content-Type": "application/json",
            "Prefer": "return=minimal"
        }
    };

    let memoriaFila = [];
    let filtroAtivo = 'TODOS';

    function setLoader(v) { document.getElementById('loader-overlay').style.display = v ? 'flex' : 'none'; }
    function abrirReabertura() { document.getElementById('form-principal-wrapper').style.display = 'none'; document.getElementById('form-reabertura-wrapper').style.display = 'block'; }
    function fecharReabertura() { document.getElementById('form-reabertura-wrapper').style.display = 'none'; document.getElementById('form-principal-wrapper').style.display = 'block'; }

    const mascaraPlaca = (el) => {
        el.oninput = function() {
            let v = this.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
            if (v.length > 3 && !isNaN(v[3])) v = v.substring(0,3) + "-" + v.substring(3,7);
            this.value = v.substring(0,8);
        };
    };
    mascaraPlaca(document.getElementById('placa'));
    mascaraPlaca(document.getElementById('re_placa'));

    document.getElementById('whatsapp').oninput = function(e) {
        let v = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !v[2] ? v[1] : '(' + v[1] + ') ' + v[2] + (v[3] ? '-' + v[3] : '');
    };

    document.getElementById('jornada24').onchange = function() {
        document.getElementById('area-tempo').style.opacity = this.checked ? "0.3" : "1";
        document.getElementById('limite').disabled = this.checked;
    };

    async function carregarDados() {
        try {
            const res = await fetch(`${RAÍZEN_DB.URL}/rest/v1/registros?SAIDA=is.null&select=*`, { headers: RAÍZEN_DB.HEADERS });
            memoriaFila = await res.json();
            renderTabela();
        } catch(e) { console.error(e); }
    }

    function renderTabela() {
        const corpo = document.getElementById('listaFila');
        corpo.innerHTML = "";
        let lista = [...memoriaFila].sort((a,b) => {
            const agA = a.AGENDAMENTO ? new Date(a.AGENDAMENTO) : new Date(8640000000000000);
            const agB = b.AGENDAMENTO ? new Date(b.AGENDAMENTO) : new Date(8640000000000000);
            return agA - agB;
        });

        if (filtroAtivo !== 'TODOS') lista = lista.filter(i => i.PRODUTO.toUpperCase().includes(filtroAtivo));

        lista.forEach(item => {
            const id = item.ID;
            const corTag = item.PRODUTO.includes("GASOLINA") ? "bg-gas" : item.PRODUTO.includes("BIODIESEL") ? "bg-b100" : item.PRODUTO.includes("ANIDRO") ? "bg-ani" : item.PRODUTO.includes("HIDRATADO") ? "bg-hid" : "bg-die";

            corpo.innerHTML += `
                <tr>
                    <td data-label="VEÍCULO" style="color:var(--roxo-raizen); font-weight:900; font-size:22px;">${item.PLACA}</td>
                    <td data-label="PRODUTO"><span class="tag-p ${corTag}">${item.PRODUTO}</span></td>
                    <td data-label="STATUS JORNADA">${verificarJornada(item.JORNADA)}</td>
                    <td data-label="HORA ENTRADA" style="font-size:12px; color:#64748b;">${item.ENTRADA}</td>
                    <td data-label="AGENDAMENTO" style="background:#fff7ed;">
                        <input type="datetime-local" id="ag-${id}" value="${item.AGENDAMENTO ? item.AGENDAMENTO.slice(0,16) : ''}" class="input-edit-table">
                        <button onclick="salvarCampo('${id}', 'AGENDAMENTO')" class="btn-acao-tabela" style="background:var(--verde-raizen); color:white;">SALVAR DATA</button>
                    </td>
                    <td data-label="TELEFONE" style="background:#f0fdf4;">
                        <input type="text" id="tel-${id}" value="${item.TELEFONE}" class="input-edit-table">
                        <button onclick="salvarCampo('${id}', 'TELEFONE')" class="btn-acao-tabela" style="background:#166534; color:white;">CORRIGIR TEL</button>
                    </td>
                    <td data-label="WHATSAPP">
                        <button onclick="chamarWhatsApp('${item.TELEFONE}')" style="background:#25d366; color:white; border:none; padding:15px; border-radius:15px; cursor:pointer; font-weight:900; width:100%; display:flex; align-items:center; justify-content:center; gap:8px;">
                            <i class="fa-brands fa-whatsapp"></i> CONVOCAR
                        </button>
                    </td>
                    <td data-label="AÇÕES">
                        <button onclick="finalizar('${id}')" style="background:#3b82f6; color:white; border:none; padding:15px; border-radius:15px; cursor:pointer; font-weight:900; width:100%;">SAÍDA</button>
                    </td>
                </tr>`;
        });
    }

    function verificarJornada(h) {
        if(h === "24 HORAS") return "<b style='color:green'>● 24H LIBERADA</b>";
        if(!h) return "---";
        const limite = new Date(); const [hr, min] = h.split(':');
        limite.setHours(parseInt(hr), parseInt(min), 0);
        return new Date() > limite ? `<b style="color:var(--cor-erro)">● EXPIRADA (${h})</b>` : `<b style="color:var(--cor-sucesso)">● EM DIA (${h})</b>`;
    }

    async function salvarCampo(id, campo) {
        let val = document.getElementById(campo === 'AGENDAMENTO' ? `ag-${id}` : `tel-${id}`).value;
        if(campo === 'AGENDAMENTO') val = val ? val.replace("T", " ") : null;
        setLoader(true);
        try {
            await fetch(`${RAÍZEN_DB.URL}/rest/v1/registros?ID=eq.${id}`, {
                method: 'PATCH', headers: RAÍZEN_DB.HEADERS, body: JSON.stringify({ [campo]: val })
            });
            alert("ATUALIZADO COM SUCESSO!"); carregarDados();
        } finally { setLoader(false); }
    }

    function chamarWhatsApp(tel) {
        const baia = prompt("Motorista vamos descarregar?\nInforme a BAIA ou ÁREA:");
        if(!baia) return;
        const msg = encodeURIComponent(`Olá\nMotorista vamos descarregar?\nBaia ${baia}\nObrigado!`);
        window.open(`https://wa.me/55${tel.replace(/\D/g, "")}?text=${msg}`, '_blank');
    }

    async function finalizar(id) {
        if(!confirm("CONFIRMA SAÍDA?")) return;
        setLoader(true);
        try {
            await fetch(`${RAÍZEN_DB.URL}/rest/v1/registros?ID=eq.${id}`, {
                method: 'PATCH', headers: RAÍZEN_DB.HEADERS, body: JSON.stringify({ "SAIDA": new Date().toLocaleString('pt-BR') })
            });
            carregarDados();
        } finally { setLoader(false); }
    }

    async function processarReabertura() {
        const p = document.getElementById('re_placa').value.toUpperCase();
        const h = document.getElementById('re_hora').value;
        setLoader(true);
        try {
            const res = await fetch(`${RAÍZEN_DB.URL}/rest/v1/registros?PLACA=eq.${p}&SAIDA=is.null`, { headers: RAÍZEN_DB.HEADERS });
            const data = await res.json();
            if(data.length > 0) {
                await fetch(`${RAÍZEN_DB.URL}/rest/v1/registros?ID=eq.${data[0].ID}`, {
                    method: 'PATCH', headers: RAÍZEN_DB.HEADERS, body: JSON.stringify({"JORNADA": h})
                });
                alert("JORNADA REABERTA!"); location.reload();
            } else alert("PLACA NÃO ENCONTRADA NO PÁTIO!");
        } finally { setLoader(false); }
    }

    function filtrar(tipo, btn) {
        filtroAtivo = tipo;
        document.querySelectorAll('.chip-filtro').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderTabela();
    }

    function ativarOperador() {
        if(prompt("SENHA:") === "raizen2026") {
            document.getElementById('secao-entrada').style.display = 'none';
            document.getElementById('modulo-operador-full').style.display = 'block';
            carregarDados();
            setInterval(carregarDados, 30000);
        }
    }

    document.getElementById('formMaster').onsubmit = async e => {
        e.preventDefault();
        setLoader(true);
        const d = {
            "PLACA": document.getElementById('placa').value.toUpperCase(),
            "PRODUTO": document.getElementById('produto').value,
            "TELEFONE": document.getElementById('whatsapp').value,
            "JORNADA": document.getElementById('jornada24').checked ? "24 HORAS" : document.getElementById('limite').value,
            "ENTRADA": new Date().toLocaleString('pt-BR')
        };
        try {
            await fetch(`${RAÍZEN_DB.URL}/rest/v1/registros`, { method: 'POST', headers: RAÍZEN_DB.HEADERS, body: JSON.stringify(d) });
            alert("REGISTRADO!"); location.reload();
        } finally { setLoader(false); }
    };
</script>
</body>
</html>
