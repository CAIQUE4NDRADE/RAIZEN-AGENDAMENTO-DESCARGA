<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAÍZEN - CONTROLE DE DESCARGAS V13.0</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* DEFINIÇÕES DE CORES E IDENTIDADE VISUAL RAÍZEN */
        :root {
            --verde-raizen: #4d6d5d;
            --roxo-raizen: #84207d;
            --ouro-raizen: #ffc107;
            --fundo: #f4f7f6;
            --branco: #ffffff;
            --danger: #d32f2f;
            --info: #3498db;
            --sucesso: #2ecc71;
            --shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        /* RESET E FONTES */
        * { box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--fundo); 
            margin: 0; 
            padding-bottom: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* HEADER INDUSTRIAL - RAÍZEN */
        header { 
            background: linear-gradient(135deg, var(--verde-raizen) 0%, #2d3e35 100%); 
            width: 100%; 
            padding: 50px 0; 
            text-align: center; 
            border-bottom: 15px solid var(--roxo-raizen); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .logo-industrial {
            color: var(--branco);
            font-size: 60px;
            font-weight: 900;
            letter-spacing: 8px;
            margin: 0;
            text-transform: uppercase;
            text-shadow: 3px 3px 0px rgba(0,0,0,0.2);
        }

        header h1 { 
            color: var(--branco); 
            margin: 10px 0 0 0; 
            font-size: 18px; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            font-weight: 300; 
        }

        /* ESTRUTURA DOS CARDS */
        .container-sistema { 
            width: 95%; 
            max-width: 900px; 
            margin: 40px auto; 
            background: var(--branco); 
            padding: 50px; 
            border-radius: 45px; 
            box-shadow: var(--shadow); 
            border-left: 20px solid var(--roxo-raizen);
            position: relative;
        }

        /* PAINEL ADMINISTRATIVO (OCULTO POR PADRÃO) */
        #painel-operador-master { 
            display: none; 
            width: 99%; 
            max-width: 1850px; 
            background: var(--branco);
            margin: 30px auto;
            border-radius: 30px;
            padding: 40px;
            box-shadow: var(--shadow);
        }

        h2 { 
            color: var(--roxo-raizen); 
            text-align: center; 
            font-weight: 900; 
            text-transform: uppercase; 
            margin-bottom: 40px; 
            font-size: 28px;
            border-bottom: 5px solid #f8f9fa;
            padding-bottom: 20px;
        }

        /* BARRA DE PESQUISA AVANÇADA */
        .search-box {
            margin-bottom: 35px;
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-box input {
            width: 100%;
            padding: 25px 25px 25px 70px;
            border: 4px solid var(--roxo-raizen);
            border-radius: 25px;
            font-size: 20px;
            font-weight: 700;
            background: #fff;
            color: #333;
            transition: all 0.3s;
        }

        .search-box input:focus {
            box-shadow: 0 0 20px rgba(132, 32, 125, 0.2);
            outline: none;
        }

        .search-box i {
            position: absolute;
            left: 25px;
            color: var(--roxo-raizen);
            font-size: 25px;
        }

        /* FORMULÁRIO TÉCNICO */
        .form-group { margin-bottom: 30px; }
        
        label { 
            display: block; 
            margin-bottom: 12px; 
            font-weight: 800; 
            color: var(--verde-raizen); 
            font-size: 14px; 
            text-transform: uppercase;
        }

        input[type="text"], 
        input[type="tel"], 
        input[type="time"], 
        select { 
            width: 100%; 
            padding: 22px; 
            border: 3px solid #e2e8f0; 
            border-radius: 22px; 
            font-size: 19px; 
            font-weight: 700;
            background: #f8fafc;
            color: #2d3748;
        }

        input:focus { border-color: var(--roxo-raizen); outline: none; background: #fff; }

        /* BOX DE JORNADA ESPECIAL */
        .jornada-alerta {
            background: #fff9c4;
            padding: 30px;
            border-radius: 25px;
            border: 3px solid var(--ouro-raizen);
            margin-top: 10px;
        }

        .check-container {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            margin-top: 20px;
            background: white;
            padding: 15px;
            border-radius: 15px;
        }

        .check-container input { width: 30px; height: 30px; cursor: pointer; }

        .btn-descarga { 
            width: 100%; 
            padding: 30px; 
            background: var(--roxo-raizen); 
            color: white; 
            border: none; 
            border-radius: 25px; 
            font-size: 24px; 
            font-weight: 900; 
            cursor: pointer; 
            text-transform: uppercase;
            box-shadow: 0 15px 30px rgba(132, 32, 125, 0.4);
            transition: transform 0.2s;
        }

        .btn-descarga:active { transform: scale(0.98); }

        /* TABELA OPERACIONAL */
        .wrapper-tabela { 
            overflow-x: auto; 
            border-radius: 30px; 
            border: 2px solid #ddd; 
            background: #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        table { width: 100%; border-collapse: collapse; min-width: 1650px; }
        
        th { 
            background: #1e293b; 
            color: white; 
            padding: 25px; 
            font-size: 13px; 
            text-transform: uppercase; 
            letter-spacing: 2px;
        }

        td { 
            padding: 20px; 
            border-bottom: 1px solid #edf2f7; 
            text-align: center; 
            font-weight: 700; 
            font-size: 17px;
        }

        /* ESTILOS DE PRODUTOS */
        .badge-produto {
            padding: 12px 20px;
            border-radius: 15px;
            color: white;
            font-size: 11px;
            font-weight: 900;
            display: inline-block;
            min-width: 150px;
            text-transform: uppercase;
        }
        .bg-gasolina { background: #f39c12; color: #000; }
        .bg-b100 { background: #1a202c; }
        .bg-anidro { background: #27ae60; }
        .bg-hidratado { background: #2ecc71; }
        .bg-s10 { background: #718096; }

        /* BOTÕES DE COMANDO */
        .btn-comando {
            border: none;
            border-radius: 15px;
            padding: 16px;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            color: white;
            text-transform: uppercase;
            font-size: 11px;
            margin-bottom: 8px;
            display: block;
        }
        .btn-whatsapp { background: #25D366; box-shadow: 0 5px 10px rgba(37, 211, 102, 0.2); }
        .btn-saida { background: var(--info); box-shadow: 0 5px 10px rgba(52, 152, 219, 0.2); }

        /* LINK DE ACESSO AO PAINEL */
        .footer-link {
            margin-top: 50px;
            text-align: center;
            border-top: 2px dashed #ccc;
            padding-top: 30px;
        }

        .footer-link button {
            background: #fff;
            border: 3px solid var(--roxo-raizen);
            color: var(--roxo-raizen);
            padding: 20px 50px;
            border-radius: 60px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
        }

        .footer-link button:hover { background: var(--roxo-raizen); color: white; }

        /* ANIMAÇÃO DE CARREGAMENTO */
        .loader {
            border: 5px solid rgba(255,255,255,0.3);
            border-top: 5px solid #fff;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

<header>
    <p class="logo-industrial">RAÍZEN</p>
    <h1>TERMINAL PAULÍNIA | CONTROLE DE DESCARGAS</h1>
</header>

<div class="container-sistema" id="view-motorista">
    <h2>REGISTRO DE DESCARGA</h2>
    <form id="mainForm">
        <div class="form-group">
            <label><i class="fa-solid fa-truck-front"></i> Placa do Veículo (Caminhão/Bitrem)</label>
            <input type="text" id="input_placa" placeholder="BRA-2E19" maxlength="8" required>
        </div>

        <div class="form-group">
            <label><i class="fa-solid fa-droplet"></i> Produto Carregado</label>
            <select id="input_produto" required>
                <option value="">-- SELECIONE O PRODUTO --</option>
                <option value="GASOLINA">GASOLINA COMUM/ADITIVADA</option>
                <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
                <option value="ETANOL ANIDRO">ETANOL ANIDRO</option>
                <option value="ETANOL HIDRATADO">ETANOL HIDRATADO</option>
                <option value="DIESEL S10">DIESEL S10</option>
            </select>
        </div>

        <div class="form-group">
            <label><i class="fa-brands fa-whatsapp"></i> WhatsApp do Condutor (Contato)</label>
            <input type="tel" id="input_zap" placeholder="(19) 99999-9999" maxlength="15" required>
        </div>

        <div class="jornada-alerta">
            <label><i class="fa-solid fa-clock"></i> Horário de Término da Jornada</label>
            <input type="time" id="input_hora">
            
            <label class="check-container">
                <input type="checkbox" id="input_24h">
                <span style="font-weight:900; color:var(--danger); font-size:16px;">DECLARO JORNADA 24 HORAS</span>
            </label>
        </div>

        <div style="margin-top:40px;">
            <button type="submit" class="btn-descarga" id="btn_salvar">REGISTRAR ENTRADA NO PÁTIO</button>
        </div>
    </form>
    
    <div class="footer-link">
        <button onclick="liberarAcessoOperador()">PAINEL DE GESTÃO OPERACIONAL / OPERADOR</button>
    </div>
</div>

<div id="painel-operador-master">
    <h2>CONTROLE DE FILA - ÁREA 02</h2>
    
    <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="filtroGlobal" placeholder="BUSCAR POR PLACA, PRODUTO OU JORNADA (Ex: 24 Horas)..." onkeyup="filtrarFila()">
    </div>

    <div class="wrapper-tabela">
        <table id="tabelaDescarga">
            <thead>
                <tr>
                    <th>PLACA</th>
                    <th>PRODUTO</th>
                    <th>CONTATO</th>
                    <th>JORNADA</th>
                    <th>ENTRADA</th>
                    <th style="background:#fff9c4; color:black;">AGENDAMENTO NO COLETA</th>
                    <th>AÇÕES DO OPERADOR</th>
                </tr>
            </thead>
            <tbody id="corpoFila">
                </tbody>
        </table>
    </div>

    <div style="margin-top:50px; display:grid; grid-template-columns: 1fr 1fr; gap:30px;">
        <button class="btn-descarga" style="background:#555;" onclick="location.reload()">VOLTAR AO INÍCIO</button>
        <button class="btn-descarga" style="background:var(--verde-raizen);" onclick="sincronizarDados()">ATUALIZAR FILA</button>
    </div>
</div>

<script>
    /* ===========================================================
       LÓGICA DO SISTEMA - RAÍZEN TERMINAL PAULÍNIA
       ===========================================================
    */
    const DB_ENDPOINT = 'https://sheetdb.io/api/v1/p9z83v5m0dxq5';
    const KEY_OP = 'raizen2026';

    /* MÁSCARAS DE ENTRADA (MANTIDAS E REFORÇADAS) */
    document.getElementById('input_placa').oninput = function(e) {
        let val = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
        if (val.length > 3 && !isNaN(val[3])) {
            val = val.substring(0,3) + "-" + val.substring(3,7);
        }
        e.target.value = val.substring(0,8);
    };

    document.getElementById('input_zap').oninput = function(e) {
        let r = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !r[2] ? r[1] : '(' + r[1] + ') ' + r[2] + (r[3] ? '-' + r[3] : '');
    };

    /* LÓGICA DE FILTRO AVANÇADO (PLACA, PRODUTO E JORNADA) */
    function filtrarFila() {
        const termo = document.getElementById("filtroGlobal").value.toUpperCase();
        const tabela = document.getElementById("tabelaDescarga");
        const linhas = tabela.getElementsByTagName("tr");

        for (let i = 1; i < linhas.length; i++) {
            const txtPlaca = linhas[i].getElementsByTagName("td")[0].textContent.toUpperCase();
            const txtProd = linhas[i].getElementsByTagName("td")[1].textContent.toUpperCase();
            const txtJornada = linhas[i].getElementsByTagName("td")[3].textContent.toUpperCase();
            
            if (txtPlaca.includes(termo) || txtProd.includes(termo) || txtJornada.includes(termo)) {
                linhas[i].style.display = "";
            } else {
                linhas[i].style.display = "none";
            }
        }
    }

    /* MENSAGEM WHATSAPP COM TRAVA DE SEGURANÇA */
    function convocarMotorista(tel, placa) {
        const numLimpo = tel.replace(/\D/g, "");
        
        // TRAVA: Só envia se o número for válido (11 dígitos)
        if(numLimpo.length < 11) {
            alert("ERRO: O número do veículo " + placa + " está incorreto ou incompleto.");
            return;
        }

        const baiaDestino = prompt("INFORME A BAIA DE DESCARGA (ÁREA 2):");
        if(!baiaDestino) return;

        const msgOriginal = `Olá%0AMotorista vamos descarregar?%0ABaia *${baiaDestino}* - Área 02%0AObrigado!%0A%0A_Obs: aguarde a instrução do operador para entrar na baia!_`;
        
        // Link API WhatsApp robusto
        const urlFinal = `https://api.whatsapp.com/send?phone=55${numLimpo}&text=${msgOriginal}`;
        window.open(urlFinal, '_blank');
    }

    /* SUBMISSÃO DOS DADOS PARA A PLANILHA */
    document.getElementById('mainForm').onsubmit = async function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('btn_salvar');
        const zapValidacao = document.getElementById('input_zap').value.replace(/\D/g, "");

        if(zapValidacao.length < 11) {
            alert("NÚMERO DE WHATSAPP INVÁLIDO! Use o formato (DDD) 9XXXX-XXXX.");
            return;
        }

        btn.innerHTML = '<span class="loader"></span> PROCESSANDO...';
        btn.disabled = true;

        const novoRegistro = {
            "PLACA": document.getElementById('input_placa').value,
            "PRODUTO": document.getElementById('input_produto').value,
            "TELEFONE": document.getElementById('input_zap').value,
            "JORNADA": document.getElementById('input_24h').checked ? "24 HORAS" : document.getElementById('input_hora').value,
            "ENTRADA": new Date().toLocaleString('pt-BR'),
            "SAIDA": "",
            "AGENDAMENTO NO COLETA": ""
        };

        try {
            const resposta = await fetch(DB_ENDPOINT, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify([novoRegistro])
            });
            
            if(resposta.ok) {
                alert("MOTORISTA REGISTRADO COM SUCESSO!");
                location.reload();
            }
        } catch (err) {
            alert("ERRO DE CONEXÃO. VERIFIQUE A INTERNET.");
            btn.disabled = false;
            btn.innerText = "REGISTRAR ENTRADA NO PÁTIO";
        }
    };

    /* FUNÇÕES DO PAINEL DO OPERADOR */
    async function sincronizarDados() {
        const corpo = document.getElementById('corpoFila');
        corpo.innerHTML = "<tr><td colspan='7'><span class='loader' style='border-top-color:#84207d; width:20px; height:20px;'></span> Sincronizando fila em tempo real...</td></tr>";

        try {
            const req = await fetch(DB_ENDPOINT + "?t=" + Date.now());
            const lista = await req.json();
            corpo.innerHTML = "";

            lista.filter(row => row.PLACA && !row.SAIDA).forEach(item => {
                let badgeClass = "bg-s10";
                if(item.PRODUTO === "GASOLINA") badgeClass = "bg-gasolina";
                if(item.PRODUTO === "BIODIESEL (B100)") badgeClass = "bg-b100";
                if(item.PRODUTO === "ETANOL ANIDRO") badgeClass = "bg-anidro";
                if(item.PRODUTO === "ETANOL HIDRATADO") badgeClass = "bg-hidratado";

                const linhaTr = document.createElement('tr');
                linhaTr.innerHTML = `
                    <td style="color:var(--roxo-raizen); font-size:22px;">${item.PLACA}</td>
                    <td><span class="badge-produto ${badgeClass}">${item.PRODUTO}</span></td>
                    <td>${item.TELEFONE}</td>
                    <td style="color:${item.JORNADA === '24 HORAS' ? 'red' : 'black'}; font-weight:900;">${item.JORNADA}</td>
                    <td style="font-size:12px;">${item.ENTRADA.split(',')[1] || item.ENTRADA}</td>
                    <td style="background:#fffde7; border:2px solid #fbc02d;">
                        <input type="datetime-local" id="ag-${item.PLACA}" value="${item['AGENDAMENTO NO COLETA'] || ''}" style="font-size:11px; padding:8px; border-radius:10px;">
                        <button onclick="updateColeta('${item.PLACA}')" style="width:100%; margin-top:8px; background:var(--verde-raizen); color:white; border:none; padding:10px; border-radius:12px; cursor:pointer; font-weight:bold;">SALVAR</button>
                    </td>
                    <td>
                        <button class="btn-comando btn-whatsapp" onclick="convocarMotorista('${item.TELEFONE}', '${item.PLACA}')"><i class="fa-brands fa-whatsapp"></i> CHAMAR</button>
                        <button class="btn-comando btn-saida" onclick="marcarSaida('${item.PLACA}')"><i class="fa-solid fa-right-from-bracket"></i> FINALIZAR</button>
                    </td>
                `;
                corpo.appendChild(linhaTr);
            });
        } catch (e) {
            corpo.innerHTML = "<tr><td colspan='7'>FALHA AO BUSCAR DADOS NA PLANILHA.</td></tr>";
        }
    }

    async function updateColeta(placa) {
        const valorData = document.getElementById(`ag-${placa}`).value;
        await fetch(`${DB_ENDPOINT}/PLACA/${placa}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({"AGENDAMENTO NO COLETA": valorData})
        });
        alert("AGENDAMENTO ATUALIZADO NO SISTEMA.");
        sincronizarDados();
    }

    async function marcarSaida(placa) {
        if(confirm("CONFIRMAR SAÍDA DO VEÍCULO " + placa + "?")) {
            await fetch(`${DB_ENDPOINT}/PLACA/${placa}`, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({"SAIDA": new Date().toLocaleString('pt-BR')})
            });
            sincronizarDados();
        }
    }

    function liberarAcessoOperador() {
        const pass = prompt("SENHA DE ACESSO AO PAINEL:");
        if(pass === KEY_OP) {
            document.getElementById('view-motorista').style.display = 'none';
            document.getElementById('painel-operador-master').style.display = 'block';
            sincronizarDados();
        } else {
            alert("ACESSO NEGADO.");
        }
    }

    console.log("Controle de Descargas Raízen V13.0 - Operação Paulínia Iniciada.");
</script>
</body>
</html>
