<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raízen - DESCARGA ÁREA 2</title>
    <style>
        :root {
            --cor-principal: #4d6d5d; 
            --amarelo-raizen: #ffcd00;
            --fundo: #f0f2f5;
            --branco: #ffffff;
            --danger: #dc3545;
            --warning: #ffc107;
            --success: #28a745;
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--fundo); margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        header { 
            background-color: var(--cor-principal); 
            width: 100%; 
            padding: 20px 0; 
            text-align: center; 
            border-bottom: 6px solid var(--amarelo-raizen); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }
        header h1 { color: var(--branco); margin: 0; font-size: 22px; text-transform: uppercase; }
        
        .container { 
            width: 92%; 
            max-width: 500px; 
            margin: 20px auto; 
            background: var(--branco); 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        }

        #admin-panel { display: none; max-width: 98%; width: 1300px; }

        h2 { color: var(--cor-principal); text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        
        label { display: block; margin-top: 15px; font-weight: bold; color: #333; }

        input, select { 
            width: 100%; 
            padding: 15px; 
            margin-top: 5px; 
            border: 2px solid #ddd; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 18px;
        }

        .jornada-container {
            background: #f1f3f1;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #ddd;
            margin-top: 15px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 10px;
            cursor: pointer;
            padding: 10px;
            background: #fff;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        .checkbox-group input[type="checkbox"] {
            width: 25px;
            height: 25px;
            cursor: pointer;
        }

        .btn-enviar { 
            width: 100%; 
            padding: 20px; 
            background-color: var(--cor-principal); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 20px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 25px; 
        }

        /* TABELA ADMIN */
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: var(--cor-principal); color: white; padding: 12px; text-align: left; font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }
        
        .status-badge { padding: 5px 10px; border-radius: 4px; font-weight: bold; font-size: 11px; color: white; display: inline-block; }
        .bg-ok { background: var(--success); }
        .bg-alerta { background: var(--warning); color: #333; }
        .bg-vencido { background: var(--danger); animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .btn-zap { background:#25D366; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer; font-weight:bold; width: 100%; margin-bottom: 5px; display: block; text-align: center; text-decoration: none; font-size: 11px; }
        .btn-concluir { background:#007bff; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer; font-weight:bold; width: 100%; font-size: 11px; }
        
        #modalColeta { display:none; position:fixed; z-index:999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5); }
        .modal-content { background:white; margin:15% auto; padding:25px; border-radius:15px; width:300px; text-align: center; }
    </style>
</head>
<body>

<header><h1>RAÍZEN - TERMINAL PAULÍNIA</h1></header>

<div class="container" id="tela-motorista">
    <h2>DESCARGA ÁREA 2</h2>
    <form id="formAgendamento">
        <label>Placa do Veículo</label>
        <input type="text" id="placa" placeholder="ABC-1234" maxlength="8" required>
        
        <label>Produto</label>
        <select id="produto" required>
            <option value="">Selecione o produto...</option>
            <option value="GASOLINA">GASOLINA</option>
            <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
            <option value="S10">S10</option>
            <option value="ANIDRO">ANIDRO</option>
            <option value="HIDRATADO">HIDRATADO</option>
        </select>

        <label>WhatsApp</label>
        <input type="tel" id="telefone" placeholder="(19) 99999-9999" maxlength="15" required>

        <div class="jornada-container">
            <div id="divHorario">
                <label style="margin-top: 0;">Fim da Jornada (Horário):</label>
                <input type="time" id="horaJornada" required>
            </div>
            
            <label class="checkbox-group">
                <input type="checkbox" id="check24h" onchange="toggleJornada()">
                <span style="font-weight: bold; font-size: 16px;">Jornada 24 Horas (Sem Fim)</span>
            </label>
        </div>

        <button type="submit" class="btn-enviar" id="btnEnviar">REGISTRAR ENTRADA</button>
    </form>
    
    <div style="text-align: center; margin-top: 30px;">
        <button onclick="abrirAdmin()" style="background:none; border:none; color:#ccc; text-decoration:underline; cursor:pointer;">Admin</button>
    </div>
</div>

<div class="container" id="admin-panel">
    <h2>PAINEL ADMINISTRATIVO</h2>
    <div style="overflow-x: auto;">
        <table id="tabelaDados">
            <thead>
                <tr>
                    <th>Placa</th>
                    <th>WhatsApp</th>
                    <th>Produto</th>
                    <th>Status Jornada</th>
                    <th style="background:#2d4a3e; color:white;">Agendado</th>
                    <th>Pátio</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <button class="btn-enviar" style="background:#666;" onclick="window.location.reload()">SAIR</button>
</div>

<div id="modalColeta">
    <div class="modal-content">
        <h3>Definir Coleta</h3>
        <input type="hidden" id="placaAlvo">
        <input type="date" id="inputData"><br><br>
        <input type="time" id="inputHora"><br><br>
        <button class="btn-enviar" id="btnSalvarAgenda" onclick="salvarColeta()">SALVAR</button>
        <button onclick="fecharModal()" style="margin-top:10px; border:none; background:none; color:red; cursor:pointer;">Cancelar</button>
    </div>
</div>

<script>
    const API_URL = 'https://sheetdb.io/api/v1/p9z83v5m0dxq5';

    // LÓGICA DA JORNADA INVERTIDA (O QUE VOCÊ PEDIU)
    function toggleJornada() {
        const is24h = document.getElementById('check24h').checked;
        const divHorario = document.getElementById('divHorario');
        const inputHora = document.getElementById('horaJornada');

        if (is24h) {
            divHorario.style.display = 'none';
            inputHora.required = false;
            inputHora.value = "";
        } else {
            divHorario.style.display = 'block';
            inputHora.required = true;
        }
    }

    // MÁSCARA TELEFONE
    document.getElementById('telefone').addEventListener('input', function(e) {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
    });

    // MÁSCARA PLACA E BLOQUEIO DE NÚMEROS REPETIDOS
    document.getElementById('placa').addEventListener('input', function(e) {
        let v = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
        if (v.length <= 3) e.target.value = v.replace(/[0-9]/g, "");
        else {
            if (!isNaN(v[3])) { if (v.length > 3) v = v.substring(0,3) + "-" + v.substring(3,7); }
            e.target.value = v.substring(0,8);
        }
    });

    function carregarAtivos() {
        fetch(API_URL + "?t=" + new Date().getTime())
        .then(res => res.json())
        .then(data => {
            const tbody = document.querySelector('#tabelaDados tbody');
            tbody.innerHTML = "";
            data.filter(i => i.PLACA && !i.SAIDA).forEach(i => {
                const agenda = (i.COLETA && i.COLETA !== "undefined") ? i.COLETA : "Pendente";
                tbody.innerHTML += `
                    <tr>
                        <td style="font-weight:bold">${i.PLACA}</td>
                        <td>${i.TELEFONE}</td>
                        <td>${i.PRODUTO || "—"}</td>
                        <td>${getStatusJornada(i.JORNADA)}</td>
                        <td style="font-weight:bold; color:green">${agenda}</td>
                        <td>${calcularEspera(i.ENTRADA)}</td>
                        <td>
                            <button class="btn-zap" onclick="enviarZap('${i.TELEFONE}', '${i.PLACA}', '${agenda}')">CHAMAR</button>
                            <button class="btn-concluir" onclick="concluir('${i.PLACA}')">CONCLUIR</button>
                            <button onclick="abrirModal('${i.PLACA}')" style="font-size:10px; color:blue; background:none; border:none; cursor:pointer;">[Agendar]</button>
                        </td>
                    </tr>`;
            });
        });
    }

    function getStatusJornada(horaFim) {
        if (!horaFim || horaFim === "24 Horas") return '<span class="status-badge bg-ok">LIVRE (24h)</span>';
        const agora = new Date();
        const [h, m] = horaFim.split(':');
        const limite = new Date(); limite.setHours(h, m, 0);
        const diff = (limite - agora) / 60000;
        if (diff < 0) return `<span class="status-badge bg-vencido">VENCIDA (${horaFim})</span>`;
        if (diff <= 60) return `<span class="status-badge bg-alerta">ALERTA (${horaFim})</span>`;
        return `<span class="status-badge bg-ok">EM DIA (${horaFim})</span>`;
    }

    function calcularEspera(entrada) {
        if(!entrada) return "—";
        const partes = entrada.split(', ');
        const d = partes[0].split('/'); const h = partes[1].split(':');
        const inicio = new Date(d[2], d[1]-1, d[0], h[0], h[1]);
        const diff = Math.floor((new Date() - inicio) / 60000);
        return diff > 60 ? Math.floor(diff/60)+"h "+(diff%60)+"m" : diff+" min";
    }

    document.getElementById('formAgendamento').addEventListener('submit', function(e) {
        e.preventDefault();
        const p = document.getElementById('placa').value;
        if(/(.)\1{6,}/.test(p.replace("-",""))) return alert("Placa Inválida (Números repetidos)!");

        const jornada = document.getElementById('check24h').checked ? "24 Horas" : document.getElementById('horaJornada').value;

        const btn = document.getElementById('btnEnviar');
        btn.innerText = "GRAVANDO...";
        
        const dados = {
            "PLACA": p,
            "PRODUTO": document.getElementById('produto').value,
            "TELEFONE": document.getElementById('telefone').value,
            "JORNADA": jornada,
            "ENTRADA": new Date().toLocaleString('pt-BR'),
            "COLETA": "", "SAIDA": ""
        };

        fetch(API_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify([dados]) })
        .then(() => { alert("Registrado com sucesso!"); location.reload(); });
    });

    function abrirAdmin() { if (prompt("Senha:") === "raizen2026") { document.getElementById('tela-motorista').style.display='none'; document.getElementById('admin-panel').style.display='block'; carregarAtivos(); } }
    function abrirModal(placa) { document.getElementById('placaAlvo').value = placa; document.getElementById('modalColeta').style.display='block'; }
    function fecharModal() { document.getElementById('modalColeta').style.display='none'; }
    function salvarColeta() {
        const placa = document.getElementById('placaAlvo').value;
        const d = document.getElementById('inputData').value.split('-').reverse().join('/');
        const h = document.getElementById('inputHora').value;
        fetch(`${API_URL}/PLACA/${placa}`, { method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ "COLETA": d + " " + h }) })
        .then(() => { fecharModal(); carregarAtivos(); });
    }
    function concluir(placa) { if(confirm("Confirmar saída?")) fetch(`${API_URL}/PLACA/${placa}`, { method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ "SAIDA": new Date().toLocaleString() }) }).then(() => carregarAtivos()); }
    function enviarZap(tel, placa, agenda) { const baia = prompt("Qual a Baia?"); if(baia) window.open(`https://web.whatsapp.com/send?phone=55${tel.replace(/\D/g, "")}&text=VEÍCULO: ${placa} - AGENDADO: ${agenda} - DIRIGIR-SE À BAIA: ${baia}`); }
</script>
</body>
</html>
