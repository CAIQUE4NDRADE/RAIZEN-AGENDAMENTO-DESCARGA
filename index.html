<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAÍZEN - GESTÃO OPERACIONAL V20.0</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --verde-raizen: #4d6d5d; --roxo-raizen: #84207d; --ouro-raizen: #ffc107;
            --fundo-base: #f1f5f9; --branco: #ffffff; --cor-alerta: #e11d48;
            --cor-sucesso: #10b981; --cor-texto: #1e293b; --verde-botao-reabrir: #3d5446; 
        }

        * { box-sizing: border-box; font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--fundo-base); color: var(--cor-texto); padding-bottom: 50px; }

        header { 
            background: linear-gradient(135deg, var(--verde-raizen) 0%, #1a241f 100%); 
            padding: 50px 20px; text-align: center; border-bottom: 20px solid var(--roxo-raizen);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .logo-raizen-master { color: var(--branco); font-size: 60px; font-weight: 900; letter-spacing: 10px; text-transform: uppercase; }

        .card-industrial { 
            width: 94%; max-width: 850px; margin: 40px auto; background: var(--branco); 
            padding: 40px; border-radius: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.1); 
            border-left: 25px solid var(--roxo-raizen);
        }

        #secao-operador { display: none; width: 98%; margin: 10px auto; background: #fff; padding: 15px; border-radius: 15px; zoom: 0.85; }

        .wrapper-campo { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; font-weight: 900; color: var(--verde-raizen); font-size: 14px; text-transform: uppercase; }
        
        input, select { 
            width: 100%; padding: 22px; border: 4px solid #e2e8f0; border-radius: 20px; 
            font-size: 20px; font-weight: 700; background: #f8fafc;
        }

        .container-jornada-exp { background: #fffbeb; padding: 30px; border-radius: 30px; border: 4px solid var(--ouro-raizen); margin: 25px 0; }
        
        .btn-principal { 
            width: 100%; padding: 25px; background: var(--roxo-raizen); color: white; border: none; 
            border-radius: 20px; font-size: 20px; font-weight: 900; cursor: pointer; text-transform: uppercase;
        }

        /* TABELA E SEMÁFOROS */
        .moldura-tabela { overflow-x: auto; border-radius: 15px; border: 2px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th { background: #0f172a; color: #fff; padding: 12px; font-size: 12px; }
        td { padding: 12px; border-bottom: 3px solid #f1f5f9; text-align: center; font-weight: 800; }

        .tag-prod { padding: 8px 12px; border-radius: 10px; font-size: 11px; font-weight: 900; text-transform: uppercase; display: inline-block; }
        .tag-gasosa { background: #ff8c00; color: #fff; } 
        .tag-b100 { background: #5d4037; color: #fff; } 
        .tag-anidro { background: #0056b3; color: #fff; } 
        .tag-hidratado { border: 2px solid #0056b3; color: #0056b3; } 
        .tag-s10 { border: 2px solid #5d4037; color: #5d4037; }

        .box-semaforo { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .semaforo-verde { background: #dcfce7; color: #166534; border: 2px solid var(--cor-sucesso); }
        .semaforo-vermelho { background: #fee2e2; color: #991b1b; border: 2px solid var(--cor-alerta); }
        .led { width: 10px; height: 10px; border-radius: 50%; }
        .led-g { background: #10b981; box-shadow: 0 0 8px #10b981; }
        .led-r { background: #ef4444; box-shadow: 0 0 8px #ef4444; }
    </style>
</head>
<body>

<header>
    <div class="logo-raizen-master">RAÍZEN</div>
    <p style="color:white; font-weight:700; letter-spacing: 3px;">TERMINAL PAULÍNIA - ÁREA 02</p>
</header>

<div class="card-industrial" id="modulo-entrada">
    <div id="container-registro">
        <h2 style="text-align:center; color:var(--roxo-raizen); margin-bottom:30px;">REGISTRO DE CHEGADA</h2>
        <form id="formDescarga">
            <div class="wrapper-campo">
                <label><i class="fa-solid fa-truck"></i> PLACA</label>
                <input type="text" id="campo_placa" placeholder="ABC-1234" maxlength="8" required oninput="this.value = this.value.toUpperCase()">
            </div>
            <div class="wrapper-campo">
                <label><i class="fa-solid fa-droplet"></i> PRODUTO</label>
                <select id="campo_produto" required>
                    <option value="">-- SELECIONE --</option>
                    <option value="GASOLINA COMUM / ADITIVADA">GASOLINA</option>
                    <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
                    <option value="ETANOL ANIDRO">ETANOL ANIDRO</option>
                    <option value="ETANOL HIDRATADO">ETANOL HIDRATADO</option>
                    <option value="DIESEL S10">DIESEL S10</option>
                </select>
            </div>
            <div class="wrapper-campo">
                <label><i class="fa-brands fa-whatsapp"></i> WHATSAPP</label>
                <input type="tel" id="campo_whatsapp" placeholder="(19) 99999-9999" required>
            </div>

            <div class="container-jornada-exp">
                <label>FIM DA JORNADA</label>
                <input type="time" id="campo_hora_limite" style="padding:10px;">
                <label style="display:flex; align-items:center; gap:10px; margin-top:15px; color:var(--cor-alerta);">
                    <input type="checkbox" id="check_jornada_24h" style="width:25px; height:25px;"> JORNADA 24 HORAS
                </label>
            </div>

            <button type="submit" class="btn-principal">CONFIRMAR CHEGADA</button>
            <button type="button" onclick="toggleReabrir(true)" class="btn-principal" style="background:var(--verde-botao-reabrir); margin-top:10px;">REABRIR JORNADA</button>
        </form>
    </div>

    <div id="container-reabrir" style="display:none;">
        <h2 style="text-align:center; color:var(--verde-botao-reabrir);">REABRIR JORNADA</h2>
        <div class="wrapper-campo">
            <label>PLACA ATUAL</label>
            <input type="text" id="reabrir_placa" placeholder="ABC-1234" maxlength="8">
        </div>
        <div class="wrapper-campo">
            <label>NOVA HORA LIMITE</label>
            <input type="time" id="reabrir_hora">
        </div>
        <button onclick="salvarReabertura()" class="btn-principal" style="background:var(--verde-botao-reabrir)">ATUALIZAR JORNADA</button>
        <button onclick="toggleReabrir(false)" style="width:100%; margin-top:15px; border:none; background:none; text-decoration:underline; font-weight:bold; cursor:pointer;">VOLTAR</button>
    </div>

    <p onclick="acessoOperador()" style="text-align:center; margin-top:30px; cursor:pointer; font-weight:900; color:var(--roxo-raizen); text-decoration:underline;">MÓDULO DE GESTÃO</p>
</div>

<div id="secao-operador">
    <h3 style="margin-bottom:15px; border-left:10px solid var(--roxo-raizen); padding-left:10px;">FILA DE DESCARGA - ÁREA 02</h3>
    <div class="moldura-tabela">
        <table>
            <thead>
                <tr>
                    <th>PLACA</th>
                    <th>PRODUTO</th>
                    <th>JORNADA</th>
                    <th>ENTRADA</th>
                    <th style="background:#fff9c4; color:#000;">AGENDAMENTO</th>
                    <th>AÇÕES</th>
                </tr>
            </thead>
            <tbody id="dadosFila"></tbody>
        </table>
    </div>
    <button class="btn-principal" style="background:#64748b; margin-top:15px;" onclick="location.reload()">SAIR</button>
</div>

<script>
    const SUPABASE_URL = 'https://rbbkjuiizmvatiawfzuv.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_WkrHi6cWtZsnsDXl0nh1hA_kz1UT_1X';
    const HEADERS = { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json" };

    function toggleReabrir(show) {
        document.getElementById('container-registro').style.display = show ? 'none' : 'block';
        document.getElementById('container-reabrir').style.display = show ? 'block' : 'none';
    }

    function gerarSemaforo(valor) {
        if(valor === "24 HORAS") return `<div class="box-semaforo semaforo-verde"><span class="led led-g"></span> 24H</div>`;
        if(!valor) return "--";
        const agora = new Date();
        const t = valor.split(':');
        const limite = new Date(); limite.setHours(t[0], t[1], 0);
        return (agora > limite) ? `<div class="box-semaforo semaforo-vermelho"><span class="led led-r"></span> ${valor}</div>` : `<div class="box-semaforo semaforo-verde"><span class="led led-g"></span> ${valor}</div>`;
    }

    async function sincronizarFila() {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/registros?SAIDA=is.null&select=*`, { headers: HEADERS });
        const ativos = await res.json();
        const corpo = document.getElementById('dadosFila');
        corpo.innerHTML = "";

        ativos.forEach(item => {
            let cl = item.PRODUTO.includes("GASOLINA") ? "tag-gasosa" : item.PRODUTO.includes("BIODIESEL") ? "tag-b100" : item.PRODUTO.includes("ANIDRO") ? "tag-anidro" : item.PRODUTO.includes("HIDRATADO") ? "tag-hidratado" : "tag-s10";

            corpo.innerHTML += `
                <tr>
                    <td style="color:var(--roxo-raizen); font-size:18px;">${item.PLACA}</td>
                    <td><span class="tag-prod ${cl}">${item.PRODUTO}</span></td>
                    <td>${gerarSemaforo(item.JORNADA)}</td>
                    <td style="font-size:11px;">${item.ENTRADA}</td>
                    <td style="background:#fffde7;">
                        <input type="datetime-local" id="ag-${item.id}" value="${item.AGENDAMENTO || ''}" style="padding:5px; font-size:11px;">
                        <button onclick="salvarAgenda('${item.id}')" style="background:var(--verde-raizen); color:white; border:none; padding:5px; border-radius:5px; cursor:pointer;">OK</button>
                    </td>
                    <td>
                        <button onclick="chamar('${item.TELEFONE}','${item.PLACA}')" style="background:#22c55e; color:white; border:none; padding:8px; border-radius:8px; width:100%; cursor:pointer; font-weight:800; margin-bottom:4px;">CONVOCAR</button>
                        <button onclick="finalizar('${item.id}')" style="background:#ef4444; color:white; border:none; padding:8px; border-radius:8px; width:100%; cursor:pointer; font-weight:800;">FIM</button>
                    </td>
                </tr>`;
        });
    }

    document.getElementById('formDescarga').onsubmit = async e => {
        e.preventDefault();
        const dados = {
            PLACA: document.getElementById('campo_placa').value.toUpperCase(),
            PRODUTO: document.getElementById('campo_produto').value,
            TELEFONE: document.getElementById('campo_whatsapp').value,
            JORNADA: document.getElementById('check_jornada_24h').checked ? "24 HORAS" : document.getElementById('campo_hora_limite').value,
            ENTRADA: new Date().toLocaleString('pt-BR')
        };
        await fetch(`${SUPABASE_URL}/rest/v1/registros`, { method: 'POST', headers: HEADERS, body: JSON.stringify(dados) });
        alert("REGISTRADO COM SUCESSO!"); location.reload();
    };

    async function salvarReabertura() {
        const placa = document.getElementById('reabrir_placa').value.toUpperCase();
        const hora = document.getElementById('reabrir_hora').value;
        const res = await fetch(`${SUPABASE_URL}/rest/v1/registros?PLACA=eq.${placa}&SAIDA=is.null&select=id`, { headers: HEADERS });
        const data = await res.json();
        
        if(data.length > 0) {
            await fetch(`${SUPABASE_URL}/rest/v1/registros?id=eq.${data[0].id}`, { method: 'PATCH', headers: HEADERS, body: JSON.stringify({ JORNADA: hora }) });
            alert("JORNADA ATUALIZADA!"); location.reload();
        } else { alert("PLACA NÃO ENCONTRADA NO PÁTIO!"); }
    }

    async function salvarAgenda(id) {
        const val = document.getElementById(`ag-${id}`).value;
        await fetch(`${SUPABASE_URL}/rest/v1/registros?id=eq.${id}`, { method: 'PATCH', headers: HEADERS, body: JSON.stringify({ AGENDAMENTO: val }) });
        alert("AGENDADO!");
    }

    async function finalizar(id) {
        if(confirm("FINALIZAR?")) {
            await fetch(`${SUPABASE_URL}/rest/v1/registros?id=eq.${id}`, { method: 'PATCH', headers: HEADERS, body: JSON.stringify({ SAIDA: new Date().toLocaleString('pt-BR') }) });
            sincronizarFila();
        }
    }

    function chamar(tel, placa) {
        const baia = prompt("BAIA DE DESCARGA?");
        if(baia) {
            const msg = `Olá! Placa *${placa}*, favor comparecer à *BAIA ${baia}* para descarga.`;
            window.open(`https://api.whatsapp.com/send?phone=55${tel.replace(/\D/g, "")}&text=${encodeURIComponent(msg)}`, '_blank');
        }
    }

    function acessoOperador() {
        if(prompt("SENHA:") === "raizen2026") {
            document.getElementById('modulo-entrada').style.display = 'none';
            document.getElementById('secao-operador').style.display = 'block';
            sincronizarFila();
        }
    }
</script>
</body>
</html>
