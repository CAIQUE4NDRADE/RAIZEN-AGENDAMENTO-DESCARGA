<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAÍZEN - GESTÃO OPERACIONAL V30.0</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --verde-raizen: #4d6d5d;
            --roxo-raizen: #84207d;
            --ouro-raizen: #ffc107;
            --fundo-base: #f1f5f9;
            --branco: #ffffff;
            --cor-alerta: #e11d48;
            --cor-sucesso: #10b981;
        }

        * { box-sizing: border-box; font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--fundo-base); color: #1e293b; padding-bottom: 100px; }

        /* HEADER ORIGINAL GIGANTE */
        header { 
            background: linear-gradient(135deg, var(--verde-raizen) 0%, #1a241f 100%); 
            padding: 90px 20px; text-align: center; border-bottom: 25px solid var(--roxo-raizen);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .logo-raizen-master { color: var(--branco); font-size: 85px; font-weight: 900; letter-spacing: 15px; text-transform: uppercase; }

        /* PAINEL MOTORISTA (VISUAL TOP) */
        .card-industrial { 
            width: 94%; max-width: 1100px; margin: 60px auto; background: var(--branco); 
            padding: 70px; border-radius: 60px; box-shadow: 0 40px 80px rgba(0,0,0,0.2); 
            border-left: 35px solid var(--roxo-raizen);
        }
        .card-industrial h2 { font-size: 38px; color: var(--roxo-raizen); font-weight: 900; margin-bottom: 50px; text-align: center; border-bottom: 12px solid #f1f5f9; padding-bottom: 30px; }
        
        .wrapper-campo { margin-bottom: 40px; }
        label { display: block; margin-bottom: 15px; font-weight: 900; color: var(--verde-raizen); font-size: 16px; text-transform: uppercase; }

        input, select { 
            width: 100%; padding: 28px; border: 5px solid #e2e8f0; border-radius: 30px; 
            font-size: 24px; font-weight: 700; background: #f8fafc;
        }

        .btn-principal { 
            width: 100%; padding: 40px; background: var(--roxo-raizen); color: white; border: none; 
            border-radius: 35px; font-size: 30px; font-weight: 900; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 25px 50px rgba(132, 32, 125, 0.4);
        }

        /* NOVO BOTÃO DE REABERTURA COM ESTILO RAÍZEN */
        .btn-reabrir { background: var(--verde-raizen); margin-top: 25px; font-size: 22px; padding: 30px; }

        /* PAINEL ADM ROBUSTO */
        #secao-operador { display: none; width: 98%; margin: 20px auto; background: var(--branco); padding: 40px; border-radius: 40px; }
        .barra-busca { margin-bottom: 30px; display: flex; gap: 15px; }
        .barra-busca input { padding: 20px; font-size: 18px; margin-bottom: 0; border: 3px solid var(--roxo-raizen); }

        .moldura-tabela { overflow-x: hidden; border: 3px solid #e2e8f0; border-radius: 30px; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        
        th { background: #0f172a; color: white; padding: 15px 5px; font-size: 11px; text-transform: uppercase; }
        td { padding: 15px 5px; border-bottom: 2px solid #f1f5f9; text-align: center; font-weight: 800; font-size: 12px; word-wrap: break-word; }

        /* CORES PRODUTOS */
        .tag-prod { padding: 8px; border-radius: 10px; font-size: 10px; font-weight: 900; display: block; color: white; }
        .tag-gasolina { background: #ff8c00; }
        .tag-b100 { background: #5d4037; }
        .tag-anidro { background: #0056b3; }
        .tag-hidratado { background: #3b82f6; }
        .tag-diesel { background: #334155; }

        .col-coleta { background: #fffde7; border: 2px solid var(--ouro-raizen); color: #92400e; padding: 5px; border-radius: 8px; font-size: 14px; width: 95%; font-weight: 900; text-align: center; }

        .btn-acao { width: 100%; padding: 12px 2px; border-radius: 10px; border: none; color: white; font-weight: 900; font-size: 11px; margin-bottom: 5px; cursor: pointer; }

    </style>
</head>
<body>

<header>
    <div class="logo-raizen-master">RAÍZEN</div>
    <h1 style="color:white; letter-spacing: 5px; font-weight: 300; margin-top: 10px;">TERMINAL PAULÍNIA</h1>
</header>

<div class="card-industrial" id="modulo-entrada">
    <div id="view-registro-normal">
        <h2>REGISTRO DE ENTRADA</h2>
        <div class="wrapper-campo">
            <label>PLACA DO VEÍCULO</label>
            <input type="text" id="campo_placa" placeholder="ABC-1234" maxlength="8">
        </div>
        <div class="wrapper-campo">
            <label>PRODUTO</label>
            <select id="campo_produto">
                <option value="">SELECIONE...</option>
                <option value="GASOLINA">GASOLINA COMUM / ADITIVADA</option>
                <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
                <option value="ETANOL ANIDRO">ETANOL ANIDRO</option>
                <option value="ETANOL HIDRATADO">ETANOL HIDRATADO</option>
                <option value="DIESEL S10">DIESEL S10</option>
            </select>
        </div>
        <div class="wrapper-campo">
            <label>NÚMERO DO WHATSAPP</label>
            <input type="tel" id="campo_whatsapp" placeholder="(19) 99999-9999">
        </div>
        <div class="wrapper-campo">
            <label>FIM DA JORNADA</label>
            <input type="time" id="campo_jornada">
        </div>
        <button onclick="registrar()" class="btn-principal">EFETUAR REGISTRO</button>
        <button onclick="trocarView('view-reabertura')" class="btn-principal btn-reabrir">REABRIR JORNADA (ESTOU NO PÁTIO)</button>
    </div>

    <div id="view-reabertura" style="display:none;">
        <h2 style="color:var(--verde-raizen)">ATUALIZAR JORNADA</h2>
        <p style="text-align:center; margin-bottom:30px; font-weight:700;">Use esta opção se você dormiu no pátio e iniciou nova jornada.</p>
        <div class="wrapper-campo">
            <label>CONFIRME SUA PLACA</label>
            <input type="text" id="reabrir_placa" placeholder="ABC-1234">
        </div>
        <div class="wrapper-campo">
            <label>NOVO HORÁRIO DE TÉRMINO</label>
            <input type="time" id="reabrir_jornada">
        </div>
        <button onclick="executarReabertura()" class="btn-principal" style="background:var(--verde-raizen)">ATUALIZAR PARA HOJE</button>
        <button onclick="trocarView('view-registro-normal')" style="width:100%; background:none; border:none; color:gray; margin-top:30px; text-decoration:underline; font-weight:900;">VOLTAR AO REGISTRO</button>
    </div>

    <button onclick="acessoOperador()" style="margin-top:50px; background:none; border:none; color:var(--roxo-raizen); text-decoration:underline; width:100%; font-weight:900; font-size:22px;">MÓDULO DE GESTÃO ADM</button>
</div>

<div id="secao-operador">
    <h2>PAINEL DE CONTROLE DE FILA</h2>
    <div class="barra-busca">
        <input type="text" id="filtroBusca" placeholder="🔍 Filtrar por Placa..." onkeyup="filtrar()">
        <button onclick="sincronizarFila()" style="background:var(--verde-raizen); color:white; border:none; padding:20px; border-radius:20px; font-weight:900;">ATUALIZAR</button>
    </div>

    <div class="moldura-tabela">
        <table>
            <thead>
                <tr>
                    <th style="width: 17%;">PLACA</th>
                    <th style="width: 20%;">PRODUTO</th>
                    <th style="width: 21%;">AG. COLETA</th>
                    <th style="width: 17%;">JORNADA</th>
                    <th style="width: 25%;">AÇÕES</th>
                </tr>
            </thead>
            <tbody id="dadosFila"></tbody>
        </table>
    </div>
    <button class="btn-principal" style="background:#475569; margin-top:30px; font-size:22px;" onclick="location.reload()">SAIR DO SISTEMA</button>
</div>

<script>
    const API_URL = 'https://sheetdb.io/api/v1/p9z83v5m0dxq5';
    const SENHA_OP = 'raizen2026';

    function trocarView(id) {
        document.getElementById('view-registro-normal').style.display = 'none';
        document.getElementById('view-reabertura').style.display = 'none';
        document.getElementById(id).style.display = 'block';
    }

    async function registrar() {
        const p = document.getElementById('campo_placa').value.toUpperCase();
        const pr = document.getElementById('campo_produto').value;
        if(!p || !pr) return alert("Placa e Produto são obrigatórios!");

        const dados = {
            "PLACA": p,
            "PRODUTO": pr,
            "TELEFONE": document.getElementById('campo_whatsapp').value,
            "JORNADA": document.getElementById('campo_jornada').value || "24 HORAS",
            "ENTRADA": new Date().toLocaleString(),
            "SAIDA": ""
        };

        await fetch(API_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify([dados]) });
        alert("REGISTRADO COM SUCESSO!");
        location.reload();
    }

    async function executarReabertura() {
        const placa = document.getElementById('reabrir_placa').value.toUpperCase();
        const novaJornada = document.getElementById('reabrir_jornada').value;
        if(!placa || !novaJornada) return alert("Informe Placa e Novo Horário!");

        // Faz o PATCH para atualizar apenas a jornada daquela placa
        await fetch(`${API_URL}/PLACA/${placa}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({"JORNADA": novaJornada})
        });
        alert("JORNADA ATUALIZADA COM SUCESSO!");
        location.reload();
    }

    async function sincronizarFila() {
        const corpo = document.getElementById('dadosFila');
        corpo.innerHTML = "<tr><td colspan='5'>Sincronizando Dados...</td></tr>";
        const res = await fetch(API_URL + "?t=" + Date.now());
        const json = await res.json();
        let ativos = json.filter(x => x.PLACA && !x.SAIDA);
        
        ativos.sort((a, b) => (a['AGENDAMENTO NO COLETA'] || '23:59').localeCompare(b['AGENDAMENTO NO COLETA'] || '23:59'));

        corpo.innerHTML = "";
        ativos.forEach(item => {
            const tr = document.createElement('tr');
            let p = item.PRODUTO.toUpperCase();
            let cor = p.includes("GASOLINA") ? "tag-gasolina" : p.includes("B100") ? "tag-b100" : p.includes("ANIDRO") ? "tag-anidro" : "tag-hidratado";

            tr.innerHTML = `
                <td style="color:var(--roxo-raizen);">${item.PLACA}</td>
                <td><span class="tag-prod ${cor}">${item.PRODUTO}</span></td>
                <td>
                    <input type="time" class="col-coleta" value="${item['AGENDAMENTO NO COLETA'] || ''}" 
                    onchange="atualizarCampo('${item.PLACA}', 'AGENDAMENTO NO COLETA', this.value)">
                </td>
                <td style="font-weight:900;">${item.JORNADA}</td>
                <td>
                    <button class="btn-acao" style="background:#22c55e;" onclick="window.open('https://api.whatsapp.com/send?phone=55${item.TELEFONE.replace(/\D/g,'')}&text=Motorista ${item.PLACA}, favor encostar para descarga.')">ZAP</button>
                    <button class="btn-acao" style="background:#3b82f6;" onclick="finalizar('${item.PLACA}')">FIM</button>
                </td>
            `;
            corpo.appendChild(tr);
        });
    }

    async function atualizarCampo(placa, campo, valor) {
        let obj = {}; obj[campo] = valor;
        await fetch(`${API_URL}/PLACA/${placa}`, { method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(obj) });
    }

    async function finalizar(placa) {
        if(confirm(`Deseja encerrar a descarga da placa ${placa}?`)) {
            await fetch(`${API_URL}/PLACA/${placa}`, { method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({"SAIDA": new Date().toLocaleString()}) });
            sincronizarFila();
        }
    }

    function acessoOperador() {
        if(prompt("SENHA OPERACIONAL:") === SENHA_OP) {
            document.getElementById('modulo-entrada').style.display = 'none';
            document.getElementById('secao-operador').style.display = 'block';
            sincronizarFila();
        }
    }

    function filtrar() {
        let b = document.getElementById("filtroBusca").value.toUpperCase();
        let r = document.getElementById("dadosFila").getElementsByTagName("tr");
        for (let l of r) l.style.display = l.cells[0].innerText.toUpperCase().includes(b) ? "" : "none";
    }

    // Auto-update a cada 60s no ADM
    setInterval(() => { if(document.getElementById('secao-operador').style.display === 'block') sincronizarFila(); }, 60000);
</script>
</body>
</html>
