<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200"> 
    <title>RAÍZEN - GESTÃO OPERACIONAL V27.5</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* ========================================
           DESIGN SYSTEM INDUSTRIAL RAÍZEN
           ESTILO EXPANDIDO PARA MANUTENÇÃO (BLINDADO)
           ========================================
        */

        :root {
            --verde-raizen: #4d6d5d;
            --roxo-raizen: #84207d;
            --ouro-raizen: #ffc107;
            --fundo-base: #f1f5f9;
            --branco: #ffffff;
            --preto-industrial: #1a241f;
            --cinza-texto: #475569;
            --cor-erro: #e11d48;
            --cor-sucesso: #10b981;
            --sombra-premium: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
        }

        body { 
            background-color: var(--fundo-base); 
            color: #1e293b; 
            min-height: 100vh; 
            padding-bottom: 80px;
            overflow-x: auto;
        }

        /* CABEÇALHO LOGO RAÍZEN 
        */
        header { 
            background: linear-gradient(135deg, var(--verde-raizen) 0%, var(--preto-industrial) 100%); 
            padding-top: 100px;
            padding-bottom: 100px;
            padding-left: 20px;
            padding-right: 20px;
            text-align: center; 
            border-bottom: 30px solid var(--roxo-raizen);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            position: relative;
        }

        .logo-display {
            color: var(--branco); 
            font-size: 110px; 
            font-weight: 900;
            letter-spacing: 25px; 
            text-transform: uppercase;
            text-shadow: 5px 5px 0px rgba(0,0,0,0.2);
        }

        /* CONTAINERS PRINCIPAIS 
        */
        .card-master { 
            width: 94%; 
            max-width: 1150px; 
            margin-top: -60px;
            margin-bottom: 60px;
            margin-left: auto;
            margin-right: auto;
            background: var(--branco); 
            padding: 70px; 
            border-radius: 45px; 
            box-shadow: var(--sombra-premium); 
            border-left: 35px solid var(--roxo-raizen);
            position: relative;
            z-index: 10;
        }

        #modulo-operador-full, 
        #modulo-supervisao { 
            display: none; 
            width: 98%; 
            max-width: 1900px; 
            margin-top: 40px;
            margin-bottom: 40px;
            margin-left: auto;
            margin-right: auto;
            background: var(--branco); 
            padding: 45px; 
            border-radius: 35px;
            box-shadow: var(--sombra-premium); 
            zoom: 0.75;
        }

        h2 { 
            color: var(--roxo-raizen); 
            text-align: center; 
            font-weight: 900; 
            text-transform: uppercase; 
            margin-bottom: 50px; 
            font-size: 38px; 
            border-bottom: 12px solid #f8fafc;
            padding-bottom: 25px;
        }

        /* ELEMENTOS DE FORMULÁRIO 
        */
        .wrapper-input { 
            margin-bottom: 40px; 
        }
        
        label { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            margin-bottom: 18px; 
            font-weight: 900; 
            color: var(--verde-raizen); 
            font-size: 16px; 
            text-transform: uppercase;
        }

        input, select { 
            width: 100%; 
            padding-top: 28px;
            padding-bottom: 28px;
            padding-left: 28px;
            padding-right: 28px;
            border-top: 5px solid #f1f5f9; 
            border-bottom: 5px solid #f1f5f9; 
            border-left: 5px solid #f1f5f9; 
            border-right: 5px solid #f1f5f9; 
            border-radius: 25px; 
            font-size: 24px; 
            font-weight: 700; 
            background-color: #f8fafc; 
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--roxo-raizen);
            outline: none;
            background-color: #ffffff;
        }

        /* ESTILO DOS BOTÕES 
        */
        .btn-master { 
            width: 100%; 
            padding-top: 35px;
            padding-bottom: 35px;
            padding-left: 35px;
            padding-right: 35px;
            background-color: var(--roxo-raizen); 
            color: #ffffff; 
            border: none; 
            border-radius: 30px; 
            font-size: 26px; 
            font-weight: 900; 
            cursor: pointer; 
            text-transform: uppercase; 
            box-shadow: 0 15px 0 #5e1659; 
            margin-bottom: 25px; 
            display: flex; 
            justify-content: center;
            align-items: center; 
            gap: 20px;
            transition: transform 0.1s;
        }

        .btn-master:active { 
            transform: translateY(10px); 
            box-shadow: 0 5px 0 #5e1659; 
        }

        /* TABELAS DE DADOS 
        */
        .moldura-tabela { 
            overflow-x: auto; 
            border-radius: 30px; 
            border: 3px solid #f1f5f9; 
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            min-width: 1850px; 
            background-color: #ffffff; 
        }

        th { 
            background-color: #1e293b; 
            color: #ffffff; 
            padding-top: 25px;
            padding-bottom: 25px;
            padding-left: 25px;
            padding-right: 25px;
            font-size: 13px; 
            text-transform: uppercase; 
        }

        td { 
            padding-top: 20px;
            padding-bottom: 20px;
            padding-left: 20px;
            padding-right: 20px;
            border-bottom: 3px solid #f8fafc; 
            text-align: center; 
            font-weight: 700; 
        }

        .input-edit-table {
            padding: 12px; 
            border: 2px solid #e2e8f0; 
            border-radius: 12px;
            font-size: 14px; 
            font-weight: 700; 
            width: 100%; 
            text-align: center;
        }

        /* LOADER DE SINCRONIZAÇÃO 
        */
        #loader-overlay {
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background-color: rgba(255,255,255,0.95); 
            z-index: 10000; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
        }

        .raizen-spinner { 
            width: 90px; 
            height: 90px; 
            border: 12px solid #f3f3f3; 
            border-top: 12px solid var(--roxo-raizen); 
            border-radius: 50%; 
            animation: girar 1s linear infinite; 
        }

        @keyframes girar { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }

        .status-badge { 
            padding: 8px 15px; 
            border-radius: 10px; 
            font-size: 12px; 
            text-transform: uppercase; 
        }

        .status-ok { 
            background-color: #dcfce7; 
            color: #166534; 
        }

        .status-expirado { 
            background-color: #fee2e2; 
            color: #991b1b; 
        }

    </style>
</head>
<body>

<div id="loader-overlay">
    <div class="raizen-spinner"></div>
    <h2 style="border:none; margin-top:25px;">SINCRONIZANDO COM O TERMINAL...</h2>
</div>

<header>
    <div class="logo-display">RAÍZEN</div>
</header>

<div class="card-master" id="secao-entrada">
    
    <div id="form-principal-wrapper">
        <h2><i class="fa-solid fa-truck-ramp-box"></i> REGISTRO DE ENTRADA</h2>
        
        <form id="formMaster">
            
            <div class="wrapper-input">
                <label><i class="fa-solid fa-barcode"></i> PLACA DO VEÍCULO</label>
                <input type="text" id="placa" placeholder="AAA-0000" maxlength="8" required>
            </div>

            <div class="wrapper-input">
                <label><i class="fa-solid fa-gas-pump"></i> PRODUTO</label>
                <select id="produto" required>
                    <option value="">-- SELECIONE O PRODUTO --</option>
                    <option value="GASOLINA">GASOLINA</option>
                    <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
                    <option value="ETANOL ANIDRO">ETANOL ANIDRO</option>
                    <option value="ETANOL HIDRATADO">ETANOL HIDRATADO</option>
                    <option value="DIESEL S10">DIESEL S10</option>
                </select>
            </div>

            <div class="wrapper-input">
                <label><i class="fa-brands fa-whatsapp"></i> WHATSAPP MOTORISTA</label>
                <input type="tel" id="whatsapp" placeholder="(19) 99999-9999" maxlength="15" required>
            </div>
            
            <div style="background-color: #fffbeb; padding: 40px; border-radius: 40px; border: 4px dashed var(--ouro-raizen); margin-top: 45px; margin-bottom: 45px;">
                
                <div id="container-horario-limite">
                    <label><i class="fa-solid fa-clock"></i> HORÁRIO LIMITE JORNADA</label>
                    <input type="time" id="limite"> 
                </div>
                
                <label style="margin-top:25px; display:flex; align-items:center; gap:20px; cursor:pointer; font-size: 20px; font-weight: 900; color: var(--roxo-raizen);">
                    <input type="checkbox" id="jornada24" style="width:35px; height:35px;" onchange="toggleLimiteVisual(this)"> 
                    HABILITAR JORNADA 24 HORAS
                </label>
            </div>

            <button type="submit" class="btn-master">CONFIRMAR REGISTRO</button>
            
            <button type="button" onclick="abrirReabertura()" class="btn-master" style="background-color:var(--cinza-texto); font-size:18px;">
                <i class="fa-solid fa-clock-rotate-left"></i> REABRIR JORNADA EXISTENTE
            </button>
        </form>
    </div>

    <div id="form-reabertura-wrapper" style="display:none;">
        <h2 style="color:var(--cinza-texto)">REABRIR REGISTRO</h2>
        
        <div class="wrapper-input">
            <label>PLACA DO VEÍCULO</label>
            <input type="text" id="re_placa" placeholder="AAA-0000" maxlength="8">
        </div>
        
        <div class="wrapper-input">
            <label>NOVA HORA LIMITE</label>
            <input type="time" id="re_hora">
        </div>
        
        <button onclick="processarReabertura()" class="btn-master" style="background-color:var(--cinza-texto)">ATUALIZAR JORNADA</button>
        
        <button onclick="fecharReabertura()" style="width:100%; background:none; border:none; color:var(--roxo-raizen); font-weight:900; cursor:pointer; padding:20px;">CANCELAR OPERAÇÃO</button>
    </div>

    <div style="text-align:center; margin-top:50px; display:flex; justify-content:center; gap:30px;">
        <button onclick="ativarOperador()" style="background:none; border:none; color:var(--roxo-raizen); font-weight:900; cursor:pointer; text-transform:uppercase;">
            <i class="fa-solid fa-lock"></i> PAINEL OPERADOR
        </button>
        <button onclick="ativarSupervisao()" style="background:none; border:none; color:var(--verde-raizen); font-weight:900; cursor:pointer; text-transform:uppercase;">
            <i class="fa-solid fa-shield-halved"></i> GESTÃO DE TANQUES
        </button>
    </div>
</div>

<div id="modulo-operador-full">
    <h2>PAINEL DE CONTROLE OPERACIONAL</h2>
    
    <div id="status-tanques-topo" style="display:flex; justify-content:center; gap:15px; margin-bottom:30px; flex-wrap:wrap;"></div>
    
    <div class="moldura-tabela">
        <table>
            <thead>
                <tr>
                    <th>VEÍCULO</th>
                    <th>PRODUTO</th>
                    <th>JORNADA</th>
                    <th style="background-color:#f1f5f9; color:var(--roxo-raizen);">VOLUME CARGA (L)</th>
                    <th>AGENDAMENTO</th>
                    <th>TELEFONE</th>
                    <th>CONVOCAR</th>
                    <th>SAÍDA</th>
                </tr>
            </thead>
            <tbody id="listaFila"></tbody>
        </table>
    </div>
    
    <button class="btn-master" style="background-color:#1e293b; margin-top:30px;" onclick="location.reload()">VOLTAR AO INÍCIO</button>
</div>

<div id="modulo-supervisao">
    <h2>GESTÃO DE CAPACIDADE (SUPERVISÃO)</h2>
    
    <div class="moldura-tabela" style="max-width:900px; margin-left:auto; margin-right:auto;">
        <table style="min-width:100%">
            <thead>
                <tr>
                    <th>PRODUTO / TANQUE</th>
                    <th>ESPAÇO LIVRE ATUAL (LITROS)</th>
                    <th>AÇÃO</th>
                </tr>
            </thead>
            <tbody id="listaEstoqueSupervisao"></tbody>
        </table>
    </div>
    
    <button class="btn-master" style="background-color:#1e293b; margin-top:50px;" onclick="location.reload()">SAIR DA SUPERVISÃO</button>
</div>

<script>
    /* ========================================
       LOGICA DE SISTEMA (JavaScript Expandido)
       ========================================
    */

    const RAÍZEN_DB = {
        URL: 'https://rbbkjuiizmvatiawfzuv.supabase.co',
        KEY: 'sb_publishable_WkrHi6cWtZsnsDXl0nh1hA_kz1UT_1X',
        ID_COL: 'ID',
        HEADERS: { 
            "apikey": 'sb_publishable_WkrHi6cWtZsnsDXl0nh1hA_kz1UT_1X', 
            "Authorization": `Bearer sb_publishable_WkrHi6cWtZsnsDXl0nh1hA_kz1UT_1X`, 
            "Content-Type": "application/json", 
            "Prefer": "return=minimal" 
        }
    };

    let memoriaFila = [];
    let memoriaEstoque = [];

    // --- CONTROLE DE INTERFACE ---

    function setLoader(estado) { 
        const loader = document.getElementById('loader-overlay');
        if (estado) {
            loader.style.display = 'flex';
        } else {
            loader.style.display = 'none';
        }
    }

    function toggleLimiteVisual(checkbox) {
        const campoHorario = document.getElementById('container-horario-limite');
        if (checkbox.checked) {
            campoHorario.style.display = 'none';
        } else {
            campoHorario.style.display = 'block';
        }
    }

    // --- MÁSCARAS DE INPUT ---

    const inputPlaca = document.getElementById('placa');
    inputPlaca.addEventListener('input', function(e) {
        let val = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
        if (val.length > 3) {
            val = val.slice(0, 3) + "-" + val.slice(3);
        }
        e.target.value = val.slice(0, 8);
    });

    const inputWhatsApp = document.getElementById('whatsapp');
    inputWhatsApp.addEventListener('input', function(e) {
        let v = e.target.value.replace(/\D/g, "");
        if (v.length > 11) {
            v = v.slice(0, 11);
        }
        
        if (v.length > 10) {
            // Formato Celular: (XX) XXXXX-XXXX
            v = "(" + v.slice(0, 2) + ") " + v.slice(2, 7) + "-" + v.slice(7);
        } else if (v.length > 6) {
            // Formato Fixo: (XX) XXXX-XXXX
            v = "(" + v.slice(0, 2) + ") " + v.slice(2, 6) + "-" + v.slice(6);
        } else if (v.length > 2) {
            v = "(" + v.slice(0, 2) + ") " + v.slice(2);
        } else if (v.length > 0) {
            v = "(" + v;
        }
        e.target.value = v;
    });

    // --- COMUNICAÇÃO COM BANCO DE DADOS ---

    async function carregarDados() {
        try {
            // Busca Fila
            const respostaFila = await fetch(`${RAÍZEN_DB.URL}/rest/v1/registros?SAIDA=is.null&select=*`, { 
                headers: RAÍZEN_DB.HEADERS 
            });
            memoriaFila = await respostaFila.json();

            // Busca Estoque
            const respostaEstoque = await fetch(`${RAÍZEN_DB.URL}/rest/v1/estoque?select=*`, { 
                headers: RAÍZEN_DB.HEADERS 
            });
            memoriaEstoque = await respostaEstoque.json();

            // Atualiza Telas
            renderTabela(); 
            renderResumoEstoque(); 
            renderSupervisaoEstoque();
            
        } catch (erro) {
            console.error("Erro ao carregar dados:", erro);
        }
    }

    // --- RENDERS DE TABELA ---

    function renderSupervisaoEstoque() {
        const corpoTabelaSup = document.getElementById('listaEstoqueSupervisao');
        if (!corpoTabelaSup) return;
        
        corpoTabelaSup.innerHTML = "";
        
        memoriaEstoque.forEach(item => {
            corpoTabelaSup.innerHTML += `
                <tr>
                    <td style="color:var(--roxo-raizen); font-size:20px;">
                        <b>${item.produto}</b>
                    </td>
                    <td>
                        <input type="number" 
                               id="input-sup-${item.id}" 
                               value="${item.espaco_disponivel}" 
                               class="input-edit-table" 
                               style="font-size:22px;">
                    </td>
                    <td>
                        <button onclick="salvarAlteracaoSupervisao(${item.id})" 
                                style="background-color:var(--verde-raizen); color:white; border:none; padding:15px; border-radius:12px; font-weight:900; cursor:pointer;">
                            ATUALIZAR
                        </button>
                    </td>
                </tr>`;
        });
    }

    async function salvarAlteracaoSupervisao(id) {
        const novoValor = document.getElementById(`input-sup-${id}`).value;
        
        setLoader(true);
        
        try {
            await fetch(`${RAÍZEN_DB.URL}/rest/v1/estoque?id=eq.${id}`, { 
                method: 'PATCH', 
                headers: RAÍZEN_DB.HEADERS, 
                body: JSON.stringify({ "espaco_disponivel": parseFloat(novoValor) }) 
            });
            
            alert("CAPACIDADE DO TANQUE ATUALIZADA COM SUCESSO!");
            await carregarDados();
            
        } catch (e) {
            alert("ERRO AO SALVAR!");
        } finally {
            setLoader(false);
        }
    }

    function renderTabela() {
        const corpoFila = document.getElementById('listaFila');
        if (!corpoFila) return;
        
        corpoFila.innerHTML = "";
        
        memoriaFila.forEach(item => {
            const id = item[RAÍZEN_DB.ID_COL];
            const statusHora = verificarStatusHorario(item.JORNADA);
            
            corpoFila.innerHTML += `
                <tr>
                    <td style="font-size:24px; color:var(--roxo-raizen)">${item.PLACA}</td>
                    <td>${item.PRODUTO}</td>
                    <td><span class="status-badge status-ok">${statusHora}</span></td>
                    <td>
                        <div style="display:flex; gap:8px; justify-content:center;">
                            <input type="number" id="vol-input-${id}" value="${item.VOLUME || ''}" class="input-edit-table" style="width:130px;">
                            <button onclick="salvarVolumeOperador('${id}')" 
                                    style="background-color:var(--roxo-raizen); color:white; border:none; padding:10px; border-radius:8px; cursor:pointer;">
                                <i class="fa-solid fa-save"></i>
                            </button>
                        </div>
                    </td>
                    <td>
                        <input type="datetime-local" 
                               id="ag-input-${id}" 
                               value="${item.AGENDAMENTO ? item.AGENDAMENTO.slice(0,16) : ''}" 
                               class="input-edit-table" 
                               onchange="atualizarCampoDireto('${id}', 'AGENDAMENTO', this.value)">
                    </td>
                    <td style="font-size:14px;">${item.TELEFONE}</td>
                    <td>
                        <button onclick="convocarMotorista('${item.TELEFONE}', '${item.PRODUTO}', ${item.VOLUME || 0})" 
                                style="background-color:#25d366; color:white; border:none; padding:15px; border-radius:12px; font-weight:900; cursor:pointer;">
                            CONVOCAR
                        </button>
                    </td>
                    <td>
                        <button onclick="processarSaidaComAbate('${id}', '${item.PRODUTO}', ${item.VOLUME || 0})" 
                                style="background-color:var(--roxo-raizen); color:white; border:none; padding:15px; border-radius:12px; font-weight:900; cursor:pointer;">
                            SAÍDA
                        </button>
                    </td>
                </tr>`;
        });
    }

    // --- FUNÇÕES DE AÇÃO ---

    async function salvarVolumeOperador(id) {
        const valorVolume = document.getElementById(`vol-input-${id}`).value;
        
        setLoader(true);
        
        try {
            await fetch(`${RAÍZEN_DB.URL}/rest/v1/registros?ID=eq.${id}`, { 
                method: 'PATCH', 
                headers: RAÍZEN_DB.HEADERS, 
                body: JSON.stringify({ "VOLUME": valorVolume }) 
            });
            
            alert("VOLUME ASSUMIDO COM SUCESSO NO SISTEMA!");
            await carregarDados();
            
        } catch (e) {
            alert("ERRO!");
        } finally {
            setLoader(false);
        }
    }

    async function atualizarCampoDireto(id, campo, valor) {
        setLoader(true);
        await fetch(`${RAÍZEN_DB.URL}/rest/v1/registros?ID=eq.${id}`, { 
            method: 'PATCH', 
            headers: RAÍZEN_DB.HEADERS, 
            body: JSON.stringify({ [campo]: valor }) 
        });
        setLoader(false);
    }

    async function convocarMotorista(tel, produto, volume) {
        if (!volume || volume <= 0) {
            return alert("POR FAVOR, INFORME O VOLUME DA CARGA!");
        }
        
        const baiaInput = prompt("DIGITE A BAIA DE DESCARGA:");
        if (baiaInput) {
            const linkWhatsapp = `https://wa.me/55${tel.replace(/\D/g, "")}?text=RAÍZEN INFORMA: Dirija-se à BAIA ${baiaInput} para descarga imediata.`;
            window.open(linkWhatsapp, '_blank');
        }
    }

    async function processarSaidaComAbate(id, produto, volume) {
        if (!confirm("CONFIRMAR SAÍDA E BAIXA NO ESTOQUE?")) return;
        
        setLoader(true);
        
        try {
            // Registra Saída
            await fetch(`${RAÍZEN_DB.URL}/rest/v1/registros?ID=eq.${id}`, { 
                method: 'PATCH', 
                headers: RAÍZEN_DB.HEADERS, 
                body: JSON.stringify({ "SAIDA": new Date().toLocaleString() }) 
            });

            // Localiza Tanque para Abate
            const tanqueEncontrado = memoriaEstoque.find(e => 
                produto.includes(e.produto.toUpperCase()) || 
                e.produto.toUpperCase().includes(produto)
            );

            if (tanqueEncontrado && volume > 0) {
                const novoEstoque = tanqueEncontrado.espaco_disponivel - volume;
                await fetch(`${RAÍZEN_DB.URL}/rest/v1/estoque?id=eq.${tanqueEncontrado.id}`, { 
                    method: 'PATCH', 
                    headers: RAÍZEN_DB.HEADERS, 
                    body: JSON.stringify({ "espaco_disponivel": novoEstoque }) 
                });
            }
            
            await carregarDados();
            
        } catch (e) {
            alert("ERRO NO PROCESSAMENTO!");
        } finally {
            setLoader(false);
        }
    }

    function verificarStatusHorario(h) {
        if (h === "24 HORAS") return "LIBERADA";
        if (!h) return "PENDENTE";
        
        const [horaStr, minStr] = h.split(':');
        const dataLimite = new Date(); 
        dataLimite.setHours(parseInt(horaStr), parseInt(minStr), 0);
        
        const agora = new Date();
        if (agora > dataLimite) {
            return "EXPIRADA";
        } else {
            return "EM DIA";
        }
    }

    function renderResumoEstoque() {
        const containerResumo = document.getElementById('status-tanques-topo');
        if (!containerResumo) return;
        
        containerResumo.innerHTML = "";
        
        memoriaEstoque.forEach(e => {
            containerResumo.innerHTML += `
                <div style="background-color:white; padding:15px; border:2px solid var(--verde-raizen); border-radius:15px; font-weight:900; box-shadow: 2px 2px 5px rgba(0,0,0,0.05);">
                    <span style="color:var(--roxo-raizen)">${e.produto}:</span> 
                    ${e.espaco_disponivel.toLocaleString()}L disp.
                </div>`;
        });
    }

    // --- SEGURANÇA E ACESSO ---

    function ativarOperador() { 
        const pass = prompt("SENHA OPERADOR:");
        if (pass === "raizen2026") { 
            document.getElementById('secao-entrada').style.display = 'none'; 
            document.getElementById('modulo-operador-full').style.display = 'block'; 
            carregarDados(); 
        } else {
            alert("ACESSO NEGADO!");
        }
    }

    function ativarSupervisao() { 
        const pass = prompt("SENHA SUPERVISÃO:");
        if (pass === "super2026") { 
            document.getElementById('secao-entrada').style.display = 'none'; 
            document.getElementById('modulo-supervisao').style.display = 'block'; 
            carregarDados(); 
        } else {
            alert("ACESSO NEGADO!");
        }
    }

    // --- FORMULÁRIO DE REGISTRO ---

    const formPrincipal = document.getElementById('formMaster');
    formPrincipal.onsubmit = async function(e) {
        e.preventDefault();
        setLoader(true);
        
        const novoRegistro = { 
            "PLACA": document.getElementById('placa').value.toUpperCase(), 
            "PRODUTO": document.getElementById('produto').value, 
            "TELEFONE": document.getElementById('whatsapp').value, 
            "JORNADA": document.getElementById('jornada24').checked ? "24 HORAS" : document.getElementById('limite').value, 
            "ENTRADA": new Date().toLocaleString() 
        };

        try {
            await fetch(`${RAÍZEN_DB.URL}/rest/v1/registros`, { 
                method: 'POST', 
                headers: RAÍZEN_DB.HEADERS, 
                body: JSON.stringify(novoRegistro) 
            });
            alert("MOTORISTA REGISTRADO COM SUCESSO!"); 
            location.reload();
        } catch (erro) {
            alert("ERRO AO SALVAR NO BANCO!");
        } finally {
            setLoader(false);
        }
    };

    // --- REABERTURA ---

    function abrirReabertura() { 
        document.getElementById('form-principal-wrapper').style.display = 'none'; 
        document.getElementById('form-reabertura-wrapper').style.display = 'block'; 
    }

    function fecharReabertura() { 
        document.getElementById('form-reabertura-wrapper').style.display = 'none'; 
        document.getElementById('form-principal-wrapper').style.display = 'block'; 
    }

    async function processarReabertura() {
        const placaRe = document.getElementById('re_placa').value.toUpperCase();
        const horaRe = document.getElementById('re_hora').value;
        
        setLoader(true);
        
        try {
            const resBusca = await fetch(`${RAÍZEN_DB.URL}/rest/v1/registros?PLACA=eq.${placaRe}&SAIDA=is.null`, { 
                headers: RAÍZEN_DB.HEADERS 
            });
            const listaEncontrada = await resBusca.json();
            
            if (listaEncontrada.length > 0) {
                await fetch(`${RAÍZEN_DB.URL}/rest/v1/registros?ID=eq.${listaEncontrada[0].ID}`, { 
                    method: 'PATCH', 
                    headers: RAÍZEN_DB.HEADERS, 
                    body: JSON.stringify({ "JORNADA": horaRe }) 
                });
                alert("JORNADA REABERTA!"); 
                location.reload();
            } else { 
                alert("VEÍCULO NÃO ESTÁ NO PÁTIO!"); 
                setLoader(false); 
            }
        } catch (e) {
            alert("ERRO!");
            setLoader(false);
        }
    }

    /* FIM DO CÓDIGO FONTE BLINDADO - V27.5

</script>
