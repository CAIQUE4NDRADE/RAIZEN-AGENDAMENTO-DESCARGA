<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAÍZEN | TERMINAL DE PAULINIA</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --raizen-purple: #84207d;
            --raizen-green: #4d6d5d;
            --white: #ffffff;
            --shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: #f0f2f5; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
        }

        /* HEADER COM LOGO EM SVG (NÃO QUEBRA NUNCA) */
        header { 
            background: var(--raizen-green);
            width: 100%; 
            padding: 25px 0; 
            text-align: center; 
            border-bottom: 8px solid var(--raizen-purple); 
            box-shadow: var(--shadow);
        }

        .logo-container {
            margin-bottom: 10px;
        }

        header h1 { 
            color: white; 
            margin: 0; 
            font-size: 18px; 
            letter-spacing: 5px; 
            text-transform: uppercase;
            font-weight: 300;
        }

        /* CONTAINER PRINCIPAL */
        .main-card { 
            width: 90%; 
            max-width: 600px; 
            background: white; 
            margin: 30px auto; 
            padding: 40px; 
            border-radius: 30px; 
            box-shadow: var(--shadow);
            border-left: 10px solid var(--raizen-purple);
        }

        #admin-panel { display: none; max-width: 95%; width: 1700px; }

        h2 { color: var(--raizen-purple); text-align: center; margin-bottom: 30px; text-transform: uppercase; }

        /* CAMPOS DE FORMULÁRIO */
        .field { margin-bottom: 20px; }
        
        label { font-weight: bold; color: #444; display: block; margin-bottom: 8px; text-transform: uppercase; font-size: 13px; }

        input, select { 
            width: 100%; 
            padding: 18px; 
            border: 2px solid #ddd; 
            border-radius: 15px; 
            font-size: 16px; 
            background: #fafafa;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--raizen-purple); outline: none; background: white; }

        .btn-submit { 
            width: 100%; 
            padding: 22px; 
            background: var(--raizen-purple);
            color: white; 
            border: none; 
            border-radius: 15px; 
            font-size: 20px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 20px;
            text-transform: uppercase;
        }

        /* AJUSTE DO LINK ADMINISTRATIVO (MAIS VISÍVEL) */
        .admin-trigger {
            display: block;
            margin-top: 40px;
            text-align: center;
            color: var(--raizen-purple) !important; /* Cor forte para visibilidade */
            font-weight: 800;
            text-decoration: underline;
            font-size: 14px;
            cursor: pointer;
        }

        /* TABELA DE GESTÃO */
        .table-area { overflow-x: auto; margin-top: 20px; border-radius: 20px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; min-width: 1400px; }
        th { background: #f8f9fa; padding: 20px; border-bottom: 2px solid #eee; text-transform: uppercase; font-size: 12px; }
        td { padding: 18px; border-bottom: 1px solid #eee; text-align: center; font-weight: bold; }

        .badge { padding: 8px 15px; border-radius: 10px; color: white; font-size: 11px; }
        .bg-gas { background: #f39c12; color: #000; }
        .bg-bio { background: #000; }
        .bg-eta { background: #27ae60; }

        .btn-zap { background: #25D366; color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; }
        .btn-done { background: #3498db; color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 5px; }

    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <svg width="180" height="50" viewBox="0 0 300 80" xmlns="http://www.w3.org/2000/svg">
            <path d="M25.2 20.5c0 14.1-11.5 25.6-25.6 25.6h-2.1v12.8h-11.8V20.5h39.5zm-25.6 13.9c7.7 0 13.9-6.2 13.9-13.9s-6.2-13.9-13.9-13.9h-2.1v27.8h2.1zM65.4 58.9l-3.8-10.4H45.8l-3.8 10.4h-12.2l15.8-38.4h12.5l15.8 38.4H65.4zm-15.6-32.3l-8.2 21.9h16.4l-8.2-21.9zM88.5 20.5v38.4H76.7V20.5h11.8zM128.5 20.5L108.2 58.9h-12.5l15.8-38.4h12.5l12.5 38.4h-12.2l-3.3-10.4h-15.8l-3.3 10.4h-12.2l15.8-38.4h12.5zM140.5 20.5h32.5v10.4h-20.7v5.5h18.2v10.4h-18.2v6.6h20.7v10.4h-32.5V20.5zM180.5 20.5l25.5 28.5V20.5h11.8v38.4h-9.5l-27.8-31.5v31.5h-11.8V20.5h11.8z" fill="#ffffff"/>
            <circle cx="270" cy="40" r="25" fill="#ffc107"/>
        </svg>
    </div>
    <h1>TERMINAL PAULÍNIA | PORTAL COLETA</h1>
</header>

<div class="main-card" id="form-motorista">
    <h2><i class="fa-solid fa-truck"></i> REGISTRO DE DESCARGA</h2>
    <form id="raizenForm">
        <div class="field">
            <label>Placa do Veículo</label>
            <input type="text" id="p_placa" placeholder="ABC-1234" maxlength="8" required>
        </div>
        <div class="field">
            <label>Produto</label>
            <select id="p_produto" required>
                <option value="">Selecione...</option>
                <option value="GASOLINA">GASOLINA</option>
                <option value="B100">BIODIESEL B100</option>
                <option value="S10">DIESEL S10</option>
                <option value="ETANOL">ETANOL (ANIDRO/HIDRATADO)</option>
            </select>
        </div>
        <div class="field">
            <label>WhatsApp</label>
            <input type="tel" id="p_zap" placeholder="(19) 99999-9999" required>
        </div>
        <div class="field" style="background:#fff8e1; padding:20px; border-radius:15px;">
            <label>Término da Jornada</label>
            <input type="time" id="p_hora">
            <label style="margin-top:15px; display:flex; align-items:center; gap:10px; cursor:pointer;">
                <input type="checkbox" id="p_24h" style="width:20px; height:20px;"> JORNADA 24 HORAS
            </label>
        </div>
        <button type="submit" class="btn-submit" id="btn_enviar">REGISTRAR ENTRADA</button>
    </form>
    <span class="admin-trigger" onclick="acessoAdmin()">ACESSAR PAINEL DO OPERADOR</span>
</div>

<div class="main-card" id="admin-panel">
    <h2>PAINEL DE GESTÃO - ÁREA 2</h2>
    <div class="table-area">
        <table id="tabelaDados">
            <thead>
                <tr>
                    <th>Placa</th>
                    <th>Produto</th>
                    <th>WhatsApp</th>
                    <th>Jornada</th>
                    <th>No Pátio</th>
                    <th style="background:#fffde7;">PORTAL COLETA</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <button class="btn-submit" style="background:#333;" onclick="location.reload()">SAIR</button>
</div>

<script>
    const API = 'https://sheetdb.io/api/v1/p9z83v5m0dxq5';

    // MÁSCARA PLACA
    document.getElementById('p_placa').oninput = (e) => {
        let v = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
        if (v.length > 3 && !isNaN(v[3])) v = v.substring(0,3) + "-" + v.substring(3,7);
        e.target.value = v.substring(0,8);
    };

    // MÁSCARA ZAP
    document.getElementById('p_zap').oninput = (e) => {
        let r = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !r[2] ? r[1] : '(' + r[1] + ') ' + r[2] + (r[3] ? '-' + r[3] : '');
    };

    async function carregar() {
        const tb = document.querySelector('#tabelaDados tbody');
        tb.innerHTML = "<tr><td colspan='7'>Carregando dados...</td></tr>";
        const res = await fetch(API + "?t=" + Date.now());
        const dados = await res.json();
        tb.innerHTML = "";

        dados.filter(i => i.PLACA && !i.SAIDA).forEach(i => {
            let badge = i.PRODUTO.includes("GAS") ? "bg-gas" : (i.PRODUTO.includes("B100") ? "bg-bio" : "bg-eta");
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="color:#84207d; font-size:18px;">${i.PLACA}</td>
                <td><span class="badge ${badge}">${i.PRODUTO}</span></td>
                <td>${i.TELEFONE}</td>
                <td>${i.JORNADA}</td>
                <td style="font-size:12px; color:#666;">${i.ENTRADA}</td>
                <td style="background:#fffde7;">
                    <input type="datetime-local" id="col-${i.PLACA}" value="${i['AGENDAMENTO NO COLETA'] || ''}" style="font-size:11px; padding:5px;">
                    <button onclick="salvarCol('${i.PLACA}')" style="margin-top:5px; width:100%; font-size:10px;">SALVAR</button>
                </td>
                <td>
                    <button class="btn-zap" onclick="chamar('${i.TELEFONE}')">CHAMAR ZAP</button>
                    <button class="btn-done" onclick="finalizar('${i.PLACA}')">CONCLUIR</button>
                </td>
            `;
            tb.appendChild(tr);
        });
    }

    // CORREÇÃO DO WHATSAPP (FORÇA ABRIR APP NO CELULAR)
    function chamar(tel) {
        const baia = prompt("Informe a BAIA:");
        if(!baia) return;
        const num = tel.replace(/\D/g, "");
        const txt = `Olá! Vamos descarregar? Baia *${baia}* - Área 02. Aguarde a instrução do operador para entrar!`;
        // O "api.whatsapp.com" funciona melhor que "wa.me" em alguns Androids para evitar a tela de erro
        window.open(`https://api.whatsapp.com/send?phone=55${num}&text=${encodeURIComponent(txt)}`, '_blank');
    }

    async function salvarCol(placa) {
        const val = document.getElementById(`col-${placa}`).value;
        await fetch(`${API}/PLACA/${placa}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({"AGENDAMENTO NO COLETA": val})
        });
        alert("Agendado!");
        carregar();
    }

    document.getElementById('raizenForm').onsubmit = async (e) => {
        e.preventDefault();
        document.getElementById('btn_enviar').innerText = "REGISTRANDO...";
        const payload = {
            "PLACA": document.getElementById('p_placa').value,
            "PRODUTO": document.getElementById('p_produto').value,
            "TELEFONE": document.getElementById('p_zap').value,
            "JORNADA": document.getElementById('p_24h').checked ? "24 Horas" : document.getElementById('p_hora').value,
            "ENTRADA": new Date().toLocaleString('pt-BR'),
            "SAIDA": ""
        };
        await fetch(API, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify([payload]) });
        alert("Registrado com sucesso!");
        location.reload();
    };

    async function finalizar(placa) {
        if(confirm("Confirmar saída?")) {
            await fetch(`${API}/PLACA/${placa}`, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({"SAIDA": new Date().toLocaleString('pt-BR')})
            });
            carregar();
        }
    }

    function acessoAdmin() {
        if(prompt("Senha:") === "raizen2026") {
            document.getElementById('form-motorista').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            carregar();
        }
    }
</script>
</body>
</html>
