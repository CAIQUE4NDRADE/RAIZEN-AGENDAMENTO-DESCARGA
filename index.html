<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raízen - CONTROLE DE DESCARGA ÁREA 2 - TERMINAL PAULÍNIA</title>
    <style>
        /* ==========================================================================
           CONFIGURAÇÕES DE DESIGN E IDENTIDADE RAÍZEN
           ========================================================================== */
        :root {
            --verde-raizen: #4d6d5d; 
            --amarelo-raizen: #ffcd00;
            --fundo-cinza: #f0f2f5;
            --branco-puro: #ffffff;
            --vermelho-alerta: #dc3545;
            --verde-sucesso: #28a745;
            --azul-link: #007bff;
            --sombra-box: 0 15px 40px rgba(0,0,0,0.2);
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--fundo-cinza); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        /* CABEÇALHO COM SOMBRA E BORDA AMARELA */
        header { 
            background-color: var(--verde-raizen); 
            width: 100%; 
            padding: 35px 0; 
            text-align: center; 
            border-bottom: 8px solid var(--amarelo-raizen); 
            box-shadow: 0 5px 20px rgba(0,0,0,0.3); 
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        header h1 { 
            color: var(--branco-puro); 
            margin: 0; 
            font-size: 28px; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            font-weight: 900;
        }
        
        /* CONTAINERS DAS TELAS PRINCIPAIS */
        .container { 
            width: 92%; 
            max-width: 680px; 
            margin: 45px auto; 
            background: var(--branco-puro); 
            padding: 45px; 
            border-radius: 30px; 
            box-shadow: var(--sombra-box); 
        }

        /* PAINEL ADMINISTRATIVO (MÁXIMA LARGURA) */
        #admin-panel { 
            display: none; 
            max-width: 98%; 
            width: 1600px; 
        }

        h2 { 
            color: var(--verde-raizen); 
            text-align: center; 
            border-bottom: 4px solid var(--amarelo-raizen); 
            padding-bottom: 20px; 
            margin-bottom: 35px; 
            text-transform: uppercase;
            font-size: 22px;
        }
        
        /* ESTILIZAÇÃO DOS CAMPOS DE ENTRADA */
        label { 
            display: block; 
            margin-top: 25px; 
            font-weight: 800; 
            color: #222; 
            font-size: 17px; 
        }

        input, select { 
            width: 100%; 
            padding: 20px; 
            margin-top: 10px; 
            border: 2px solid #ccc; 
            border-radius: 15px; 
            box-sizing: border-box; 
            font-size: 18px; 
            color: #333;
            transition: all 0.3s ease;
        }
        input:focus { border-color: var(--verde-raizen); outline: none; box-shadow: 0 0 12px rgba(77,109,93,0.3); }

        /* CAMPO DE BUSCA DE PLACA NO PAINEL ADMIN */
        .busca-placa-area {
            background: #e9ecef;
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            border: 1px solid #ddd;
        }
        .busca-placa-area input { margin-top: 0; background: white; border: 2px solid var(--verde-raizen); font-weight: bold; }

        /* BOX DA JORNADA (ESTILO MOTORISTA) */
        .box-jornada {
            background: #f1f5f2;
            padding: 30px;
            border-radius: 20px;
            border: 2px dashed #999;
            margin-top: 30px;
        }

        .check-container {
            display: flex; 
            align-items: center; 
            gap: 20px; 
            cursor: pointer; 
            padding: 20px; 
            background: white; 
            border-radius: 15px; 
            border: 1px solid #ddd; 
            margin-top: 20px;
            user-select: none;
        }
        .check-container input { width: 35px; height: 35px; cursor: pointer; }
        .check-container span { font-size: 19px; font-weight: bold; color: var(--verde-raizen); }

        /* BOTÕES DE AÇÃO */
        .btn-principal { 
            width: 100%; 
            padding: 25px; 
            background-color: var(--verde-raizen); 
            color: white; 
            border: none; 
            border-radius: 15px; 
            font-size: 24px; 
            font-weight: 900; 
            cursor: pointer; 
            margin-top: 35px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            transition: transform 0.2s;
        }
        .btn-principal:active { transform: scale(0.97); }

        /* TABELA DE DADOS - ADMIN */
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        th { background: var(--verde-raizen); color: white; padding: 25px; text-align: center; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 22px; border-bottom: 1px solid #eee; text-align: center; font-size: 15px; font-weight: 700; }
        
        /* STATUS DE AGENDAMENTO (LOGICA DA SETA) */
        .status-pendente { 
            color: white; 
            background: var(--vermelho-alerta); 
            padding: 12px 18px; 
            border-radius: 10px; 
            font-weight: 900; 
            display: inline-block; 
            animation: pulse-vermelho 1.8s infinite;
        }
        .status-agendado { 
            color: #1b5e20; 
            background: #e8f5e9; 
            padding: 14px; 
            border-radius: 12px; 
            border: 3px solid #c8e6c9; 
            display: block; 
            font-size: 16px;
        }

        /* ANIMAÇÕES */
        @keyframes pulse-vermelho { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.05); } 100% { opacity: 1; transform: scale(1); } }
        
        .badge-jornada { padding: 10px 15px; border-radius: 10px; font-weight: bold; font-size: 13px; color: white; }
        .badge-ok { background: var(--verde-sucesso); }
        .badge-vencida { background: var(--vermelho-alerta); animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* BOTÕES INTERNOS DA TABELA */
        .btn-tabela { 
            border: none; border-radius: 10px; padding: 14px; font-weight: bold; cursor: pointer; font-size: 11px; 
            width: 100%; margin-bottom: 10px; color: white; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-agenda { background: white; color: var(--azul-link); border: 2px solid var(--azul-link); }
        .btn-whatsapp { background: #25D366; }
        .btn-finalizar { background: var(--azul-link); }

        /* MODAL DE AGENDAMENTO */
        #modalAgendamento { display:none; position:fixed; z-index:9999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter: blur(12px); }
        .modal-body { background:white; margin:6% auto; padding:50px; border-radius:40px; width:480px; text-align: center; box-shadow: 0 50px 100px rgba(0,0,0,0.7); }
    </style>
</head>
<body>

<header><h1>RAÍZEN - TERMINAL PAULÍNIA</h1></header>

<div class="container" id="tela-entrada">
    <h2>DESCARGA ÁREA 2</h2>
    <form id="formMotorista">
        <label>Placa do Caminhão</label>
        <input type="text" id="placaInput" placeholder="ABC-1234" maxlength="8" required>
        
        <label>Produto para Descarga</label>
        <select id="produtoInput" required>
            <option value="">Clique para selecionar...</option>
            <option value="GASOLINA">GASOLINA</option>
            <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
            <option value="S10">S10</option>
            <option value="ANIDRO">ANIDRO</option>
            <option value="HIDRATADO">HIDRATADO</option>
        </select>

        <label>WhatsApp (com DDD)</label>
        <input type="tel" id="whatsappInput" placeholder="(19) 99999-9999" maxlength="15" required>

        <div class="box-jornada">
            <div id="containerRelogio">
                <label style="margin-top: 0;">Horário que acaba sua Jornada:</label>
                <input type="time" id="fimJornadaInput" required>
            </div>
            <label class="check-container">
                <input type="checkbox" id="check24horas" onchange="toggleRelogio()">
                <span>Minha jornada é de 24 Horas</span>
            </label>
        </div>

        <button type="submit" class="btn-principal" id="btnSalvarMotorista">CONCLUIR REGISTRO</button>
    </form>
    <div style="text-align:center; margin-top:30px;">
        <button onclick="acessarAdmin()" style="background:none; border:none; color:#bbb; text-decoration:underline; cursor:pointer; font-size:15px;">Acesso Administrativo</button>
    </div>
</div>

<div class="container" id="admin-panel">
    <h2>GESTÃO DE PÁTIO - ÁREA 2</h2>
    
    <div class="busca-placa-area">
        <strong style="color:var(--verde-raizen); font-size:18px;">🔎 FILTRAR PLACA:</strong>
        <input type="text" id="campoBuscaPlaca" placeholder="Digite a placa para buscar..." onkeyup="executarFiltro()">
    </div>

    <div style="overflow-x: auto;">
        <table id="tabelaGeral">
            <thead>
                <tr>
                    <th>Placa</th>
                    <th>WhatsApp</th>
                    <th>Jornada</th>
                    <th style="background:#2d4a3e; color:white; width: 240px;">AGENDAMENTO:</th>
                    <th>Espera</th>
                    <th style="width: 190px;">Controles</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
    <button class="btn-principal" style="background:#555;" onclick="window.location.reload()">SAIR DO SISTEMA</button>
</div>

<div id="modalAgendamento">
    <div class="modal-body">
        <h3 style="margin-top:0; font-size:24px;">Definir Agendamento</h3>
        <p id="placaDestaqueModal" style="font-weight:bold; font-size:26px; color:var(--verde-raizen); margin: 20px 0;"></p>
        <input type="hidden" id="placaAlvoHidden">
        
        <label>Escolha a Data:</label>
        <input type="date" id="inputDataColeta">
        
        <label>Escolha o Horário:</label>
        <input type="time" id="inputHoraColeta">
        
        <button class="btn-principal" id="btnSalvarAgendaFinal" onclick="enviarDadosParaPlanilha()">CONFIRMAR NA PLANILHA</button>
        <button onclick="fecharModalAgendamento()" style="margin-top:25px; border:none; background:none; color:red; font-weight:bold; cursor:pointer; font-size:16px;">CANCELAR OPERAÇÃO</button>
    </div>
</div>

<script>
    const SHEET_API = 'https://sheetdb.io/api/v1/p9z83v5m0dxq5';

    // FUNÇÕES DE INTERFACE DO MOTORISTA
    function toggleRelogio() {
        const is24h = document.getElementById('check24horas').checked;
        document.getElementById('containerRelogio').style.display = is24h ? 'none' : 'block';
        document.getElementById('fimJornadaInput').required = !is24h;
    }

    // MÁSCARAS DE INPUT (PLACA E CELULAR)
    document.getElementById('whatsappInput').addEventListener('input', (e) => {
        let v = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !v[2] ? v[1] : '(' + v[1] + ') ' + v[2] + (v[3] ? '-' + v[3] : '');
    });
    document.getElementById('placaInput').addEventListener('input', (e) => {
        let v = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
        if (v.length > 3 && !isNaN(v[3])) v = v.substring(0,3) + "-" + v.substring(3,7);
        e.target.value = v.substring(0,8);
    });

    // FUNÇÃO DE BUSCA/FILTRO (O QUE TINHA SUMIDO)
    function executarFiltro() {
        const filter = document.getElementById("campoBuscaPlaca").value.toUpperCase();
        const trs = document.getElementById("tabelaGeral").getElementsByTagName("tr");
        for (let i = 1; i < trs.length; i++) {
            let td = trs[i].getElementsByTagName("td")[0];
            if (td) {
                let txt = td.textContent || td.innerText;
                trs[i].style.display = txt.toUpperCase().indexOf(filter) > -1 ? "" : "none";
            }
        }
    }

    // CARREGAMENTO DA TABELA COM LÓGICA DE SUMIR O PENDENTE
    function carregarTabelaDados() {
        const tbody = document.querySelector('#tabelaGeral tbody');
        tbody.innerHTML = "<tr><td colspan='6'>Buscando informações na nuvem Raízen...</td></tr>";

        fetch(SHEET_API + "?t=" + new Date().getTime())
        .then(res => res.json())
        .then(data => {
            tbody.innerHTML = "";
            data.filter(row => row.PLACA && !row.SAIDA).forEach(row => {
                
                // --- LÓGICA DA SETA: SE TIVER COLETA, SOME O PENDENTE ---
                let agendamentoHTML = "";
                if (row.COLETA && row.COLETA.trim() !== "" && row.COLETA !== "undefined" && row.COLETA !== "null") {
                    agendamentoHTML = `<span class="status-agendado">📅 ${row.COLETA}</span>`;
                } else {
                    agendamentoHTML = `<span class="status-pendente">⚠️ PENDENTE</span>`;
                }

                tbody.innerHTML += `
                    <tr>
                        <td style="font-size:17px;">${row.PLACA}</td>
                        <td>${row.TELEFONE}</td>
                        <td>${formatarJornada(row.JORNADA)}</td>
                        <td style="background:#fcfcfc">${agendamentoHTML}</td>
                        <td style="color:#777;">${calcularTempoPatio(row.ENTRADA)}</td>
                        <td>
                            <button class="btn-tabela btn-agenda" onclick="abrirModalAgenda('${row.PLACA}')">📅 AGENDAR</button>
                            <button class="btn-tabela btn-whatsapp" onclick="enviarMensagem('${row.TELEFONE}', '${row.PLACA}', '${row.COLETA}')">📱 CHAMAR</button>
                            <button class="btn-tabela btn-finalizar" onclick="registrarSaida('${row.PLACA}')">✅ FINALIZAR</button>
                        </td>
                    </tr>`;
            });
        });
    }

    // AUXILIARES DE CÁLCULO
    function formatarJornada(valor) {
        if (!valor || valor === "24 Horas") return '<span class="badge-jornada badge-ok">LIBERADA (24H)</span>';
        const [h, m] = valor.split(':');
        const d = new Date(); d.setHours(h, m, 0);
        return (d < new Date()) ? `<span class="badge-jornada badge-vencida">VENCIDA (${valor})</span>` : `<span class="badge-jornada badge-ok">EM DIA (${valor})</span>`;
    }

    function calcularTempoPatio(entrada) {
        if(!entrada) return "0 min";
        const partes = entrada.split(', ');
        const dataP = partes[0].split('/'); const horaP = partes[1].split(':');
        const dtEntrada = new Date(dataP[2], dataP[1]-1, dataP[0], horaP[0], horaP[1]);
        const diff = Math.floor((new Date() - dtEntrada) / 60000);
        return diff > 60 ? Math.floor(diff/60) + "h " + (diff%60) + "m" : diff + " min";
    }

    // MODAL E GRAVAÇÃO
    function abrirModalAgenda(placa) {
        document.getElementById('placaAlvoHidden').value = placa;
        document.getElementById('placaDestaqueModal').innerText = "VEÍCULO: " + placa;
        document.getElementById('modalAgendamento').style.display = 'block';
    }
    function fecharModalAgendamento() { document.getElementById('modalAgendamento').style.display = 'none'; }

    function enviarDadosParaPlanilha() {
        const placa = document.getElementById('placaAlvoHidden').value;
        const dt = document.getElementById('inputDataColeta').value.split('-').reverse().join('/');
        const hr = document.getElementById('inputHoraColeta').value;
        if(!dt || !hr || dt === "") return alert("Selecione a Data e Hora!");

        const btn = document.getElementById('btnSalvarAgendaFinal');
        btn.innerText = "GRAVANDO...";

        fetch(`${SHEET_API}/PLACA/${placa}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ "COLETA": dt + " às " + hr })
        }).then(() => {
            fecharModalAgendamento();
            carregarTabelaDados();
            btn.innerText = "CONFIRMAR NA PLANILHA";
        });
    }

    // REGISTRO DE MOTORISTA
    document.getElementById('formMotorista').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSalvarMotorista');
        btn.innerText = "ENVIANDO...";

        const payload = {
            "PLACA": document.getElementById('placaInput').value,
            "PRODUTO": document.getElementById('produtoInput').value,
            "TELEFONE": document.getElementById('whatsappInput').value,
            "JORNADA": document.getElementById('check24horas').checked ? "24 Horas" : document.getElementById('fimJornadaInput').value,
            "ENTRADA": new Date().toLocaleString('pt-BR'),
            "COLETA": "", "SAIDA": ""
        };

        fetch(SHEET_API, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify([payload]) })
        .then(() => { alert("Entrada Confirmada!"); location.reload(); });
    });

    function acessarAdmin() { if (prompt("Digite a Senha Raízen:") === "raizen2026") { document.getElementById('tela-entrada').style.display='none'; document.getElementById('admin-panel').style.display='block'; carregarTabelaDados(); } }
    function registrarSaida(placa) { if(confirm("Liberar saída do veículo?")) fetch(`${SHEET_API}/PLACA/${placa}`, { method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ "SAIDA": new Date().toLocaleString() }) }).then(() => carregarTabelaDados()); }
    function enviarMensagem(tel, placa, coleta) {
        const baia = prompt("Qual a BAIA de descarga?");
        if(baia) {
            const texto = `*TERMINAL RAÍZEN PAULÍNIA*%0APLACA: *${placa}*%0ACOLETA: *${coleta || 'Pendente'}*%0ABAIA: *${baia}*%0A%0AFavor dirigir-se à descarga imediatamente.`;
            window.open(`https://web.whatsapp.com/send?phone=55${tel.replace(/\D/g, "")}&text=${texto}`);
        }
    }
</script>
</body>
</html>
