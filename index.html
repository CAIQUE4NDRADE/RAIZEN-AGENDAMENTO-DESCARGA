<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200"> 
    <title>RAÍZEN - GESTÃO OPERACIONAL V28.0</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- DESIGN SYSTEM INDUSTRIAL RAÍZEN (MANTIDO) --- */
        :root {
            --verde-raizen: #4d6d5d;
            --roxo-raizen: #84207d;
            --ouro-raizen: #ffc107;
            --fundo-base: #f1f5f9;
            --branco: #ffffff;
            --cor-erro: #e11d48;
            --cor-sucesso: #10b981;
            --sombra-premium: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
        body { background-color: var(--fundo-base); color: #1e293b; min-height: 100vh; padding-bottom: 80px; overflow-x: auto; }

        header { 
            background: linear-gradient(135deg, var(--verde-raizen) 0%, #1a241f 100%); 
            padding: 100px 20px; text-align: center; border-bottom: 30px solid var(--roxo-raizen);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4); position: relative;
        }
        .logo-display { color: var(--branco); font-size: 110px; font-weight: 900; letter-spacing: 25px; text-transform: uppercase; text-shadow: 5px 5px 0px rgba(0,0,0,0.2); }

        /* NOVO: DESIGN DO PAINEL DE SUPERVISÃO */
        #painel-supervisao {
            width: 98%; max-width: 1900px; margin: 20px auto; display: none;
            background: #1e293b; color: white; padding: 30px; border-radius: 35px;
            box-shadow: var(--sombra-premium); border-left: 15px solid var(--ouro-raizen);
            zoom: 0.75;
        }
        .grid-estoque { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-top: 15px; }
        .card-estoque { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; text-align: center; }
        .card-estoque h4 { font-size: 11px; margin-bottom: 10px; color: var(--ouro-raizen); text-transform: uppercase; }
        .card-estoque input { background: #f8fafc; color: #1e293b; padding: 15px; font-size: 22px; border-radius: 12px; text-align: center; border: none; width: 100%; font-weight: 900; }

        .card-master { width: 94%; max-width: 1150px; margin: -60px auto 60px; background: var(--branco); padding: 70px; border-radius: 45px; box-shadow: var(--sombra-premium); border-left: 35px solid var(--roxo-raizen); position: relative; z-index: 10; }
        #modulo-operador-full { display: none; width: 98%; max-width: 1900px; margin: 40px auto; background: var(--branco); padding: 45px; border-radius: 35px; box-shadow: var(--sombra-premium); zoom: 0.75; }

        h2 { color: var(--roxo-raizen); text-align: center; font-weight: 900; text-transform: uppercase; margin-bottom: 50px; font-size: 38px; border-bottom: 12px solid #f8fafc; padding-bottom: 25px; }

        /* TABELA E COMPONENTES MANTIDOS */
        .moldura-tabela { overflow-x: auto; border-radius: 30px; border: 3px solid #f1f5f9; }
        table { width: 100%; border-collapse: collapse; min-width: 1950px; background: white; }
        th { background: #1e293b; color: white; padding: 25px; font-size: 13px; text-transform: uppercase; }
        td { padding: 20px; border-bottom: 3px solid #f8fafc; text-align: center; font-weight: 700; font-size: 17px; }

        .tag-p { padding: 12px 20px; border-radius: 15px; font-size: 13px; font-weight: 900; color: white; display: inline-block; min-width: 160px; }
        .bg-gas { background: #ff8c00; } .bg-b100 { background: #5d4037; } .bg-ani { background: #0056b3; } .bg-hid { background: #00a8ff; border: 2px solid #0056b3; } .bg-die { background: #334155; }

        .input-edit-table { padding: 12px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; font-weight: 900; width: 100%; text-align: center; background: #f8fafc; }
        .btn-master { width: 100%; padding: 35px; background: var(--roxo-raizen); color: white; border: none; border-radius: 30px; font-size: 26px; font-weight: 900; cursor: pointer; text-transform: uppercase; box-shadow: 0 15px 0 #5e1659; margin-bottom: 25px; display: flex; justify-content: center; align-items: center; gap: 20px; }
        
        #loader-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; }
        .raizen-spinner { width: 90px; height: 90px; border: 12px solid #f3f3f3; border-top: 12px solid var(--roxo-raizen); border-radius: 50%; animation: girar 1s linear infinite; }
        @keyframes girar { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader-overlay"><div class="raizen-spinner"></div><h2 style="border:none; margin-top:25px;">SINCRONIZANDO...</h2></div>

<header><div class="logo-display">RAÍZEN</div></header>

<div id="painel-supervisao">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h3 style="color: var(--ouro-raizen); margin: 0; font-size: 24px;"><i class="fa-solid fa-warehouse"></i> ESPAÇO DISPONÍVEL NOS TANQUES (L)</h3>
        <button onclick="desbloquearEstoque()" id="btn-trava-estoque" style="background: var(--ouro-raizen); color: #1e293b; border: none; padding: 15px 30px; border-radius: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase;">
            <i class="fa-solid fa-lock"></i> Alterar Espaço
        </button>
    </div>
    <div class="grid-estoque">
        <div class="card-estoque"><h4>GASOLINA</h4><input type="number" id="est-GASOLINA" value="200000" readonly onchange="salvarEstoqueLocal()"></div>
        <div class="card-estoque"><h4>B100</h4><input type="number" id="est-BIODIESEL" value="200000" readonly onchange="salvarEstoqueLocal()"></div>
        <div class="card-estoque"><h4>ANIDRO</h4><input type="number" id="est-ANIDRO" value="200000" readonly onchange="salvarEstoqueLocal()"></div>
        <div class="card-estoque"><h4>HIDRATADO</h4><input type="number" id="est-HIDRATADO" value="200000" readonly onchange="salvarEstoqueLocal()"></div>
        <div class="card-estoque"><h4>DIESEL S10</h4><input type="number" id="est-DIESEL" value="200000" readonly onchange="salvarEstoqueLocal()"></div>
    </div>
</div>

<div class="card-master" id="secao-entrada">
    <div id="form-principal-wrapper">
        <h2><i class="fa-solid fa-truck-ramp-box"></i> REGISTRO DE ENTRADA</h2>
        <form id="formMaster">
            <div class="wrapper-input">
                <label><i class="fa-solid fa-barcode"></i> PLACA DO VEÍCULO</label>
                <input type="text" id="placa" placeholder="AAA-0000" maxlength="8" required>
            </div>
            <div class="wrapper-input">
                <label><i class="fa-solid fa-gas-pump"></i> PRODUTO</label>
                <select id="produto" required>
                    <option value="">-- SELECIONE --</option>
                    <option value="GASOLINA">GASOLINA</option>
                    <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
                    <option value="ETANOL ANIDRO">ETANOL ANIDRO</option>
                    <option value="ETANOL HIDRATADO">ETANOL HIDRATADO</option>
                    <option value="DIESEL S10">DIESEL S10</option>
                </select>
            </div>
            <div class="wrapper-input">
                <label><i class="fa-brands fa-whatsapp"></i> WHATSAPP MOTORISTA</label>
                <input type="tel" id="whatsapp" placeholder="(19) 99999-9999" required>
            </div>
            
            <div style="background: #fffbeb; padding: 40px; border-radius: 40px; border: 4px dashed var(--ouro-raizen); margin: 45px 0;">
                <div id="area-tempo">
                    <label><i class="fa-solid fa-clock"></i> HORÁRIO LIMITE JORNADA</label>
                    <input type="time" id="limite" required> 
                </div>
                <label style="margin-top:25px; display:flex; align-items:center; gap:20px; cursor:pointer; font-size: 20px; font-weight: 900; color: var(--roxo-raizen);">
                    <input type="checkbox" id="jornada24" style="width:35px; height:35px;"> HABILITAR JORNADA 24 HORAS
                </label>
            </div>

            <button type="submit" class="btn-master">CONFIRMAR REGISTRO</button>
            <button type="button" onclick="abrirReabertura()" class="btn-master" style="background:#475569; box-shadow: 0 15px 0 #2d3748; font-size:18px;">
                <i class="fa-solid fa-clock-rotate-left"></i> REABRIR JORNADA EXISTENTE
            </button>
        </form>
    </div>

    <div id="form-reabertura-wrapper" style="display:none;">
        <h2 style="color:#475569">REABRIR REGISTRO</h2>
        <div class="wrapper-input">
            <label>PLACA</label>
            <input type="text" id="re_placa" placeholder="AAA-0000" maxlength="8">
        </div>
        <div class="wrapper-input">
            <label>NOVA HORA LIMITE</label>
            <input type="time" id="re_hora">
        </div>
        <button onclick="processarReabertura()" class="btn-master" style="background:#475569">ATUALIZAR JORNADA</button>
        <button onclick="fecharReabertura()" style="width:100%; background:none; border:none; color:var(--roxo-raizen); font-weight:900; cursor:pointer; padding:20px;">CANCELAR</button>
    </div>

    <div style="text-align:center; margin-top:50px;">
        <button onclick="ativarOperador()" style="background:none; border:none; color:var(--roxo-raizen); font-weight:900; cursor:pointer; text-transform:uppercase; letter-spacing:2px;">
            <i class="fa-solid fa-lock"></i> ACESSO OPERACIONAL
        </button>
    </div>
</div>

<div id="modulo-operador-full">
    <h2>PAINEL DE CONTROLE DE PÁTIO</h2>
    <div class="filtros-top" style="display: flex; gap: 20px; margin-bottom: 40px; justify-content: center;">
        <button class="chip-filtro active" onclick="filtrar('TODOS', this)" style="padding: 18px 40px; border-radius: 20px; border: none; font-weight: 900; cursor: pointer;">TODOS</button>
        </div>

    <div class="moldura-tabela">
        <table>
            <thead>
                <tr>
                    <th>VEÍCULO</th>
                    <th>PRODUTO</th>
                    <th>VOLUME (L)</th>
                    <th>JORNADA</th>
                    <th>ENTRADA</th>
                    <th style="background:#fff7ed; color:#c2410c;">AGENDAMENTO</th>
                    <th style="background:#f0fdf4; color:#166534;">TELEFONE</th>
                    <th>AÇÕES</th>
                    <th>FINALIZAR</th>
                </tr>
            </thead>
            <tbody id="listaFila"></tbody>
        </table>
    </div>
    <div style="margin-top:40px; display:flex; gap:25px;">
        <button class="btn-master" style="background:#1e293b; box-shadow: 0 15px 0 #0f172a;" onclick="location.reload()">VOLTAR</button>
        <button class="btn-master" style="background:var(--verde-raizen); box-shadow: 0 15px 0 #2d3e35;" onclick="carregarDados()">ATUALIZAR DADOS</button>
    </div>
</div>

<script>
    const RAÍZEN_DB = {
        URL: 'https://rbbkjuiizmvatiawfzuv.supabase.co',
        KEY: 'sb_publishable_WkrHi6cWtZsnsDXl0nh1hA_kz1UT_1X',
        HEADERS: { 
            "apikey": 'sb_publishable_WkrHi6cWtZsnsDXl0nh1hA_kz1UT_1X', 
            "Authorization": `Bearer sb_publishable_WkrHi6cWtZsnsDXl0nh1hA_kz1UT_1X`, 
            "Content-Type": "application/json",
            "Prefer": "return=minimal"
        }
    };

    let memoriaFila = [];
    let filtroAtivo = 'TODOS';

    /* --- GESTÃO DE ESTOQUE/TANQUES --- */
    function desbloquearEstoque() {
        if(prompt("SENHA DE SUPERVISÃO:") === "super2026") {
            const inputs = document.querySelectorAll('.card-estoque input');
            inputs.forEach(i => {
                i.readOnly = false;
                i.style.background = "#fff";
                i.style.border = "2px solid var(--cor-sucesso)";
            });
            document.getElementById('btn-trava-estoque').innerHTML = '<i class="fa-solid fa-lock-open"></i> EDITANDO...';
        } else { alert("SENHA INCORRETA!"); }
    }

    function salvarEstoqueLocal() {
        const estoque = {
            GASOLINA: document.getElementById('est-GASOLINA').value,
            BIODIESEL: document.getElementById('est-BIODIESEL').value,
            ANIDRO: document.getElementById('est-ANIDRO').value,
            HIDRATADO: document.getElementById('est-HIDRATADO').value,
            DIESEL: document.getElementById('est-DIESEL').value
        };
        localStorage.setItem('estoqueRaizen_V28', JSON.stringify(estoque));
        
        // Retrava
        const inputs = document.querySelectorAll('.card-estoque input');
        inputs.forEach(i => { i.readOnly = true; i.style.background = "#f8fafc"; i.style.border = "none"; });
        document.getElementById('btn-trava-estoque').innerHTML = '<i class="fa-solid fa-lock"></i> Alterar Espaço';
    }

    function carregarEstoque() {
        const salvo = JSON.parse(localStorage.getItem('estoqueRaizen_V28'));
        if(salvo) {
            document.getElementById('est-GASOLINA').value = salvo.GASOLINA;
            document.getElementById('est-BIODIESEL').value = salvo.BIODIESEL;
            document.getElementById('est-ANIDRO').value = salvo.ANIDRO;
            document.getElementById('est-HIDRATADO').value = salvo.HIDRATADO;
            document.getElementById('est-DIESEL').value = salvo.DIESEL;
        }
    }

    /* --- FUNÇÕES DO BANCO E TABELA --- */
    async function carregarDados() {
        setLoader(true);
        try {
            const res = await fetch(`${RAÍZEN_DB.URL}/rest/v1/registros?SAIDA=is.null&select=*`, { headers: RAÍZEN_DB.HEADERS });
            memoriaFila = await res.json();
            renderTabela();
        } finally { setLoader(false); }
    }

    function renderTabela() {
        const corpo = document.getElementById('listaFila');
        corpo.innerHTML = "";
        let lista = [...memoriaFila];
        if (filtroAtivo !== 'TODOS') lista = lista.filter(i => i.PRODUTO.toUpperCase().includes(filtroAtivo));

        lista.forEach(item => {
            const id = item.ID;
            const corTag = item.PRODUTO.includes("GASOLINA") ? "bg-gas" : item.PRODUTO.includes("BIODIESEL") ? "bg-b100" : item.PRODUTO.includes("ANIDRO") ? "bg-ani" : item.PRODUTO.includes("HIDRATADO") ? "bg-hid" : "bg-die";
            
            corpo.innerHTML += `
                <tr>
                    <td style="color:var(--roxo-raizen); font-weight:900; font-size:22px;">${item.PLACA}</td>
                    <td><span class="tag-p ${corTag}">${item.PRODUTO}</span></td>
                    <td><input type="number" id="vol-${id}" class="input-edit-table" value="${item.VOLUME || ''}" placeholder="LITROS"></td>
                    <td>${verificarJornada(item.JORNADA)}</td>
                    <td style="font-size:12px; color:#64748b;">${item.ENTRADA}</td>
                    <td style="background:#fffbeb;">
                        <input type="datetime-local" id="ag-${id}" value="${item.AGENDAMENTO ? item.AGENDAMENTO.slice(0,16) : ''}" class="input-edit-table">
                        <button onclick="salvarCampo('${id}', 'AGENDAMENTO')" class="btn-acao-tabela" style="background:var(--verde-raizen); color:white; border:none; padding:5px; border-radius:5px; margin-top:5px; cursor:pointer; width:100%;">SALVAR</button>
                    </td>
                    <td style="background:#f0fdf4;">
                        <input type="text" id="tel-${id}" value="${item.TELEFONE}" class="input-edit-table">
                        <button onclick="salvarCampo('${id}', 'TELEFONE')" class="btn-acao-tabela" style="background:#166534; color:white; border:none; padding:5px; border-radius:5px; margin-top:5px; cursor:pointer; width:100%;">SALVAR</button>
                    </td>
                    <td><button onclick="chamarWhatsApp('${item.TELEFONE}', '${item.PLACA}', '${id}')" style="background:#25d366; color:white; border:none; padding:15px; border-radius:15px; cursor:pointer; font-weight:900; width:100%;"><i class="fa-brands fa-whatsapp"></i> CONVOCAR</button></td>
                    <td><button onclick="tentarFinalizar('${id}', '${item.PRODUTO}')" style="background:#3b82f6; color:white; border:none; padding:15px; border-radius:15px; cursor:pointer; font-weight:900; width:100%;">SAÍDA</button></td>
                </tr>`;
        });
    }

    async function tentarFinalizar(id, produto) {
        const volInput = document.getElementById(`vol-${id}`).value;
        const volCaminhao = parseFloat(volInput);
        
        if(!volCaminhao || volCaminhao <= 0) {
            alert("ERRO: Informe o VOLUME descarregado antes da saída!");
            return;
        }

        let chaveEstoque = produto.includes("GASOLINA") ? "GASOLINA" : produto.includes("BIODIESEL") ? "BIODIESEL" : produto.includes("ANIDRO") ? "ANIDRO" : produto.includes("HIDRATADO") ? "HIDRATADO" : "DIESEL";
        const campoEstoque = document.getElementById(`est-${chaveEstoque}`);
        const estoqueAtual = parseFloat(campoEstoque.value);

        if(volCaminhao > estoqueAtual) {
            alert(`🚨 BLOQUEADO: Espaço insuficiente no tanque de ${chaveEstoque}!\nDisponível: ${estoqueAtual}L\nCaminhão: ${volCaminhao}L`);
            return;
        }

        if(confirm(`Confirmar saída e subtrair ${volCaminhao}L de ${chaveEstoque}?`)) {
            setLoader(true);
            campoEstoque.value = (estoqueAtual - volCaminhao).toFixed(0);
            salvarEstoqueLocal();

            await fetch(`${RAÍZEN_DB.URL}/rest/v1/registros?ID=eq.${id}`, {
                method: 'PATCH', headers: RAÍZEN_DB.HEADERS, body: JSON.stringify({ "SAIDA": new Date().toLocaleString('pt-BR'), "VOLUME": volCaminhao })
            });
            carregarDados();
        }
    }

    /* --- MANTENDO DEMAIS FUNÇÕES ORIGINAIS DA V26.9 --- */
    function verificarJornada(h) {
        if(h === "24 HORAS") return "<b style='color:green'>● 24H LIBERADA</b>";
        if(!h) return "---";
        const limite = new Date(); const [hr, min] = h.split(':');
        limite.setHours(parseInt(hr), parseInt(min), 0);
        return (new Date() > limite) ? `<b style="color:var(--cor-erro)">● EXPIRADA</b>` : `<b style="color:var(--cor-sucesso)">● EM DIA</b>`;
    }

    async function salvarCampo(id, campo) {
        let valor = document.getElementById(campo === 'AGENDAMENTO' ? `ag-${id}` : `tel-${id}`).value;
        setLoader(true);
        await fetch(`${RAÍZEN_DB.URL}/rest/v1/registros?ID=eq.${id}`, {
            method: 'PATCH', headers: RAÍZEN_DB.HEADERS, body: JSON.stringify({ [campo]: valor })
        });
        setLoader(false);
        alert("ATUALIZADO!");
    }

    function chamarWhatsApp(tel, placa, id) {
        const baia = prompt("Motorista para a BAIA:");
        if(!baia) return;
        const msg = encodeURIComponent(`Olá\nMotorista da placa ${placa}\nFavor encostar na Baia ${baia}\nObrigado!`);
        window.open(`https://wa.me/55${tel.replace(/\D/g, "")}?text=${msg}`, '_blank');
    }

    function ativarOperador() {
        if(prompt("SENHA OPERACIONAL:") === "raizen2026") {
            document.getElementById('secao-entrada').style.display = 'none';
            document.getElementById('modulo-operador-full').style.display = 'block';
            document.getElementById('painel-supervisao').style.display = 'block';
            carregarEstoque();
            carregarDados();
        }
    }

    function setLoader(v) { document.getElementById('loader-overlay').style.display = v ? 'flex' : 'none'; }
    function abrirReabertura() { document.getElementById('form-principal-wrapper').style.display = 'none'; document.getElementById('form-reabertura-wrapper').style.display = 'block'; }
    function fecharReabertura() { document.getElementById('form-reabertura-wrapper').style.display = 'none'; document.getElementById('form-principal-wrapper').style.display = 'block'; }

    // Scripts de máscara e submit originais mantidos...
    document.getElementById('formMaster').onsubmit = async e => {
        e.preventDefault();
        setLoader(true);
        const data = {
            "PLACA": document.getElementById('placa').value.toUpperCase(),
            "PRODUTO": document.getElementById('produto').value,
            "TELEFONE": document.getElementById('whatsapp').value,
            "JORNADA": document.getElementById('jornada24').checked ? "24 HORAS" : document.getElementById('limite').value,
            "ENTRADA": new Date().toLocaleString('pt-BR')
        };
        await fetch(`${RAÍZEN_DB.URL}/rest/v1/registros`, { method: 'POST', headers: RAÍZEN_DB.HEADERS, body: JSON.stringify(data) });
        location.reload();
    };
</script>
</body>
</html>
